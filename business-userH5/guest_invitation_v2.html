<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>访客邀约</title>
    <link rel="stylesheet" href="/business-common/list-style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #30c2b3; --bg: #f5f7fa; --card-bg: #fff; --text: #333; --text-secondary: #666; --border: #e8e8e8; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg); font-size: 14px; color: var(--text); min-height: 100vh; }
        
        /* 页面容器 */
        .page-container { min-height: 100vh; display: flex; flex-direction: column; }
        
        /* 头部 */
        .header { background: linear-gradient(135deg, #30c2b3 0%, #20b2aa 100%); color: #fff; padding: 16px 20px; position: sticky; top: 0; z-index: 100; }
        .header-title { font-size: 18px; font-weight: 600; text-align: center; }
        
        /* 刷新/加载提示 */
        .refresh-tip, .loading-tip { text-align: center; padding: 12px; color: var(--text-secondary); font-size: 13px; }
        .refresh-tip { display: none; }
        .refresh-tip.show { display: block; }
        .loading-tip { display: none; }
        .loading-tip.show { display: block; }
        .loading-tip .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 6px; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* 列表区域 */
        .list-container { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 12px; }
        
        /* 访客卡片 */
        .guest-card { background: var(--card-bg); border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.05); }
        .guest-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .guest-name { font-size: 16px; font-weight: 600; color: var(--text); }
        .guest-status { font-size: 12px; padding: 4px 10px; border-radius: 12px; }
        .status-1 { background: #e6f7ff; color: #1890ff; } /* 待确认 */
        .status-0 { background: #f6ffed; color: #52c41a; } /* 已确认 */
        .status-2 { background: #fff1f0; color: #ff4d4f; } /* 已取消/过期 */
        
        .guest-info { color: var(--text-secondary); font-size: 13px; line-height: 1.8; }
        .guest-info-row { display: flex; margin-bottom: 6px; }
        .guest-info-label { width: 70px; flex-shrink: 0; color: #999; }
        .guest-info-value { flex: 1; }
        .access-code { font-size: 24px; font-weight: 700; color: var(--primary); letter-spacing: 4px; }
        
        .guest-time { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; font-size: 12px; color: #999; }
        
        /* 空状态 */
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
        .empty-icon { font-size: 64px; margin-bottom: 16px; opacity: 0.5; }
        .empty-text { font-size: 14px; }
        
        /* 加载更多 */
        .load-more { text-align: center; padding: 16px; color: var(--text-secondary); font-size: 13px; }
        .load-more.no-more { color: #999; }
        
        /* 下拉刷新动画 */
        .pull-refresh { position: absolute; top: -50px; left: 0; right: 0; text-align: center; padding: 16px; color: var(--text-secondary); font-size: 13px; transition: top 0.3s; }
        .pull-refresh.show { top: 0; }
        
        /* 底部按钮 */
        .footer { padding: 12px 20px 20px; background: #fff; border-top: 1px solid var(--border); }
        .btn-primary { width: 100%; height: 48px; background: var(--primary); color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: 500; cursor: pointer; }
        .btn-primary:active { opacity: 0.9; }
    </style>
</head>
<body>
<div class="page-container">
    <!-- 头部 -->
    <div class="header">
        <div class="header-title">访客邀约</div>
    </div>
    
    <!-- 下拉刷新提示 -->
    <div class="pull-refresh" id="pullRefresh">
        <span>下拉刷新</span>
    </div>
    
    <!-- 刷新中提示 -->
    <div class="refresh-tip" id="refreshTip">正在刷新...</div>
    
    <!-- 列表区域 -->
    <div class="list-container" id="listContainer">
        <div id="guestList"></div>
        <div class="load-more" id="loadMore">上拉加载更多</div>
    </div>
    
    <!-- 底部 -->
    <div class="footer">
        <button class="btn-primary" onclick="createInvitation()">+ 新增访客邀约</button>
    </div>
</div>

<script>
// 获取token
const urlParams = new URLSearchParams(location.search);
const token = urlParams.get('access_token') || '';
const isdev = urlParams.get('isdev') || '0';

// 分页状态
let currentPage = 1;
let pageSize = 10;
let isLoading = false;
let hasMore = true;
let isRefreshing = false;

// 状态映射
const statusMap = {
    0: { text: '已确认', class: 'status-0' },
    1: { text: '待确认', class: 'status-1' },
    2: { text: '已取消', class: 'status-2' }
};

// 初始化
function init() {
    loadData(1, true);
    setupPullRefresh();
    setupLoadMore();
}

// 加载数据
async function loadData(page = 1, isRefresh = false) {
    if (isLoading) return;
    isLoading = true;
    
    if (isRefresh) {
        document.getElementById('refreshTip').classList.add('show');
    }
    
    try {
        const url = `/api/v2/guest/invitations?current=${page}&row_count=${pageSize}&access_token=${encodeURIComponent(token)}&isdev=${isdev}`;
        const res = await fetch(url);
        const result = await res.json();
        
        if (result.success && result.data) {
            const list = result.data;
            renderList(list, page === 1);
            
            // 判断是否还有更多
            hasMore = list.length >= pageSize;
            document.getElementById('loadMore').textContent = hasMore ? '上拉加载更多' : '没有更多了';
            document.getElementById('loadMore').classList.toggle('no-more', !hasMore);
            
            if (isRefresh) {
                currentPage = 1;
            }
        } else {
            if (page === 1) {
                document.getElementById('guestList').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📋</div>
                        <div class="empty-text">${result.msg || '暂无访客邀约'}</div>
                    </div>
                `;
            }
        }
    } catch (e) {
        console.error('加载失败:', e);
        if (page === 1) {
            document.getElementById('guestList').innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">⚠️</div>
                    <div class="empty-text">加载失败，请下拉重试</div>
                </div>
            `;
        }
    } finally {
        isLoading = false;
        isRefreshing = false;
        document.getElementById('refreshTip').classList.remove('show');
        document.getElementById('pullRefresh').classList.remove('show');
    }
}

// 渲染列表
function renderList(list, isReplace) {
    const container = document.getElementById('guestList');
    
    if (list.length === 0 && isReplace) {
        container.innerHTML = `
            <div class="empty-state">
                <div class="empty-icon">📋</div>
                <div class="empty-text">暂无访客邀约</div>
            </div>
        `;
        return;
    }
    
    const html = list.map(item => {
        const status = statusMap[item.guestStatus] || { text: '未知', class: '' };
        const timeStr = item.arriveTime && item.leaveTime 
            ? `${formatDate(item.arriveTime)} 至 ${formatDate(item.leaveTime)}`
            : '-';
        
        return `
            <div class="guest-card" onclick="viewDetail('${item.guestId}')">
                <div class="guest-header">
                    <span class="guest-name">${escapeHtml(item.guestName || '匿名访客')}</span>
                    <span class="guest-status ${status.class}">${status.text}</span>
                </div>
                <div class="guest-info">
                    ${item.descrtption ? `
                    <div class="guest-info-row">
                        <span class="guest-info-label">来访事由</span>
                        <span class="guest-info-value">${escapeHtml(item.descrtption)}</span>
                    </div>` : ''}
                    <div class="guest-info-row">
                        <span class="guest-info-label">来访时间</span>
                        <span class="guest-info-value">${timeStr}</span>
                    </div>
                    ${item.accCode ? `
                    <div class="guest-info-row">
                        <span class="guest-info-label">邀约码</span>
                        <span class="guest-info-value access-code">${item.accCode}</span>
                    </div>` : ''}
                </div>
                ${item.endDate ? `
                <div class="guest-time">
                    <span>有效期至 ${formatDate(item.endDate)}</span>
                </div>` : ''}
            </div>
        `;
    }).join('');
    
    if (isReplace) {
        container.innerHTML = html;
    } else {
        container.insertAdjacentHTML('beforeend', html);
    }
}

// 设置下拉刷新
function setupPullRefresh() {
    const container = document.getElementById('listContainer');
    let startY = 0;
    let isPulling = false;
    
    container.addEventListener('touchstart', (e) => {
        if (container.scrollTop === 0) {
            startY = e.touches[0].pageY;
            isPulling = true;
        }
    }, { passive: true });
    
    container.addEventListener('touchmove', (e) => {
        if (!isPulling) return;
        const y = e.touches[0].pageY;
        const diff = y - startY;
        
        if (diff > 60 && container.scrollTop === 0) {
            document.getElementById('pullRefresh').classList.add('show');
            document.getElementById('pullRefresh').innerHTML = '<span>释放刷新</span>';
        }
    }, { passive: true });
    
    container.addEventListener('touchend', () => {
        if (!isPulling) return;
        isPulling = false;
        
        const pullRefresh = document.getElementById('pullRefresh');
        if (pullRefresh.classList.contains('show')) {
            pullRefresh.innerHTML = '<span>正在刷新...</span>';
            isRefreshing = true;
            loadData(1, true);
        }
    });
}

// 设置上拉加载
function setupLoadMore() {
    const container = document.getElementById('listContainer');
    
    container.addEventListener('scroll', () => {
        if (isLoading || !hasMore) return;
        
        const scrollTop = container.scrollTop;
        const scrollHeight = container.scrollHeight;
        const clientHeight = container.clientHeight;
        
        if (scrollTop + clientHeight >= scrollHeight - 50) {
            currentPage++;
            loadData(currentPage, false);
        }
    });
}

// 查看详情
function viewDetail(guestId) {
    console.log('查看详情:', guestId);
    // 可以跳转到详情页或显示弹窗
    // window.location.href = `guest_detail_v2.html?guest_id=${guestId}&access_token=${token}`;
}

// 创建邀约
function createInvitation() {
    // 跳转到访客服务页面
    const timestamp = Date.now();
    const guestUrl = `https://wj.wojiacloud.com/guest/create?access_token=${encodeURIComponent(token)}&time=${timestamp}`;
    window.location.href = guestUrl;
}

// 格式化日期
function formatDate(dateStr) {
    if (!dateStr) return '-';
    const d = new Date(dateStr);
    if (isNaN(d.getTime())) return dateStr;
    return `${d.getMonth() + 1}月${d.getDate()}日 ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
}

// HTML转义
function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// 启动
init();
</script>
</body>
</html>
