<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>门店列表</title>
    <link rel="stylesheet" href="../business-common/list-style.css">
    <style>
        /* 页面特有样式 */
        .actions .link { color: var(--el-color-primary); cursor: pointer; margin-right: 10px; }
        .actions .link:hover { text-decoration: underline; }
        .actions .link.danger { color: var(--el-color-danger); }
        /* 弹窗样式保留 */
        /* 门店详情弹窗 */
        .modal-mask { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 100; }
    </style>
</head>
<body class="wy-design-list">
    <!-- 顶部区域 -->
    <div class="wy-design-list_top">
        <div class="wy-design-list_top_title">
            <h1 class="wy-design-list_title">门店列表</h1>
            <div class="wy-design-list_space"></div>
            <div class="wy-design-list_btn-group">
                <div class="wy-design-list_btn">
                    <button type="button" class="el-button el-button--primary el-button--small" onclick="loadList(1)">
                        <span>搜索</span>
                    </button>
                </div>
                <div class="wy-design-list_btn">
                    <button type="button" class="el-button el-button--small" onclick="resetSearch()">
                        <span>重置</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 筛选区域 -->
    <div class="wy-design-list_filter">
        <div class="wy-design-list_other">
            <div class="el-input el-input--small" style="width: 200px;">
                <input type="text" id="searchInput" placeholder="搜索门店名称..." class="el-input__inner">
            </div>
        </div>
    </div>

    <!-- 表格区域 -->
    <div class="wy-design-table wy-design-table_main wy-design-table_has-bar">
        <div class="wy-design-table_bar">
            <i class="wy-design-table_set el-icon-setting" title="列设置"></i>
            <span class="wy-design-table_total">共 <em id="totalCount">0</em> 条</span>
            <div class="wy-pages">
                <div class="wy-pages_total">第<em id="currentPage">1</em>/<em id="totalPages">1</em>页</div>
                <div class="wy-pages_prev el-icon-arrow-left" id="prevBtn" onclick="changePage(-1)"></div>
                <div class="wy-pages_next el-icon-arrow-right" id="nextBtn" onclick="changePage(1)"></div>
            </div>
        </div>
        <table class="el-table el-table--fit el-table--border el-table--enable-row-hover">
            <thead class="el-table__header">
                <tr>
                    <th><div class="cell">名称</div></th>
                    <th><div class="cell">操作</div></th>
                </tr>
            </thead>
            <tbody class="el-table__body" id="listBody">
                <tr><td colspan="10" style="text-align: center; padding: 60px; color: var(--el-text-secondary);">加载中...</td></tr>
            </tbody>
        </table>
    </div>

    
    <div class="modal-mask" id="modalMask" onclick="closeModal(event)">
        <div class="modal" id="detailModal">
            <span class="modal-close" onclick="closeModal()">✕</span>
            <div class="modal-title" id="modalShopName">-</div>
            <div id="modalRating" class="star-bar" style="margin:6px 0">-</div>
            <div id="modalDetails"></div>
            <div class="reviews-section">
                <div style="font-size:15px;font-weight:600;margin:12px 0 8px">用户评价</div>
                <div id="modalReviews"><div class="loading">加载中...</div></div>
            </div>
            <div style="margin-top:16px">
                <button class="btn btn-primary" id="btnFav" onclick="toggleFav()" style="width:100%;padding:12px">收藏门店</button>
            </div>
        </div>
    </div>

    

    <script>
    var urlParams = new URLSearchParams(location.search);
        var token = urlParams.get('access_token');
        var isdev = urlParams.get('isdev') || '0';
        if (token) {
            localStorage.setItem('user_token', token);
            localStorage.setItem('user_isdev', isdev);
        } else {
            token = localStorage.getItem('user_token');
            isdev = localStorage.getItem('user_isdev') || '0';
        }
        if (!token) {
            document.body.innerHTML = '<div style="text-align:center;padding:60px 20px;color:#999"><h2>请先登录</h2></div>';
            throw new Error('No token');
        }

        var currentType = '';
        var currentShopId = null;
        var isFaved = false;

        var typeMap = {
            restaurant: '🍜 餐饮',
            retail: '🛍️ 零售',
            service: '🔧 服务',
            entertainment: '🎮 娱乐',
            health: '💊 健康',
            other: '📦 其他'
        };
        var statusIconMap = {restaurant:'🍜', retail:'🛍️', service:'🔧', entertainment:'🎮', health:'💊', other:'🏪'};

        function qs(u) { return u + (u.indexOf('?')>=0?'&':'?') + 'access_token=' + encodeURIComponent(token) + '&isdev=' + isdev; }

        function loadShops(keyword) {
            var url = '/api/shops?page=1&page_size=20';
            if (currentType) url += '&shop_type=' + currentType;
            if (keyword) url += '&keyword=' + encodeURIComponent(keyword);
            url = qs(url);
            document.getElementById('shopList').innerHTML = '<div class="loading">加载中...</div>';
            fetch(url).then(function(r){return r.json()}).then(function(data){
                if (data.success && data.data && data.data.items && data.data.items.length > 0) {
                    var html = '';
                    for (var i = 0; i < data.data.items.length; i++) {
                        var s = data.data.items[i];
                        var typeLabel = typeMap[s.shop_type] || ('🏪 ' + (s.shop_type || ''));
                        var statusCls = s.status === 'open' ? 'status-open' : 'status-closed';
                        var statusText = s.status === 'open' ? '营业中' : '已关闭';
                        var avgRating = parseFloat(s.avg_rating || 0);
                        var stars = avgRating > 0 ? '★'.repeat(Math.round(avgRating)) + '☆'.repeat(5 - Math.round(avgRating)) : '暂无评分';
                        html += '<div class="shop-card" onclick="openDetail(' + s.id + ')">'
                            + '<div class="shop-cover" style="font-size:56px;height:120px">' + (statusIconMap[s.shop_type]||'🏪') + '</div>'
                            + '<div class="shop-body">'
                            + '<div class="shop-name">' + escapeHtml(s.shop_name || '') + '<span class="shop-status ' + statusCls + '">' + statusText + '</span></div>'
                            + '<div class="shop-meta">'
                            + '<span class="shop-type">' + typeLabel + '</span>'
                            + '<span class="shop-rating">' + stars + (avgRating > 0 ? ' ' + avgRating.toFixed(1) : '') + '</span>'
                            + '</div>'
                            + '<div class="shop-addr"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="2"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>' + escapeHtml(s.address || '暂无地址') + '</div>'
                            + '<div class="shop-hours">🕙 ' + escapeHtml(s.business_hours || '暂无营业时间') + '</div>'
                            + '<div class="shop-action">'
                            + '<button class="btn btn-outline" onclick="event.stopPropagation();openDetail(' + s.id + ')">查看详情</button>'
                            + '<button class="btn btn-primary" onclick="event.stopPropagation();openDetail(' + s.id + ')">查看评价</button>'
                            + '</div></div></div>';
                    }
                    document.getElementById('shopList').innerHTML = html;
                } else {
                    document.getElementById('shopList').innerHTML = '<div class="empty"><div class="empty-icon">🏚️</div><p>暂无门店信息</p></div>';
                }
            }).catch(function(){
                document.getElementById('shopList').innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div><p>加载失败，请重试</p></div>';
            });
        }

        function openDetail(shopId) {
            currentShopId = shopId;
            document.getElementById('modalMask').classList.add('show');
            document.getElementById('modalShopName').textContent = '加载中...';
            document.getElementById('modalRating').textContent = '';
            document.getElementById('modalDetails').innerHTML = '';
            document.getElementById('modalReviews').innerHTML = '<div class="loading">加载中...</div>';

            // 加载门店详情
            fetch(qs('/api/shops/' + shopId))
            .then(function(r){return r.json()})
            .then(function(data){
                if (data.success && data.data) {
                    var s = data.data;
                    document.getElementById('modalShopName').textContent = s.shop_name || '';
                    var avgRating = parseFloat(s.avg_rating || 0);
                    document.getElementById('modalRating').textContent = avgRating > 0
                        ? '★'.repeat(Math.round(avgRating)) + '☆'.repeat(5-Math.round(avgRating)) + ' ' + avgRating.toFixed(1) + '分'
                        : '暂无评分';
                    document.getElementById('modalDetails').innerHTML =
                        '<div class="detail-row"><span class="detail-label">类型</span><span class="detail-value">' + escapeHtml(typeMap[s.shop_type]||s.shop_type||'') + '</span></div>'
                        + '<div class="detail-row"><span class="detail-label">地址</span><span class="detail-value">' + escapeHtml(s.address||'未填写') + '</span></div>'
                        + '<div class="detail-row"><span class="detail-label">电话</span><span class="detail-value">' + escapeHtml(s.phone||'未填写') + '</span></div>'
                        + '<div class="detail-row"><span class="detail-label">营业时间</span><span class="detail-value">' + escapeHtml(s.business_hours||'未填写') + '</span></div>'
                        + '<div class="detail-row"><span class="detail-label">状态</span><span class="detail-value">' + (s.status==='open'?'<span style="color:#38a169">营业中</span>':'<span style="color:#e53e3e">已关闭</span>') + '</span></div>'
                        + (s.description ? '<div class="detail-row"><span class="detail-label">简介</span><span class="detail-value">' + escapeHtml(s.description) + '</span></div>' : '');
                }
            }).catch(function(){});

            // 加载评价
            fetch(qs('/api/reviews?target_type=shop&target_id=' + shopId + '&page_size=10'))
            .then(function(r){return r.json()})
            .then(function(data){
                if (data.success && data.data && data.data.items && data.data.items.length > 0) {
                    var html = '';
                    for (var i = 0; i < data.data.items.length; i++) {
                        var rv = data.data.items[i];
                        var stars = '★'.repeat(rv.rating||0) + '☆'.repeat(5-(rv.rating||0));
                        var anon = rv.is_anonymous ? '匿名用户' : (rv.user_name || '用户');
                        html += '<div class="review-item">'
                            + '<div class="review-header"><span class="reviewer-name">' + escapeHtml(anon) + '</span><span class="review-stars">' + stars + '</span><span class="review-time">' + escapeHtml((rv.created_at||'').substring(0,10)) + '</span></div>'
                            + '<div class="review-content">' + escapeHtml(rv.content || '') + '</div>'
                            + (rv.reply ? '<div class="review-reply">商家回复：' + escapeHtml(rv.reply) + '</div>' : '')
                            + '</div>';
                    }
                    document.getElementById('modalReviews').innerHTML = html;
                } else {
                    document.getElementById('modalReviews').innerHTML = '<div style="color:#bbb;text-align:center;padding:16px;font-size:13px">暂无评价</div>';
                }
            }).catch(function(){
                document.getElementById('modalReviews').innerHTML = '<div style="color:#bbb;text-align:center;padding:16px;font-size:13px">评价加载失败</div>';
            });

            // 检查收藏状态
            fetch(qs('/api/user/favorites/check?target_type=shop&target_id=' + shopId))
            .then(function(r){return r.json()})
            .then(function(data){
                isFaved = data.data && data.data.is_favorite;
                document.getElementById('btnFav').textContent = isFaved ? '❤️ 已收藏' : '🤍 收藏门店';
                document.getElementById('btnFav').style.background = isFaved ? '#e53e3e' : '#43b89c';
            }).catch(function(){});
        }

        function toggleFav() {
            if (!currentShopId) return;
            if (isFaved) {
                fetch(qs('/api/user/favorites/shop/' + currentShopId), { method: 'DELETE' })
                .then(function(r){return r.json()})
                .then(function(d){
                    if (d.success) {
                        isFaved = false;
                        document.getElementById('btnFav').textContent = '🤍 收藏门店';
                        document.getElementById('btnFav').style.background = '#43b89c';
                        alert('已取消收藏');
                    }
                });
            } else {
                fetch(qs('/api/user/favorites'), {
                    method: 'POST',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({target_type:'shop', target_id: currentShopId})
                }).then(function(r){return r.json()}).then(function(d){
                    if (d.success) {
                        isFaved = true;
                        document.getElementById('btnFav').textContent = '❤️ 已收藏';
                        document.getElementById('btnFav').style.background = '#e53e3e';
                        alert('收藏成功');
                    }
                });
            }
        }

        function closeModal(e) {
            if (!e || e.target === document.getElementById('modalMask')) {
                document.getElementById('modalMask').classList.remove('show');
            }
        }

        function doSearch() {
            var kw = document.getElementById('searchInput').value.trim();
            loadShops(kw);
        }

        document.getElementById('searchInput').addEventListener('keydown', function(e){
            if (e.key === 'Enter') doSearch();
        });

        document.querySelectorAll('.filter-tag').forEach(function(el){
            el.addEventListener('click', function(){
                document.querySelectorAll('.filter-tag').forEach(function(e){e.classList.remove('active')});
                el.classList.add('active');
                currentType = el.dataset.type;
                loadShops('');
            });
        });

        loadShops('');
    </script>
</body>
</html>
