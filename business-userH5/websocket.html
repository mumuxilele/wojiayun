<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>消息中心 - 社区商业</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header h1 { font-size: 18px; }
        .ws-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
        }
        .ws-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ccc;
        }
        .ws-dot.connected { background: #52c41a; }
        .ws-dot.connecting { background: #faad14; animation: pulse 1s infinite; }
        .ws-dot.disconnected { background: #ff4d4f; }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .container { padding: 15px; }
        
        .tabs {
            display: flex;
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 12px;
            cursor: pointer;
            font-size: 14px;
            color: #666;
            transition: all 0.3s;
        }
        .tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }
        .tab .count {
            display: inline-block;
            background: #ff4d4f;
            color: #fff;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
            margin-left: 4px;
        }
        
        .notification-list {
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        
        .notification-item {
            padding: 15px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            gap: 12px;
            transition: background 0.2s;
            cursor: pointer;
        }
        .notification-item:hover { background: #fafafa; }
        .notification-item.unread { background: #f0f7ff; }
        .notification-item.unread:hover { background: #e8f0ff; }
        
        .notification-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }
        .notification-icon.order { background: #e6f7ff; color: #1890ff; }
        .notification-icon.booking { background: #fff7e6; color: #fa8c16; }
        .notification-icon.points { background: #f6ffed; color: #52c41a; }
        .notification-icon.system { background: #f9f0ff; color: #722ed1; }
        
        .notification-content {
            flex: 1;
            min-width: 0;
        }
        .notification-title {
            font-size: 14px;
            color: #333;
            font-weight: 500;
            margin-bottom: 4px;
        }
        .notification-item.unread .notification-title { font-weight: 600; }
        .notification-desc {
            font-size: 13px;
            color: #999;
            line-height: 1.4;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }
        .notification-time {
            font-size: 12px;
            color: #bbb;
            margin-top: 6px;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        .empty-state .icon { font-size: 48px; margin-bottom: 15px; }
        
        .toast {
            position: fixed;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .toast.show { opacity: 1; }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="header">
            <h1>📬 消息中心</h1>
            <div class="ws-status">
                <span class="ws-dot" :class="wsStatus"></span>
                <span>{{ wsStatusText }}</span>
            </div>
        </div>
        
        <div class="container">
            <div class="tabs">
                <div class="tab" :class="{active: activeTab === 'all'}" @click="activeTab = 'all'">
                    全部<span v-if="unreadCount > 0" class="count">{{ unreadCount }}</span>
                </div>
                <div class="tab" :class="{active: activeTab === 'order'}" @click="activeTab = 'order'">订单</div>
                <div class="tab" :class="{active: activeTab === 'points'}" @click="activeTab = 'points'">积分</div>
                <div class="tab" :class="{active: activeTab === 'system'}" @click="activeTab = 'system'">系统</div>
            </div>
            
            <div v-if="loading" class="loading">加载中...</div>
            
            <div v-else class="notification-list">
                <div v-for="item in filteredNotifications" 
                     :key="item.id" 
                     class="notification-item"
                     :class="{unread: !item.is_read}"
                     @click="handleClick(item)">
                    <div class="notification-icon" :class="getIconClass(item.notify_type)">
                        {{ getIcon(item.notify_type) }}
                    </div>
                    <div class="notification-content">
                        <div class="notification-title">{{ item.title }}</div>
                        <div class="notification-desc">{{ item.content }}</div>
                        <div class="notification-time">{{ formatTime(item.created_at) }}</div>
                    </div>
                </div>
                
                <div v-if="filteredNotifications.length === 0" class="empty-state">
                    <div class="icon">📭</div>
                    <div>暂无消息</div>
                </div>
            </div>
        </div>
        
        <div class="toast" :class="{show: toast.show}">{{ toast.message }}</div>
    </div>
    
    <script>
    const app = new Vue({
        el: '#app',
        data: {
            activeTab: 'all',
            notifications: [],
            unreadCount: 0,
            loading: true,
            wsConnected: false,
            ws: null,
            wsReconnectTimer: null,
            toast: { show: false, message: '' }
        },
        computed: {
            wsStatus() {
                if (this.wsConnected) return 'connected';
                if (this.ws) return 'connecting';
                return 'disconnected';
            },
            wsStatusText() {
                if (this.wsConnected) return '实时在线';
                if (this.ws) return '连接中...';
                return '离线';
            },
            filteredNotifications() {
                if (this.activeTab === 'all') return this.notifications;
                return this.notifications.filter(n => n.notify_type === this.activeTab);
            }
        },
        mounted() {
            this.checkLogin();
            this.loadNotifications();
            this.connectWebSocket();
        },
        beforeDestroy() {
            this.disconnectWebSocket();
        },
        methods: {
            getQueryParam(name) {
                const url = new URL(window.location.href);
                return url.searchParams.get(name);
            },
            checkLogin() {
                const token = this.getQueryParam('access_token') || localStorage.getItem('user_token');
                if (!token) {
                    alert('请先登录');
                    setTimeout(() => window.location.href = 'index.html', 1500);
                }
            },
            async loadNotifications() {
                try {
                    const token = this.getQueryParam('access_token') || localStorage.getItem('user_token');
                    const res = await fetch(`/api/user/notifications?access_token=${token}&page=1&page_size=50`);
                    const data = await res.json();
                    
                    if (data.success) {
                        this.notifications = data.data.items || [];
                        this.unreadCount = data.data.items?.filter(n => !n.is_read).length || 0;
                    }
                } catch (e) {
                    console.error('加载消息失败:', e);
                } finally {
                    this.loading = false;
                }
            },
            connectWebSocket() {
                const token = this.getQueryParam('access_token') || localStorage.getItem('user_token');
                if (!token) return;
                
                try {
                    // 使用相对路径，支持ws和wss
                    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                    const host = window.location.host;
                    const wsUrl = `${protocol}//${host}?access_token=${token}`;
                    
                    // 如果SocketIO不可用，降级为轮询
                    if (typeof io === 'undefined') {
                        console.log('SocketIO未加载，降级为轮询模式');
                        this.startPolling();
                        return;
                    }
                    
                    this.ws = io('/', {
                        query: { access_token: token },
                        transports: ['websocket', 'polling'],
                        reconnection: true,
                        reconnectionDelay: 1000,
                        reconnectionAttempts: 5
                    });
                    
                    this.ws.on('connect', () => {
                        console.log('WebSocket连接成功');
                        this.wsConnected = true;
                        this.showToast('已连接实时消息');
                    });
                    
                    this.ws.on('disconnect', () => {
                        console.log('WebSocket断开连接');
                        this.wsConnected = false;
                    });
                    
                    this.ws.on('notification', (data) => {
                        console.log('收到实时通知:', data);
                        this.handleRealTimeNotification(data);
                    });
                    
                    this.ws.on('reconnect', () => {
                        console.log('WebSocket重连成功');
                        this.wsConnected = true;
                    });
                    
                } catch (e) {
                    console.error('WebSocket连接失败:', e);
                    this.startPolling();
                }
            },
            disconnectWebSocket() {
                if (this.ws) {
                    this.ws.disconnect();
                    this.ws = null;
                }
                if (this.wsReconnectTimer) {
                    clearInterval(this.wsReconnectTimer);
                }
            },
            startPolling() {
                // 降级：每30秒轮询一次
                this.wsReconnectTimer = setInterval(() => {
                    this.loadNotifications();
                }, 30000);
            },
            handleRealTimeNotification(data) {
                // 添加到列表顶部
                this.notifications.unshift({
                    id: 'new_' + Date.now(),
                    title: data.title,
                    content: data.content,
                    notify_type: data.type,
                    is_read: false,
                    created_at: new Date().toISOString()
                });
                this.unreadCount++;
                
                // 显示通知
                if (document.hidden) {
                    // 页面隐藏时显示系统通知
                    if (Notification.permission === 'granted') {
                        new Notification(data.title, { body: data.content });
                    }
                } else {
                    this.showToast(`${data.title}: ${data.content}`);
                }
            },
            async handleClick(item) {
                if (item.is_read) return;
                
                try {
                    const token = this.getQueryParam('access_token') || localStorage.getItem('user_token');
                    await fetch(`/api/user/notifications/${item.id}/read?access_token=${token}`, { method: 'POST' });
                    
                    item.is_read = true;
                    this.unreadCount = Math.max(0, this.unreadCount - 1);
                } catch (e) {
                    console.error('标记已读失败:', e);
                }
            },
            getIcon(type) {
                const icons = {
                    order: '📦',
                    booking: '📅',
                    points: '💰',
                    system: '🔔',
                    default: '📬'
                };
                return icons[type] || icons.default;
            },
            getIconClass(type) {
                const classes = {
                    order: 'order',
                    booking: 'booking',
                    points: 'points',
                    system: 'system',
                    default: ''
                };
                return classes[type] || '';
            },
            formatTime(time) {
                if (!time) return '';
                const d = new Date(time);
                const now = new Date();
                const diff = now - d;
                
                if (diff < 60000) return '刚刚';
                if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前';
                if (diff < 86400000) return Math.floor(diff / 3600000) + '小时前';
                if (diff < 604800000) return Math.floor(diff / 86400000) + '天前';
                
                return d.toLocaleDateString('zh-CN');
            },
            showToast(message) {
                this.toast.message = message;
                this.toast.show = true;
                setTimeout(() => { this.toast.show = false; }, 3000);
            }
        }
    });
    
    // 请求通知权限
    if ('Notification' in window && Notification.permission === 'default') {
        Notification.requestPermission();
    }
    </script>
    
    <!-- Socket.IO 客户端 (可选，如果没有会自动降级为轮询) -->
    <!-- <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script> -->
</body>
</html>
