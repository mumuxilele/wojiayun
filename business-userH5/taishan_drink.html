<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大堂饮品</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f5f5f5;padding-bottom:70px}
.header{background:#fff;padding:14px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #e8e8e8;position:sticky;top:0;z-index:10}
.back{font-size:22px;cursor:pointer;background:none;border:none}
.header h1{font-size:17px}
.tabs{display:flex;background:#fff;overflow-x:auto;border-bottom:1px solid #e8e8e8}
.tab{flex-shrink:0;padding:12px 16px;font-size:13px;color:#666;cursor:pointer;border:none;background:none;border-bottom:2px solid transparent}
.tab.active{color:#1890ff;border-bottom-color:#1890ff}
.list{padding:12px}
.drink-card{display:flex;gap:12px;background:#fff;border-radius:10px;padding:12px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.drink-img{width:80px;height:80px;border-radius:8px;background:#f0f0f0;flex-shrink:0;object-fit:cover}
.drink-info{flex:1;display:flex;flex-direction:column;justify-content:space-between}
.drink-info h3{font-size:14px;font-weight:500}
.drink-info .desc{font-size:11px;color:#999}
.drink-info .specs{display:flex;gap:4px;margin:4px 0}
.drink-info .spec{font-size:10px;padding:2px 6px;background:#f5f5f5;border-radius:4px;color:#666}
.drink-bottom{display:flex;justify-content:space-between;align-items:center}
.drink-price{color:#ff4d4f;font-size:15px;font-weight:600}
.add-btn{width:28px;height:28px;border-radius:50%;background:#1890ff;color:#fff;border:none;font-size:18px;cursor:pointer}
.cart-bar{position:fixed;bottom:0;left:0;right:0;background:#333;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;color:#fff;z-index:100;display:none}
.cart-bar.show{display:flex}
.cart-total{font-size:16px;font-weight:600}
.cart-submit{background:#1890ff;border:none;color:#fff;padding:8px 20px;border-radius:20px;font-size:14px;cursor:pointer}
</style>
</head>
<body>
<div class="header"><button class="back" onclick="history.back()">‹</button><h1>大堂饮品</h1></div>
<div class="tabs" id="tabs"></div>
<div class="list" id="list"><div style="text-align:center;padding:40px;color:#999">加载中...</div></div>
<div class="cart-bar" id="cartBar">
  <div class="cart-total" id="cartTotal">¥0.00</div>
  <button class="cart-submit" onclick="submitOrder()">去下单</button>
</div>

<script>
const API_BASE='';
let cart={},items=[];
function getToken(){return localStorage.getItem('access_token')||''}
function api(p,o={}){return fetch(API_BASE+p+(p.includes('?')?'&':'?')+'access_token='+getToken(),{headers:{'Content-Type':'application/json','Token':getToken'},...o}).then(r=>r.json())}

api('/api/taishan/drink/categories').then(res=>{
  const cats=res.data||[];
  document.getElementById('tabs').innerHTML='<button class="tab active" onclick="filterCat(this,0)">全部</button>'+cats.map(c=>`<button class="tab" onclick="filterCat(this,${c.id})">${c.name}</button>`).join('');
})

api('/api/taishan/drink/items').then(res=>{
  items=res.data||[];
  renderList(items);
})

function filterCat(btn,catId){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  renderList(catId?items.filter(i=>i.category_id==catId):items);
}

function renderList(list){
  const el=document.getElementById('list');
  if(!list.length){el.innerHTML='<div style="text-align:center;padding:40px;color:#999">暂无饮品</div>';return}
  el.innerHTML=list.map(d=>{
    const specs=d.specs?(typeof d.specs==='string'?JSON.parse(d.specs):d.specs):[];
    return `<div class="drink-card">
      <img class="drink-img" src="${d.image||''}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 80 80%22><rect fill=%22%23f0f5ff%22 width=%2280%22 height=%2280%22/><text x=%2240%22 y=%2244%22 text-anchor=%22middle%22 fill=%22%231890ff%22 font-size=%2220%22>☕</text></svg>'">
      <div class="drink-info">
        <div><h3>${d.name}</h3><div class="desc">${d.description||''}</div>
        ${specs.length?`<div class="specs">${specs.map(s=>`<span class="spec">${s.name||s}</span>`).join('')}</div>`:''}</div>
        <div class="drink-bottom">
          <span class="drink-price">¥${Number(d.price).toFixed(2)}</span>
          <button class="add-btn" onclick="addCart(${d.id},'${d.name}',${d.price})">+</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function addCart(id,name,price){
  if(!cart[id])cart[id]={id,name,price,quantity:0};
  cart[id].quantity++;
  updateCart();
}
function updateCart(){
  const items=Object.values(cart);
  const total=items.reduce((s,i)=>s+i.price*i.quantity,0);
  document.getElementById('cartTotal').textContent='¥'+total.toFixed(2)+' ('+items.reduce((s,i)=>s+i.quantity,0)+'杯)';
  document.getElementById('cartBar').classList.toggle('show',items.length>0);
}

function submitOrder(){
  const cartItems=Object.values(cart).map(i=>({item_id:i.id,name:i.name,price:i.price,quantity:i.quantity}));
  if(!cartItems.length)return;
  api('/api/taishan/drink/orders',{method:'POST',body:JSON.stringify({items:cartItems,delivery_type:'self'})}).then(res=>{
    if(res.success){alert('下单成功!');cart={};updateCart()}
    else alert(res.msg||'下单失败')
  })
}
</script>
</body>
</html>
