<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>搜索</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f5f5f5;min-height:100vh;padding-bottom:30px}
.header{background:linear-gradient(135deg,#667eea,#764ba2);padding:12px 15px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:50}
.back{color:white;text-decoration:none;font-size:14px;padding:4px 8px;flex-shrink:0}
.search-bar{flex:1;display:flex;align-items:center;background:rgba(255,255,255,.9);border-radius:20px;padding:6px 12px;gap:8px}
.search-bar input{flex:1;border:none;outline:none;font-size:15px;background:transparent;color:#333}
.search-bar input::placeholder{color:#aaa}
.clear-btn{color:#999;cursor:pointer;font-size:16px;line-height:1}
.search-submit{color:#667eea;font-size:14px;font-weight:600;cursor:pointer;flex-shrink:0;padding:4px 8px}

/* 分类Tab */
.tab-row{display:flex;background:white;border-bottom:1px solid #f0f0f0}
.tab{flex:1;padding:12px 0;text-align:center;font-size:14px;color:#666;cursor:pointer;position:relative}
.tab.active{color:#667eea;font-weight:600}
.tab.active::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:2px;background:#667eea;border-radius:2px}

/* 历史&热门 */
.section{padding:15px}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.section-title{font-size:15px;font-weight:600;color:#333}
.section-clear{font-size:13px;color:#999;cursor:pointer}
.section-clear:hover{color:#667eea}
.tag-list{display:flex;flex-wrap:wrap;gap:8px}
.search-tag{padding:6px 14px;background:#f5f5f5;border-radius:20px;font-size:13px;color:#555;cursor:pointer;transition:all .2s}
.search-tag:active{background:#ede9ff;color:#667eea}
.hot-tag{background:#fff0f0;color:#ff4d4f}
.hot-tag:active{background:#ffd4d4}

/* 搜索结果 */
.result-list{padding:10px}
.result-item{background:white;border-radius:12px;margin-bottom:10px;padding:12px;display:flex;gap:10px;cursor:pointer;transition:all .2s}
.result-item:active{transform:scale(.98)}
.result-img{width:70px;height:70px;border-radius:8px;background:#f0f0f0;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:28px}
.result-img img{width:100%;height:100%;object-fit:cover}
.result-info{flex:1;min-width:0}
.result-name{font-size:15px;color:#333;font-weight:500;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.result-desc{font-size:12px;color:#999;margin-bottom:6px;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.result-meta{display:flex;align-items:center;justify-content:space-between}
.result-price{font-size:16px;color:#f57c00;font-weight:700}
.result-badge{font-size:11px;color:#52c41a;background:#f6ffed;padding:2px 6px;border-radius:4px}

.empty{text-align:center;padding:60px 20px;color:#bbb}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty-text{font-size:14px}

.loading{text-align:center;padding:40px;color:#bbb;font-size:14px}

/* 加载更多 */
.load-more{text-align:center;padding:16px;color:#999;font-size:14px;cursor:pointer}
.load-more:hover{color:#667eea}
</style>
</head>
<body>

<div class="header">
    <a href="index.html" class="back">←</a>
    <div class="search-bar">
        <span>🔍</span>
        <input type="text" id="searchInput" placeholder="搜索场地、门店、商品..." autofocus
               onkeydown="if(event.key==='Enter')doSearch()">
        <span class="clear-btn" id="clearBtn" onclick="clearSearch()" style="display:none">✕</span>
    </div>
    <span class="search-submit" onclick="doSearch()">搜索</span>
</div>

<div class="tab-row" id="tabRow" style="display:none">
    <div class="tab active" data-type="all" onclick="switchTab('all')">全部</div>
    <div class="tab" data-type="venue" onclick="switchTab('venue')">场地</div>
    <div class="tab" data-type="shop" onclick="switchTab('shop')">门店</div>
    <div class="tab" data-type="product" onclick="switchTab('product')">商品</div>
</div>

<!-- 未搜索时显示历史和热门 -->
<div id="defaultView">
    <div class="section" id="historySection" style="display:none">
        <div class="section-header">
            <span class="section-title">搜索历史</span>
            <span class="section-clear" onclick="clearHistory()">清空</span>
        </div>
        <div class="tag-list" id="historyList"></div>
    </div>

    <div class="section">
        <div class="section-header">
            <span class="section-title">🔥 热门搜索</span>
        </div>
        <div class="tag-list" id="hotList"></div>
    </div>
</div>

<!-- 搜索结果 -->
<div id="resultView" style="display:none">
    <div id="resultContainer" class="result-list"></div>
    <div id="loadMoreBtn" class="load-more" style="display:none" onclick="loadMore()">加载更多</div>
</div>

<script>
const token = localStorage.getItem('wjy_token') || new URLSearchParams(location.search).get('access_token') || '';
const isdev = new URLSearchParams(location.search).get('isdev') || '0';

let currentKeyword = '';
let currentTab = 'all';
let currentPage = 1;
let hasMore = false;
let isLoading = false;

function apiUrl(path) {
    const sep = path.includes('?') ? '&' : '?';
    return path + sep + 'access_token=' + encodeURIComponent(token) + '&isdev=' + isdev;
}

async function getApi(path) {
    try {
        const r = await fetch(apiUrl(path));
        return r.json();
    } catch { return {success: false}; }
}

// ======= 初始化 =======
async function init() {
    await loadHistory();
    await loadHotKeywords();
    
    // 恢复上次搜索
    const lastKeyword = sessionStorage.getItem('search_keyword');
    if (lastKeyword) {
        document.getElementById('searchInput').value = lastKeyword;
        doSearch();
    }
}

// ======= 搜索历史 =======
async function loadHistory() {
    const r = await getApi('/api/user/search/history?limit=10');
    const items = r.data?.items || [];
    const section = document.getElementById('historySection');
    const list = document.getElementById('historyList');
    if (!items.length) { section.style.display = 'none'; return; }
    section.style.display = '';
    list.innerHTML = items.map(i => 
        `<span class="search-tag" onclick="fillSearch('${escHtml(i.keyword)}')">${escHtml(i.keyword)}</span>`
    ).join('');
}

async function clearHistory() {
    if (!confirm('确定清空搜索历史？')) return;
    await fetch(apiUrl('/api/user/search/history'), {method: 'DELETE'});
    document.getElementById('historySection').style.display = 'none';
}

async function saveHistory(keyword) {
    if (!token || !keyword) return;
    await fetch(apiUrl('/api/user/search/history'), {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({keyword, type: currentTab === 'all' ? 'product' : currentTab})
    });
}

// ======= 热门搜索 =======
async function loadHotKeywords() {
    const r = await getApi('/api/search/hot?type=product');
    const items = r.data?.items || [];
    const list = document.getElementById('hotList');
    if (!items.length) {
        // 默认热门词
        const defaults = ['会议室', '停车', '健身', '快餐', '咖啡'];
        list.innerHTML = defaults.map(w => 
            `<span class="search-tag hot-tag" onclick="fillSearch('${w}')">${w}</span>`
        ).join('');
        return;
    }
    list.innerHTML = items.map((i, idx) => 
        `<span class="search-tag hot-tag" onclick="fillSearch('${escHtml(i.keyword)}')">${idx < 3 ? '🔥' : ''}${escHtml(i.keyword)}</span>`
    ).join('');
}

function fillSearch(keyword) {
    document.getElementById('searchInput').value = keyword;
    doSearch();
}

// ======= 搜索 =======
function clearSearch() {
    document.getElementById('searchInput').value = '';
    document.getElementById('clearBtn').style.display = 'none';
    document.getElementById('tabRow').style.display = 'none';
    document.getElementById('defaultView').style.display = '';
    document.getElementById('resultView').style.display = 'none';
    currentKeyword = '';
    sessionStorage.removeItem('search_keyword');
}

async function doSearch() {
    const keyword = document.getElementById('searchInput').value.trim();
    if (!keyword) { clearSearch(); return; }
    
    document.getElementById('clearBtn').style.display = '';
    currentKeyword = keyword;
    currentPage = 1;
    sessionStorage.setItem('search_keyword', keyword);
    
    document.getElementById('tabRow').style.display = 'flex';
    document.getElementById('defaultView').style.display = 'none';
    document.getElementById('resultView').style.display = '';
    
    await saveHistory(keyword);
    await fetchResults(true);
}

function switchTab(tab) {
    currentTab = tab;
    currentPage = 1;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelector(`.tab[data-type="${tab}"]`).classList.add('active');
    fetchResults(true);
}

async function fetchResults(replace = false) {
    if (isLoading) return;
    isLoading = true;
    
    const container = document.getElementById('resultContainer');
    if (replace) container.innerHTML = '<div class="loading">搜索中...</div>';
    
    const kw = encodeURIComponent(currentKeyword);
    const results = [];
    const promises = [];
    
    if (currentTab === 'all' || currentTab === 'venue') {
        promises.push(getApi(`/api/user/venues?page=${currentPage}&page_size=5&keyword=${kw}`)
            .then(r => { if (r.success) (r.data?.items || []).forEach(v => results.push({...v, _type:'venue'})); }));
    }
    if (currentTab === 'all' || currentTab === 'shop') {
        promises.push(getApi(`/api/shops?keyword=${kw}&page=${currentPage}&page_size=5`)
            .then(r => { if (r.success) (r.data || []).forEach(s => results.push({...s, _type:'shop'})); }));
    }
    if (currentTab === 'all' || currentTab === 'product') {
        promises.push(getApi(`/api/products?keyword=${kw}&page=${currentPage}&page_size=5`)
            .then(r => { if (r.success) (r.data || []).forEach(p => results.push({...p, _type:'product'})); }));
    }
    
    await Promise.all(promises);
    isLoading = false;
    
    if (replace) container.innerHTML = '';
    
    if (!results.length && replace) {
        container.innerHTML = `
            <div class="empty">
                <div class="empty-icon">🔍</div>
                <div class="empty-text">没有找到"${escHtml(currentKeyword)}"相关内容</div>
            </div>`;
        document.getElementById('loadMoreBtn').style.display = 'none';
        return;
    }
    
    results.forEach(item => {
        const card = buildResultCard(item);
        container.insertAdjacentHTML('beforeend', card);
    });
    
    // 简单判断是否有更多（实际应根据total判断）
    hasMore = results.length >= 5;
    document.getElementById('loadMoreBtn').style.display = hasMore && currentTab !== 'all' ? '' : 'none';
}

function buildResultCard(item) {
    const type = item._type;
    let icon = '🏢', name = '', desc = '', price = '', badge = '', link = '#';
    
    if (type === 'venue') {
        icon = '🏟️';
        name = item.venue_name || item.name || '';
        desc = item.venue_type || '';
        price = item.price ? `¥${item.price}/小时` : '免费';
        badge = item.status === 'open' ? '可预约' : '';
        link = `bookings.html?venue_id=${item.id}`;
    } else if (type === 'shop') {
        icon = '🏪';
        name = item.shop_name || '';
        desc = item.address || item.description || '';
        price = '';
        badge = item.business_hours || '';
        link = `orders.html?shop_id=${item.id}`;
    } else if (type === 'product') {
        icon = '📦';
        name = item.product_name || '';
        desc = item.description || '';
        price = item.price ? `¥${parseFloat(item.price).toFixed(2)}` : '';
        badge = item.category || '';
        link = `cart.html?product_id=${item.id}`;
    }
    
    // 处理图片
    let imgHtml = `<span style="font-size:30px">${icon}</span>`;
    try {
        const imgs = item.images ? JSON.parse(item.images) : [];
        if (imgs.length) imgHtml = `<img src="${escHtml(imgs[0])}" onerror="this.parentNode.innerHTML='<span style=font-size:30px>${icon}</span>'">`;
    } catch {}
    
    return `
        <div class="result-item" onclick="location.href='${link}'">
            <div class="result-img">${imgHtml}</div>
            <div class="result-info">
                <div class="result-name">${escHtml(name)}</div>
                <div class="result-desc">${escHtml(desc)}</div>
                <div class="result-meta">
                    ${price ? `<span class="result-price">${escHtml(price)}</span>` : '<span></span>'}
                    ${badge ? `<span class="result-badge">${escHtml(badge)}</span>` : ''}
                </div>
            </div>
        </div>`;
}

function loadMore() {
    currentPage++;
    fetchResults(false);
}

function escHtml(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// 搜索框输入监听
document.getElementById('searchInput').addEventListener('input', function() {
    document.getElementById('clearBtn').style.display = this.value ? '' : 'none';
});

init();
</script>
</body>
</html>
