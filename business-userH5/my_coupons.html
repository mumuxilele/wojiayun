<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的优惠券</title>
    <link rel="stylesheet" href="../business-common/list-style.css">
    <style>
        /* 页面特有样式 */
        .actions .link { color: var(--el-color-primary); cursor: pointer; margin-right: 10px; }
        .actions .link:hover { text-decoration: underline; }
        .actions .link.danger { color: var(--el-color-danger); }
        /* 弹窗样式保留 */
        
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.45); z-index: 200; }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background: var(--el-bg-white); border-radius: 4px; width: 580px; max-width: 95vw; max-height: 85vh; flex-direction: column; z-index: 201; box-shadow: 0 4px 20px rgba(0,0,0,.18); }
        .modal.show { display: flex; }
        .modal-header { padding: 16px 20px; border-bottom: 1px solid var(--el-border-color-light); display: flex; justify-content: space-between; align-items: center; }
        .modal-title { font-size: 16px; font-weight: 600; color: var(--el-text-primary); }
        .modal-close { background: none; border: none; width: 32px; height: 32px; border-radius: 4px; cursor: pointer; font-size: 16px; color: var(--el-text-secondary); display: flex; align-items: center; justify-content: center; }
        .modal-close:hover { background: var(--el-bg-light); }
        .modal-body { padding: 20px; overflow-y: auto; flex: 1; }
        .modal-footer { padding: 12px 20px; border-top: 1px solid var(--el-border-color-light); display: flex; justify-content: flex-end; gap: 10px; }
    </style>
</head>
<body class="wy-design-list">
    <!-- 顶部区域 -->
    <div class="wy-design-list_top">
        <div class="wy-design-list_top_title">
            <h1 class="wy-design-list_title">我的优惠券</h1>
            <div class="wy-design-list_space"></div>
            <div class="wy-design-list_btn-group">
                <div class="wy-design-list_btn">
                    <button type="button" class="el-button el-button--primary el-button--small" onclick="loadList(1)">
                        <span>搜索</span>
                    </button>
                </div>
                <div class="wy-design-list_btn">
                    <button type="button" class="el-button el-button--small" onclick="resetSearch()">
                        <span>重置</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 筛选区域 -->
    <div class="wy-design-list_filter">
        <div class="wy-design-list_other">
            <div class="el-input el-input--small" style="width: 200px;">
                <input type="text" id="keyword" placeholder="搜索关键词" class="el-input__inner">
            </div>
        </div>
    </div>

    <!-- 表格区域 -->
    <div class="wy-design-table wy-design-table_main wy-design-table_has-bar">
        <div class="wy-design-table_bar">
            <i class="wy-design-table_set el-icon-setting" title="列设置"></i>
            <span class="wy-design-table_total">共 <em id="totalCount">0</em> 条</span>
            <div class="wy-pages">
                <div class="wy-pages_total">第<em id="currentPage">1</em>/<em id="totalPages">1</em>页</div>
                <div class="wy-pages_prev el-icon-arrow-left" id="prevBtn" onclick="changePage(-1)"></div>
                <div class="wy-pages_next el-icon-arrow-right" id="nextBtn" onclick="changePage(1)"></div>
            </div>
        </div>
        <table class="el-table el-table--fit el-table--border el-table--enable-row-hover">
            <thead class="el-table__header">
                <tr>
                    <th><div class="cell">名称</div></th>
                    <th><div class="cell">操作</div></th>
                </tr>
            </thead>
            <tbody class="el-table__body" id="listBody">
                <tr><td colspan="10" style="text-align: center; padding: 60px; color: var(--el-text-secondary);">加载中...</td></tr>
            </tbody>
        </table>
    </div>

    

    <script>
    var urlParams = new URLSearchParams(location.search);
var token = urlParams.get('access_token') || localStorage.getItem('user_token');
var isdev = urlParams.get('isdev') || localStorage.getItem('user_isdev') || '0';
var currentStatus = 'unused';
var myPoints = 0;

if (!token) {
    document.body.innerHTML = '<div style="text-align:center;padding:60px;color:#999"><h2>请先登录</h2></div>';
    throw new Error('No token');
}

if (token) {
    localStorage.setItem('user_token', token);
    localStorage.setItem('user_isdev', isdev);
}

function api(path) {
    return path + (path.includes('?') ? '&' : '?') + 'access_token=' + encodeURIComponent(token) + '&isdev=' + isdev;
}

function goTo(url) {
    var sep = url.indexOf('?') >= 0 ? '&' : '?';
    location.href = url + sep + 'access_token=' + encodeURIComponent(token) + '&isdev=' + isdev;
}

function switchTab(el) {
    document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
    el.classList.add('active');
    currentStatus = el.dataset.status;
    if (currentStatus === 'exchange') {
        loadExchangePage();
    } else {
        loadCoupons(currentStatus);
    }
}

function getCouponTypeText(type, value) {
    if (type === 'cash') return { amount: '¥' + parseFloat(value||0).toFixed(0), unit: '现金券' };
    if (type === 'discount') return { amount: parseFloat(value||0) * 10 + '折', unit: '折扣券' };
    return { amount: parseFloat(value||0) + '积分', unit: '积分券' };
}

function renderCouponCard(c) {
    var typeInfo = getCouponTypeText(c.coupon_type, c.coupon_discount || c.discount_value);
    var typeClass = c.coupon_type === 'cash' ? 'cash' : c.coupon_type === 'discount' ? 'discount' : 'points';
    var statusBadge = '';
    if (c.status === 'used') statusBadge = '<div class="coupon-status-badge badge-used">已使用</div>';
    if (c.status === 'expired') statusBadge = '<div class="coupon-status-badge badge-expired">已过期</div>';
    var minStr = c.min_amount > 0 ? '满' + parseFloat(c.min_amount).toFixed(0) + '元可用' : '无门槛';
    var expireStr = c.valid_until ? '有效期至 ' + (c.valid_until+'').substring(0,10) : '长期有效';
    var actionBtn = c.status === 'unused' 
        ? '<button class="use-btn" onclick="goTo(\'products.html\')">去使用</button>'
        : '';
    return '<div class="coupon-card ' + c.status + '">'
        + '<div class="coupon-left ' + typeClass + '"><div class="coupon-amount">' + typeInfo.amount + '</div><div class="coupon-amount-unit">' + typeInfo.unit + '</div></div>'
        + '<div class="coupon-right">'
        + '<div class="coupon-name">' + (c.coupon_name || '优惠券') + '</div>'
        + '<div class="coupon-condition">' + minStr + '</div>'
        + '<div class="coupon-footer"><span class="coupon-expire">' + expireStr + '</span>' + actionBtn + '</div>'
        + '<div style="margin-top:6px"><span class="coupon-code">' + (c.coupon_code || '') + '</span></div>'
        + '</div>'
        + statusBadge + '</div>';
}

function loadCoupons(status) {
    document.getElementById('mainContent').innerHTML = '<div class="loading">加载中...</div>';
    fetch(api('/api/user/coupons?status=' + status))
    .then(function(r){ return r.json(); })
    .then(function(d) {
        if (!d.success || !d.data || !d.data.items || d.data.items.length === 0) {
            var emptyText = { unused: '暂无可用优惠券', used: '暂无已使用的优惠券', expired: '暂无过期优惠券' };
            document.getElementById('mainContent').innerHTML = 
                '<div class="empty"><div class="empty-icon">🎫</div><p>' + (emptyText[status] || '暂无数据') + '</p></div>';
            return;
        }
        var html = '<div class="section-title">' + d.data.items.length + ' 张优惠券</div><div class="coupon-list">';
        d.data.items.forEach(function(c) { html += renderCouponCard(c); });
        html += '</div>';
        document.getElementById('mainContent').innerHTML = html;
    })
    .catch(function() {
        document.getElementById('mainContent').innerHTML = '<div class="empty"><div class="empty-icon">😞</div><p>加载失败，请重试</p></div>';
    });
}

function loadExchangePage() {
    // 加载我的积分和可兑换的优惠券
    document.getElementById('mainContent').innerHTML = '<div class="loading">加载中...</div>';
    Promise.all([
        fetch(api('/api/user/member')).then(function(r){ return r.json(); }),
        fetch(api('/api/coupons/available')).then(function(r){ return r.json(); })
    ]).then(function(results) {
        var memberData = results[0];
        var couponsData = results[1];
        myPoints = (memberData.success && memberData.data) ? (memberData.data.points || 0) : 0;
        var coupons = (couponsData.success && couponsData.data) ? (couponsData.data.items || []) : [];
        var html = '<div class="exchange-section">'
            + '<div class="points-info"><span style="font-size:13px;color:#666">我的积分</span><span class="points-value">' + myPoints + ' 积分</span></div>'
            + '<div class="exchange-title">🎁 可兑换优惠券</div>';
        if (coupons.length === 0) {
            html += '<div style="text-align:center;padding:20px;color:#bbb">暂无可兑换的优惠券</div>';
        } else {
            coupons.forEach(function(c) {
                var typeInfo = getCouponTypeText(c.coupon_type, c.discount_value);
                var canExchange = myPoints >= (c.points_cost || 0);
                var stockInfo = c.total_count > 0 ? ('剩余 ' + (c.total_count - (c.used_count||0)) + ' 张') : '不限量';
                html += '<div class="exchange-card">'
                    + '<div class="exchange-info">'
                    + '<div class="exchange-name">' + (c.coupon_name || '') + ' <span style="font-size:12px;color:#f5576c">（' + typeInfo.amount + '）</span></div>'
                    + '<div class="exchange-desc">' + (c.min_amount > 0 ? '满' + c.min_amount + '元可用 · ' : '') + stockInfo + '</div>'
                    + '</div>'
                    + '<button class="exchange-btn" ' + (canExchange ? '' : 'disabled') + ' onclick="exchangeCoupon(' + c.id + ', ' + (c.points_cost||0) + ', \'' + (c.coupon_name||'') + '\')">'
                    + (c.points_cost || 0) + '积分兑换</button>'
                    + '</div>';
            });
        }
        html += '</div>';
        document.getElementById('mainContent').innerHTML = html;
    }).catch(function() {
        document.getElementById('mainContent').innerHTML = '<div class="empty"><div class="empty-icon">😞</div><p>加载失败</p></div>';
    });
}

function exchangeCoupon(couponId, cost, name) {
    if (!confirm('确认使用 ' + cost + ' 积分兑换「' + name + '」？')) return;
    fetch(api('/api/user/coupons/exchange'), {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({coupon_id: couponId})
    }).then(function(r){ return r.json(); })
    .then(function(d) {
        if (d.success) {
            alert('兑换成功！优惠券码：' + (d.data && d.data.coupon_code ? d.data.coupon_code : ''));
            loadExchangePage();
        } else {
            alert(d.msg || '兑换失败');
        }
    }).catch(function() { alert('操作失败，请重试'); });
}

loadCoupons('unused');
    </script>
</body>
</html>
