<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>会员中心</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f5f5f5}
.header{background:linear-gradient(135deg,#faad14,#d48806);color:#fff;padding:24px 16px 20px}
.header .card{background:rgba(255,255,255,.15);border-radius:12px;padding:16px}
.header .name{font-size:18px;font-weight:600;margin-bottom:4px}
.header .level{font-size:12px;opacity:.8}
.header .stats{display:flex;gap:20px;margin-top:14px}
.header .stat{text-align:center}
.header .stat .num{font-size:22px;font-weight:700}
.header .stat .label{font-size:11px;opacity:.8}
.tabs{display:flex;background:#fff;border-bottom:1px solid #e8e8e8}
.tab{flex:1;padding:12px;text-align:center;font-size:13px;color:#666;cursor:pointer;border:none;background:none;border-bottom:2px solid transparent}
.tab.active{color:#faad14;border-bottom-color:#faad14}
.section{margin:12px;background:#fff;border-radius:12px;overflow:hidden}
.section-title{padding:14px 16px;font-size:14px;font-weight:600;border-bottom:1px solid #f0f0f0}
.item{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid #f5f5f5}
.item:last-child{border-bottom:none}
.item .left{display:flex;flex-direction:column;gap:4px}
.item .left .title{font-size:14px}
.item .left .sub{font-size:11px;color:#999}
.item .right{font-size:15px;font-weight:600}
.item .right.earn{color:#52c41a}
.item .right.spend{color:#ff4d4f}
.coupon-card{display:flex;margin:12px;border-radius:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.coupon-left{background:#ff4d4f;color:#fff;padding:16px 20px;display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:90px}
.coupon-left .value{font-size:24px;font-weight:700}
.coupon-left .type{font-size:11px;opacity:.8}
.coupon-right{flex:1;padding:12px 16px;background:#fff;display:flex;flex-direction:column;justify-content:center}
.coupon-right .name{font-size:14px;font-weight:500;margin-bottom:4px}
.coupon-right .condition{font-size:11px;color:#999}
.coupon-right .expire{font-size:11px;color:#999;margin-top:4px}
.coupon-unused .coupon-left{background:#ff4d4f}
.coupon-used .coupon-left{background:#ccc}
.coupon-expired .coupon-left{background:#d9d9d9}
.empty{text-align:center;padding:40px;color:#999;font-size:13px}
</style>
</head>
<body>
<div class="header">
<div class="card">
<div class="name" id="memberName">未登录</div>
<div class="level" id="memberLevel">普通用户</div>
<div class="stats">
<div class="stat"><div class="num" id="points">0</div><div class="label">积分</div></div>
<div class="stat"><div class="num" id="balance">¥0</div><div class="label">余额</div></div>
<div class="stat"><div class="num" id="totalConsumption">¥0</div><div class="label">累计消费</div></div>
</div>
</div>
</div>
<div class="tabs">
<button class="tab active" onclick="switchTab(this,'points')">积分明细</button>
<button class="tab" onclick="switchTab(this,'coupons')">优惠券</button>
<button class="tab" onclick="switchTab(this,'ledger')">消费记录</button>
</div>
<div id="tabContent"></div>

<script>
const API_BASE='';let currentTab='points';
function getToken(){return localStorage.getItem('access_token')||''}
function api(p,o={}){return fetch(API_BASE+p+(p.includes('?')?'&':'?')+'access_token='+getToken(),{headers:{'Content-Type':'application/json','Token':getToken'},...o}).then(r=>r.json())}

// 加载会员信息
api('/api/taishan/member/info').then(res=>{
if(res.success&&res.data){const m=res.data;
document.getElementById('memberName').textContent=m.user_name||'会员';
document.getElementById('memberLevel').textContent=m.level_name||'普通会员';
document.getElementById('points').textContent=m.points||0;
document.getElementById('balance').textContent='¥'+Number(m.balance||0).toFixed(0);
document.getElementById('totalConsumption').textContent='¥'+Number(m.total_consumption||0).toFixed(0)}
}).catch(()=>{});

function switchTab(btn,tab){
document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));btn.classList.add('active');
currentTab=tab;loadTab();
}

function loadTab(){
if(currentTab==='points')loadPoints();
else if(currentTab==='coupons')loadCoupons();
else loadLedger();
}

function loadPoints(){
api('/api/taishan/member/points?page_size=50').then(res=>{
const list=(res.data||{}).items||[];
const el=document.getElementById('tabContent');
if(!list.length){el.innerHTML='<div class="empty">暂无积分记录</div>';return}
el.innerHTML='<div class="section"><div class="section-title">积分明细</div>'+list.map(p=>`
<div class="item"><div class="left"><div class="title">${p.description||p.type}</div><div class="sub">${p.created_at?new Date(p.created_at).toLocaleString():''}</div></div>
<div class="right ${p.type==='earn'?'earn':'spend'}">${p.type==='earn'?'+':'-'}${p.points}</div></div>`).join('')+'</div>';
})}

function loadCoupons(){
api('/api/taishan/coupons?page_size=50').then(res=>{
const list=(res.data||{}).items||[];
const el=document.getElementById('tabContent');
if(!list.length){el.innerHTML='<div class="empty">暂无优惠券</div>';return}
el.innerHTML=list.map(c=>{
const cls=c.status==0?'coupon-unused':c.status==1?'coupon-used':'coupon-expired';
const typeLabel=c.coupon_type=='fixed'?'满减券':c.coupon_type=='discount'?'折扣券':'代金券';
return `<div class="coupon-card ${cls}"><div class="coupon-left"><div class="value">${c.coupon_type=='discount'?Number(c.coupon_value)*10+'折':'¥'+Number(c.coupon_value).toFixed(0)}</div><div class="type">${typeLabel}</div></div>
<div class="coupon-right"><div class="name">${c.coupon_name||typeLabel}</div><div class="condition">${c.min_amount>0?'满'+Number(c.min_amount).toFixed(0)+'可用':'无门槛'}</div>
<div class="expire">${c.expire_time?'有效期至 '+new Date(c.expire_time).toLocaleDateString():'长期有效'} · ${c.status==0?'未使用':c.status==1?'已使用':'已过期'}</div></div></div>`}).join('');
})}

function loadLedger(){
api('/api/taishan/ledger?page_size=50').then(res=>{
const list=(res.data||{}).items||[];
const el=document.getElementById('tabContent');
const moduleNames={cafeteria:'社区食堂',banquet:'私宴包间',drink:'大堂饮品',sports:'运动场馆',carwash:'洗车服务',laundry:'洗衣服务'};
if(!list.length){el.innerHTML='<div class="empty">暂无消费记录</div>';return}
el.innerHTML='<div class="section"><div class="section-title">消费记录</div>'+list.map(l=>`
<div class="item"><div class="left"><div class="title">${moduleNames[l.module]||l.module} · ${l.order_no||''}</div><div class="sub">${l.created_at?new Date(l.created_at).toLocaleString():''}</div></div>
<div class="right">¥${Number(l.pay_amount).toFixed(2)}</div></div>`).join('')+'</div>';
})}

loadTab();
</script>
</body>
</html>
