<!DOCTYPE html>
<html lang="zh-CN" data-theme="residential">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>粤海物业 - 生活服务</title>
<script src="api.js"></script>
<style>
:root {
  --primary: #00dea0; --primary-light: #33e5b5; --primary-dark: #00b383; --primary-bg: #e8f5e9;
  --purple: #845ef7; --purple-light: #9a8ef7; --purple-bg: #f3f0ff;
  --gray-50: #fafafa; --gray-100: #f5f5f5; --gray-200: #eeeeee;
  --gray-300: #e0e0e0; --gray-400: #bdbdbd; --gray-500: #9e9e9e; --gray-600: #757575;
  --gray-700: #616161; --gray-800: #424242; --gray-900: #212121; --white: #ffffff;
  --radius-sm: 8px; --radius-md: 12px; --radius-lg: 16px; --radius-xl: 20px;
  --shadow-card: 0 2px 12px rgba(0,0,0,0.08);
  --shadow-float: 0 4px 20px rgba(0,0,0,0.12);
}
[data-theme="commercial"] {
  --primary: #00dea0; --primary-light: #33e5b5; --primary-dark: #00b383; --primary-bg: #e8f5e9;
  --accent: #2c3e50; --accent-light: #34495e; --accent-bg: #f0f2f5;
  --radius-sm: 6px; --radius-md: 8px; --radius-lg: 10px; --radius-xl: 12px;
  --shadow-card: 0 2px 8px rgba(0,0,0,0.08);
  --shadow-float: 0 4px 12px rgba(0,0,0,0.1);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: var(--gray-100); color: var(--gray-900); font-size: 16px; line-height: 1.5;
  padding-bottom: 80px; -webkit-font-smoothing: antialiased;
}
.header {
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
  color: #fff; padding: 16px; position: sticky; top: 0; z-index: 100;
  box-shadow: var(--shadow-float);
}
[data-theme="commercial"] .header {
  background: linear-gradient(90deg, var(--primary) 0%, var(--accent) 100%);
}
.header__top { display: flex; align-items: center; gap: 12px; }
.header__back { font-size: 24px; cursor: pointer; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 50%; background: rgba(255,255,255,0.2); }
.header__title { font-size: 18px; font-weight: 600; }
.service-container { padding: 16px; display: flex; flex-direction: column; gap: 16px; }
.service-grid {
  display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;
}
.service-card {
  background: var(--white); border-radius: var(--radius-lg); padding: 20px 16px;
  box-shadow: var(--shadow-card); border: 1px solid var(--gray-200);
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  cursor: pointer; transition: transform 0.2s;
}
.service-card:active { transform: scale(0.98); }
.service-card__icon { font-size: 32px; }
.service-card__name { font-size: 14px; font-weight: 500; color: var(--gray-900); }
.service-card__desc { font-size: 12px; color: var(--gray-600); text-align: center; }
.section {
  background: var(--white); border-radius: var(--radius-lg); padding: 16px;
  box-shadow: var(--shadow-card); border: 1px solid var(--gray-200);
}
.section__title {
  font-size: 16px; font-weight: 600; color: var(--gray-900); margin-bottom: 16px;
  display: flex; align-items: center; gap: 8px;
}
.section__title::before {
  content: ''; display: inline-block; width: 4px; height: 18px;
  background: var(--primary); border-radius: 2px;
}
.mall-item {
  display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--gray-200);
}
.mall-item:last-child { border-bottom: none; }
.mall-item__img {
  width: 80px; height: 80px; border-radius: var(--radius-sm); object-fit: cover;
  background: var(--gray-200);
}
.mall-item__info { flex: 1; }
.mall-item__name { font-size: 15px; color: var(--gray-900); margin-bottom: 4px; }
.mall-item__desc { font-size: 13px; color: var(--gray-600); margin-bottom: 8px; }
.mall-item__price { font-size: 16px; font-weight: 600; color: #ff6b6b; }
.mall-item__btn {
  padding: 4px 12px; background: var(--primary); color: #fff; border: none;
  border-radius: 4px; font-size: 12px; cursor: pointer;
}
.tabbar {
  position: fixed; bottom: 0; left: 0; right: 0; height: 64px; background: var(--white);
  border-top: 1px solid var(--gray-200); display: flex; z-index: 100;
  box-shadow: 0 -2px 8px rgba(0,0,0,0.08);
}
.tabbar__item {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 3px; color: var(--gray-500); font-size: 11px; cursor: pointer;
}
.tabbar__item--active { color: var(--primary); }
.tabbar__icon { font-size: 24px; }
</style>
</head>
<body>

<div class="header">
  <div class="header__top">
    <div class="header__back" onclick="history.back()">←</div>
    <div class="header__title">生活服务</div>
  </div>
</div>

<div class="service-container">
  <!-- 服务分类 -->
  <div class="service-grid">
    <div class="service-card" onclick="location.href='#cleaning'">
      <div class="service-card__icon">🧹</div>
      <div class="service-card__name">家政清洁</div>
      <div class="service-card__desc">专业保洁，放心到家</div>
    </div>
    <div class="service-card" onclick="location.href='#repair'">
      <div class="service-card__icon">🔧</div>
      <div class="service-card__name">家电维修</div>
      <div class="service-card__desc">上门维修，快速响应</div>
    </div>
    <div class="service-card" onclick="location.href='#express'">
      <div class="service-card__icon">📦</div>
      <div class="service-card__name">快递代收</div>
      <div class="service-card__desc">智能柜存放，随时取件</div>
    </div>
    <div class="service-card" onclick="location.href='#moving'">
      <div class="service-card__icon">🚚</div>
      <div class="service-card__name">搬家服务</div>
      <div class="service-card__desc">专业团队，安全省心</div>
    </div>
    <div class="service-card" onclick="location.href='#food'">
      <div class="service-card__icon">🍜</div>
      <div class="service-card__name">社区食堂</div>
      <div class="service-card__desc">营养餐食，配送到家</div>
    </div>
    <div class="service-card" onclick="location.href='#education'">
      <div class="service-card__icon">📚</div>
      <div class="service-card__name">教育培训</div>
      <div class="service-card__desc">少儿辅导，兴趣培养</div>
    </div>
  </div>

  <!-- 社区商城 -->
  <div class="section" id="mall">
    <div class="section__title">🛒 社区商城</div>
    <div class="mall-item">
      <div class="mall-item__img"></div>
      <div class="mall-item__info">
        <div class="mall-item__name">有机蔬菜礼盒</div>
        <div class="mall-item__desc">新鲜直达，无农药残留</div>
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <div class="mall-item__price">¥ 68.00</div>
          <button class="mall-item__btn">加入购物车</button>
        </div>
      </div>
    </div>
    <div class="mall-item">
      <div class="mall-item__img"></div>
      <div class="mall-item__info">
        <div class="mall-item__name">品牌大米5kg</div>
        <div class="mall-item__desc">东北珍珠米，香糯可口</div>
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <div class="mall-item__price">¥ 45.00</div>
          <button class="mall-item__btn">加入购物车</button>
        </div>
      </div>
    </div>
    <div class="mall-item">
      <div class="mall-item__img"></div>
      <div class="mall-item__info">
        <div class="mall-item__name">智能家居套装</div>
        <div class="mall-item__desc">智能门锁+网关+传感器</div>
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <div class="mall-item__price">¥ 899.00</div>
          <button class="mall-item__btn">加入购物车</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 底部导航 -->
<div class="tabbar">
  <div class="tabbar__item" onclick="location.href='index.html'">
    <div class="tabbar__icon">🏠</div>
    <div>首页</div>
  </div>
  <div class="tabbar__item">
    <div class="tabbar__icon">📋</div>
    <div>申请</div>
  </div>
  <div class="tabbar__item tabbar__item--active">
    <div class="tabbar__icon">🛎️</div>
    <div>服务</div>
  </div>
  <div class="tabbar__item">
    <div class="tabbar__icon">👤</div>
    <div>我的</div>
  </div>
</div>

</body>
</html>
