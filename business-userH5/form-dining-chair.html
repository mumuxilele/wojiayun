<!DOCTYPE html>
<html lang="zh-CN" data-theme="residential">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>粤海物业 - 餐饮桌凳临时摆放申请</title>
<script src="api.js"></script>
<style>
:root {
  --primary: #00dea0; --primary-light: #33e5b5; --primary-dark: #00b383; --primary-bg: #e8f5e9;
  --accent: #ff6b6b; --accent-light: #ff8e8e; --accent-bg: #fff0f0;
  --purple: #845ef7; --purple-light: #9a8ef7; --purple-bg: #f3f0ff;
  --gray-50: #fafafa; --gray-100: #f5f5f5; --gray-200: #eeeeee;
  --gray-300: #e0e0e0; --gray-400: #bdbdbd; --gray-500: #9e9e9e; --gray-600: #757575;
  --gray-700: #616161; --gray-800: #424242; --gray-900: #212121; --white: #ffffff;
  --radius-sm: 8px; --radius-md: 12px; --radius-lg: 16px; --radius-xl: 20px;
  --shadow-card: 0 2px 12px rgba(0,0,0,0.08);
  --shadow-float: 0 4px 20px rgba(0,0,0,0.12);
}
[data-theme="commercial"] {
  --primary: #00dea0; --primary-light: #33e5b5; --primary-dark: #00b383; --primary-bg: #e8f5e9;
  --accent: #2c3e50; --accent-light: #34495e; --accent-bg: #f0f2f5;
  --radius-sm: 6px; --radius-md: 8px; --radius-lg: 10px; --radius-xl: 12px;
  --shadow-card: 0 2px 8px rgba(0,0,0,0.08);
  --shadow-float: 0 4px 12px rgba(0,0,0,0.1);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: var(--gray-100); color: var(--gray-900); font-size: 16px; line-height: 1.5;
  padding-bottom: 80px; -webkit-font-smoothing: antialiased;
}
.header {
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
  color: #fff; padding: 16px; position: sticky; top: 0; z-index: 100;
  box-shadow: var(--shadow-float);
}
[data-theme="commercial"] .header {
  background: linear-gradient(90deg, var(--primary) 0%, var(--accent) 100%);
}
.header__top { display: flex; align-items: center; gap: 12px; }
.header__back { font-size: 24px; cursor: pointer; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 50%; background: rgba(255,255,255,0.2); }
.header__title { font-size: 18px; font-weight: 600; }
.form-container { padding: 16px; display: flex; flex-direction: column; gap: 16px; }
.form-section {
  background: var(--white); border-radius: var(--radius-lg); padding: 16px;
  box-shadow: var(--shadow-card); border: 1px solid var(--gray-200);
}
.form-section__title {
  font-size: 16px; font-weight: 600; color: var(--gray-900); margin-bottom: 16px;
  display: flex; align-items: center; gap: 8px;
}
.form-section__title::before {
  content: ''; display: inline-block; width: 4px; height: 18px;
  background: var(--primary); border-radius: 2px;
}
.form-group { margin-bottom: 16px; }
.form-group:last-child { margin-bottom: 0; }
.form-label {
  display: block; font-size: 14px; color: var(--gray-700); margin-bottom: 8px; font-weight: 500;
}
.form-input {
  width: 100%; height: 48px; border: 1px solid var(--gray-300); border-radius: var(--radius-sm);
  padding: 0 16px; font-size: 15px; color: var(--gray-900); background: var(--white);
  transition: border-color 0.2s;
}
.form-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 2px var(--primary-bg); }
.form-textarea {
  width: 100%; min-height: 120px; border: 1px solid var(--gray-300); border-radius: var(--radius-sm);
  padding: 12px 16px; font-size: 15px; color: var(--gray-900); background: var(--white);
  resize: vertical; font-family: inherit; transition: border-color 0.2s;
}
.form-textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 2px var(--primary-bg); }
.form-select {
  width: 100%; height: 48px; border: 1px solid var(--gray-300); border-radius: var(--radius-sm);
  padding: 0 16px; font-size: 15px; color: var(--gray-900); background: var(--white);
  appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%239e9e9e' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
  background-repeat: no-repeat; background-position: right 16px center; background-size: 16px;
  transition: border-color 0.2s;
}
.form-select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 2px var(--primary-bg); }
.form-datetime { display: flex; gap: 12px; }
.form-datetime__item { flex: 1; }
.form-datetime__label { font-size: 13px; color: var(--gray-600); margin-bottom: 4px; }
.form-number {
  width: 100%; height: 48px; border: 1px solid var(--gray-300); border-radius: var(--radius-sm);
  padding: 0 16px; font-size: 15px; color: var(--gray-900); background: var(--white);
  transition: border-color 0.2s;
}
.form-number:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 2px var(--primary-bg); }
.image-upload { display: flex; flex-wrap: wrap; gap: 12px; }
.image-upload__item {
  width: 80px; height: 80px; border: 2px dashed var(--gray-300); border-radius: var(--radius-sm);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  font-size: 24px; color: var(--gray-400); cursor: pointer; position: relative; overflow: hidden;
}
.image-upload__item--filled { border-style: solid; border-color: var(--primary); }
.image-upload__img { width: 100%; height: 100%; object-fit: cover; }
.image-upload__delete {
  position: absolute; top: 4px; right: 4px; width: 20px; height: 20px;
  background: rgba(0,0,0,0.5); color: #fff; border-radius: 50%; font-size: 12px;
  display: flex; align-items: center; justify-content: center; cursor: pointer;
}
.submit-btn {
  width: 100%; height: 52px; background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
  color: #fff; border: none; border-radius: var(--radius-lg); font-size: 16px; font-weight: 600;
  cursor: pointer; transition: opacity 0.2s; box-shadow: var(--shadow-float);
}
[data-theme="commercial"] .submit-btn {
  background: linear-gradient(90deg, var(--primary) 0%, var(--accent) 100%);
}
.submit-btn:active { opacity: 0.9; }
.tabbar {
  position: fixed; bottom: 0; left: 0; right: 0; height: 64px; background: var(--white);
  border-top: 1px solid var(--gray-200); display: flex; z-index: 100;
  box-shadow: 0 -2px 8px rgba(0,0,0,0.08);
}
.tabbar__item {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 3px; color: var(--gray-500); font-size: 11px; cursor: pointer;
}
.tabbar__item--active { color: var(--primary); }
.tabbar__icon { font-size: 24px; }
</style>
</head>
<body>

<div class="header">
  <div class="header__top">
    <div class="header__back" onclick="history.back()">←</div>
    <div class="header__title">餐饮桌凳临时摆放申请</div>
  </div>
</div>

<div class="form-container">
  <!-- 基本信息 -->
  <div class="form-section">
    <div class="form-section__title">📋 基本信息</div>
    <div class="form-group">
      <label class="form-label">申请人</label>
      <input type="text" class="form-input" value="张先生" disabled>
    </div>
    <div class="form-group">
      <label class="form-label">所属商户</label>
      <input type="text" class="form-input" value="粤海天河城 3楼301 星巴克" disabled>
    </div>
    <div class="form-group">
      <label class="form-label">摆放区域 *</label>
      <select class="form-select">
        <option value="">请选择摆放区域</option>
        <option value="public">公共区域</option>
        <option value="entrance">入口门前</option>
        <option value="corridor">走廊</option>
        <option value="platform">露台</option>
      </select>
    </div>
  </div>

  <!-- 摆放信息 -->
  <div class="form-section">
    <div class="form-section__title">🪑 摆放信息</div>
    <div class="form-group">
      <label class="form-label">摆放日期 *</label>
      <input type="date" class="form-input" value="2026-04-29">
    </div>
    <div class="form-group">
      <label class="form-label">摆放时段 *</label>
      <div class="form-datetime">
        <div class="form-datetime__item">
          <div class="form-datetime__label">开始时间</div>
          <input type="time" class="form-input" value="10:00">
        </div>
        <div class="form-datetime__item">
          <div class="form-datetime__label">结束时间</div>
          <input type="time" class="form-input" value="22:00">
        </div>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">桌凳数量 *</label>
      <div style="display:flex;gap:12px;">
        <div style="flex:1;">
          <div class="form-datetime__label">桌子（张）</div>
          <input type="number" class="form-number" value="2" min="1" max="20">
        </div>
        <div style="flex:1;">
          <div class="form-datetime__label">凳子（个）</div>
          <input type="number" class="form-number" value="8" min="1" max="40">
        </div>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">摆放说明 *</label>
      <textarea class="form-textarea" placeholder="请说明摆放用途、具体位置、是否占用消防通道等"></textarea>
    </div>
  </div>

  <!-- 联系信息 -->
  <div class="form-section">
    <div class="form-section__title">📞 联系信息</div>
    <div class="form-group">
      <label class="form-label">联系人 *</label>
      <input type="text" class="form-input" value="张先生">
    </div>
    <div class="form-group">
      <label class="form-label">联系电话 *</label>
      <input type="tel" class="form-input" value="13800138000">
    </div>
    <div class="form-group">
      <label class="form-label">备注</label>
      <textarea class="form-textarea" placeholder="其他需要说明的事项（选填）"></textarea>
    </div>
  </div>

  <!-- 照片上传 -->
  <div class="form-section">
    <div class="form-section__title">📷 照片上传</div>
    <div class="form-group">
      <label class="form-label">摆放区域现状照片（最多3张）</label>
      <div class="image-upload">
        <div class="image-upload__item">📷</div>
        <div class="image-upload__item">📷</div>
        <div class="image-upload__item">📷</div>
      </div>
    </div>
  </div>

  <!-- 提交按钮 -->
  <button class="submit-btn" onclick="(async() => {
  const type = '餐饮桌凳';
  const desc = document.querySelector('.field__textarea')?.value.trim() || '';
  if (!desc) return alert('请填写说明');
  try {
    const res = await API.workOrders.create({work_order_type: type, description: '餐饮桌凳申请：' + desc});
    if (res.code === 0) { alert('提交成功！'); location.href = 'list.html?type=dining'; }
    else alert(res.message);
  } catch(e) { alert('提交失败'); }
})()">提交申请</button>
</div>

<!-- 底部导航 -->
<div class="tabbar">
  <div class="tabbar__item" onclick="location.href='index.html'">
    <div class="tabbar__icon">🏠</div>
    <div>首页</div>
  </div>
  <div class="tabbar__item tabbar__item--active" onclick="location.href='list.html?type=apply'">
    <div class="tabbar__icon">📋</div>
    <div>申请</div>
  </div>
  <div class="tabbar__item">
    <div class="tabbar__icon">💬</div>
    <div>消息</div>
  </div>
  <div class="tabbar__item">
    <div class="tabbar__icon">👤</div>
    <div>我的</div>
  </div>
</div>

</body>
</html>
