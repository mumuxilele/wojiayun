<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>会员中心</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f5f5f5;min-height:100vh;padding-bottom:30px}
.header{background:linear-gradient(135deg,#f093fb 0%,#f5576c 100%);color:white;padding:20px 15px 40px;position:relative}
.header-top{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.back{color:white;font-size:20px;text-decoration:none;padding:4px 8px}
.header-title{font-size:18px;font-weight:600}
.member-card{background:rgba(255,255,255,.18);border-radius:16px;padding:16px;display:flex;align-items:center;gap:14px}
.avatar{width:56px;height:56px;border-radius:50%;background:rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;border:2px solid rgba(255,255,255,.5)}
.member-info .name{font-size:18px;font-weight:700}
.member-info .phone{font-size:13px;opacity:.85;margin-top:2px}
.level-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:12px;font-size:12px;margin-top:5px;font-weight:600}
.lv-bronze{background:rgba(205,127,50,.3);color:#ffd700}
.lv-silver{background:rgba(192,192,192,.3);color:#e8e8e8}
.lv-gold{background:rgba(255,215,0,.3);color:#ffd700}
.lv-platinum{background:rgba(229,228,226,.3);color:#fff}

/* 积分余额卡片 */
.points-row{display:flex;gap:12px;margin:-24px 15px 0;position:relative;z-index:10}
.points-card{flex:1;background:white;border-radius:14px;padding:16px;text-align:center;box-shadow:0 4px 16px rgba(0,0,0,.1)}
.points-card .num{font-size:24px;font-weight:700;color:#333}
.points-card .label{font-size:12px;color:#999;margin-top:3px}
.points-card .sub{font-size:11px;color:#bbb;margin-top:1px}

/* 功能菜单 */
.menu-section{background:white;margin:16px 15px;border-radius:14px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.menu-section-title{padding:14px 16px 8px;font-size:13px;color:#999;font-weight:500}
.menu-item{display:flex;align-items:center;padding:14px 16px;border-bottom:1px solid #f5f5f5;cursor:pointer}
.menu-item:last-child{border-bottom:none}
.menu-item:active{background:#fafafa}
.menu-icon{font-size:20px;width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-right:12px;flex-shrink:0}
.menu-text{flex:1;font-size:15px;color:#333}
.menu-sub{font-size:12px;color:#999;margin-top:2px}
.menu-arrow{color:#ccc;font-size:18px}
.menu-badge{background:#ff4d4f;color:white;font-size:11px;padding:1px 6px;border-radius:8px;margin-right:8px}

/* 积分记录标签 */
.tabs{display:flex;background:white;border-bottom:1px solid #f0f0f0}
.tab{flex:1;padding:11px;text-align:center;font-size:13px;color:#666;cursor:pointer;border-bottom:2px solid transparent}
.tab.active{color:#f5576c;border-bottom-color:#f5576c;font-weight:600}

/* 积分记录列表 */
.log-item{background:white;margin:0 15px;border-radius:0;padding:14px 16px;border-bottom:1px solid #f5f5f5;display:flex;align-items:center}
.log-item:first-child{border-radius:14px 14px 0 0;margin-top:0}
.log-item:last-child{border-bottom:none;border-radius:0 0 14px 14px;margin-bottom:16px}
.log-item.single{border-radius:14px;margin:0 15px 16px}
.log-icon-wrap{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;margin-right:12px}
.log-icon-earn{background:#fff8e1}
.log-icon-spend{background:#fce4ec}
.log-info{flex:1;min-width:0}
.log-desc{font-size:14px;color:#333;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.log-time{font-size:11px;color:#bbb;margin-top:3px}
.log-points{font-size:16px;font-weight:700;flex-shrink:0}
.log-earn{color:#52c41a}
.log-spend{color:#f44336}

/* 等级进度 */
.level-section{background:white;margin:16px 15px;border-radius:14px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.level-title{font-size:15px;font-weight:600;color:#333;margin-bottom:14px}
.level-bar{position:relative;margin-bottom:8px}
.level-progress{height:8px;border-radius:4px;background:#f0f0f0;overflow:hidden;margin-bottom:6px}
.level-fill{height:100%;background:linear-gradient(90deg,#f093fb,#f5576c);border-radius:4px;transition:width .5s}
.level-labels{display:flex;justify-content:space-between;font-size:11px;color:#999}
.level-next-tip{font-size:12px;color:#666;text-align:center;margin-top:6px}

.empty{text-align:center;padding:30px;color:#bbb;font-size:13px}
.loading{text-align:center;padding:30px;color:#bbb}
</style>
</head>
<body>
<div class="header">
    <div class="header-top">
        <a href="javascript:history.back()" class="back">‹</a>
        <div class="header-title">会员中心</div>
    </div>
    <div class="member-card">
        <div class="avatar">👤</div>
        <div class="member-info">
            <div class="name" id="memberName">加载中...</div>
            <div class="phone" id="memberPhone"></div>
            <div id="memberLevel"></div>
        </div>
    </div>
</div>

<!-- 积分/余额卡片 -->
<div class="points-row">
    <div class="points-card">
        <div class="num" id="myPoints">-</div>
        <div class="label">当前积分</div>
        <div class="sub" id="totalPointsSub">累计 0 积分</div>
    </div>
    <div class="points-card">
        <div class="num" id="myBalance">-</div>
        <div class="label">账户余额</div>
        <div class="sub">可用余额</div>
    </div>
    <div class="points-card" onclick="goTo('checkin.html')" style="cursor:pointer">
        <div class="num" id="checkinDays">-</div>
        <div class="label">连续签到</div>
        <div class="sub">天数</div>
    </div>
</div>

<!-- 等级进度 -->
<div class="level-section" id="levelSection" style="margin-top:28px">
    <div class="level-title">🏅 会员等级</div>
    <div class="level-bar">
        <div class="level-progress"><div class="level-fill" id="levelFill" style="width:0%"></div></div>
        <div class="level-labels"><span id="levelCurrent">青铜</span><span id="levelNext">白银 (需500积分)</span></div>
    </div>
    <div class="level-next-tip" id="levelTip">再累计 500 积分升级白银会员</div>
</div>

<!-- 快捷入口 -->
<div class="menu-section">
    <div class="menu-section-title">我的服务</div>
    <div class="menu-item" onclick="goTo('orders.html')">
        <div class="menu-icon" style="background:#e3f2fd">🛒</div>
        <div><div class="menu-text">我的订单</div><div class="menu-sub">查看全部订单状态</div></div>
        <div class="menu-arrow">›</div>
    </div>
    <div class="menu-item" onclick="goTo('bookings.html')">
        <div class="menu-icon" style="background:#f3e5f5">📅</div>
        <div><div class="menu-text">场馆预约</div><div class="menu-sub">查看预约记录</div></div>
        <div class="menu-arrow">›</div>
    </div>
    <div class="menu-item" onclick="goTo('my_coupons.html')">
        <div class="menu-icon" style="background:#fff8e1">🎫</div>
        <div><div class="menu-text">我的优惠券</div><div class="menu-sub" id="couponSub">查看可用优惠券</div></div>
        <div class="menu-arrow">›</div>
    </div>
    <div class="menu-item" onclick="goTo('favorites.html')">
        <div class="menu-icon" style="background:#fce4ec">❤️</div>
        <div><div class="menu-text">我的收藏</div><div class="menu-sub">收藏的门店/场馆/商品</div></div>
        <div class="menu-arrow">›</div>
    </div>
    <div class="menu-item" onclick="goTo('checkin.html')">
        <div class="menu-icon" style="background:#e8f5e9">✅</div>
        <div><div class="menu-text">每日签到</div><div class="menu-sub">签到赚积分</div></div>
        <div class="menu-arrow">›</div>
    </div>
</div>

<div class="menu-section">
    <div class="menu-section-title">地址管理</div>
    <div class="menu-item" onclick="goTo('address.html')">
        <div class="menu-icon" style="background:#e8eaf6">📍</div>
        <div><div class="menu-text">收货地址</div><div class="menu-sub" id="addressSub">管理配送地址</div></div>
        <div class="menu-arrow">›</div>
    </div>
</div>

<!-- 积分明细 -->
<div class="menu-section" style="overflow:visible">
    <div class="menu-section-title" style="padding-bottom:0">积分明细</div>
    <div class="tabs">
        <div class="tab active" data-type="" onclick="switchLogTab(this)">全部</div>
        <div class="tab" data-type="earn" onclick="switchLogTab(this)">获得</div>
        <div class="tab" data-type="spend" onclick="switchLogTab(this)">消耗</div>
    </div>
</div>
<div id="logList"><div class="loading">加载中...</div></div>

<script>
var urlParams = new URLSearchParams(location.search);
var token = urlParams.get('access_token') || localStorage.getItem('user_token');
var isdev = urlParams.get('isdev') || localStorage.getItem('user_isdev') || '0';
if (!token) { document.body.innerHTML = '<div style="text-align:center;padding:60px;color:#999"><h2>请先登录</h2></div>'; throw new Error('No token'); }
if (token) { localStorage.setItem('user_token', token); localStorage.setItem('user_isdev', isdev); }

function api(p) { return p + (p.includes('?') ? '&' : '?') + 'access_token=' + encodeURIComponent(token) + '&isdev=' + isdev; }
function goTo(url) { var s = url.indexOf('?') >= 0 ? '&' : '?'; location.href = url + s + 'access_token=' + encodeURIComponent(token) + '&isdev=' + isdev; }

var levelConfig = {
    bronze: { name:'青铜会员', class:'lv-bronze', nextName:'白银', nextPoints:500 },
    silver: { name:'白银会员', class:'lv-silver', nextName:'黄金', nextPoints:2000 },
    gold: { name:'黄金会员', class:'lv-gold', nextName:'铂金', nextPoints:5000 },
    platinum: { name:'铂金会员', class:'lv-platinum', nextName:null, nextPoints:null }
};

function loadMember() {
    fetch(api('/api/user/member'))
    .then(function(r){ return r.json(); })
    .then(function(d) {
        if (!d.success || !d.data) return;
        var m = d.data;
        document.getElementById('memberName').textContent = m.user_name || '用户';
        document.getElementById('memberPhone').textContent = m.phone ? m.phone.replace(/(\d{3})\d{4}(\d{4})/, '$1****$2') : '';
        document.getElementById('myPoints').textContent = m.points || 0;
        document.getElementById('myBalance').textContent = '¥' + parseFloat(m.balance || 0).toFixed(2);
        document.getElementById('totalPointsSub').textContent = '累计 ' + (m.total_points || 0) + ' 积分';

        var lv = m.member_level || 'bronze';
        var lvConf = levelConfig[lv] || levelConfig.bronze;
        document.getElementById('memberLevel').innerHTML = '<span class="level-badge ' + lvConf.class + '">🏅 ' + lvConf.name + '</span>';
        
        // 等级进度
        var totalPts = m.total_points || 0;
        if (lvConf.nextPoints) {
            var prev = { bronze:0, silver:500, gold:2000, platinum:5000 }[lv] || 0;
            var pct = Math.min(100, Math.round((totalPts - prev) / (lvConf.nextPoints - prev) * 100));
            document.getElementById('levelFill').style.width = pct + '%';
            document.getElementById('levelCurrent').textContent = lvConf.name;
            document.getElementById('levelNext').textContent = lvConf.nextName + '（需' + lvConf.nextPoints + '积分）';
            document.getElementById('levelTip').textContent = '再累计 ' + Math.max(0, lvConf.nextPoints - totalPts) + ' 积分升级' + lvConf.nextName + '会员';
        } else {
            document.getElementById('levelFill').style.width = '100%';
            document.getElementById('levelTip').textContent = '🎉 您已达到最高等级 铂金会员';
        }
    });
}

function loadCheckin() {
    fetch(api('/api/user/checkin/status'))
    .then(function(r){ return r.json(); })
    .then(function(d) {
        if (d.success && d.data) {
            document.getElementById('checkinDays').textContent = d.data.continuous_days || 0;
        }
    }).catch(function(){});
}

function loadCouponCount() {
    fetch(api('/api/user/coupons?status=unused'))
    .then(function(r){ return r.json(); })
    .then(function(d) {
        if (d.success && d.data && d.data.items) {
            var cnt = d.data.items.length;
            if (cnt > 0) document.getElementById('couponSub').textContent = cnt + ' 张可用';
        }
    }).catch(function(){});
}

function loadAddressCount() {
    fetch(api('/api/user/addresses'))
    .then(function(r){ return r.json(); })
    .then(function(d) {
        if (d.success && d.data && d.data.items) {
            var cnt = d.data.items.length;
            document.getElementById('addressSub').textContent = cnt > 0 ? '共 ' + cnt + ' 个地址' : '暂无地址，点击添加';
        }
    }).catch(function(){});
}

var currentLogType = '';
function switchLogTab(el) {
    document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
    el.classList.add('active');
    currentLogType = el.dataset.type;
    loadLogs();
}

var logTypeIconMap = {
    earn:'💰', spend:'💸', exchange:'🔄', checkin:'✅', refund:'↩️', adjust:'⚙️'
};

function loadLogs() {
    var url = '/api/user/points/logs?page=1&page_size=20';
    if (currentLogType) url += '&type=' + currentLogType;
    document.getElementById('logList').innerHTML = '<div class="loading">加载中...</div>';
    fetch(api(url))
    .then(function(r){ return r.json(); })
    .then(function(d) {
        if (!d.success || !d.data || !d.data.items || d.data.items.length === 0) {
            document.getElementById('logList').innerHTML = '<div class="empty">暂无积分记录</div>';
            return;
        }
        var items = d.data.items;
        var html = '<div style="margin:0 15px;background:white;border-radius:14px;overflow:hidden;margin-bottom:16px">';
        items.forEach(function(log, i) {
            var pts = parseInt(log.points || 0);
            var isEarn = pts > 0;
            var icon = logTypeIconMap[log.type] || (isEarn ? '💰' : '💸');
            var iconBg = isEarn ? 'log-icon-earn' : 'log-icon-spend';
            var ptsCls = isEarn ? 'log-earn' : 'log-spend';
            var ptsStr = (isEarn ? '+' : '') + pts;
            var borderBottom = i < items.length - 1 ? 'border-bottom:1px solid #f5f5f5' : '';
            html += '<div class="log-item" style="' + borderBottom + '">'
                + '<div class="log-icon-wrap ' + iconBg + '">' + icon + '</div>'
                + '<div class="log-info">'
                + '<div class="log-desc">' + (log.description || log.type || '') + '</div>'
                + '<div class="log-time">' + (log.created_at || '').substring(0,16) + '</div>'
                + '</div>'
                + '<div class="log-points ' + ptsCls + '">' + ptsStr + '</div>'
                + '</div>';
        });
        html += '</div>';
        document.getElementById('logList').innerHTML = html;
    })
    .catch(function() {
        document.getElementById('logList').innerHTML = '<div class="empty">加载失败</div>';
    });
}

loadMember();
loadCheckin();
loadCouponCount();
loadAddressCount();
loadLogs();
</script>
</body>
</html>
