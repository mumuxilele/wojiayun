<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>消息中心 - 社区服务</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; min-height: 100vh; }
        
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 15px 20px; display: flex; align-items: center; gap: 12px; }
        .back-btn { font-size: 20px; cursor: pointer; color: white; }
        .header h1 { font-size: 17px; flex: 1; }
        .unread-badge { background: #ff4d4f; color: white; font-size: 11px; padding: 2px 8px; border-radius: 10px; min-width: 22px; text-align: center; }
        .header-actions { display: flex; gap: 12px; align-items: center; }
        .btn-text { color: rgba(255,255,255,0.85); font-size: 13px; cursor: pointer; }

        /* 分类标签栏 - 横向滚动 */
        .tab-bar { background: white; padding: 10px 15px; overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch; border-bottom: 1px solid #f0f0f0; }
        .tab-bar::-webkit-scrollbar { display: none; }
        .tab-item { display: inline-flex; align-items: center; gap: 5px; padding: 6px 14px; margin-right: 8px; border-radius: 20px; font-size: 13px; cursor: pointer; background: #f5f5f5; color: #666; transition: all 0.2s; border: 1px solid transparent; }
        .tab-item.active { background: #667eea; color: white; }
        .tab-item .tab-cnt { background: rgba(255,255,255,0.3); border-radius: 8px; font-size: 11px; padding: 0 5px; min-width: 16px; text-align: center; }
        .tab-item:not(.active) .tab-cnt { background: #f5222d; color: white; }

        /* 工具栏 */
        .toolbar { display: flex; justify-content: space-between; align-items: center; padding: 8px 15px; background: white; border-bottom: 1px solid #f0f0f0; }
        .toolbar-left { font-size: 12px; color: #999; }
        .toolbar-right a { color: #667eea; font-size: 13px; text-decoration: none; margin-left: 15px; }

        /* 消息列表 */
        .notice-list { padding: 10px 15px 60px; }
        .notice-item { background: white; border-radius: 12px; margin-bottom: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.06); cursor: pointer; transition: transform 0.1s; position: relative; }
        .notice-item:active { transform: scale(0.99); }
        .notice-item.unread { border-left: 3px solid #667eea; }
        .notice-body { display: flex; align-items: flex-start; padding: 14px 15px; gap: 12px; }
        .notice-icon { width: 42px; height: 42px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
        .icon-system { background: #e6f7ff; }
        .icon-order { background: #fff7e6; }
        .icon-application { background: #f6ffed; }
        .icon-booking { background: #fff0f6; }
        .icon-points { background: #fffbe6; }
        .icon-coupon { background: #f9f0ff; }
        .icon-checkin { background: #f0fff4; }
        .icon-refund { background: #fff1f0; }
        .icon-review { background: #e6f4ff; }
        .notice-main { flex: 1; min-width: 0; }
        .notice-title-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
        .notice-title { font-size: 14px; font-weight: 600; color: #333; flex: 1; }
        .notice-time { font-size: 11px; color: #bbb; flex-shrink: 0; margin-left: 8px; white-space: nowrap; }
        .notice-content { font-size: 13px; color: #666; line-height: 1.5; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .notice-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 6px; }
        .notice-type-tag { font-size: 11px; padding: 2px 6px; border-radius: 4px; }
        .tag-system { background: #e6f7ff; color: #1890ff; }
        .tag-order { background: #fff7e6; color: #fa8c16; }
        .tag-application { background: #f6ffed; color: #52c41a; }
        .tag-booking { background: #fff0f6; color: #eb2f96; }
        .tag-points { background: #fffbe6; color: #faad14; }
        .tag-coupon { background: #f9f0ff; color: #722ed1; }
        .tag-checkin { background: #f0fff4; color: #52c41a; }
        .tag-refund { background: #fff1f0; color: #f5222d; }
        .tag-review { background: #e6f4ff; color: #1890ff; }
        .notice-arrow { color: #ddd; font-size: 14px; }
        .unread-dot { width: 8px; height: 8px; background: #667eea; border-radius: 50%; flex-shrink: 0; margin-top: 6px; }

        /* 分组日期 */
        .date-group { font-size: 12px; color: #999; text-align: center; margin: 10px 0 6px; }

        /* 加载更多 */
        .load-more { text-align: center; padding: 15px; }
        .load-more-btn { border: none; background: white; color: #667eea; padding: 8px 24px; border-radius: 20px; font-size: 13px; cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        .empty { text-align: center; padding: 80px 20px; color: #bbb; }
        .empty-icon { font-size: 60px; margin-bottom: 12px; }
        .empty p { font-size: 14px; }
        .loading { text-align: center; padding: 40px; color: #999; }
        .loading-dot { display: inline-block; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="header">
        <a class="back-btn" onclick="history.back()">←</a>
        <h1>消息中心</h1>
        <div class="header-actions">
            <span class="unread-badge" id="unreadBadge" style="display:none">0</span>
            <span class="btn-text" onclick="markAllRead()">全部已读</span>
        </div>
    </div>

    <!-- 分类标签栏 -->
    <div class="tab-bar" id="tabBar">
        <span class="tab-item active" data-type="" onclick="switchType(this)">
            全部 <span class="tab-cnt" id="cnt-all" style="display:none">0</span>
        </span>
        <span class="tab-item" data-type="order" onclick="switchType(this)">
            📦 订单 <span class="tab-cnt" id="cnt-order" style="display:none">0</span>
        </span>
        <span class="tab-item" data-type="coupon" onclick="switchType(this)">
            🎫 优惠券 <span class="tab-cnt" id="cnt-coupon" style="display:none">0</span>
        </span>
        <span class="tab-item" data-type="application" onclick="switchType(this)">
            📋 申请 <span class="tab-cnt" id="cnt-application" style="display:none">0</span>
        </span>
        <span class="tab-item" data-type="points" onclick="switchType(this)">
            💎 积分 <span class="tab-cnt" id="cnt-points" style="display:none">0</span>
        </span>
        <span class="tab-item" data-type="booking" onclick="switchType(this)">
            📅 预约 <span class="tab-cnt" id="cnt-booking" style="display:none">0</span>
        </span>
        <span class="tab-item" data-type="refund" onclick="switchType(this)">
            💰 退款 <span class="tab-cnt" id="cnt-refund" style="display:none">0</span>
        </span>
        <span class="tab-item" data-type="system" onclick="switchType(this)">
            🔔 系统 <span class="tab-cnt" id="cnt-system" style="display:none">0</span>
        </span>
    </div>

    <!-- 工具栏 -->
    <div class="toolbar">
        <span class="toolbar-left" id="totalText">加载中...</span>
        <div>
            <a href="javascript:void(0)" onclick="toggleUnreadOnly()">
                <span id="unreadOnlyLabel">只看未读</span>
            </a>
        </div>
    </div>

    <div id="noticeList" class="notice-list">
        <div class="loading"><span class="loading-dot">⏳</span> 加载中...</div>
    </div>

    <script>
    var urlParams = new URLSearchParams(location.search);
    var token = urlParams.get('access_token') || localStorage.getItem('user_token') || '';
    var isdev = urlParams.get('isdev') || localStorage.getItem('user_isdev') || '0';
    var currentType = '';
    var unreadOnly = false;
    var currentPage = 1;
    var hasMore = true;

    // 类型配置
    var TYPE_CONFIG = {
        '': { icon: '🔔', iconClass: 'icon-system', label: '全部', tagClass: 'tag-system' },
        system: { icon: '🔔', iconClass: 'icon-system', label: '系统', tagClass: 'tag-system' },
        order: { icon: '📦', iconClass: 'icon-order', label: '订单', tagClass: 'tag-order' },
        application: { icon: '📋', iconClass: 'icon-application', label: '申请', tagClass: 'tag-application' },
        booking: { icon: '📅', iconClass: 'icon-booking', label: '预约', tagClass: 'tag-booking' },
        points: { icon: '💎', iconClass: 'icon-points', label: '积分', tagClass: 'tag-points' },
        coupon: { icon: '🎫', iconClass: 'icon-coupon', label: '优惠券', tagClass: 'tag-coupon' },
        checkin: { icon: '✅', iconClass: 'icon-checkin', label: '签到', tagClass: 'tag-checkin' },
        refund: { icon: '💰', iconClass: 'icon-refund', label: '退款', tagClass: 'tag-refund' },
        review: { icon: '⭐', iconClass: 'icon-review', label: '评价', tagClass: 'tag-review' }
    };

    // 跳转链接
    var TYPE_LINK = {
        order: 'orders.html',
        coupon: 'my_coupons.html',
        application: 'applications.html',
        booking: 'bookings.html',
        points: 'member.html',
        refund: 'orders.html'
    };

    function switchType(el) {
        document.querySelectorAll('.tab-item').forEach(function(t){ t.classList.remove('active'); });
        el.classList.add('active');
        currentType = el.dataset.type;
        currentPage = 1;
        hasMore = true;
        loadNotifications(true);
    }

    function toggleUnreadOnly() {
        unreadOnly = !unreadOnly;
        document.getElementById('unreadOnlyLabel').textContent = unreadOnly ? '全部通知' : '只看未读';
        currentPage = 1;
        hasMore = true;
        loadNotifications(true);
    }

    function buildUrl(page) {
        var url = '/api/user/notifications?page=' + page + '&page_size=20&access_token=' + encodeURIComponent(token) + '&isdev=' + isdev;
        if (currentType) url += '&type=' + currentType;
        if (unreadOnly) url += '&is_read=false';
        return url;
    }

    function loadNotifications(reset) {
        var list = document.getElementById('noticeList');
        if (reset) list.innerHTML = '<div class="loading"><span>⏳</span> 加载中...</div>';

        fetch(buildUrl(currentPage))
        .then(function(r){ return r.json(); })
        .then(function(d) {
            if (!d.success) { list.innerHTML = '<div class="empty"><div class="empty-icon">❌</div><p>加载失败</p></div>'; return; }
            var data = d.data || {};
            var items = data.items || [];
            var total = data.total || 0;
            var unread = data.unread_count || 0;

            // 更新角标
            var badge = document.getElementById('unreadBadge');
            if (unread > 0) { badge.textContent = unread > 99 ? '99+' : unread; badge.style.display = 'inline-block'; }
            else { badge.style.display = 'none'; }

            document.getElementById('totalText').textContent = '共 ' + total + ' 条' + (unread > 0 ? '，' + unread + ' 条未读' : '');

            hasMore = items.length >= 20;

            if (reset) {
                if (items.length === 0) {
                    list.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><p>暂无消息</p></div>';
                    return;
                }
                list.innerHTML = '';
            }

            // 按日期分组
            var lastDate = '';
            items.forEach(function(n) {
                var dateStr = n.created_at ? n.created_at.substring(0, 10) : '';
                if (dateStr && dateStr !== lastDate) {
                    lastDate = dateStr;
                    var today = new Date().toISOString().substring(0, 10);
                    var yesterday = new Date(Date.now() - 86400000).toISOString().substring(0, 10);
                    var label = dateStr === today ? '今天' : dateStr === yesterday ? '昨天' : dateStr;
                    var dateEl = document.createElement('div');
                    dateEl.className = 'date-group';
                    dateEl.textContent = label;
                    list.appendChild(dateEl);
                }
                list.appendChild(renderItem(n));
            });

            if (hasMore) {
                var loadMoreDiv = document.createElement('div');
                loadMoreDiv.className = 'load-more';
                loadMoreDiv.innerHTML = '<button class="load-more-btn" onclick="loadMore()">加载更多</button>';
                list.appendChild(loadMoreDiv);
            }

            // 自动标记已读（进入对应分类时）
            if (currentType) {
                fetch('/api/user/notifications/read-all?type=' + currentType, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Token': token },
                    body: JSON.stringify({ type: currentType })
                }).catch(function(){});
            }

            // 更新分类角标
            loadTypeCounts();
        })
        .catch(function() {
            list.innerHTML = '<div class="empty"><div class="empty-icon">🔌</div><p>网络异常，请重试</p></div>';
        });
    }

    function renderItem(n) {
        var cfg = TYPE_CONFIG[n.notify_type] || TYPE_CONFIG['system'];
        var el = document.createElement('div');
        el.className = 'notice-item' + (n.is_read ? '' : ' unread');
        
        var link = TYPE_LINK[n.notify_type];
        if (link) {
            el.onclick = function() {
                markRead(n.id);
                var sep = link.indexOf('?') >= 0 ? '&' : '?';
                location.href = link + sep + 'access_token=' + encodeURIComponent(token) + '&isdev=' + isdev;
            };
        } else {
            el.onclick = function() { markRead(n.id); el.classList.remove('unread'); };
        }

        el.innerHTML = '<div class="notice-body">'
            + '<div class="notice-icon ' + cfg.iconClass + '">' + cfg.icon + '</div>'
            + '<div class="notice-main">'
            + '<div class="notice-title-row">'
            + '<span class="notice-title">' + escapeHtml(n.title || '') + '</span>'
            + '<span class="notice-time">' + formatTime(n.created_at) + '</span>'
            + '</div>'
            + '<div class="notice-content">' + escapeHtml(n.content || '') + '</div>'
            + '<div class="notice-footer">'
            + '<span class="notice-type-tag ' + cfg.tagClass + '">' + cfg.label + '</span>'
            + (link ? '<span class="notice-arrow">›</span>' : '')
            + '</div>'
            + '</div>'
            + (n.is_read ? '' : '<div class="unread-dot"></div>')
            + '</div>';
        return el;
    }

    function loadTypeCounts() {
        // 请求未读数按类型分布
        fetch('/api/user/notifications/unread-counts?access_token=' + encodeURIComponent(token) + '&isdev=' + isdev)
        .then(function(r){ return r.json(); })
        .then(function(d) {
            if (!d.success) return;
            var counts = d.data || {};
            var types = ['order', 'coupon', 'application', 'points', 'booking', 'refund', 'system'];
            types.forEach(function(t) {
                var el = document.getElementById('cnt-' + t);
                if (!el) return;
                var cnt = counts[t] || 0;
                if (cnt > 0) { el.textContent = cnt > 99 ? '99+' : cnt; el.style.display = 'inline-block'; }
                else { el.style.display = 'none'; }
            });
        }).catch(function(){});
    }

    function markRead(id) {
        if (!id) return;
        fetch('/api/user/notifications/' + id + '/read', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Token': token }
        }).catch(function(){});
    }

    async function markAllRead() {
        try {
            var body = {};
            if (currentType) body.type = currentType;
            await fetch('/api/user/notifications/read-all', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Token': token },
                body: JSON.stringify(body)
            });
            currentPage = 1;
            loadNotifications(true);
        } catch(e) {}
    }

    function loadMore() {
        currentPage++;
        loadNotifications(false);
    }

    function formatTime(t) {
        if (!t) return '';
        var d = new Date(t);
        var now = new Date();
        var diff = now - d;
        if (diff < 60000) return '刚刚';
        if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前';
        if (diff < 86400000) return Math.floor(diff / 3600000) + '小时前';
        if (diff < 172800000) return '昨天';
        return (d.getMonth()+1) + '/' + d.getDate() + ' ' + String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
    }

    function escapeHtml(s) {
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    loadNotifications(true);
    </script>
</body>
</html>
