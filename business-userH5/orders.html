<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的订单</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f5f5f5; min-height: 100vh; }
        .header { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 15px; display: flex; align-items: center; }
        .header h1 { font-size: 18px; flex: 1; }
        .back { color: white; text-decoration: none; font-size: 14px; }
        .filter { display: flex; gap: 8px; padding: 10px 15px; background: white; overflow-x: auto; }
        .filter-item { padding: 6px 12px; border-radius: 15px; font-size: 12px; white-space: nowrap; background: #f0f0f0; color: #666; }
        .filter-item.active { background: #667eea; color: white; }
        .list { padding: 10px; }
        .item { background: white; border-radius: 12px; padding: 15px; margin-bottom: 10px; }
        .item-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .item-title { font-size: 14px; color: #333; }
        .item-status { font-size: 12px; padding: 4px 10px; border-radius: 10px; }
        .status-pending { background: #fff3e0; color: #f57c00; }
        .status-paid { background: #e3f2fd; color: #1976d2; }
        .status-processing { background: #fff8e1; color: #ffa000; }
        .status-completed { background: #e8f5e9; color: #388e3c; }
        .status-cancelled { background: #f5f5f5; color: #999; }
        .item-amount { font-size: 18px; font-weight: 600; color: #f57c00; }
        .item-info { font-size: 12px; color: #999; margin-top: 8px; }
        .empty { text-align: center; padding: 60px 20px; color: #999; }
    </style>
</head>
<body>
    <div class="header">
        <a href="index.html" class="back">← 返回</a>
        <h1>我的订单</h1>
        <span></span>
    </div>
    <div class="filter">
        <div class="filter-item active" data-status="">全部</div>
        <div class="filter-item" data-status="pending">待支付</div>
        <div class="filter-item" data-status="paid">已支付</div>
        <div class="filter-item" data-status="completed">已完成</div>
    </div>
    <div class="list" id="list"><div class="empty">加载中...</div></div>

    <script>
        const token = localStorage.getItem('token') || new URLSearchParams(location.search).get('access_token');
        const isdev = new URLSearchParams(location.search).get('isdev') || '0';
        let currentStatus = '';

        function getStatusClass(s) { return 'item-status status-' + (s || 'pending'); }
        function getStatusText(s) { return {pending:'待支付',paid:'已支付',processing:'处理中',completed:'已完成',cancelled:'已取消'}[s] || s; }

        async function loadList() {
            const url = '/api/user/orders?page=1&page_size=20' + (currentStatus ? '&status=' + currentStatus : '') + '&access_token=' + encodeURIComponent(token) + '&isdev=' + isdev;
            const res = await fetch(url);
            const data = await res.json();
            if (data.success && data.data.items && data.data.items.length > 0) {
                document.getElementById('list').innerHTML = data.data.items.map(o => 
                    '<div class="item"><div class="item-header"><span class="item-title">' + (o.order_no || '') + '</span><span class="' + getStatusClass(o.status) + '">' + getStatusText(o.status) + '</span></div><div class="item-amount">¥' + (o.total_amount || 0) + '</div><div class="item-info">创建时间: ' + (o.create_time || '') + '</div></div>'
                ).join('');
            } else {
                document.getElementById('list').innerHTML = '<div class="empty">暂无订单</div>';
            }
        }

        document.querySelectorAll('.filter-item').forEach(el => {
            el.addEventListener('click', () => {
                document.querySelectorAll('.filter-item').forEach(e => e.classList.remove('active'));
                el.classList.add('active');
                currentStatus = el.dataset.status;
                loadList();
            });
        });

        loadList();
    </script>
</body>
</html>
