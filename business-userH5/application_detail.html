<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>申请详情</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f5f5f5; min-height: 100vh; }
        .header { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 15px; display: flex; align-items: center; }
        .header h1 { font-size: 18px; flex: 1; }
        .back { color: white; text-decoration: none; font-size: 14px; }
        .detail { padding: 15px; }
        .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 10px; }
        .card-title { font-size: 14px; color: #999; margin-bottom: 8px; }
        .card-value { font-size: 15px; color: #333; }
        .status { display: inline-block; padding: 4px 12px; border-radius: 10px; font-size: 12px; }
        .status-pending { background: #fff3e0; color: #f57c00; }
        .status-processing { background: #e3f2fd; color: #1976d2; }
        .status-completed { background: #e8f5e9; color: #388e3c; }
        .status-rejected { background: #ffebee; color: #d32f2f; }
        .btn { width: calc(100% - 30px); margin: 15px; padding: 14px; background: #667eea; color: white; border: none; border-radius: 12px; font-size: 16px; }
    </style>
</head>
<body>
    <div class="header">
        <a href="applications.html" class="back">← 返回</a>
        <h1>申请详情</h1>
        <span></span>
    </div>

    <div class="detail" id="detail">
        <div style="text-align: center; padding: 40px;">加载中...</div>
    </div>

    <script>
        const token = localStorage.getItem('token') || new URLSearchParams(location.search).get('access_token');
        const isdev = new URLSearchParams(location.search).get('isdev') || '0';
        const id = new URLSearchParams(location.search).get('id');

        async function load() {
            const res = await fetch('/api/user/applications/' + id + '?access_token=' + encodeURIComponent(token) + '&isdev=' + isdev);
            const data = await res.json();
            if (data.success && data.data) {
                const app = data.data;
                const statusClass = 'status-' + (app.status || 'pending');
                const statusText = {pending:'待处理',processing:'处理中',completed:'已完成',rejected:'已拒绝'}[app.status] || app.status;
                const typeText = {repair:'报修',booking:'预约',complaint:'投诉',consult:'咨询',other:'其他'}[app.app_type] || app.app_type;
                document.getElementById('detail').innerHTML = 
                    '<div class="card"><div class="card-title">申请单号</div><div class="card-value">' + (app.app_no || '') + '</div></div>' +
                    '<div class="card"><div class="card-title">申请类型</div><div class="card-value">' + typeText + '</div></div>' +
                    '<div class="card"><div class="card-title">标题</div><div class="card-value">' + (app.title || '') + '</div></div>' +
                    '<div class="card"><div class="card-title">详细内容</div><div class="card-value">' + (app.content || '') + '</div></div>' +
                    '<div class="card"><div class="card-title">状态</div><div class="card-value"><span class="status ' + statusClass + '">' + statusText + '</span></div></div>' +
                    (app.result ? '<div class="card"><div class="card-title">处理结果</div><div class="card-value">' + app.result + '</div></div>' : '') +
                    '<div class="card"><div class="card-title">提交时间</div><div class="card-value">' + (app.created_at || '') + '</div></div>';
            } else {
                document.getElementById('detail').innerHTML = '<div style="text-align:center;padding:40px;">' + (data.msg || '加载失败') + '</div>';
            }
        }

        load();
    </script>
</body>
</html>
