<div class="bill-overlay" id="billOverlay" onclick="closeBill()"></div>
<div class="bill-panel" id="billPanel">

  <div class="bill-row"><span>场地</span><span id="billVenue">-</span></div>

    <script>
    var UP={};
var urlP=new URLSearchParams(location.search);
var TOKEN=urlP.get('access_token');
var ISDEV=urlP.get('isdev')||'0';

if(TOKEN){localStorage.setItem('user_token',TOKEN);localStorage.setItem('user_isdev',ISDEV);}
else{TOKEN=localStorage.getItem('user_token');ISDEV=localStorage.getItem('user_isdev')||'0';}
if(!TOKEN){document.body.innerHTML='<div class="empty">请先登录</div>';throw 0;}

function api(path,method,body){
  var url='/api'+path+(path.includes('?')?'&':'?')+'access_token='+encodeURIComponent(TOKEN)+'&isdev='+ISDEV;
  return fetch(url,{method:method||'GET',headers:body?{'Content-Type':'application/json'}:{},body:body?JSON.stringify(body):undefined}).then(function(r){return r.json()});
}

function escapeHtml(text) {
  if (!text) return '';
  return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function goBack(){location.href='index.html?access_token='+encodeURIComponent(TOKEN)+'&isdev='+ISDEV;}

function switchTab(tab){
  document.querySelectorAll('.tab').forEach(function(e){e.classList.remove('active')});
  /* fix */ event.currentTarget.classList.add('active');
  document.getElementById('tabVenues').style.display=tab==='venues'?'block':'none';
  document.getElementById('tabMy').style.display=tab==='my'?'block':'none';
  if(tab==='venues'&&!UP.vLoaded)loadVenues();
  if(tab==='my'&&!UP.bLoaded)loadMyBookings();
}

// 加载场馆
function loadVenues(){
  UP.vLoaded=true;
  var type=document.getElementById('filterType').value;
  api('/user/venues?page=1&page_size=50'+(type?'&type='+type:'')).then(function(d){
    if(d.success&&d.data&&d.data.items&&d.data.items.length>0){
      var TM={yumaoqiu:'🏸',lanqiu:'🏀',pingpang:'🏓',yujia:'🧘',youyong:'🏊',gym:'💪',other:'其他'};
      document.getElementById('venueList').innerHTML=d.data.items.map(function(v){
        var imgs='';
        try{var arr=JSON.parse(v.images||'[]');if(arr&&arr.length)imgs='<img src="'+arr[0]+'" onerror="this.parentElement.innerHTML=TM[\''+(v.venue_type||'')+'\']||\'🏟️\'">';}catch(e){}
        var desc=(v.description||'').substr(0,30);
        return '<div class="venue-card">'+
          '<div class="v-top">'+
            '<div class="v-img">'+(imgs||TM[v.venue_type]||'🏟️')+'</div>'+
            '<div class="v-info">'+
              '<div class="v-name">'+escapeHtml(v.venue_name||'')+'</div>'+
              '<div class="v-tags">'+
                '<span class="tag">'+TM[v.venue_type]+'</span>'+
                '<span class="tag">可容'+(v.capacity||'-')+'人</span>'+
                '<span class="tag tag-price">¥'+(parseFloat(v.price||0)).toFixed(0)+'/时</span>'+
              '</div>'+
              '<div class="v-desc">'+escapeHtml(desc||'优质场地，欢迎预约')+'</div>'+
            '</div>'+
          '</div>'+
          '<div class="v-bottom">'+
            '<span class="v-price">¥'+(parseFloat(v.price||0)).toFixed(2)+'<span>/小时</span></span>'+
            '<button class="btn-book" onclick="openPanel('+v.id+')">立即预约</button>'+
          '</div>'+
        '</div>';
      }).join('');
    }else document.getElementById('venueList').innerHTML='<div class="empty">暂无场馆</div>';
  }).catch(function(){document.getElementById('venueList').innerHTML='<div class="empty">加载失败</div>';});
}

// 打开预约面板
var selectedVenue=null;
var bookedSlots={}; // {date: [hour, hour, ...]}

function openPanel(venueId){
  api('/user/venues/'+venueId).then(function(d){
    if(d.success&&d.data){
      selectedVenue=d.data;
      UP.curVenueId=venueId;
      // 重置状态
      UP.startHour=null;UP.endHour=null;UP.startTime=null;UP.endTime=null;
      document.getElementById('bookDate').value='';
      document.getElementById('timeSlots').innerHTML='<div style="padding:20px;text-align:center;color:#bbb;font-size:13px">请先选择日期</div>';
      updateInfo();
      
      // 渲染场地信息
      var TM={yumaoqiu:'🏸',lanqiu:'🏀',pingpang:'🏓',yujia:'🧘',youyong:'🏊',gym:'💪',other:'其他'};
      var imgsEl=document.getElementById('panelImgs');
      try{var arr=JSON.parse(selectedVenue.images||'[]');if(arr&&arr.length){imgsEl.innerHTML='<img src="'+arr[0]+'">';}else{imgsEl.innerHTML=TM[selectedVenue.venue_type]||'🏟️';}}catch(e){imgsEl.innerHTML=TM[selectedVenue.venue_type]||'🏟️';}
      
      document.getElementById('panelVenue').innerHTML=
        '<div class="v-img" id="pvImg"></div>'+
        '<div class="v-info"><div class="v-name">'+selectedVenue.venue_name+'</div>'+
        '<div class="v-price">¥'+(parseFloat(selectedVenue.price||0)).toFixed(2)+'/小时</div></div>';
      
      // 显示规则
      var rulesEl=document.getElementById('panelRules');
      if(selectedVenue.rules){
        rulesEl.textContent=selectedVenue.rules;
        rulesEl.style.display='block';
      }else rulesEl.style.display='none';
      
      document.getElementById('overlay').classList.add('show');
      document.getElementById('bookingPanel').classList.add('show');
    }
  });
}

function closePanel(){
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('bookingPanel').classList.remove('show');
}

// 日期变更时加载已预约时段
function onDateChange(){
  var date=document.getElementById('bookDate').value;
  if(!date||!UP.curVenueId)return;
  // 查询该场地该日期的已预约时段
  api('/user/venues/'+UP.curVenueId+'/booked?date='+date).then(function(d){
    bookedSlots[date]=d.data&&d.data.hours?d.data.hours:[];
    renderTimeSlots(date);
  }).catch(function(){
    bookedSlots[date]=[];
    renderTimeSlots(date);
  });
}

// 渲染时间段（8:00-22:00，每小时一个格子）
function renderTimeSlots(date){
  var booked=bookedSlots[date]||[];
  var html='';
  for(var h=8;h<=22;h++){
    var label=String(h).padStart(2,'0')+':00';
    var isUsed=booked.includes(h);
    html+='<div class="time-btn'+(isUsed?' used':' available')+'" data-hour="'+h+'" onclick="onSlotClick('+h+','+isUsed+')">'+label+(isUsed?' 已约':' ✓')+'</div>';
  }
  document.getElementById('timeSlots').innerHTML=html;
}

// 点击时间段
function onSlotClick(hour,isUsed){
  if(isUsed)return;
  if(!UP.startHour||!UP.endHour){
    // 第一个选中的作为开始时间
    UP.startHour=hour;
    UP.endHour=hour+1;
    UP.startTime=hour+':00';
    UP.endTime=(hour+1)+':00';
  } else {
    // 清空重新选择
    UP.startHour=hour;
    UP.endHour=hour+1;
    UP.startTime=hour+':00';
    UP.endTime=(hour+1)+':00';
  }
  renderTimeSlots(date);
  updateInfo();
  checkContinuity();
}

// 检查连续性并更新选中样式
function checkContinuity(){
  if(!UP.startHour)return;
  var booked=bookedSlots[document.getElementById('bookDate').value]||[];
  document.querySelectorAll('.time-btn').forEach(function(el){
    var h=parseInt(el.dataset.hour);
    if(h>=UP.startHour&&h<UP.endHour&&!booked.includes(h)){
      el.classList.add('selected');
    } else {
      el.classList.remove('selected');
    }
  });
}

// 快捷选择
function quickSelect(hours){
  var date=document.getElementById('bookDate').value;
  if(!date){alert('请先选择预约日期');return;}
  var booked=bookedSlots[date]||[];
  // 找从8点开始的连续空时段
  var start=8;
  var found=false;
  for(var s=8;s<=22-hours;s++){
    var ok=true;
    for(var h=s;h<s+hours;h++){
      if(booked.includes(h)){ok=false;break;}
    }
    if(ok){
      UP.startHour=s;
      UP.endHour=s+hours;
      UP.startTime=s+':00';
      UP.endTime=(s+hours)+':00';
      found=true;
      break;
    }
  }
  if(!found){alert('没有足够的连续时段，请手动选择');return;}
  renderTimeSlots(date);
  updateInfo();
  checkContinuity();
}

// 手动延长时间（点击结束时间按钮）
document.addEventListener('click',function(e){
  if(e.target.classList.contains('time-btn')&&!e.target.classList.contains('used')&&!e.target.classList.contains('selected')){
    var h=parseInt(e.target.dataset.hour);
    if(UP.startHour&&h>UP.startHour){
      var date=document.getElementById('bookDate').value;
      var booked=bookedSlots[date]||[];
      // 检查中间是否有被预约的
      var ok=true;
      for(var i=UP.startHour;i<=h;i++){
        if(booked.includes(i)&&i!==UP.startHour){ok=false;break;}
      }
      if(ok){
        UP.endHour=h+1;
        UP.endTime=(h+1)+':00';
        renderTimeSlots(date);
        updateInfo();
        checkContinuity();
      }
    }
  }
});

// 更新预约信息
function updateInfo(){
  var venue=selectedVenue||{};
  var price=parseFloat(venue.price||0);
  var date=document.getElementById('bookDate').value;
  var hours=UP.endHour&&UP.startHour?UP.endHour-UP.startHour:0;
  var total=price*hours;
  
  document.getElementById('infoVenue').textContent=venue.venue_name||'-';
  document.getElementById('infoDate').textContent=date||'-';
  document.getElementById('infoStart').textContent=UP.startTime||'-';
  document.getElementById('infoEnd').textContent=UP.endTime||'-';
  document.getElementById('infoHours').textContent=hours>0?hours+'小时':'-';
  document.getElementById('infoPrice').textContent='¥'+price.toFixed(2)+'/小时';
  document.getElementById('infoTotal').textContent='¥'+total.toFixed(2);
  
  var btn=document.getElementById('submitBtn');
  if(date&&hours>0){
    btn.disabled=false;
    btn.textContent='确认预约 ¥'+total.toFixed(2);
  } else {
    btn.disabled=true;
    btn.textContent='请选择预约时间';
  }
}

// 弹出账单确认
function goBill(){
  var venue=selectedVenue||{};
  var price=parseFloat(venue.price||0);
  var date=document.getElementById('bookDate').value;
  var hours=UP.endHour&&UP.startHour?UP.endHour-UP.startHour:0;
  var total=price*hours;
  
  document.getElementById('billVenue').textContent=venue.venue_name||'-';
  document.getElementById('billDate').textContent=date;
  document.getElementById('billTime').textContent=UP.startTime+' - '+UP.endTime;
  document.getElementById('billHours').textContent=hours+'小时';
  document.getElementById('billPrice').textContent='¥'+price.toFixed(2)+'/小时';
  document.getElementById('billTotal').textContent='¥'+total.toFixed(2);
  
  document.getElementById('billOverlay').classList.add('show');
  document.getElementById('billPanel').classList.add('show');
}

function closeBill(){
  document.getElementById('billOverlay').classList.remove('show');
  document.getElementById('billPanel').classList.remove('show');
}

// 提交预约
function submitBooking(){
  var venue=selectedVenue;
  var date=document.getElementById('bookDate').value;
  if(!date||!UP.startTime||!UP.endTime){alert('请完善预约信息');return;}
  var btn=document.querySelector('.bill-confirm');
  btn.disabled=true;btn.textContent='提交中...';
  api('/user/venues/'+venue.id+'/book','POST',{
    book_date:date,
    start_time:UP.startTime,
    end_time:UP.endTime
  }).then(function(d){
    if(d.success){
      closeBill();
      closePanel();
      // 展示成功引导弹窗，引导用户完成支付
      showBookingSuccess(d.data&&d.data.verify_code||'', UP.startTime, UP.endTime, date, venue);
      switchTab('my');
      UP.bLoaded=false;
      loadMyBookings();
    }else{
      alert(d.msg||'预约失败');
    }
    btn.disabled=false;btn.textContent='✅ 确认预约';
  }).catch(function(e){
    alert('预约失败：'+e.message);
    btn.disabled=false;btn.textContent='✅ 确认预约';
  });
}

// 预约成功引导弹窗
function showBookingSuccess(code, startTime, endTime, date, venue){
  var price = parseFloat(venue&&venue.price||0);
  var hours = UP.endHour&&UP.startHour?UP.endHour-UP.startHour:0;
  var total = (price * hours).toFixed(2);
  var overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:300;display:flex;align-items:center;justify-content:center';
  overlay.innerHTML=
    '<div style="background:white;border-radius:16px;width:320px;padding:28px 24px;text-align:center;position:relative">'
    +'<div style="font-size:48px;margin-bottom:12px">🎉</div>'
    +'<div style="font-size:18px;font-weight:700;color:#333;margin-bottom:8px">预约成功！</div>'
    +'<div style="font-size:13px;color:#999;margin-bottom:18px">'+date+' &nbsp;'+startTime+'~'+endTime+'</div>'
    +'<div style="background:#f9f5ff;border-radius:12px;padding:14px;margin-bottom:18px">'
    +'<div style="font-size:12px;color:#909399;margin-bottom:4px">核销码</div>'
    +'<div style="font-size:28px;font-weight:700;color:#667eea;letter-spacing:4px">'+code+'</div>'
    +'<div style="font-size:11px;color:#bbb;margin-top:4px">到场时出示此核销码</div>'
    +'</div>'
    +'<div style="background:#fff7e6;border-radius:8px;padding:10px;margin-bottom:18px;text-align:left">'
    +'<div style="font-size:13px;color:#f57c00;font-weight:600">💰 待支付：¥'+total+'</div>'
    +'<div style="font-size:12px;color:#999;margin-top:3px">请前往"我的预约"页面完成支付</div>'
    +'</div>'
    +'<button onclick="this.closest(\'div[style]\').remove()" style="width:100%;padding:12px;background:linear-gradient(135deg,#667eea,#764ba2);color:white;border:none;border-radius:12px;font-size:15px;cursor:pointer">我知道了</button>'
    +'</div>';
  document.body.appendChild(overlay);
}

// 加载我的预约
function loadMyBookings(){
  UP.bLoaded=true;
  var status=document.getElementById('myStatus').value;
  api('/user/bookings?page=1&page_size=50'+(status?'&status='+status:'')).then(function(d){
    if(d.success&&d.data&&d.data.items&&d.data.items.length>0){
      var SM={pending:'待确认',confirmed:'已确认',completed:'已完成',cancelled:'已取消'};
      var TM={yumaoqiu:'🏸',lanqiu:'🏀',pingpang:'🏓',yujia:'🧘',youyong:'🏊',gym:'💪',other:'🏟️'};
      document.getElementById('myBookingList').innerHTML=d.data.items.map(function(b){
        var t1=(b.start_time||'').substr(0,5);
        var t2=(b.end_time||'').substr(0,5);
        // 格式化日期
        var bookDate = b.book_date ? b.book_date.split(' ')[0] : '-';
        // 获取图片
        var imgHtml = '';
        if (b.images) {
            try {
                var imgs = JSON.parse(b.images);
                if (imgs && imgs.length > 0) {
                    imgHtml = '<img src="'+imgs[0]+'" class="bk-img" onerror="this.style.display=\'none\'">';
                }
            } catch(e) {}
        }
        // 无图片时显示类型 emoji 占位
        if(!imgHtml){
          var emoji = TM[b.venue_type] || '🏟️';
          imgHtml = '<div class="bk-img-placeholder">'+emoji+'</div>';
        }
        // 状态标签
        var statusLabel = SM[b.status] || b.status;
        // 格式化时间
        var hours = parseFloat(b.total_hours)||0;
        var price = parseFloat(b.total_price||0);
        return '<div class="booking-item">'+
          '<div class="bk-main">'+
            imgHtml +
            '<div class="bk-details">'+
              '<div class="bk-top">'+
                '<span class="bk-venue">'+(b.venue_name||'场馆预约')+'</span>'+
                '<span class="bk-status '+b.status+'">'+statusLabel+'</span>'+
              '</div>'+
              '<div class="bk-info">'+
                '<div>📅 '+bookDate+'  ⏰ '+t1+' ~ '+t2+'</div>'+
                '<div>⏱️ 时长 <strong>'+hours+'</strong> 小时  💰 总价 <strong>¥'+price.toFixed(2)+'</strong></div>'+
                '<div class="bk-created">下单时间：'+(b.created_at||'-')+'</div>'+
              '</div>'+
            '</div>'+
          '</div>'+
          (b.verify_code?'<div class="bk-code"><span>核销码</span><strong>'+b.verify_code+'</strong></div>':'')+
          '<div style="margin-top:8px;display:flex;gap:8px;justify-content:flex-end">'+
          (b.status==='pending'&&b.pay_status!=='paid'?'<button onclick="payBooking('+b.id+')" style="padding:6px 14px;background:linear-gradient(135deg,#667eea,#764ba2);color:white;border:none;border-radius:15px;font-size:12px;cursor:pointer">去支付</button>':'')+
          (b.status==='pending'?'<button onclick="cancelBooking('+b.id+')" style="padding:6px 14px;background:none;border:1px solid #ff4d4f;color:#ff4d4f;border-radius:15px;font-size:12px;cursor:pointer">取消预约</button>':'')+
          '</div>'+
        '</div>';
      }).join('');
    }else document.getElementById('myBookingList').innerHTML='<div class="empty">暂无预约记录<br><br><button onclick="switchTab(\'venues\')" style="padding:8px 20px;background:#667eea;color:white;border:none;border-radius:8px;font-size:14px;cursor:pointer">去预约场馆</button></div>';
  }).catch(function(){document.getElementById('myBookingList').innerHTML='<div class="empty">加载失败</div>';});
}

// 取消预约
function cancelBooking(id){
  if(!confirm('确定要取消这个预约吗？'))return;
  api('/user/bookings/'+id+'/cancel','POST',{}).then(function(d){
    if(d.success){alert('预约已取消');UP.bLoaded=false;loadMyBookings();}
    else alert(d.msg||'取消失败，请联系管理员');
  }).catch(function(){alert('取消失败，请稍后重试');});
}

// 支付预约
function payBooking(id){
  if(!confirm('确认支付该预约金额？'))return;
  api('/user/bookings/'+id+'/pay','POST',{}).then(function(d){
    if(d.success){
      alert('支付成功！管理员确认后将为您完成预约确认。');
      UP.bLoaded=false;
      loadMyBookings();
    }else alert(d.msg||'支付失败，请联系管理员');
  }).catch(function(){alert('支付失败，请稍后重试');});
}

// 初始化
var today=new Date();
// 使用本地时区格式化日期（避免UTC偏移导致日期少一天）
var yyyy=today.getFullYear();
var mm=String(today.getMonth()+1).padStart(2,'0');
var dd=String(today.getDate()).padStart(2,'0');
var todayStr=yyyy+'-'+mm+'-'+dd;
document.getElementById('bookDate').min=todayStr;
// 默认设置为今天（方便用户快速操作）
