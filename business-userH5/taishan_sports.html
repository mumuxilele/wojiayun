<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>运动场馆</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f5f5f5}
.header{background:#fff;padding:14px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #e8e8e8;position:sticky;top:0;z-index:10}
.back{font-size:22px;cursor:pointer;background:none;border:none}
.header h1{font-size:17px}
.tabs{display:flex;background:#fff;overflow-x:auto;padding:0;border-bottom:1px solid #e8e8e8}
.tab{flex-shrink:0;padding:12px 16px;font-size:13px;color:#666;cursor:pointer;border:none;background:none;border-bottom:2px solid transparent}
.tab.active{color:#1890ff;border-bottom-color:#1890ff}
.venues{padding:12px}
.venue-card{background:#fff;border-radius:12px;margin-bottom:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.venue-img{width:100%;height:140px;object-fit:cover;background:#f0f0f0}
.venue-info{padding:14px}
.venue-info h3{font-size:15px;margin-bottom:4px}
.venue-meta{font-size:12px;color:#666;margin-bottom:6px}
.venue-price{color:#ff4d4f;font-size:16px;font-weight:600;margin-bottom:8px}
.venue-price small{font-size:12px;font-weight:400}
.status-badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:4px;margin-bottom:8px}
.status-open{background:#f6ffed;color:#52c41a}
.status-closed{background:#fff1f0;color:#ff4d4f}
.status-maintain{background:#fff7e6;color:#faad14}
.book-btn{width:100%;padding:10px;background:#1890ff;color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:none;align-items:flex-end}
.modal.show{display:flex}
.modal-content{background:#fff;width:100%;border-radius:16px 16px 0 0;padding:20px}
.modal-content h2{font-size:16px;margin-bottom:16px;display:flex;justify-content:space-between}
.modal-content .close{cursor:pointer;font-size:20px;color:#999}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:13px;color:#666;margin-bottom:6px}
.form-group input{width:100%;padding:10px;border:1px solid #e8e8e8;border-radius:8px;font-size:14px}
.submit{width:100%;padding:14px;background:#1890ff;color:#fff;border:none;border-radius:10px;font-size:15px;cursor:pointer}
</style>
</head>
<body>
<div class="header"><button class="back" onclick="history.back()">‹</button><h1>运动场馆</h1></div>
<div class="tabs" id="tabs"></div>
<div class="venues" id="venues"><div style="text-align:center;padding:40px;color:#999">加载中...</div></div>

<div class="modal" id="bookModal">
  <div class="modal-content">
    <h2>预约场馆 <span class="close" onclick="closeModal()">✕</span></h2>
    <div id="selectedVenue"></div>
    <div class="form-group"><label>预约日期</label><input type="date" id="bookDate"></div>
    <div class="form-group"><label>开始时间</label><input type="time" id="bookStart" value="09:00"></div>
    <div class="form-group"><label>结束时间</label><input type="time" id="bookEnd" value="10:00"></div>
    <div class="form-group"><label>备注</label><input type="text" id="bookRemark" placeholder="选填"></div>
    <button class="submit" onclick="submitBooking()">提交预约</button>
  </div>
</div>

<script>
const API_BASE='';
let venues=[],selectedVenueId=null;
const typeNames={badminton:'羽毛球',basketball:'篮球',tennis:'网球',gym:'健身',swimming:'游泳',yoga:'瑜伽'};
function getToken(){return localStorage.getItem('access_token')||''}
function api(p,o={}){return fetch(API_BASE+p+(p.includes('?')?'&':'?')+'access_token='+getToken(),{headers:{'Content-Type':'application/json','Token':getToken()},...o}).then(r=>r.json())}

api('/api/taishan/sports/venues').then(res=>{
  venues=res.data||[];
  const types=[...new Set(venues.map(v=>v.type))];
  document.getElementById('tabs').innerHTML='<button class="tab active" onclick="filterType(this,\'\')">全部</button>'+types.map(t=>`<button class="tab" onclick="filterType(this,'${t}')">${typeNames[t]||t}</button>`).join('');
  renderVenues(venues);
})

function filterType(btn,type){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  renderVenues(type?venues.filter(v=>v.type==type):venues);
}

function renderVenues(list){
  const el=document.getElementById('venues');
  if(!list.length){el.innerHTML='<div style="text-align:center;padding:40px;color:#999">暂无场馆</div>';return}
  el.innerHTML=list.map(v=>{
    const statusText=v.status==1?'开放中':v.status==2?'维护中':'已关闭';
    const statusClass=v.status==1?'status-open':v.status==2?'status-maintain':'status-closed';
    return `<div class="venue-card">
      <img class="venue-img" src="${v.image||''}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 400 140%22><rect fill=%22%23f5f5f5%22 width=%22400%22 height=%22140%22/><text x=%22200%22 y=%2274%22 text-anchor=%22middle%22 fill=%22%23ccc%22 font-size=%2216%22>${typeNames[v.type]||'场馆'}</text></svg>'">
      <div class="venue-info">
        <h3>${v.name}</h3>
        <div class="venue-meta">${typeNames[v.type]||v.type} · ${v.open_time}-${v.close_time} · 容纳${v.capacity}人</div>
        <span class="status-badge ${statusClass}">${statusText}</span>
        <div class="venue-price">¥${Number(v.price_per_hour).toFixed(0)}<small>/小时</small></div>
        <div style="font-size:12px;color:#999;margin-bottom:10px">${v.description||''}</div>
        ${v.status==1?`<button class="book-btn" onclick="openBooking(${v.id},'${v.name}',${v.price_per_hour})">立即预约</button>`:`<button class="book-btn" style="background:#ccc" disabled>暂不可预约</button>`}
      </div>
    </div>`;
  }).join('');
}

function openBooking(id,name,price){
  selectedVenueId=id;
  document.getElementById('selectedVenue').innerHTML=`<div style="padding:10px;background:#f0f5ff;border-radius:8px;margin-bottom:14px;font-size:14px">预约: <b>${name}</b> · ¥${Number(price).toFixed(0)}/小时</div>`;
  document.getElementById('bookDate').value=new Date(Date.now()+86400000).toISOString().split('T')[0];
  document.getElementById('bookModal').classList.add('show');
}
function closeModal(){document.getElementById('bookModal').classList.remove('show')}

function submitBooking(){
  const data={
    venue_id:selectedVenueId,
    booking_date:document.getElementById('bookDate').value,
    start_time:document.getElementById('bookStart').value,
    end_time:document.getElementById('bookEnd').value,
    remark:document.getElementById('bookRemark').value
  };
  if(!data.booking_date){alert('请选择日期');return}
  api('/api/taishan/sports/bookings',{method:'POST',body:JSON.stringify(data)}).then(res=>{
    if(res.success){alert('预约成功!');closeModal()}
    else alert(res.msg||'预约失败')
  })
}
</script>
</body>
</html>
