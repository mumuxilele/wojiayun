<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的收藏</title>
    <link rel="stylesheet" href="../business-common/list-style.css">
    <style>
        /* 页面特有样式 */
        .actions .link { color: var(--el-color-primary); cursor: pointer; margin-right: 10px; }
        .actions .link:hover { text-decoration: underline; }
        .actions .link.danger { color: var(--el-color-danger); }
        /* 弹窗样式保留 */
        
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.45); z-index: 200; }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background: var(--el-bg-white); border-radius: 4px; width: 580px; max-width: 95vw; max-height: 85vh; flex-direction: column; z-index: 201; box-shadow: 0 4px 20px rgba(0,0,0,.18); }
        .modal.show { display: flex; }
        .modal-header { padding: 16px 20px; border-bottom: 1px solid var(--el-border-color-light); display: flex; justify-content: space-between; align-items: center; }
        .modal-title { font-size: 16px; font-weight: 600; color: var(--el-text-primary); }
        .modal-close { background: none; border: none; width: 32px; height: 32px; border-radius: 4px; cursor: pointer; font-size: 16px; color: var(--el-text-secondary); display: flex; align-items: center; justify-content: center; }
        .modal-close:hover { background: var(--el-bg-light); }
        .modal-body { padding: 20px; overflow-y: auto; flex: 1; }
        .modal-footer { padding: 12px 20px; border-top: 1px solid var(--el-border-color-light); display: flex; justify-content: flex-end; gap: 10px; }
    </style>
</head>
<body class="wy-design-list">
    <!-- 顶部区域 -->
    <div class="wy-design-list_top">
        <div class="wy-design-list_top_title">
            <h1 class="wy-design-list_title">我的收藏</h1>
            <div class="wy-design-list_space"></div>
            <div class="wy-design-list_btn-group">
                <div class="wy-design-list_btn">
                    <button type="button" class="el-button el-button--primary el-button--small" onclick="loadList(1)">
                        <span>搜索</span>
                    </button>
                </div>
                <div class="wy-design-list_btn">
                    <button type="button" class="el-button el-button--small" onclick="resetSearch()">
                        <span>重置</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 筛选区域 -->
    <div class="wy-design-list_filter">
        <div class="wy-design-list_other">
            <div class="el-input el-input--small" style="width: 200px;">
                <input type="text" id="keyword" placeholder="搜索关键词" class="el-input__inner">
            </div>
        </div>
    </div>

    <!-- 表格区域 -->
    <div class="wy-design-table wy-design-table_main wy-design-table_has-bar">
        <div class="wy-design-table_bar">
            <i class="wy-design-table_set el-icon-setting" title="列设置"></i>
            <span class="wy-design-table_total">共 <em id="totalCount">0</em> 条</span>
            <div class="wy-pages">
                <div class="wy-pages_total">第<em id="currentPage">1</em>/<em id="totalPages">1</em>页</div>
                <div class="wy-pages_prev el-icon-arrow-left" id="prevBtn" onclick="changePage(-1)"></div>
                <div class="wy-pages_next el-icon-arrow-right" id="nextBtn" onclick="changePage(1)"></div>
            </div>
        </div>
        <table class="el-table el-table--fit el-table--border el-table--enable-row-hover">
            <thead class="el-table__header">
                <tr>
                    <th><div class="cell">名称</div></th>
                    <th><div class="cell">操作</div></th>
                </tr>
            </thead>
            <tbody class="el-table__body" id="listBody">
                <tr><td colspan="10" style="text-align: center; padding: 60px; color: var(--el-text-secondary);">加载中...</td></tr>
            </tbody>
        </table>
    </div>

    

    <script>
    const token = localStorage.getItem('wjy_token') || new URLSearchParams(location.search).get('access_token') || '';
const isdev = new URLSearchParams(location.search).get('isdev') || '0';

let currentTab = 'all';
let currentPage = 1;
let isEditing = false;
let allItems = [];

function apiUrl(path) {
    const sep = path.includes('?') ? '&' : '?';
    return path + sep + 'access_token=' + encodeURIComponent(token) + '&isdev=' + isdev;
}

async function getApi(path) {
    try {
        const r = await fetch(apiUrl(path));
        return r.json();
    } catch { return {success: false}; }
}

async function deleteApi(path) {
    try {
        const r = await fetch(apiUrl(path), {method: 'DELETE'});
        return r.json();
    } catch { return {success: false}; }
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
}

function switchTab(tab) {
    currentTab = tab;
    currentPage = 1;
    allItems = [];
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelector(`.tab[data-type="${tab}"]`).classList.add('active');
    loadFavorites(true);
}

function toggleEdit() {
    isEditing = !isEditing;
    document.getElementById('editBtn').textContent = isEditing ? '完成' : '管理';
    renderItems();
}

async function loadFavorites(replace = false) {
    const container = document.getElementById('favList');
    if (replace) container.innerHTML = '<div class="loading">加载中...</div>';
    
    let url = `/api/user/favorites?page=${currentPage}&page_size=10`;
    if (currentTab !== 'all') url += `&type=${currentTab}`;
    
    const r = await getApi(url);
    if (!r.success) {
        container.innerHTML = '<div class="empty"><div class="empty-icon">😔</div><div class="empty-text">加载失败，请刷新重试</div></div>';
        return;
    }
    
    const items = r.data?.items || [];
    const total = r.data?.total || 0;
    
    if (replace) allItems = items;
    else allItems = [...allItems, ...items];
    
    renderItems();
    
    const hasMore = allItems.length < total;
    document.getElementById('loadMoreBtn').style.display = hasMore ? '' : 'none';
}

function renderItems() {
    const container = document.getElementById('favList');
    
    if (!allItems.length) {
        const tabNames = {all:'收藏', venue:'场地收藏', shop:'门店收藏', product:'商品收藏'};
        container.innerHTML = `
            <div class="empty">
                <div class="empty-icon">🤍</div>
                <div class="empty-text">暂无${tabNames[currentTab]}</div>
                <button class="go-btn" onclick="location.href='index.html'">去逛逛</button>
            </div>`;
        return;
    }
    
    container.innerHTML = allItems.map(item => buildCard(item)).join('');
}

function buildCard(item) {
    const type = item.target_type;
    let icon = '📌', name = item.target_name || '', price = '', desc = '', link = '#';
    
    if (type === 'venue') {
        icon = '🏟️';
        price = item.price ? `¥${item.price}/小时` : '';
        desc = '场地';
        link = `bookings.html?venue_id=${item.target_id}`;
    } else if (type === 'shop') {
        icon = '🏪';
        desc = item.address || '门店';
        link = `orders.html?shop_id=${item.target_id}`;
    } else if (type === 'product') {
        icon = '📦';
        price = item.price ? `¥${parseFloat(item.price).toFixed(2)}` : '';
        desc = '商品';
        link = `cart.html?product_id=${item.target_id}`;
    }
    
    // 图片处理
    let imgHtml = `<span style="font-size:32px">${icon}</span>`;
    try {
        const imgs = item.images ? JSON.parse(item.images) : [];
        if (imgs.length) imgHtml = `<img src="${escHtml(imgs[0])}" onerror="this.parentNode.innerHTML='<span style=font-size:32px>${icon}</span>'">`;
    } catch {}
    
    const time = item.created_at ? item.created_at.substring(0, 10) : '';
    
    return `
        <div class="fav-item" id="fav-${type}-${item.target_id}">
            <div class="fav-img" onclick="location.href='${link}'">${imgHtml}</div>
            <div class="fav-body" onclick="location.href='${link}'">
                <div class="fav-name">${escHtml(name)}</div>
                <div class="fav-desc">${escHtml(desc)}</div>
                <div class="fav-bottom">
                    ${price ? `<span class="fav-price">${escHtml(price)}</span>` : '<span></span>'}
                    <span class="fav-time">收藏于 ${time}</span>
                </div>
            </div>
            ${isEditing ? `
            <div class="fav-action" onclick="removeFav('${type}', '${item.target_id}', this)">
                <div class="unfav-btn">❤️<br>取消<br>收藏</div>
            </div>` : ''}
        </div>`;
}

async function removeFav(type, targetId, btnEl) {
    if (!confirm('确定取消收藏？')) return;
    const r = await deleteApi(`/api/user/favorites/${type}/${targetId}`);
    if (r.success) {
        showToast('已取消收藏');
        // 从列表中移除
        allItems = allItems.filter(i => !(i.target_type === type && String(i.target_id) === String(targetId)));
        renderItems();
    } else {
        showToast(r.msg || '操作失败');
    }
}

function loadMore() {
    currentPage++;
    loadFavorites(false);
}

function escHtml(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// 初始化
loadFavorites(true);
    </script>
</body>
</html>
