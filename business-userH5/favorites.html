<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>我的收藏</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f5f5f5;min-height:100vh;padding-bottom:30px}
.header{background:linear-gradient(135deg,#667eea,#764ba2);color:white;padding:15px;display:flex;align-items:center;position:sticky;top:0;z-index:50}
.header h1{font-size:18px;flex:1;text-align:center}
.back{color:white;font-size:14px;text-decoration:none;padding:4px 8px}
.header-right{padding:4px 8px;font-size:13px;cursor:pointer;color:rgba(255,255,255,.85)}

.tab-row{display:flex;background:white;border-bottom:1px solid #eee}
.tab{flex:1;padding:12px 0;text-align:center;font-size:14px;color:#666;cursor:pointer;position:relative}
.tab.active{color:#667eea;font-weight:600}
.tab.active::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:2px;background:#667eea;border-radius:2px}

.list{padding:10px}
.fav-item{background:white;border-radius:12px;margin-bottom:10px;display:flex;align-items:stretch;overflow:hidden;cursor:pointer;transition:all .2s;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.fav-item:active{transform:scale(.98)}

.fav-img{width:80px;height:80px;flex-shrink:0;background:#f5f5f5;display:flex;align-items:center;justify-content:center;font-size:32px}
.fav-img img{width:100%;height:100%;object-fit:cover}
.fav-body{flex:1;padding:12px;min-width:0;display:flex;flex-direction:column;justify-content:space-between}
.fav-name{font-size:15px;color:#333;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fav-desc{font-size:12px;color:#999;margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fav-bottom{display:flex;justify-content:space-between;align-items:center;margin-top:6px}
.fav-price{font-size:15px;color:#f57c00;font-weight:700}
.fav-time{font-size:11px;color:#ccc}
.fav-action{width:60px;display:flex;align-items:center;justify-content:center;background:#fff5f5;flex-shrink:0}
.unfav-btn{padding:8px 12px;font-size:12px;color:#ff4d4f;cursor:pointer;text-align:center;line-height:1.4}
.unfav-btn:active{background:#ffe0e0}

.empty{text-align:center;padding:80px 20px;color:#bbb}
.empty-icon{font-size:56px;margin-bottom:16px}
.empty-text{font-size:15px;margin-bottom:20px}
.go-btn{padding:10px 28px;background:linear-gradient(135deg,#667eea,#764ba2);color:white;border:none;border-radius:25px;font-size:14px;cursor:pointer}

.loading{text-align:center;padding:40px;color:#bbb;font-size:14px}
.load-more{text-align:center;padding:16px;color:#999;font-size:14px;cursor:pointer}
.load-more:hover{color:#667eea}

.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.75);color:white;padding:10px 20px;border-radius:20px;font-size:14px;pointer-events:none;opacity:0;transition:opacity .3s;z-index:999}
.toast.show{opacity:1}
</style>
</head>
<body>

<div class="header">
    <a href="index.html" class="back">←</a>
    <h1>我的收藏</h1>
    <span class="header-right" id="editBtn" onclick="toggleEdit()">管理</span>
</div>

<div class="tab-row">
    <div class="tab active" data-type="all" onclick="switchTab('all')">全部</div>
    <div class="tab" data-type="venue" onclick="switchTab('venue')">场地</div>
    <div class="tab" data-type="shop" onclick="switchTab('shop')">门店</div>
    <div class="tab" data-type="product" onclick="switchTab('product')">商品</div>
</div>

<div id="favList" class="list">
    <div class="loading">加载中...</div>
</div>

<div id="loadMoreBtn" class="load-more" style="display:none" onclick="loadMore()">加载更多</div>

<div class="toast" id="toast"></div>

<script>
const token = localStorage.getItem('wjy_token') || new URLSearchParams(location.search).get('access_token') || '';
const isdev = new URLSearchParams(location.search).get('isdev') || '0';

let currentTab = 'all';
let currentPage = 1;
let isEditing = false;
let allItems = [];

function apiUrl(path) {
    const sep = path.includes('?') ? '&' : '?';
    return path + sep + 'access_token=' + encodeURIComponent(token) + '&isdev=' + isdev;
}

async function getApi(path) {
    try {
        const r = await fetch(apiUrl(path));
        return r.json();
    } catch { return {success: false}; }
}

async function deleteApi(path) {
    try {
        const r = await fetch(apiUrl(path), {method: 'DELETE'});
        return r.json();
    } catch { return {success: false}; }
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
}

function switchTab(tab) {
    currentTab = tab;
    currentPage = 1;
    allItems = [];
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelector(`.tab[data-type="${tab}"]`).classList.add('active');
    loadFavorites(true);
}

function toggleEdit() {
    isEditing = !isEditing;
    document.getElementById('editBtn').textContent = isEditing ? '完成' : '管理';
    renderItems();
}

async function loadFavorites(replace = false) {
    const container = document.getElementById('favList');
    if (replace) container.innerHTML = '<div class="loading">加载中...</div>';
    
    let url = `/api/user/favorites?page=${currentPage}&page_size=10`;
    if (currentTab !== 'all') url += `&type=${currentTab}`;
    
    const r = await getApi(url);
    if (!r.success) {
        container.innerHTML = '<div class="empty"><div class="empty-icon">😔</div><div class="empty-text">加载失败，请刷新重试</div></div>';
        return;
    }
    
    const items = r.data?.items || [];
    const total = r.data?.total || 0;
    
    if (replace) allItems = items;
    else allItems = [...allItems, ...items];
    
    renderItems();
    
    const hasMore = allItems.length < total;
    document.getElementById('loadMoreBtn').style.display = hasMore ? '' : 'none';
}

function renderItems() {
    const container = document.getElementById('favList');
    
    if (!allItems.length) {
        const tabNames = {all:'收藏', venue:'场地收藏', shop:'门店收藏', product:'商品收藏'};
        container.innerHTML = `
            <div class="empty">
                <div class="empty-icon">🤍</div>
                <div class="empty-text">暂无${tabNames[currentTab]}</div>
                <button class="go-btn" onclick="location.href='index.html'">去逛逛</button>
            </div>`;
        return;
    }
    
    container.innerHTML = allItems.map(item => buildCard(item)).join('');
}

function buildCard(item) {
    const type = item.target_type;
    let icon = '📌', name = item.target_name || '', price = '', desc = '', link = '#';
    
    if (type === 'venue') {
        icon = '🏟️';
        price = item.price ? `¥${item.price}/小时` : '';
        desc = '场地';
        link = `bookings.html?venue_id=${item.target_id}`;
    } else if (type === 'shop') {
        icon = '🏪';
        desc = item.address || '门店';
        link = `orders.html?shop_id=${item.target_id}`;
    } else if (type === 'product') {
        icon = '📦';
        price = item.price ? `¥${parseFloat(item.price).toFixed(2)}` : '';
        desc = '商品';
        link = `cart.html?product_id=${item.target_id}`;
    }
    
    // 图片处理
    let imgHtml = `<span style="font-size:32px">${icon}</span>`;
    try {
        const imgs = item.images ? JSON.parse(item.images) : [];
        if (imgs.length) imgHtml = `<img src="${escHtml(imgs[0])}" onerror="this.parentNode.innerHTML='<span style=font-size:32px>${icon}</span>'">`;
    } catch {}
    
    const time = item.created_at ? item.created_at.substring(0, 10) : '';
    
    return `
        <div class="fav-item" id="fav-${type}-${item.target_id}">
            <div class="fav-img" onclick="location.href='${link}'">${imgHtml}</div>
            <div class="fav-body" onclick="location.href='${link}'">
                <div class="fav-name">${escHtml(name)}</div>
                <div class="fav-desc">${escHtml(desc)}</div>
                <div class="fav-bottom">
                    ${price ? `<span class="fav-price">${escHtml(price)}</span>` : '<span></span>'}
                    <span class="fav-time">收藏于 ${time}</span>
                </div>
            </div>
            ${isEditing ? `
            <div class="fav-action" onclick="removeFav('${type}', '${item.target_id}', this)">
                <div class="unfav-btn">❤️<br>取消<br>收藏</div>
            </div>` : ''}
        </div>`;
}

async function removeFav(type, targetId, btnEl) {
    if (!confirm('确定取消收藏？')) return;
    const r = await deleteApi(`/api/user/favorites/${type}/${targetId}`);
    if (r.success) {
        showToast('已取消收藏');
        // 从列表中移除
        allItems = allItems.filter(i => !(i.target_type === type && String(i.target_id) === String(targetId)));
        renderItems();
    } else {
        showToast(r.msg || '操作失败');
    }
}

function loadMore() {
    currentPage++;
    loadFavorites(false);
}

function escHtml(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// 初始化
loadFavorites(true);
</script>
</body>
</html>
