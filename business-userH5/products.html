<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品商城 - 社区服务</title>
    <link rel="stylesheet" href="../business-common/list-style.css">
    <style>
        /* 页面特有样式 */
        .actions .link { color: var(--el-color-primary); cursor: pointer; margin-right: 10px; }
        .actions .link:hover { text-decoration: underline; }
        .actions .link.danger { color: var(--el-color-danger); }
        /* 弹窗样式保留 */
        
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.45); z-index: 200; }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background: var(--el-bg-white); border-radius: 4px; width: 580px; max-width: 95vw; max-height: 85vh; flex-direction: column; z-index: 201; box-shadow: 0 4px 20px rgba(0,0,0,.18); }
        .modal.show { display: flex; }
        .modal-header { padding: 16px 20px; border-bottom: 1px solid var(--el-border-color-light); display: flex; justify-content: space-between; align-items: center; }
        .modal-title { font-size: 16px; font-weight: 600; color: var(--el-text-primary); }
        .modal-close { background: none; border: none; width: 32px; height: 32px; border-radius: 4px; cursor: pointer; font-size: 16px; color: var(--el-text-secondary); display: flex; align-items: center; justify-content: center; }
        .modal-close:hover { background: var(--el-bg-light); }
        .modal-body { padding: 20px; overflow-y: auto; flex: 1; }
        .modal-footer { padding: 12px 20px; border-top: 1px solid var(--el-border-color-light); display: flex; justify-content: flex-end; gap: 10px; }
    </style>
</head>
<body class="wy-design-list">
    <!-- 顶部区域 -->
    <div class="wy-design-list_top">
        <div class="wy-design-list_top_title">
            <h1 class="wy-design-list_title">商品商城 - 社区服务</h1>
            <div class="wy-design-list_space"></div>
            <div class="wy-design-list_btn-group">
                <div class="wy-design-list_btn">
                    <button type="button" class="el-button el-button--primary el-button--small" onclick="loadList(1)">
                        <span>搜索</span>
                    </button>
                </div>
                <div class="wy-design-list_btn">
                    <button type="button" class="el-button el-button--small" onclick="resetSearch()">
                        <span>重置</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 筛选区域 -->
    <div class="wy-design-list_filter">
        <div class="wy-design-list_other">
            <div class="el-input el-input--small" style="width: 200px;">
                <input type="text" id="searchInput" placeholder="搜索商品..." class="el-input__inner">
            </div>
        </div>
    </div>

    <!-- 表格区域 -->
    <div class="wy-design-table wy-design-table_main wy-design-table_has-bar">
        <div class="wy-design-table_bar">
            <i class="wy-design-table_set el-icon-setting" title="列设置"></i>
            <span class="wy-design-table_total">共 <em id="totalCount">0</em> 条</span>
            <div class="wy-pages">
                <div class="wy-pages_total">第<em id="currentPage">1</em>/<em id="totalPages">1</em>页</div>
                <div class="wy-pages_prev el-icon-arrow-left" id="prevBtn" onclick="changePage(-1)"></div>
                <div class="wy-pages_next el-icon-arrow-right" id="nextBtn" onclick="changePage(1)"></div>
            </div>
        </div>
        <table class="el-table el-table--fit el-table--border el-table--enable-row-hover">
            <thead class="el-table__header">
                <tr>
                    <th><div class="cell">名称</div></th>
                    <th><div class="cell">操作</div></th>
                </tr>
            </thead>
            <tbody class="el-table__body" id="listBody">
                <tr><td colspan="10" style="text-align: center; padding: 60px; color: var(--el-text-secondary);">加载中...</td></tr>
            </tbody>
        </table>
    </div>

    

    <script>
    var urlParams = new URLSearchParams(location.search);
        var token = urlParams.get('access_token');
        var isdev = urlParams.get('isdev') || '0';
        if (token) {
            localStorage.setItem('user_token', token);
            localStorage.setItem('user_isdev', isdev);
        } else {
            token = localStorage.getItem('user_token');
            isdev = localStorage.getItem('user_isdev') || '0';
        }
        
        var apiUrl = '/api/user/products?access_token=' + encodeURIComponent(token) + '&isdev=' + isdev;
        var currentCategory = '';
        var currentSort = 'default';
        var keyword = '';
        
        document.getElementById('backLink').href = 'index.html?access_token=' + encodeURIComponent(token) + '&isdev=' + isdev;
        document.getElementById('cartLink').href = 'cart.html?access_token=' + encodeURIComponent(token) + '&isdev=' + isdev;
        
        function showToast(msg) {
            var t = document.getElementById('toast');
            t.textContent = msg; t.style.display = 'block';
            setTimeout(function(){ t.style.display = 'none'; }, 1500);
        }
        
        function loadCategories() {
            fetch('/api/user/products/categories?access_token=' + encodeURIComponent(token) + '&isdev=' + isdev)
            .then(function(r){return r.json()})
            .then(function(d){
                if (!d.success || !d.data) return;
                var html = '<div class="cat-tag active" data-cat="">全部</div>';
                for (var i = 0; i < d.data.length; i++) {
                    var c = d.data[i];
                    html += '<div class="cat-tag" data-cat="' + c.name + '">' + c.name + '(' + c.count + ')</div>';
                }
                document.getElementById('categoryBar').innerHTML = html;
                // 绑定事件
                document.querySelectorAll('.cat-tag').forEach(function(el){
                    el.addEventListener('click', function(){
                        document.querySelectorAll('.cat-tag').forEach(function(e){e.classList.remove('active')});
                        el.classList.add('active');
                        currentCategory = el.dataset.cat;
                        loadProducts();
                    });
                });
            })
            .catch(function(e){ console.error('loadCategories error:', e); });
        }
        
        document.querySelectorAll('.sort-tag').forEach(function(el){
            el.addEventListener('click', function(){
                document.querySelectorAll('.sort-tag').forEach(function(e){e.classList.remove('active')});
                el.classList.add('active');
                currentSort = el.dataset.sort;
                loadProducts();
            });
        });
        
        function doSearch() {
            keyword = document.getElementById('searchInput').value.trim();
            loadProducts();
        }
        
        function loadProducts() {
            var url = apiUrl + '&page=1&page_size=20';
            if (currentCategory) url += '&category=' + encodeURIComponent(currentCategory);
            if (keyword) url += '&keyword=' + encodeURIComponent(keyword);
            if (currentSort === 'sales') url += '&sort=sales_count&order=desc';
            else if (currentSort === 'price_asc') url += '&sort=price&order=asc';
            else if (currentSort === 'price_desc') url += '&sort=price&order=desc';
            else if (currentSort === 'newest') url += '&sort=created_at&order=desc';
            
            fetch(url)
            .then(function(r){return r.json()})
            .then(function(d){
                if (!d.success || !d.data || !d.data.items || d.data.items.length === 0) {
                    document.getElementById('productGrid').innerHTML = '<div class="empty">暂无商品</div>';
                    return;
                }
                var html = '';
                for (var i = 0; i < d.data.items.length; i++) {
                    var p = d.data.items[i];
                    var stock = parseInt(p.stock || 0);
                    var stockClass = stock > 10 ? '' : 'low';
                    var stockText = stock > 10 ? '有货' : (stock > 0 ? '仅剩' + stock + '件' : '已售罄');
                    var imgs = p.images || '';
                    var imgHtml = '';
                    if (imgs.indexOf('[') === 0) {
                        try { var arr = JSON.parse(imgs); if (arr.length > 0) imgHtml = '<img src="' + arr[0] + '">'; } catch(e) {}
                    } else if (imgs) {
                        imgHtml = '<img src="' + imgs + '">';
                    }
                    html += '<div class="product-card" onclick="goDetail(' + p.id + ')">'
                        + '<div class="product-img">' + (imgHtml || '📦') + '</div>'
                        + '<div class="product-info">'
                        + '<div class="product-name">' + (p.product_name || '') + '</div>'
                        + '<div class="product-desc">' + (p.description || '暂无描述') + '</div>'
                        + '<div class="product-bottom">'
                        + '<div><div class="product-price">' + parseFloat(p.price || 0).toFixed(2) + '</div>'
                        + '<span class="product-sales">已售 ' + (p.sales_count || 0) + '</span></div>'
                        + '<button class="add-cart-btn" onclick="event.stopPropagation();addToCart(' + p.id + ',\'' + (p.product_name||'').replace(/'/g,"\\'") + '\')" ' + (stock <= 0 ? 'disabled style="background:#ccc"' : '') + '>' + (stock > 0 ? '加购' : '缺货') + '</button>'
                        + '</div></div></div>';
                }
                document.getElementById('productGrid').innerHTML = html;
            })
            .catch(function(e){
                document.getElementById('productGrid').innerHTML = '<div class="empty">加载失败</div>';
            });
        }
        
        function addToCart(pid, pname) {
            fetch('/api/user/cart?access_token=' + encodeURIComponent(token) + '&isdev=' + isdev, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({product_id: pid, quantity: 1})
            })
            .then(function(r){return r.json()})
            .then(function(d){
                showToast(d.success ? '已加入购物车' : (d.msg || '操作失败'));
            })
            .catch(function(){ showToast('操作失败'); });
        }
        
        function goDetail(pid) {
            location.href = 'product_detail.html?id=' + pid + '&access_token=' + encodeURIComponent(token) + '&isdev=' + isdev;
        }
        
        loadCategories();
        loadProducts();
    </script>
</body>
</html>
