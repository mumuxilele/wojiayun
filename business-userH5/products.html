<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>商品商城 - 社区服务</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; min-height: 100vh; }
        
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 15px; position: sticky; top: 0; z-index: 100; }
        .header-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .header a { color: white; text-decoration: none; font-size: 18px; }
        .header h2 { font-size: 18px; flex: 1; }
        .search-box { display: flex; gap: 8px; }
        .search-box input { flex: 1; padding: 8px 12px; border: none; border-radius: 20px; font-size: 14px; outline: none; }
        .search-box button { padding: 8px 16px; border: none; border-radius: 20px; background: white; color: #667eea; font-size: 13px; font-weight: 600; cursor: pointer; }
        
        .category-bar { display: flex; overflow-x: auto; background: white; padding: 10px 15px; gap: 8px; white-space: nowrap; -webkit-overflow-scrolling: touch; }
        .category-bar::-webkit-scrollbar { display: none; }
        .cat-tag { padding: 6px 14px; border-radius: 20px; font-size: 13px; background: #f5f5f5; color: #666; cursor: pointer; flex-shrink: 0; }
        .cat-tag.active { background: #667eea; color: white; }
        
        .sort-bar { display: flex; background: white; padding: 8px 15px; border-bottom: 1px solid #f0f0f0; gap: 5px; }
        .sort-tag { padding: 4px 12px; border-radius: 12px; font-size: 12px; background: #f5f5f5; color: #666; cursor: pointer; }
        .sort-tag.active { background: #667eea; color: white; }
        
        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px 15px; }
        .product-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); cursor: pointer; }
        .product-card:active { transform: scale(0.98); }
        .product-img { width: 100%; height: 150px; background: #f0f0f0; display: flex; align-items: center; justify-content: center; font-size: 40px; overflow: hidden; }
        .product-img img { width: 100%; height: 100%; object-fit: cover; }
        .product-info { padding: 10px; }
        .product-name { font-size: 14px; color: #333; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .product-desc { font-size: 11px; color: #999; margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .product-bottom { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
        .product-price { font-size: 16px; font-weight: 700; color: #f5576c; }
        .product-price::before { content: '¥'; font-size: 12px; }
        .product-sales { font-size: 11px; color: #bbb; }
        .product-stock { font-size: 10px; color: #52c41a; }
        .product-stock.low { color: #f5222d; }
        .add-cart-btn { padding: 4px 10px; border: none; border-radius: 12px; background: #667eea; color: white; font-size: 12px; cursor: pointer; }
        
        .empty { text-align: center; padding: 40px; color: #bbb; font-size: 14px; }
        .loading { text-align: center; padding: 20px; color: #999; font-size: 13px; }
        
        .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.75); color: white; padding: 10px 20px; border-radius: 20px; font-size: 13px; z-index: 1000; display: none; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-top">
            <a href="index.html" id="backLink">←</a>
            <h2>🏪 商品商城</h2>
            <a href="cart.html" id="cartLink">🛍️</a>
        </div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="搜索商品..." onkeydown="if(event.key==='Enter')doSearch()">
            <button onclick="doSearch()">搜索</button>
        </div>
    </div>
    
    <div class="category-bar" id="categoryBar">
        <div class="cat-tag active" data-cat="">全部</div>
    </div>
    
    <div class="sort-bar">
        <div class="sort-tag active" data-sort="default">综合</div>
        <div class="sort-tag" data-sort="sales">销量</div>
        <div class="sort-tag" data-sort="price_asc">价格↑</div>
        <div class="sort-tag" data-sort="price_desc">价格↓</div>
        <div class="sort-tag" data-sort="newest">最新</div>
    </div>
    
    <div class="product-grid" id="productGrid"><div class="loading">加载中...</div></div>
    
    <div class="toast" id="toast"></div>

    <script>
        var urlParams = new URLSearchParams(location.search);
        var token = urlParams.get('access_token');
        var isdev = urlParams.get('isdev') || '0';
        if (token) {
            localStorage.setItem('user_token', token);
            localStorage.setItem('user_isdev', isdev);
        } else {
            token = localStorage.getItem('user_token');
            isdev = localStorage.getItem('user_isdev') || '0';
        }
        
        var apiUrl = '/api/user/products?access_token=' + encodeURIComponent(token) + '&isdev=' + isdev;
        var currentCategory = '';
        var currentSort = 'default';
        var keyword = '';
        
        document.getElementById('backLink').href = 'index.html?access_token=' + encodeURIComponent(token) + '&isdev=' + isdev;
        document.getElementById('cartLink').href = 'cart.html?access_token=' + encodeURIComponent(token) + '&isdev=' + isdev;
        
        function showToast(msg) {
            var t = document.getElementById('toast');
            t.textContent = msg; t.style.display = 'block';
            setTimeout(function(){ t.style.display = 'none'; }, 1500);
        }
        
        function loadCategories() {
            fetch('/api/user/products/categories?access_token=' + encodeURIComponent(token) + '&isdev=' + isdev)
            .then(function(r){return r.json()})
            .then(function(d){
                if (!d.success || !d.data) return;
                var html = '<div class="cat-tag active" data-cat="">全部</div>';
                for (var i = 0; i < d.data.length; i++) {
                    var c = d.data[i];
                    html += '<div class="cat-tag" data-cat="' + c.name + '">' + c.name + '(' + c.count + ')</div>';
                }
                document.getElementById('categoryBar').innerHTML = html;
                // 绑定事件
                document.querySelectorAll('.cat-tag').forEach(function(el){
                    el.addEventListener('click', function(){
                        document.querySelectorAll('.cat-tag').forEach(function(e){e.classList.remove('active')});
                        el.classList.add('active');
                        currentCategory = el.dataset.cat;
                        loadProducts();
                    });
                });
            })
            .catch(function(e){ console.error('loadCategories error:', e); });
        }
        
        document.querySelectorAll('.sort-tag').forEach(function(el){
            el.addEventListener('click', function(){
                document.querySelectorAll('.sort-tag').forEach(function(e){e.classList.remove('active')});
                el.classList.add('active');
                currentSort = el.dataset.sort;
                loadProducts();
            });
        });
        
        function doSearch() {
            keyword = document.getElementById('searchInput').value.trim();
            loadProducts();
        }
        
        function loadProducts() {
            var url = apiUrl + '&page=1&page_size=20';
            if (currentCategory) url += '&category=' + encodeURIComponent(currentCategory);
            if (keyword) url += '&keyword=' + encodeURIComponent(keyword);
            if (currentSort === 'sales') url += '&sort=sales_count&order=desc';
            else if (currentSort === 'price_asc') url += '&sort=price&order=asc';
            else if (currentSort === 'price_desc') url += '&sort=price&order=desc';
            else if (currentSort === 'newest') url += '&sort=created_at&order=desc';
            
            fetch(url)
            .then(function(r){return r.json()})
            .then(function(d){
                if (!d.success || !d.data || !d.data.items || d.data.items.length === 0) {
                    document.getElementById('productGrid').innerHTML = '<div class="empty">暂无商品</div>';
                    return;
                }
                var html = '';
                for (var i = 0; i < d.data.items.length; i++) {
                    var p = d.data.items[i];
                    var stock = parseInt(p.stock || 0);
                    var stockClass = stock > 10 ? '' : 'low';
                    var stockText = stock > 10 ? '有货' : (stock > 0 ? '仅剩' + stock + '件' : '已售罄');
                    var imgs = p.images || '';
                    var imgHtml = '';
                    if (imgs.indexOf('[') === 0) {
                        try { var arr = JSON.parse(imgs); if (arr.length > 0) imgHtml = '<img src="' + arr[0] + '">'; } catch(e) {}
                    } else if (imgs) {
                        imgHtml = '<img src="' + imgs + '">';
                    }
                    html += '<div class="product-card" onclick="goDetail(' + p.id + ')">'
                        + '<div class="product-img">' + (imgHtml || '📦') + '</div>'
                        + '<div class="product-info">'
                        + '<div class="product-name">' + (p.product_name || '') + '</div>'
                        + '<div class="product-desc">' + (p.description || '暂无描述') + '</div>'
                        + '<div class="product-bottom">'
                        + '<div><div class="product-price">' + parseFloat(p.price || 0).toFixed(2) + '</div>'
                        + '<span class="product-sales">已售 ' + (p.sales_count || 0) + '</span></div>'
                        + '<button class="add-cart-btn" onclick="event.stopPropagation();addToCart(' + p.id + ',\'' + (p.product_name||'').replace(/'/g,"\\'") + '\')" ' + (stock <= 0 ? 'disabled style="background:#ccc"' : '') + '>' + (stock > 0 ? '加购' : '缺货') + '</button>'
                        + '</div></div></div>';
                }
                document.getElementById('productGrid').innerHTML = html;
            })
            .catch(function(e){
                document.getElementById('productGrid').innerHTML = '<div class="empty">加载失败</div>';
            });
        }
        
        function addToCart(pid, pname) {
            fetch('/api/user/cart?access_token=' + encodeURIComponent(token) + '&isdev=' + isdev, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({product_id: pid, quantity: 1})
            })
            .then(function(r){return r.json()})
            .then(function(d){
                showToast(d.success ? '已加入购物车' : (d.msg || '操作失败'));
            })
            .catch(function(){ showToast('操作失败'); });
        }
        
        function goDetail(pid) {
            location.href = 'product_detail.html?id=' + pid + '&access_token=' + encodeURIComponent(token) + '&isdev=' + isdev;
        }
        
        loadCategories();
        loadProducts();
    </script>
</body>
</html>
