<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的申请</title>
    <link rel="stylesheet" href="../business-common/list-style.css">
    <style>
        /* 页面特有样式 */
        .actions .link { color: var(--el-color-primary); cursor: pointer; margin-right: 10px; }
        .actions .link:hover { text-decoration: underline; }
        .actions .link.danger { color: var(--el-color-danger); }
        /* 弹窗样式保留 */
        
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.45); z-index: 200; }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background: var(--el-bg-white); border-radius: 4px; width: 580px; max-width: 95vw; max-height: 85vh; flex-direction: column; z-index: 201; box-shadow: 0 4px 20px rgba(0,0,0,.18); }
        .modal.show { display: flex; }
        .modal-header { padding: 16px 20px; border-bottom: 1px solid var(--el-border-color-light); display: flex; justify-content: space-between; align-items: center; }
        .modal-title { font-size: 16px; font-weight: 600; color: var(--el-text-primary); }
        .modal-close { background: none; border: none; width: 32px; height: 32px; border-radius: 4px; cursor: pointer; font-size: 16px; color: var(--el-text-secondary); display: flex; align-items: center; justify-content: center; }
        .modal-close:hover { background: var(--el-bg-light); }
        .modal-body { padding: 20px; overflow-y: auto; flex: 1; }
        .modal-footer { padding: 12px 20px; border-top: 1px solid var(--el-border-color-light); display: flex; justify-content: flex-end; gap: 10px; }
    </style>
</head>
<body class="wy-design-list">
    <!-- 顶部区域 -->
    <div class="wy-design-list_top">
        <div class="wy-design-list_top_title">
            <h1 class="wy-design-list_title">我的申请</h1>
            <div class="wy-design-list_space"></div>
            <div class="wy-design-list_btn-group">
                <div class="wy-design-list_btn">
                    <button type="button" class="el-button el-button--primary el-button--small" onclick="loadList(1)">
                        <span>搜索</span>
                    </button>
                </div>
                <div class="wy-design-list_btn">
                    <button type="button" class="el-button el-button--small" onclick="resetSearch()">
                        <span>重置</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 筛选区域 -->
    <div class="wy-design-list_filter">
        <div class="wy-design-list_other">
            <div class="el-input el-input--small" style="width: 200px;">
                <input type="text" id="keyword" placeholder="搜索关键词" class="el-input__inner">
            </div>
        </div>
    </div>

    <!-- 表格区域 -->
    <div class="wy-design-table wy-design-table_main wy-design-table_has-bar">
        <div class="wy-design-table_bar">
            <i class="wy-design-table_set el-icon-setting" title="列设置"></i>
            <span class="wy-design-table_total">共 <em id="totalCount">0</em> 条</span>
            <div class="wy-pages">
                <div class="wy-pages_total">第<em id="currentPage">1</em>/<em id="totalPages">1</em>页</div>
                <div class="wy-pages_prev el-icon-arrow-left" id="prevBtn" onclick="changePage(-1)"></div>
                <div class="wy-pages_next el-icon-arrow-right" id="nextBtn" onclick="changePage(1)"></div>
            </div>
        </div>
        <table class="el-table el-table--fit el-table--border el-table--enable-row-hover">
            <thead class="el-table__header">
                <tr>
                    <th><div class="cell">名称</div></th>
                    <th><div class="cell">操作</div></th>
                </tr>
            </thead>
            <tbody class="el-table__body" id="listBody">
                <tr><td colspan="10" style="text-align: center; padding: 60px; color: var(--el-text-secondary);">加载中...</td></tr>
            </tbody>
        </table>
    </div>

    

    <script>
    var TYPE_MAP = {repair:'🔧 报修', booking:'📅 预约', complaint:'📝 投诉', consult:'💬 咨询', other:'📋 其他'};
        var STATUS_TEXT = {pending:'待处理', processing:'处理中', completed:'已完成', rejected:'已拒绝', cancelled:'已撤销'};

        var urlParams = new URLSearchParams(location.search);
        var token = urlParams.get('access_token');
        var isdev = urlParams.get('isdev') || '0';
        if (token) { localStorage.setItem('user_token', token); localStorage.setItem('user_isdev', isdev); }
        else { token = localStorage.getItem('user_token'); isdev = localStorage.getItem('user_isdev') || '0'; }
        if (!token) { document.body.innerHTML = '<div class="empty">请先登录</div>'; throw new Error('No token'); }

        var currentStatus = '';
        var currentPage = 1;
        var pageSize = 15;
        var totalCount = 0;
        var allItems = [];
        var loading = false;

        function goTo(url) {
            var sep = url.indexOf('?') >= 0 ? '&' : '?';
            location.href = url + sep + 'access_token=' + encodeURIComponent(token) + '&isdev=' + isdev;
        }
        function goBack() { goTo('index.html'); }

        function getStatusClass(s) { return 'item-status status-' + (s || 'pending'); }

        function renderItems(items, append) {
            var html = items.map(function(item) {
                var typeText = TYPE_MAP[item.app_type] || item.app_type || '';
                var statusText = STATUS_TEXT[item.status] || item.status;
                var dateStr = (item.created_at || '').substring(0, 16);
                return '<div class="item" onclick="goTo(\'application_detail.html?id=' + item.id + '\')">'
                    + '<div class="item-header">'
                    + '<span class="item-title">' + (item.title || '') + '</span>'
                    + '<span class="' + getStatusClass(item.status) + '">' + statusText + '</span>'
                    + '</div>'
                    + '<div class="item-meta">'
                    + '<span class="item-type">' + typeText + '</span>'
                    + '<span>' + dateStr + '</span>'
                    + '</div>'
                    + '</div>';
            }).join('');
            if (append) {
                document.getElementById('list').innerHTML += html;
            } else {
                document.getElementById('list').innerHTML = html || '<div class="empty"><div class="empty-icon">📭</div><div class="empty-tip">暂无申请记录</div><div class="empty-sub">点击右下角 + 提交新申请</div></div>';
            }
        }

        async function loadList(reset) {
            if (loading) return;
            if (reset) { currentPage = 1; allItems = []; }
            loading = true;
            var btn = document.getElementById('loadMoreBtn');
            if (btn) { btn.disabled = true; btn.textContent = '加载中...'; }

            if (currentPage === 1) {
                document.getElementById('list').innerHTML = '<div class="empty"><div class="empty-icon">⏳</div><div class="empty-tip">加载中...</div></div>';
                document.getElementById('loadMoreArea').style.display = 'none';
                document.getElementById('statBar').style.display = 'none';
            }

            var url = '/api/user/applications?page=' + currentPage + '&page_size=' + pageSize
                + (currentStatus ? '&status=' + currentStatus : '')
                + '&access_token=' + encodeURIComponent(token) + '&isdev=' + isdev;
            try {
                var res = await fetch(url);
                var data = await res.json();
                if (data.success && data.data) {
                    var items = data.data.items || [];
                    totalCount = data.data.total || 0;
                    var pages = data.data.pages || 1;
                    allItems = allItems.concat(items);

                    // 更新统计条
                    document.getElementById('totalCount').textContent = totalCount;
                    document.getElementById('statBar').style.display = totalCount > 0 ? 'flex' : 'none';

                    if (currentPage === 1) {
                        renderItems(allItems, false);
                    } else {
                        renderItems(items, true);
                    }

                    // 控制"加载更多"按钮
                    if (currentPage < pages) {
                        document.getElementById('loadMoreArea').style.display = 'block';
                        if (btn) { btn.disabled = false; btn.textContent = '加载更多 (' + allItems.length + '/' + totalCount + ')'; }
                    } else {
                        document.getElementById('loadMoreArea').style.display = 'none';
                    }
                }
            } catch(e) {
                if (currentPage === 1) document.getElementById('list').innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-tip">加载失败，请重试</div></div>';
            }
            loading = false;
        }

        function loadMore() {
            currentPage++;
            loadList(false);
        }

        // 筛选标签点击
        document.querySelectorAll('.filter-item').forEach(function(el) {
            el.addEventListener('click', function() {
                document.querySelectorAll('.filter-item').forEach(function(e) { e.classList.remove('active'); });
                el.classList.add('active');
                currentStatus = el.dataset.status;
                loadList(true);
            });
        });

        loadList(true);
    </script>
</body>
</html>
