<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的申请</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f5f5f5; min-height: 100vh; padding-bottom: 60px; }
        .header { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 15px; position: sticky; top: 0; z-index: 100; display: flex; align-items: center; }
        .header h1 { font-size: 18px; flex: 1; }
        .back { color: white; text-decoration: none; font-size: 14px; }
        .filter { display: flex; gap: 8px; padding: 10px 15px; background: white; overflow-x: auto; }
        .filter-item { padding: 6px 12px; border-radius: 15px; font-size: 12px; white-space: nowrap; background: #f0f0f0; color: #666; }
        .filter-item.active { background: #667eea; color: white; }
        .list { padding: 10px; }
        .item { background: white; border-radius: 12px; padding: 15px; margin-bottom: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .item-title { font-size: 15px; font-weight: 500; color: #333; }
        .item-status { font-size: 12px; padding: 4px 10px; border-radius: 10px; }
        .status-pending { background: #fff3e0; color: #f57c00; }
        .status-processing { background: #e3f2fd; color: #1976d2; }
        .status-completed { background: #e8f5e9; color: #388e3c; }
        .status-rejected { background: #ffebee; color: #d32f2f; }
        .item-info { font-size: 12px; color: #999; }
        .fab { position: fixed; bottom: 30px; right: 20px; width: 56px; height: 56px; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 28px; box-shadow: 0 4px 15px rgba(102,126,234,0.5); text-decoration: none; }
        .empty { text-align: center; padding: 60px 20px; color: #999; }
    </style>
</head>
<body>
    <div class="header">
        <a href="index.html" class="back">← 返回</a>
        <h1>我的申请</h1>
        <span></span>
    </div>

    <div class="filter">
        <div class="filter-item active" data-status="">全部</div>
        <div class="filter-item" data-status="pending">待处理</div>
        <div class="filter-item" data-status="processing">处理中</div>
        <div class="filter-item" data-status="completed">已完成</div>
        <div class="filter-item" data-status="rejected">已拒绝</div>
    </div>

    <div class="list" id="list">
        <div class="empty">加载中...</div>
    </div>

    <a href="application_create.html" class="fab">+</a>

    <script>
        const token = localStorage.getItem('token') || new URLSearchParams(location.search).get('access_token');
        const isdev = new URLSearchParams(location.search).get('isdev') || '0';
        let currentStatus = '';
        let page = 1;

        function getStatusClass(status) {
            return 'item-status status-' + (status || 'pending');
        }

        function getStatusText(status) {
            return {pending:'待处理',processing:'处理中',completed:'已完成',rejected:'已拒绝'}[status] || status;
        }

        async function loadList() {
            document.getElementById('list').innerHTML = '<div class="empty">加载中...</div>';
            const url = '/api/user/applications?page=' + page + '&page_size=20' + 
                (currentStatus ? '&status=' + currentStatus : '') + 
                '&access_token=' + encodeURIComponent(token) + '&isdev=' + isdev;
            const res = await fetch(url);
            const data = await res.json();
            if (data.success && data.data.items) {
                if (data.data.items.length === 0) {
                    document.getElementById('list').innerHTML = '<div class="empty">暂无申请记录</div>';
                    return;
                }
                document.getElementById('list').innerHTML = data.data.items.map(item => `
                    <div class="item" onclick="location.href='application_detail.html?id=${item.id}'">
                        <div class="item-header">
                            <span class="item-title">${item.title || ''}</span>
                            <span class="${getStatusClass(item.status)}">${getStatusText(item.status)}</span>
                        </div>
                        <div class="item-info">申请类型: ${item.app_type || ''} | 提交时间: ${item.created_at || ''}</div>
                    </div>
                `).join('');
            }
        }

        document.querySelectorAll('.filter-item').forEach(el => {
            el.addEventListener('click', () => {
                document.querySelectorAll('.filter-item').forEach(e => e.classList.remove('active'));
                el.classList.add('active');
                currentStatus = el.dataset.status;
                loadList();
            });
        });

        loadList();
    </script>
</body>
</html>
