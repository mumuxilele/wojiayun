<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的申请</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f5f5f5; min-height: 100vh; }
        .header { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 15px; display: flex; align-items: center; }
        .header h1 { font-size: 18px; flex: 1; }
        .back { color: white; text-decoration: none; font-size: 14px; }
        .filter { display: flex; gap: 8px; padding: 10px 15px; background: white; overflow-x: auto; }
        .filter-item { padding: 6px 12px; border-radius: 15px; font-size: 12px; white-space: nowrap; background: #f0f0f0; color: #666; }
        .filter-item.active { background: #667eea; color: white; }
        .list { padding: 10px; }
        .item { background: white; border-radius: 12px; padding: 15px; margin-bottom: 10px; }
        .item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .item-title { font-size: 15px; font-weight: 500; color: #333; }
        .item-status { font-size: 12px; padding: 4px 10px; border-radius: 10px; }
        .status-pending { background: #fff3e0; color: #f57c00; }
        .status-processing { background: #e3f2fd; color: #1976d2; }
        .status-completed { background: #e8f5e9; color: #388e3c; }
        .status-rejected { background: #ffebee; color: #d32f2f; }
        .item-info { font-size: 12px; color: #999; }
        .fab { position: fixed; bottom: 30px; right: 20px; width: 56px; height: 56px; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 28px; text-decoration: none; }
        .empty { text-align: center; padding: 60px 20px; color: #999; }
    </style>
</head>
<body>
    <div class="header">
        <a href="javascript:void(0)" class="back" onclick="goBack()">← 返回</a>
        <h1>我的申请</h1>
        <span></span>
    </div>

    <div class="filter">
        <div class="filter-item active" data-status="">全部</div>
        <div class="filter-item" data-status="pending">待处理</div>
        <div class="filter-item" data-status="processing">处理中</div>
        <div class="filter-item" data-status="completed">已完成</div>
        <div class="filter-item" data-status="rejected">已拒绝</div>
    </div>

    <div class="list" id="list"><div class="empty">加载中...</div></div>

    <a href="javascript:void(0)" class="fab" onclick="goTo('application_create.html')">+</a>

    <script>
        var urlParams = new URLSearchParams(location.search);
        var token = urlParams.get('access_token');
        var isdev = urlParams.get('isdev') || '0';
        
        if (token) {
            localStorage.setItem('user_token', token);
            localStorage.setItem('user_isdev', isdev);
        } else {
            token = localStorage.getItem('user_token');
            isdev = localStorage.getItem('user_isdev') || '0';
        }

        if (!token) {
            document.body.innerHTML = '<div class="empty">请先登录</div>';
            throw new Error('No token');
        }

        function goTo(url) {
            var sep = url.indexOf('?') >= 0 ? '&' : '?';
            var params = 'access_token=' + encodeURIComponent(token) + '&isdev=' + isdev;
            location.href = url + sep + params;
        }

        function goBack() {
            goTo('index.html');
        }

        var currentStatus = '';

        function getStatusClass(status) { return 'item-status status-' + (status || 'pending'); }
        function getStatusText(status) { return {pending:'待处理',processing:'处理中',completed:'已完成',rejected:'已拒绝'}[status] || status; }

        async function loadList() {
            document.getElementById('list').innerHTML = '<div class="empty">加载中...</div>';
            var url = '/api/user/applications?page=1&page_size=20' + (currentStatus ? '&status=' + currentStatus : '') + '&access_token=' + encodeURIComponent(token) + '&isdev=' + isdev;
            try {
                var res = await fetch(url);
                var data = await res.json();
                if (data.success && data.data.items) {
                    if (data.data.items.length === 0) {
                        document.getElementById('list').innerHTML = '<div class="empty">暂无申请记录</div>';
                        return;
                    }
                    document.getElementById('list').innerHTML = data.data.items.map(function(item) {
                        var detailUrl = 'application_detail.html?id=' + item.id;
                        return '<div class="item" onclick="goTo(\'' + detailUrl + '\')"><div class="item-header"><span class="item-title">' + (item.title || '') + '</span><span class="' + getStatusClass(item.status) + '">' + getStatusText(item.status) + '</span></div><div class="item-info">申请类型: ' + (item.app_type || '') + ' | 提交时间: ' + (item.created_at || '') + '</div></div>';
                    }).join('');
                }
            } catch(e) {
                document.getElementById('list').innerHTML = '<div class="empty">加载失败</div>';
            }
        }

        document.querySelectorAll('.filter-item').forEach(function(el) {
            el.addEventListener('click', function() {
                document.querySelectorAll('.filter-item').forEach(function(e) { e.classList.remove('active'); });
                el.classList.add('active');
                currentStatus = el.dataset.status;
                loadList();
            });
        });

        loadList();
    </script>
</body>
</html>
