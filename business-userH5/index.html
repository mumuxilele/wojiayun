<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>社区服务 - 用户端</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; min-height: 100vh; }
        
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .header h1 { font-size: 20px; }
        .user-info { font-size: 13px; opacity: 0.9; }
        
        .stats-row { display: flex; gap: 10px; }
        .stat-card { background: rgba(255,255,255,0.15); border-radius: 10px; padding: 12px; flex: 1; text-align: center; }
        .stat-num { font-size: 22px; font-weight: 600; }
        .stat-label { font-size: 11px; opacity: 0.8; margin-top: 2px; }
        
        .menu-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 15px; }
        .menu-item { background: white; border-radius: 12px; padding: 18px 10px; text-align: center; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .menu-item:active { transform: scale(0.98); }
        .menu-icon { font-size: 28px; margin-bottom: 6px; display: block; }
        .menu-text { font-size: 13px; color: #333; font-weight: 500; }
        
        .filter-section { background: white; margin: 0 15px 10px; border-radius: 12px; padding: 12px; }
        .filter-title { font-size: 13px; color: #666; margin-bottom: 8px; }
        .filter-row { display: flex; gap: 8px; flex-wrap: wrap; }
        .filter-tag { padding: 5px 12px; border-radius: 15px; font-size: 12px; background: #f0f0f0; color: #666; cursor: pointer; }
        .filter-tag.active { background: #667eea; color: white; }
        
        .section { background: white; margin: 0 15px 15px; border-radius: 12px; overflow: hidden; }
        .section-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; border-bottom: 1px solid #f5f5f5; }
        .section-title { font-size: 15px; font-weight: 600; color: #333; }
        .section-more { font-size: 12px; color: #667eea; text-decoration: none; }
        
        .record-item { display: flex; padding: 12px 15px; border-bottom: 1px solid #f5f5f5; cursor: pointer; }
        .record-item:last-child { border-bottom: none; }
        .record-item:active { background: #fafafa; }
        .record-icon { width: 40px; height: 40px; background: #f5f5f5; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; margin-right: 10px; flex-shrink: 0; }
        .record-info { flex: 1; min-width: 0; }
        .record-title { font-size: 14px; color: #333; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .record-desc { font-size: 12px; color: #999; margin-top: 3px; }
        .record-status { font-size: 11px; padding: 2px 6px; border-radius: 4px; margin-left: 8px; flex-shrink: 0; }
        
        .status-pending { background: #fff7e6; color: #fa8c16; }
        .status-processing { background: #e6f7ff; color: #1890ff; }
        .status-completed { background: #f6ffed; color: #52c41a; }
        .status-rejected { background: #fff1f0; color: #f5222d; }
        
        .empty { text-align: center; padding: 25px; color: #bbb; font-size: 13px; }
        .login-tip { text-align: center; padding: 60px 20px; color: #999; }
        .footer { text-align: center; padding: 15px; color: #bbb; font-size: 11px; }
        .loading { display: flex; align-items: center; justify-content: center; padding: 20px; }
        .loading::after { content: '加载中...'; color: #999; }
        
        /* 通知提示条 */
        .notice-bar { background: linear-gradient(90deg, #ff7f50, #ff4500); color: white; padding: 10px 15px; font-size: 13px; display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .notice-bar:active { opacity: .9; }
        .notice-dot { width: 8px; height: 8px; background: white; border-radius: 50%; flex-shrink: 0; animation: blink 1.2s infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
        /* 待支付预约提示 */
        .pay-alert { background: #fff7e6; border: 1px solid #ffd591; border-radius: 12px; margin: 0 15px 12px; padding: 12px 15px; display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .pay-alert:active { background: #fff0d0; }
        .pay-alert-icon { font-size: 22px; flex-shrink: 0; }
        .pay-alert-text { flex: 1; }
        .pay-alert-title { font-size: 14px; font-weight: 600; color: #d46b08; }
        .pay-alert-sub { font-size: 12px; color: #fa8c16; margin-top: 2px; }
        .pay-alert-arrow { color: #fa8c16; font-size: 18px; }
        .points-card { background: white; margin: 0 15px 15px; border-radius: 12px; padding: 16px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .points-left { display: flex; align-items: center; gap: 12px; }
        .points-icon { width: 44px; height: 44px; background: linear-gradient(135deg, #f093fb, #f5576c); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
        .points-info .label { font-size: 12px; color: #999; margin-bottom: 2px; }
        .points-info .value { font-size: 20px; font-weight: 700; color: #333; }
        .points-right { text-align: right; }
        .points-right .balance-label { font-size: 12px; color: #999; }
        .points-right .balance-value { font-size: 16px; font-weight: 600; color: #f5576c; }
        .member-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; margin-top: 3px; }
        .badge-bronze { background: #cd7f32; color: white; }
        .badge-silver { background: #c0c0c0; color: white; }
        .badge-gold { background: #ffd700; color: #333; }
        .badge-platinum { background: #e5e4e2; color: #333; }
        /* 角标样式 */
        .menu-item { position: relative; }
        .menu-badge { position: absolute; top: 6px; right: 6px; background: #f5222d; color: white; font-size: 10px; min-width: 16px; height: 16px; line-height: 16px; border-radius: 8px; padding: 0 4px; text-align: center; display: none; }
        /* 签到打卡按钮高亮 */
        .menu-item.highlight { background: linear-gradient(135deg, #fff7e6, #fffbe6); border: 1px solid #ffe58f; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-top">
            <h1>🏠 社区服务中心</h1>
            <div class="user-info" id="userName">加载中...</div>
        </div>
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-num" id="statPending">-</div>
                <div class="stat-label">待处理</div>
            </div>
            <div class="stat-card">
                <div class="stat-num" id="statProcessing">-</div>
                <div class="stat-label">处理中</div>
            </div>
            <div class="stat-card">
                <div class="stat-num" id="statCompleted">-</div>
                <div class="stat-label">已完成</div>
            </div>
            <div class="stat-card">
                <div class="stat-num" id="statOrders">-</div>
                <div class="stat-label">订单数</div>
            </div>
            <div class="stat-card">
                <div class="stat-num" id="statBookings">-</div>
                <div class="stat-label">预约数</div>
            </div>
        </div>
    </div>

    <!-- 通知提示条（有状态变更时才显示） -->
    <div class="notice-bar" id="noticeBar" style="display:none" onclick="goTo('applications.html')">
        <div class="notice-dot"></div>
        <span id="noticeText">您有申请状态已更新，点击查看</span>
        <span style="margin-left:auto">›</span>
    </div>

    <div class="menu-grid">
        <div class="menu-item" onclick="goTo('applications.html')">
            <span class="menu-icon">📋</span>
            <div class="menu-text">我的申请</div>
        </div>
        <div class="menu-item" onclick="goTo('application_create.html')">
            <span class="menu-icon">➕</span>
            <div class="menu-text">提交申请</div>
        </div>
        <div class="menu-item" onclick="goTo('orders.html')">
            <span class="menu-icon">🛒</span>
            <div class="menu-text">我的订单</div>
        </div>
        <div class="menu-item" onclick="goTo('bookings.html')">
            <span class="menu-icon">📅</span>
            <div class="menu-text">场馆预约</div>
        </div>
        <div class="menu-item" onclick="goTo('products.html')">
            <span class="menu-icon">🏪</span>
            <div class="menu-text">商品商城</div>
        </div>
        <div class="menu-item" onclick="goTo('cart.html')">
            <span class="menu-icon">🛍️</span>
            <div class="menu-text">购物车</div>
        </div>
        <div class="menu-item" onclick="goTo('notifications.html')">
            <span class="menu-badge" id="notifBadge"></span>
            <span class="menu-icon">🔔</span>
            <div class="menu-text">消息通知</div>
        </div>
        <div class="menu-item" onclick="goTo('feedback.html')">
            <span class="menu-icon">💬</span>
            <div class="menu-text">意见反馈</div>
        </div>
        <div class="menu-item" onclick="goTo('member.html')">
            <span class="menu-icon">💎</span>
            <div class="menu-text">会员中心</div>
        </div>
        <div class="menu-item" onclick="goTo('my_coupons.html')">
            <span class="menu-badge" id="couponBadge"></span>
            <span class="menu-icon">🎫</span>
            <div class="menu-text">优惠券</div>
        </div>
        <div class="menu-item highlight" onclick="goTo('checkin.html')">
            <span class="menu-badge" id="checkinBadge" style="background:#52c41a"></span>
            <span class="menu-icon">✅</span>
            <div class="menu-text">每日签到</div>
        </div>
        <div class="menu-item" onclick="goTo('favorites.html')">
            <span class="menu-icon">❤️</span>
            <div class="menu-text">我的收藏</div>
        </div>
        <div class="menu-item" onclick="goTo('shops.html')">
            <span class="menu-icon">🏪</span>
            <div class="menu-text">附近门店</div>
        </div>
        <div class="menu-item" onclick="goTo('promotions.html')">
            <span class="menu-icon">🔥</span>
            <div class="menu-text">限时促销</div>
        </div>
        <div class="menu-item" onclick="goTo('addresses.html')">
            <span class="menu-icon">📍</span>
            <div class="menu-text">收货地址</div>
        </div>
    </div>

    <!-- 待支付预约提示（有待支付预约时才显示） -->
    <div class="pay-alert" id="payAlert" style="display:none" onclick="goTo('bookings.html')">
        <div class="pay-alert-icon">💰</div>
        <div class="pay-alert-text">
            <div class="pay-alert-title">您有待支付的预约</div>
            <div class="pay-alert-sub" id="payAlertSub">点击前往完成支付</div>
        </div>
        <div class="pay-alert-arrow">›</div>
    </div>

    <!-- 积分/余额卡片 -->
    <div class="points-card" id="pointsCard" style="display:none">
        <div class="points-left">
            <div class="points-icon">💎</div>
            <div class="points-info">
                <div class="label">我的积分</div>
                <div class="value" id="myPoints">0</div>
                <div id="memberBadge"></div>
            </div>
        </div>
        <div class="points-right">
            <div class="balance-label">账户余额</div>
            <div class="balance-value" id="myBalance">¥0.00</div>
            <div style="font-size:11px;color:#999;margin-top:2px">累计 <span id="totalPoints">0</span> 积分</div>
        </div>
    </div>

    <div class="filter-section">
        <div class="filter-title">申请类型筛选</div>
        <div class="filter-row" id="filterRow">
            <div class="filter-tag active" data-type="">全部</div>
            <div class="filter-tag" data-type="repair">报修</div>
            <div class="filter-tag" data-type="booking">预约</div>
            <div class="filter-tag" data-type="complaint">投诉</div>
            <div class="filter-tag" data-type="consult">咨询</div>
        </div>
    </div>

    <div class="section">
        <div class="section-header">
            <span class="section-title">最近申请</span>
            <a href="javascript:void(0)" class="section-more" onclick="goTo('applications.html')">更多 ></a>
        </div>
        <div id="recentApps"><div class="loading"></div></div>
    </div>

    <div class="section">
        <div class="section-header">
            <span class="section-title">最近订单</span>
            <a href="javascript:void(0)" class="section-more" onclick="goTo('orders.html')">更多 ></a>
        </div>
        <div id="recentOrders"><div class="loading"></div></div>
    </div>

    <div class="footer">© 社区服务中心</div>

    <script>
        var urlParams = new URLSearchParams(location.search);
        var token = urlParams.get('access_token');
        var isdev = urlParams.get('isdev') || '0';
        var currentType = '';
        
        if (token) {
            localStorage.setItem('user_token', token);
            localStorage.setItem('user_isdev', isdev);
        } else {
            token = localStorage.getItem('user_token');
            isdev = localStorage.getItem('user_isdev') || '0';
        }

        if (!token) {
            document.body.innerHTML = '<div class="login-tip"><h2>请先登录</h2><p>需要 access_token 参数</p></div>';
            throw new Error('No token');
        }

        function goTo(url) {
            var sep = url.indexOf('?') >= 0 ? '&' : '?';
            location.href = url + sep + 'access_token=' + encodeURIComponent(token) + '&isdev=' + isdev;
        }

        function loadStats() {
            var url = '/api/user/stats?access_token=' + encodeURIComponent(token) + '&isdev=' + isdev;
            fetch(url)
            .then(function(r){return r.json()})
            .then(function(d){
                if(d.success && d.data) {
                    document.getElementById('statPending').textContent = d.data.pending || 0;
                    document.getElementById('statProcessing').textContent = d.data.processing || 0;
                    document.getElementById('statCompleted').textContent = d.data.completed || 0;
                    document.getElementById('statOrders').textContent = d.data.orders || 0;
                    document.getElementById('statBookings').textContent = d.data.bookings || 0;
                    // 尝试显示用户名
                    if (d.data.user_name) {
                        document.getElementById('userName').textContent = '你好，' + d.data.user_name;
                    }
                }
            })
            .catch(function(e){
                console.error('Stats error:', e);
            });
        }

        function loadRecentApps() {
            var url = '/api/user/applications?page=1&page_size=5';
            if(currentType) url += '&app_type=' + currentType;
            url += '&access_token=' + encodeURIComponent(token) + '&isdev=' + isdev;
            
            fetch(url).then(function(r){return r.json()}).then(function(data){
                if (data.success && data.data && data.data.items && data.data.items.length > 0) {
                    var html = '';
                    for(var i=0; i<data.data.items.length; i++) {
                        var app = data.data.items[i];
                        var statusMap = {pending:'待处理',processing:'处理中',completed:'已完成',rejected:'已拒绝'};
                        var iconMap = {repair:'🔧',booking:'📅',complaint:'📝',consult:'💬',other:'📋'};
                        html += '<div class="record-item" onclick="goTo(\'application_detail.html?id=' + app.id + '\')"><div class="record-icon">' + (iconMap[app.app_type]||'📋') + '</div><div class="record-info"><div class="record-title">' + (app.title||'') + '</div><div class="record-desc">' + (app.created_at||'') + '</div></div><span class="record-status status-' + (app.status||'pending') + '">' + (statusMap[app.status]||app.status) + '</span></div>';
                    }
                    document.getElementById('recentApps').innerHTML = html;
                } else {
                    document.getElementById('recentApps').innerHTML = '<div class="empty">暂无申请记录</div>';
                }
            }).catch(function(){
                document.getElementById('recentApps').innerHTML = '<div class="empty">加载失败</div>';
            });
        }

        function loadRecentOrders() {
            fetch('/api/user/orders?page=1&page_size=3&access_token=' + encodeURIComponent(token) + '&isdev=' + isdev)
            .then(function(r){return r.json()})
            .then(function(data){
                if (data.success && data.data && data.data.items && data.data.items.length > 0) {
                    var html = '';
                    for(var i=0; i<data.data.items.length; i++) {
                        var o = data.data.items[i];
                        // 使用正确的字段名 order_status
                        var os = o.order_status || o.status || 'pending';
                        var statusMap = {pending:'待支付',paid:'已支付',completed:'已完成',cancelled:'已取消'};
                        var statusClass = {pending:'status-pending',paid:'status-processing',completed:'status-completed',cancelled:'status-rejected'};
                        html += '<div class="record-item" onclick="goTo(\'orders.html\')">'
                            + '<div class="record-icon">🛒</div>'
                            + '<div class="record-info">'
                            + '<div class="record-title">' + (o.order_no || '') + '</div>'
                            + '<div class="record-desc">¥' + parseFloat(o.actual_amount || o.total_amount || 0).toFixed(2) + ' · ' + (o.created_at || '').substring(0,10) + '</div>'
                            + '</div>'
                            + '<span class="record-status ' + (statusClass[os] || 'status-pending') + '">' + (statusMap[os] || os) + '</span></div>';
                    }
                    document.getElementById('recentOrders').innerHTML = html;
                } else {
                    document.getElementById('recentOrders').innerHTML = '<div class="empty">暂无订单记录</div>';
                }
            }).catch(function(){
                document.getElementById('recentOrders').innerHTML = '<div class="empty">加载失败</div>';
            });
        }

        // 加载会员积分信息
        function loadMemberInfo() {
            fetch('/api/user/member?access_token=' + encodeURIComponent(token) + '&isdev=' + isdev)
            .then(function(r){return r.json()})
            .then(function(data){
                if(data.success && data.data) {
                    var d = data.data;
                    document.getElementById('myPoints').textContent = d.points || 0;
                    document.getElementById('myBalance').textContent = '¥' + parseFloat(d.balance || 0).toFixed(2);
                    document.getElementById('totalPoints').textContent = d.total_points || 0;
                    var levelMap = {bronze:'青铜会员',silver:'白银会员',gold:'黄金会员',platinum:'铂金会员'};
                    var levelBadge = {bronze:'badge-bronze',silver:'badge-silver',gold:'badge-gold',platinum:'badge-platinum'};
                    var lv = d.member_level || 'bronze';
                    document.getElementById('memberBadge').innerHTML = '<span class="member-badge ' + (levelBadge[lv]||'badge-bronze') + '">' + (levelMap[lv]||lv) + '</span>';
                    document.getElementById('pointsCard').style.display = 'flex';
                }
            })
            .catch(function(e){ console.warn('loadMemberInfo error:', e); });
        }

        document.querySelectorAll('.filter-tag').forEach(function(el){
            el.addEventListener('click', function(){
                document.querySelectorAll('.filter-tag').forEach(function(e){e.classList.remove('active')});
                el.classList.add('active');
                currentType = el.dataset.type;
                loadRecentApps();
            });
        });

        // 检测申请状态变更（与上次缓存对比）
        function checkNotifications() {
            var url = '/api/user/applications?page=1&page_size=20&access_token=' + encodeURIComponent(token) + '&isdev=' + isdev;
            fetch(url).then(function(r){return r.json()}).then(function(data){
                if (!data.success || !data.data || !data.data.items) return;
                var items = data.data.items;
                var cacheKey = 'app_status_cache_' + token.substr(-8);
                var cached = {};
                try { cached = JSON.parse(localStorage.getItem(cacheKey) || '{}'); } catch(e) {}
                var changed = [];
                var newCache = {};
                var statusText = {pending:'待处理', processing:'处理中', completed:'已完成', rejected:'已拒绝', cancelled:'已撤销'};
                items.forEach(function(item) {
                    newCache[item.id] = item.status;
                    if (cached[item.id] && cached[item.id] !== item.status) {
                        changed.push('"' + (item.title||'').substr(0,10) + '" → ' + (statusText[item.status]||item.status));
                    }
                });
                // 保存新缓存
                localStorage.setItem(cacheKey, JSON.stringify(newCache));
                // 如果有变化，显示通知条
                if (changed.length > 0) {
                    var text = changed.length === 1 ? changed[0] : changed.length + '条申请状态已更新';
                    document.getElementById('noticeText').textContent = '📢 ' + text + '，点击查看';
                    document.getElementById('noticeBar').style.display = 'flex';
                }
            }).catch(function(){});
        }

        // 检测待支付预约
        function checkUnpaidBookings() {
            fetch('/api/user/bookings?page=1&page_size=20&status=pending&access_token=' + encodeURIComponent(token) + '&isdev=' + isdev)
            .then(function(r){return r.json()})
            .then(function(data){
                if (!data.success || !data.data) return;
                var items = (data.data.items || []).filter(function(b){ return b.pay_status !== 'paid'; });
                if (items.length > 0) {
                    document.getElementById('payAlertSub').textContent = '共 ' + items.length + ' 个预约待支付，点击前往处理';
                    document.getElementById('payAlert').style.display = 'flex';
                }
            }).catch(function(){});
        }

        document.getElementById('userName').textContent = '欢迎您';
        loadStats();
        loadMemberInfo();
        loadRecentApps();
        loadRecentOrders();
        checkNotifications();
        checkUnpaidBookings();
        loadBadges();

        // 加载角标（未读消息数、未用优惠券数、今日是否已签到）
        function loadBadges() {
            // 未读通知数角标
            fetch('/api/user/notifications?page=1&page_size=1&access_token=' + encodeURIComponent(token) + '&isdev=' + isdev)
            .then(function(r){return r.json()})
            .then(function(d){
                if(d.success && d.data) {
                    var cnt = d.data.unread_count || 0;
                    var el = document.getElementById('notifBadge');
                    if(cnt > 0) { el.textContent = cnt > 99 ? '99+' : cnt; el.style.display = 'block'; }
                }
            }).catch(function(){});
            
            // 未用优惠券数角标
            fetch('/api/user/stats?access_token=' + encodeURIComponent(token) + '&isdev=' + isdev)
            .then(function(r){return r.json()})
            .then(function(d){
                if(d.success && d.data) {
                    var cnt = d.data.unused_coupons || 0;
                    var el = document.getElementById('couponBadge');
                    if(cnt > 0) { el.textContent = cnt > 99 ? '99+' : cnt; el.style.display = 'block'; }
                }
            }).catch(function(){});

            // 今日签到检测（未签到则显示红点）
            fetch('/api/user/checkin/status?access_token=' + encodeURIComponent(token) + '&isdev=' + isdev)
            .then(function(r){return r.json()})
            .then(function(d){
                if(d.success && d.data && !d.data.checked_today) {
                    var el = document.getElementById('checkinBadge');
                    el.textContent = '签到';
                    el.style.display = 'block';
                }
            }).catch(function(){});
        }
    </script>
</body>
</html>
