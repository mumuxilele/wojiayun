<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>走访台账管理 - PC端</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <script src="https://unpkg.com/element-plus/dist/index.full.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/@element-plus/icons-vue">
    <script src="https://unpkg.com/@element-plus/icons-vue"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f7fa; min-height: 100vh; }
        
        .layout { display: flex; min-height: 100vh; }
        
        /* 侧边栏 */
        .sidebar { width: 220px; background: linear-gradient(180deg, #1a1a2e, #16213e); color: #fff; }
        .logo { height: 60px; display: flex; align-items: center; padding: 0 20px; font-size: 18px; font-weight: 600; color: #00d1a0; }
        .menu-item { padding: 14px 20px; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: all 0.3s; }
        .menu-item:hover { background: rgba(255,255,255,0.1); }
        .menu-item.active { background: linear-gradient(90deg, #00d1a0, #00b890); }
        
        /* 主内容 */
        .main { flex: 1; display: flex; flex-direction: column; }
        
        /* 头部 */
        .header { height: 60px; background: #fff; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .header-title { font-size: 18px; font-weight: 500; color: #303133; }
        
        /* 内容区 */
        .content { padding: 24px; flex: 1; }
        
        /* 卡片 */
        .card { background: #fff; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.05); padding: 20px; margin-bottom: 20px; }
        
        /* 搜索栏 */
        .search-bar { display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 20px; }
        .search-bar .el-select, .search-bar .el-input { width: 180px; }
        
        /* 表格 */
        .el-table { font-size: 14px; }
        
        /* 统计卡片 */
        .stats { display: flex; gap: 20px; margin-bottom: 20px; }
        .stat-card { flex: 1; background: linear-gradient(135deg, #00d1a0, #00b890); border-radius: 8px; padding: 20px; color: #fff; }
        .stat-num { font-size: 32px; font-weight: 600; }
        .stat-label { font-size: 14px; opacity: 0.9; margin-top: 5px; }
        
        /* 弹窗 */
        .dialog-form { padding: 20px; }
        .dialog-form .el-form-item { margin-bottom: 18px; }
    </style>
</head>
<body>
    <div id="app">
        <div class="layout">
            <!-- 侧边栏 -->
            <div class="sidebar">
                <div class="logo">🏢 走访台账系统</div>
                <div class="menu-item" :class="{active: activeMenu==='list'}" @click="activeMenu='list'">
                    <i class="el-icon-document"></i>走访记录
                </div>
                <div class="menu-item" :class="{active: activeMenu==='stats'}" @click="activeMenu='stats'">
                    <i class="el-icon-data-analysis"></i>数据统计
                </div>
            </div>
            
            <!-- 主内容 -->
            <div class="main">
                <div class="header">
                    <div class="header-title">走访台账管理</div>
                    <div>管理员</div>
                </div>
                
                <div class="content">
                    <!-- 记录列表 -->
                    <template v-if="activeMenu==='list'">
                        <div class="card">
                            <div class="search-bar">
                                <el-input v-model="search.companyName" placeholder="企业名称" clearable style="width:150px"></el-input>
                                <el-input v-model="search.visitorName" placeholder="走访人姓名" clearable style="width:150px"></el-input>
                                <el-select v-model="search.category" placeholder="分类" clearable style="width:120px">
                                    <el-option label="租赁" value="租赁"></el-option>
                                    <el-option label="服务" value="服务"></el-option>
                                    <el-option label="物业" value="物业"></el-option>
                                    <el-option label="其他" value="其他"></el-option>
                                </el-select>
                                <el-date-picker v-model="search.dateRange" type="daterange" range-separator="至" start-placeholder="开始日期" end-placeholder="结束日期" value-format="YYYY-MM-DD" style="width:240px"></el-date-picker>
                                <el-button type="primary" icon="el-icon-search" @click="loadList">搜索</el-button>
                                <el-button icon="el-icon-refresh" @click="resetSearch">重置</el-button>
                                <el-button type="success" icon="el-icon-plus" @click="showAdd">新增记录</el-button>
                            </div>
                            
                            <el-table :data="tableData" border stripe>
                                <el-table-column prop="company_name" label="企业名称" width="180"></el-table-column>
                                <el-table-column prop="region" label="区域地址" width="150"></el-table-column>
                                <el-table-column prop="visitor_name" label="走访人" width="100"></el-table-column>
                                <el-table-column prop="category" label="分类" width="80">
                                    <template #default="{row}">
                                        <el-tag :type="getCategoryType(row.category)">{{row.category}}</el-tag>
                                    </template>
                                </el-table-column>
                                <el-table-column prop="content" label="沟通事项" show-overflow-tooltip></el-table-column>
                                <el-table-column prop="visit_time" label="走访时间" width="160"></el-table-column>
                                <el-table-column label="操作" width="180" fixed="right">
                                    <template #default="{row}">
                                        <el-button type="text" size="small" @click="showDetail(row)">详情</el-button>
                                        <el-button type="text" size="small" @click="showEdit(row)">编辑</el-button>
                                        <el-button type="text" size="small" style="color:#f56c6c" @click="handleDelete(row)">删除</el-button>
                                    </template>
                                </el-table-column>
                            </el-table>
                            
                            <el-pagination style="margin-top:20px;justify-content:center" 
                                :current-page="pagination.page" 
                                :page-size="pagination.pageSize"
                                :total="pagination.total"
                                layout="total,prev,pager,next"
                                @current-change="loadList">
                            </el-pagination>
                        </div>
                    </template>
                    
                    <!-- 统计 -->
                    <template v-if="activeMenu==='stats'">
                        <div class="stats">
                            <div class="stat-card">
                                <div class="stat-num">{{stats.total}}</div>
                                <div class="stat-label">总走访记录</div>
                            </div>
                            <div class="stat-card" style="background:linear-gradient(135deg,#409eff,#66b1ff)">
                                <div class="stat-num">{{stats.byCategory.length}}</div>
                                <div class="stat-label">分类统计</div>
                            </div>
                            <div class="stat-card" style="background:linear-gradient(135deg,#e6a23c,#f0c78a)">
                                <div class="stat-num">{{stats.byVisitor.length}}</div>
                                <div class="stat-label">人员统计</div>
                            </div>
                        </div>
                        
                        <div style="display:flex;gap:20px">
                            <div class="card" style="flex:1">
                                <h3 style="margin-bottom:15px">按分类统计</h3>
                                <el-table :data="stats.byCategory" border>
                                    <el-table-column prop="name" label="分类"></el-table-column>
                                    <el-table-column prop="count" label="数量"></el-table-column>
                                </el-table>
                            </div>
                            <div class="card" style="flex:1">
                                <h3 style="margin-bottom:15px">按人员统计</h3>
                                <el-table :data="stats.byVisitor" border>
                                    <el-table-column prop="name" label="走访人"></el-table-column>
                                    <el-table-column prop="count" label="数量"></el-table-column>
                                </el-table>
                            </div>
                        </div>
                        
                        <div class="card">
                            <h3 style="margin-bottom:15px">按月份统计</h3>
                            <el-table :data="stats.byMonth" border>
                                <el-table-column prop="period" label="月份"></el-table-column>
                                <el-table-column prop="count" label="数量"></el-table-column>
                            </el-table>
                        </div>
                    </template>
                </div>
            </div>
        </div>
        
        <!-- 新增/编辑弹窗 -->
        <el-dialog :title="dialogTitle" v-model="dialogVisible" width="600px">
            <div class="dialog-form">
                <el-form :model="form" label-width="100px">
                    <el-form-item label="企业名称" required>
                        <el-input v-model="form.company_name"></el-input>
                    </el-form-item>
                    <el-form-item label="区域地址" required>
                        <el-input v-model="form.region"></el-input>
                    </el-form-item>
                    <el-form-item label="走访人账号" required>
                        <el-input v-model="form.visitor"></el-input>
                    </el-form-item>
                    <el-form-item label="走访人姓名" required>
                        <el-input v-model="form.visitor_name"></el-input>
                    </el-form-item>
                    <el-form-item label="分类" required>
                        <el-select v-model="form.category" style="width:100%">
                            <el-option label="租赁" value="租赁"></el-option>
                            <el-option label="服务" value="服务"></el-option>
                            <el-option label="物业" value="物业"></el-option>
                            <el-option label="其他" value="其他"></el-option>
                        </el-select>
                    </el-form-item>
                    <el-form-item label="沟通事项" required>
                        <el-input type="textarea" v-model="form.content" :rows="3"></el-input>
                    </el-form-item>
                    <el-form-item label="走访时间" required>
                        <el-date-picker v-model="form.visit_time" type="datetime" placeholder="选择时间" value-format="YYYY-MM-DD HH:mm:ss" style="width:100%"></el-date-picker>
                    </el-form-item>
                </el-form>
            </div>
            <template #footer>
                <el-button @click="dialogVisible=false">取消</el-button>
                <el-button type="primary" @click="submitForm">保存</el-button>
            </template>
        </el-dialog>
        
        <!-- 详情弹窗 -->
        <el-dialog title="走访详情" v-model="detailVisible" width="500px">
            <el-descriptions :column="1" border v-if="detailData">
                <el-descriptions-item label="企业名称">{{detailData.company_name}}</el-descriptions-item>
                <el-descriptions-item label="区域地址">{{detailData.region}}</el-descriptions-item>
                <el-descriptions-item label="走访人">{{detailData.visitor_name}}</el-descriptions-item>
                <el-descriptions-item label="分类">{{detailData.category}}</el-descriptions-item>
                <el-descriptions-item label="沟通事项">{{detailData.content}}</el-descriptions-item>
                <el-descriptions-item label="走访时间">{{detailData.visit_time}}</el-descriptions-item>
                <el-descriptions-item label="创建时间">{{detailData.create_time}}</el-descriptions-item>
            </el-descriptions>
        </el-dialog>
    </div>

    <script>
        const { createApp, ref, reactive, onMounted } = Vue;
        
        const app = createApp({
            setup() {
                const API_BASE = 'http://47.98.238.209:22306/visit';
                const USER_API = 'http://47.98.238.209:22307';
                const TOKEN = 'visit_token_2024';
                let currentUser = null;
                
                const activeMenu = ref('list');
                const tableData = ref([]);
                const dialogVisible = ref(false);
                const detailVisible = ref(false);
                const dialogTitle = ref('新增记录');
                const isEdit = ref(false);
                const detailData = ref(null);
                
                const search = reactive({
                    companyName: '',
                    visitorName: '',
                    category: '',
                    dateRange: []
                });
                
                const pagination = reactive({
                    page: 1,
                    pageSize: 10,
                    total: 0
                });
                
                const form = reactive({
                    id: '',
                    company_name: '',
                    region: '',
                    visitor: '',
                    visitor_name: '',
                    category: '',
                    content: '',
                    visit_time: ''
                });
                
                const stats = reactive({
                    total: 0,
                    byCategory: [],
                    byVisitor: [],
                    byMonth: []
                });
                
                const getCategoryType = (cat) => {
                    const map = {'租赁':'primary','服务':'success','物业':'warning','其他':'info'};
                    return map[cat] || 'info';
                };
                
                const loadList = async (page = 1) => {
                    pagination.page = page;
                    
                    const params = new URLSearchParams({
                        page: pagination.page,
                        pageSize: pagination.pageSize,
                        token: TOKEN
                    });
                    if (search.companyName) params.append('companyName', search.companyName);
                    if (search.visitorName) params.append('visitorName', search.visitorName);
                    if (search.category) params.append('category', search.category);
                    if (search.dateRange && search.dateRange[0]) {
                        params.append('startDate', search.dateRange[0]);
                        params.append('endDate', search.dateRange[1]);
                    }
                    
                    const res = await fetch(`${API_BASE}/api/visit/list?${params}`);
                    const data = await res.json();
                    
                    if (data.code === 200) {
                        tableData.value = data.data.list;
                        pagination.total = data.data.total;
                    }
                };
                
                const loadStats = async () => {
                    const params = new URLSearchParams({ token: TOKEN });
                    if (search.dateRange && search.dateRange[0]) {
                        params.append('startDate', search.dateRange[0]);
                        params.append('endDate', search.dateRange[1]);
                    }
                    
                    const [catRes, visitorRes, monthRes] = await Promise.all([
                        fetch(`${API_BASE}/api/visit/stats?groupBy=category&${params}`),
                        fetch(`${API_BASE}/api/visit/stats?groupBy=visitor&${params}`),
                        fetch(`${API_BASE}/api/visit/stats?groupBy=month&${params}`)
                    ]);
                    
                    const catData = await catRes.json();
                    const visitorData = await visitorRes.json();
                    const monthData = await monthRes.json();
                    
                    if (catData.code === 200) {
                        stats.byCategory = catData.data.stats;
                        stats.total = catData.data.total;
                    }
                    if (visitorData.code === 200) stats.byVisitor = visitorData.data.stats;
                    if (monthData.code === 200) stats.byMonth = monthData.data.stats;
                };
                
                const resetSearch = () => {
                    search.companyName = '';
                    search.visitorName = '';
                    search.category = '';
                    search.dateRange = [];
                    loadList();
                };
                
                const showAdd = () => {
                    isEdit.value = false;
                    dialogTitle.value = '新增记录';
                    Object.keys(form).forEach(k => form[k] = '');
                    dialogVisible.value = true;
                };
                
                const showEdit = (row) => {
                    isEdit.value = true;
                    dialogTitle.value = '编辑记录';
                    Object.assign(form, row);
                    dialogVisible.value = true;
                };
                
                const showDetail = async (row) => {
                    const res = await fetch(`${API_BASE}/api/visit/detail?id=${row.id}&token=${TOKEN}`);
                    const data = await res.json();
                    if (data.code === 200) {
                        detailData.value = data.data;
                        detailVisible.value = true;
                    }
                };
                
                const submitForm = async () => {
                    const url = isEdit.value ? `${API_BASE}/api/visit/update` : `${API_BASE}/api/visit/add`;
                    const data = { ...form, token: TOKEN };
                    
                    const res = await fetch(url, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify(data)
                    });
                    const result = await res.json();
                    
                    if (result.code === 200) {
                        ElMessage.success('保存成功');
                        dialogVisible.value = false;
                        loadList();
                    } else {
                        ElMessage.error(result.msg || '保存失败');
                    }
                };
                
                const handleDelete = async (row) => {
                    if (!confirm('确定删除这条记录吗？')) return;
                    
                    const res = await fetch(`${API_BASE}/api/visit/delete`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({id: row.id, token: TOKEN})
                    });
                    const data = await res.json();
                    
                    if (data.code === 200) {
                        ElMessage.success('删除成功');
                        loadList();
                    } else {
                        ElMessage.error(data.msg || '删除失败');
                    }
                };
                
                onMounted(() => {
                    // 获取用户信息
                    checkUserInfo();
                    loadList();
                });
                
                // 获取用户信息
                const checkUserInfo = async () => {
                    try {
                        const urlParams = new URLSearchParams(window.location.search);
                        const accessToken = urlParams.get('access_token') || TOKEN;
                        const isDev = urlParams.get('isdev') || '0';
                        
                        const res = await fetch(`${USER_API}/getUserInfo?access_token=${accessToken}&isdev=${isDev}`);
                        const data = await res.json();
                        
                        if (data.success === true) {
                            currentUser = data.data;
                            console.log('用户:', data.data);
                        } else {
                            ElMessage.warning(data.msg || '获取用户信息失败');
                        }
                    } catch(e) {
                        console.error('获取用户信息失败:', e);
                    }
                };
                
                return {
                    activeMenu, tableData, search, pagination, form, dialogVisible, dialogTitle, isEdit, detailVisible, detailData, stats,
                    getCategoryType, loadList, loadStats, resetSearch, showAdd, showEdit, showDetail, submitForm, handleDelete
                };
            }
        });
        
        app.use(ElementPlus);
        app.mount('#app');
    </script>
</body>
</html>
