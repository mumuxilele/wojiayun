<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>评价管理</title>
    <link rel="stylesheet" href="/business-common/common.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }
        
        .header-fixed { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: #fff; }
        
        .search-bar { display: flex; gap: 10px; padding: 12px 20px; border-bottom: 1px solid #f0f0f0; }
        .search-input { flex: 1; display: flex; align-items: center; background: #f5f5f5; border-radius: 20px; padding: 8px 15px; }
        .search-input input { flex: 1; border: none; background: transparent; font-size: 14px; outline: none; }
        .filter-btn { padding: 8px 15px; background: #f5f5f5; border-radius: 20px; font-size: 14px; color: #666; }
        
        .filter-bar { display: flex; padding: 0 20px; border-bottom: 1px solid #f0f0f0; overflow-x: auto; }
        .filter-item { padding: 12px 16px; font-size: 14px; color: #666; white-space: nowrap; position: relative; }
        .filter-item.active { color: #30c2b3; font-weight: 500; }
        .filter-item.active::after { content: ''; position: absolute; bottom: 0; left: 16px; right: 16px; height: 2px; background: #30c2b3; }
        
        .content { padding-top: 100px; padding-bottom: 20px; }
        
        .review-card { background: #fff; margin: 12px 20px; padding: 16px; border-radius: 12px; }
        .review-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .reviewer-info { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: #30c2b3; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 16px; }
        .reviewer-name { font-size: 15px; font-weight: 500; color: #333; }
        .review-time { font-size: 12px; color: #999; margin-top: 2px; }
        .rating { color: #ff9500; font-size: 14px; }
        
        .review-content { font-size: 14px; color: #333; line-height: 1.6; margin-bottom: 12px; }
        .review-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
        .tag { padding: 4px 10px; background: #f0f9f8; color: #30c2b3; border-radius: 4px; font-size: 12px; }
        
        .review-target { background: #f8f8f8; padding: 10px; border-radius: 8px; font-size: 13px; color: #666; }
        .target-label { color: #999; }
        .target-name { color: #333; font-weight: 500; }
        
        .reply-section { margin-top: 12px; padding-top: 12px; border-top: 1px solid #f0f0f0; }
        .reply-content { font-size: 13px; color: #666; background: #f8f8f8; padding: 10px; border-radius: 8px; }
        .reply-label { color: #30c2b3; font-weight: 500; }
        
        .action-bar { display: flex; gap: 10px; margin-top: 12px; padding-top: 12px; border-top: 1px solid #f0f0f0; }
        .action-btn { flex: 1; padding: 10px; text-align: center; border-radius: 6px; font-size: 14px; }
        .action-btn.primary { background: #30c2b3; color: #fff; }
        .action-btn.default { background: #f5f5f5; color: #666; }
        
        .loading, .empty { text-align: center; padding: 40px; color: #999; font-size: 14px; }
        
        .panel { position: fixed; left: 0; right: 0; bottom: 0; background: #fff; border-radius: 16px 16px 0 0; transform: translateY(100%); transition: transform 0.3s; z-index: 200; max-height: 70vh; }
        .panel.show { transform: translateY(0); }
        .panel-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid #f0f0f0; }
        .panel-title { font-size: 16px; font-weight: 500; }
        .panel-close { font-size: 20px; color: #999; }
        .panel-body { padding: 20px; max-height: 50vh; overflow-y: auto; }
        
        .form-item { margin-bottom: 16px; }
        .form-label { font-size: 14px; color: #666; margin-bottom: 8px; display: block; }
        .form-input { width: 100%; padding: 12px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 14px; }
        
        .mask { position: fixed; inset: 0; background: rgba(0,0,0,0.5); opacity: 0; visibility: hidden; transition: all 0.3s; z-index: 150; }
        .mask.show { opacity: 1; visibility: visible; }
    </style>
</head>
<body>
    <div class="header-fixed">
        <div class="search-bar">
            <div class="search-input">
                <span>🔍</span>
                <input type="text" id="searchInput" placeholder="搜索评价内容/用户">
            </div>
            <div class="filter-btn" onclick="showFilter()">筛选</div>
        </div>
        <div class="filter-bar">
            <div class="filter-item active" data-type="all" onclick="switchTab(this, 'all')">全部</div>
            <div class="filter-item" data-type="good" onclick="switchTab(this, 'good')">好评</div>
            <div class="filter-item" data-type="medium" onclick="switchTab(this, 'medium')">中评</div>
            <div class="filter-item" data-type="bad" onclick="switchTab(this, 'bad')">差评</div>
            <div class="filter-item" data-type="pending" onclick="switchTab(this, 'pending')">待回复</div>
        </div>
    </div>

    <div class="content" id="reviewList"></div>

    <div class="mask" id="mask" onclick="closePanel()"></div>
    
    <div class="panel" id="filterPanel">
        <div class="panel-header">
            <span class="panel-title">筛选条件</span>
            <span class="panel-close" onclick="closePanel()">×</span>
        </div>
        <div class="panel-body">
            <div class="form-item">
                <label class="form-label">时间范围</label>
                <select class="form-input" id="timeRange">
                    <option value="">全部时间</option>
                    <option value="today">今天</option>
                    <option value="week">最近7天</option>
                    <option value="month">最近30天</option>
                </select>
            </div>
            <div class="form-item">
                <label class="form-label">评分</label>
                <select class="form-input" id="ratingFilter">
                    <option value="">全部评分</option>
                    <option value="5">5星</option>
                    <option value="4">4星</option>
                    <option value="3">3星</option>
                    <option value="2">2星及以下</option>
                </select>
            </div>
            <button class="action-btn primary" onclick="applyFilter()" style="width:100%;margin-top:20px;">应用筛选</button>
        </div>
    </div>

    <div class="panel" id="replyPanel">
        <div class="panel-header">
            <span class="panel-title">回复评价</span>
            <span class="panel-close" onclick="closePanel()">×</span>
        </div>
        <div class="panel-body">
            <div class="form-item">
                <label class="form-label">回复内容</label>
                <textarea class="form-input" id="replyContent" rows="4" placeholder="请输入回复内容"></textarea>
            </div>
            <button class="action-btn primary" onclick="submitReply()" style="width:100%;margin-top:20px;">提交回复</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="/business-common/common.js"></script>
    <script>
        let currentType = 'all';
        let currentReviewId = null;
        let page = 1;
        let loading = false;
        
        const accessToken = getUrlParam('access_token') || sessionStorage.getItem('access_token');
        const ecId = getUrlParam('ec_id') || sessionStorage.getItem('ec_id');
        const projectId = getUrlParam('project_id') || sessionStorage.getItem('project_id');
        const baseUrl = window.location.origin;
        
        function getUrlParam(name) {
            const params = new URLSearchParams(window.location.search);
            return params.get(name);
        }
        
        function switchTab(el, type) {
            document.querySelectorAll('.filter-item').forEach(item => item.classList.remove('active'));
            el.classList.add('active');
            currentType = type;
            page = 1;
            loadReviews();
        }
        
        function showFilter() {
            document.getElementById('mask').classList.add('show');
            document.getElementById('filterPanel').classList.add('show');
        }
        
        function showReply(id) {
            currentReviewId = id;
            document.getElementById('mask').classList.add('show');
            document.getElementById('replyPanel').classList.add('show');
        }
        
        function closePanel() {
            document.getElementById('mask').classList.remove('show');
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('show'));
        }
        
        function applyFilter() {
            closePanel();
            page = 1;
            loadReviews();
        }
        
        function submitReply() {
            const content = document.getElementById('replyContent').value.trim();
            if (!content) {
                showToast('请输入回复内容');
                return;
            }
            closePanel();
            showToast('回复成功');
            document.getElementById('replyContent').value = '';
        }
        
        function renderStar(rating) {
            return '★'.repeat(rating) + '☆'.repeat(5 - rating);
        }
        
        function loadReviews() {
            const list = document.getElementById('reviewList');
            if (page === 1) list.innerHTML = '<div class="loading">加载中...</div>';
            
            // 模拟数据
            const mockData = [
                { id: 1, reviewer: '张三', avatar: '张', time: '2024-01-15 14:30', rating: 5, content: '服务非常好，环境也很棒，下次还会再来！', tags: ['服务热情', '环境好'], target: '会议室A', hasReply: true, reply: '感谢您的认可，我们会继续努力！' },
                { id: 2, reviewer: '李四', avatar: '李', time: '2024-01-15 12:00', rating: 4, content: '整体不错，就是预约流程可以再简化一些。', tags: ['体验良好'], target: '工位B12', hasReply: false },
                { id: 3, reviewer: '王五', avatar: '王', time: '2024-01-14 16:45', rating: 5, content: '非常满意的体验，工作人员很专业。', tags: ['专业', '效率高'], target: '洽谈室C', hasReply: true, reply: '谢谢您的支持！' }
            ];
            
            setTimeout(() => {
                let html = '';
                mockData.forEach(item => {
                    html += `
                        <div class="review-card">
                            <div class="review-header">
                                <div class="reviewer-info">
                                    <div class="avatar">${item.avatar}</div>
                                    <div>
                                        <div class="reviewer-name">${item.reviewer}</div>
                                        <div class="review-time">${item.time}</div>
                                    </div>
                                </div>
                                <div class="rating">${renderStar(item.rating)}</div>
                            </div>
                            <div class="review-content">${item.content}</div>
                            <div class="review-tags">${item.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
                            <div class="review-target">
                                <span class="target-label">评价对象：</span>
                                <span class="target-name">${item.target}</span>
                            </div>
                            ${item.hasReply ? `
                                <div class="reply-section">
                                    <div class="reply-content">
                                        <span class="reply-label">商家回复：</span>${item.reply}
                                    </div>
                                </div>
                            ` : ''}
                            ${!item.hasReply ? `
                                <div class="action-bar">
                                    <button class="action-btn primary" onclick="showReply(${item.id})">回复</button>
                                    <button class="action-btn default">举报</button>
                                </div>
                            ` : ''}
                        </div>
                    `;
                });
                list.innerHTML = html;
            }, 300);
        }
        
        document.getElementById('searchInput').addEventListener('input', debounce(function() {
            page = 1;
            loadReviews();
        }, 300));
        
        function debounce(fn, delay) {
            let timer = null;
            return function() {
                if (timer) clearTimeout(timer);
                timer = setTimeout(() => fn.apply(this, arguments), delay);
            };
        }
        
        loadReviews();
    </script>
</body>
</html>
