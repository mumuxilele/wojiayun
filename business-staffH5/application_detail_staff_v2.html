<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>申请审批详情</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f6fa; min-height: 100vh; padding-bottom: 80px; }
        
        .header { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 16px; position: sticky; top: 0; z-index: 100; }
        .header h1 { font-size: 18px; text-align: center; }
        .header-back { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); font-size: 20px; cursor: pointer; }
        
        .status-card { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 24px 16px; text-align: center; }
        .status-icon { font-size: 48px; margin-bottom: 12px; }
        .status-text { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
        .status-step { font-size: 13px; opacity: 0.9; }
        
        .info-section { background: white; margin: 12px 16px; border-radius: 12px; padding: 16px; }
        .section-title { font-size: 15px; font-weight: 600; color: #333; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        
        .info-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f5f6fa; }
        .info-row:last-child { border-bottom: none; }
        .info-label { font-size: 14px; color: #999; }
        .info-value { font-size: 14px; color: #333; font-weight: 500; max-width: 60%; text-align: right; }
        
        .user-card { display: flex; align-items: center; gap: 12px; padding: 16px; background: #f8f9fa; border-radius: 12px; margin-bottom: 16px; }
        .user-avatar { width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, #667eea, #764ba2); color: white; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .user-info { flex: 1; }
        .user-name { font-size: 16px; font-weight: 600; color: #333; }
        .user-phone { font-size: 13px; color: #999; margin-top: 2px; }
        
        .timeline { position: relative; padding-left: 24px; }
        .timeline::before { content: ''; position: absolute; left: 7px; top: 0; bottom: 0; width: 2px; background: #e0e0e0; }
        .timeline-item { position: relative; padding-bottom: 20px; }
        .timeline-item:last-child { padding-bottom: 0; }
        .timeline-dot { position: absolute; left: -20px; width: 14px; height: 14px; border-radius: 50%; background: #667eea; border: 2px solid white; }
        .timeline-content { font-size: 14px; color: #333; }
        .timeline-remark { font-size: 13px; color: #666; margin-top: 4px; background: #f5f6fa; padding: 8px; border-radius: 6px; }
        .timeline-time { font-size: 12px; color: #999; margin-top: 4px; }
        
        .file-list { display: flex; flex-wrap: wrap; gap: 8px; }
        .file-item { background: #f5f6fa; padding: 8px 12px; border-radius: 6px; font-size: 13px; color: #667eea; cursor: pointer; }
        
        .action-bar { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 12px 16px; box-shadow: 0 -2px 8px rgba(0,0,0,0.08); display: flex; gap: 12px; }
        .btn { flex: 1; padding: 14px; border-radius: 24px; border: none; font-size: 15px; font-weight: 600; cursor: pointer; text-align: center; }
        .btn-success { background: #4caf50; color: white; }
        .btn-danger { background: #f44336; color: white; }
        .btn-default { background: #f5f6fa; color: #666; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: flex-end; }
        .modal.show { display: flex; }
        .modal-content { background: white; width: 100%; border-radius: 20px 20px 0 0; padding: 20px; max-height: 80vh; overflow-y: auto; }
        .modal-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; text-align: center; }
        .form-item { margin-bottom: 16px; }
        .form-label { display: block; font-size: 14px; color: #333; margin-bottom: 8px; }
        .form-textarea { width: 100%; padding: 12px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 15px; min-height: 100px; resize: vertical; }
        .modal-actions { display: flex; gap: 12px; margin-top: 20px; }
        .modal-btn { flex: 1; padding: 14px; border-radius: 24px; border: none; font-size: 15px; font-weight: 600; cursor: pointer; }
        
        .loading { text-align: center; padding: 40px; color: #999; }
    </style>
</head>
<body>
    <div class="header">
        <span class="header-back" onclick="history.back()">‹</span>
        <h1>审批详情</h1>
    </div>
    
    <div id="loading" class="loading">加载中...</div>
    <div id="content" style="display: none;">
        <div class="status-card" id="statusCard">
            <div class="status-icon" id="statusIcon">📋</div>
            <div class="status-text" id="statusText">待审批</div>
            <div class="status-step" id="statusStep">步骤 1/1</div>
        </div>
        
        <div class="info-section">
            <div class="section-title">👤 申请人信息</div>
            <div class="user-card">
                <div class="user-avatar">👤</div>
                <div class="user-info">
                    <div class="user-name" id="userName">-</div>
                    <div class="user-phone" id="userPhone">-</div>
                </div>
            </div>
            <div class="info-row">
                <span class="info-label">申请编号</span>
                <span class="info-value" id="appNo">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">申请类型</span>
                <span class="info-value" id="appType">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">提交时间</span>
                <span class="info-value" id="submitTime">-</span>
            </div>
        </div>
        
        <div class="info-section">
            <div class="section-title">📝 申请内容</div>
            <div class="info-row">
                <span class="info-label">申请标题</span>
                <span class="info-value" id="appTitle">-</span>
            </div>
            <div id="formDataList"></div>
        </div>
        
        <div class="info-section" id="attachmentSection" style="display: none;">
            <div class="section-title">📎 附件</div>
            <div class="file-list" id="fileList"></div>
        </div>
        
        <div class="info-section">
            <div class="section-title">📊 审批进度</div>
            <div class="timeline" id="timeline"></div>
        </div>
    </div>
    
    <div class="action-bar" id="actionBar" style="display: none;">
        <button class="btn btn-danger" onclick="showModal('reject')">拒绝</button>
        <button class="btn btn-success" onclick="showModal('approve')">通过</button>
    </div>
    
    <!-- 审批弹窗 -->
    <div class="modal" id="approveModal">
        <div class="modal-content">
            <div class="modal-title" id="modalTitle">审批意见</div>
            <div class="form-item">
                <label class="form-label">审批备注</label>
                <textarea class="form-textarea" id="approveRemark" placeholder="请输入审批备注..."></textarea>
            </div>
            <div class="modal-actions">
                <button class="modal-btn btn-default" onclick="closeModal()">取消</button>
                <button class="modal-btn btn-success" id="confirmBtn" onclick="submitApprove()">确认</button>
            </div>
        </div>
    </div>
    
    <script>
        const urlParams = new URLSearchParams(location.search);
        const token = urlParams.get('access_token') || localStorage.getItem('access_token') || '';
        const appId = urlParams.get('id');
        const API_BASE = location.origin;
        
        let appData = null;
        let currentAction = null;
        
        const statusMap = {
            'pending': { icon: '⏳', text: '待审批', color: '#ff9800' },
            'processing': { icon: '🔄', text: '审批中', color: '#2196f3' },
            'approved': { icon: '✅', text: '已通过', color: '#4caf50' },
            'rejected': { icon: '❌', text: '已拒绝', color: '#f44336' },
            'completed': { icon: '🎉', text: '已完成', color: '#9c27b0' }
        };
        
        async function loadDetail() {
            if (!appId) {
                alert('缺少申请ID');
                history.back();
                return;
            }
            
            try {
                const res = await fetch(`${API_BASE}/api/staff/applications/v2/${appId}?access_token=${token}`);
                const data = await res.json();
                
                if (!data.success) {
                    alert(data.msg || '加载失败');
                    return;
                }
                
                appData = data.data;
                renderDetail();
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';
                
                // 显示操作按钮
                if (['pending', 'processing'].includes(appData.status)) {
                    document.getElementById('actionBar').style.display = 'flex';
                }
            } catch (e) {
                alert('加载失败');
            }
        }
        
        function renderDetail() {
            const status = statusMap[appData.status] || statusMap['pending'];
            
            // 状态卡片
            document.getElementById('statusIcon').textContent = appData.type_icon || status.icon;
            document.getElementById('statusText').textContent = status.text;
            document.getElementById('statusStep').textContent = `步骤 ${appData.current_step || 0}/${appData.total_steps || 1}`;
            document.querySelector('.status-card').style.background = `linear-gradient(135deg, ${status.color}, ${adjustColor(status.color, -20)})`;
            
            // 申请人信息
            document.getElementById('userName').textContent = appData.user_name;
            document.getElementById('userPhone').textContent = appData.user_phone || '暂无电话';
            document.getElementById('appNo').textContent = appData.app_no;
            document.getElementById('appType').textContent = appData.type_name || appData.app_type;
            document.getElementById('submitTime').textContent = new Date(appData.created_at).toLocaleString('zh-CN');
            document.getElementById('appTitle').textContent = appData.title;
            
            // 表单数据
            renderFormData();
            
            // 附件
            if (appData.attachments && appData.attachments.length > 0) {
                renderAttachments();
            }
            
            // 审批进度
            renderTimeline();
        }
        
        function renderFormData() {
            let formData = appData.form_data || {};
            const schema = appData.form_schema || {};
            const fields = schema.fields || [];
            
            // 如果 form_data 是字符串，尝试解析为对象
            if (typeof formData === 'string') {
                try {
                    formData = JSON.parse(formData);
                } catch (e) {
                    // 解析失败，直接显示字符串
                    document.getElementById('formDataList').innerHTML = `
                        <div class="info-row">
                            <span class="info-label">详细内容</span>
                            <span class="info-value">${formData}</span>
                        </div>
                    `;
                    return;
                }
            }
            
            let html = '';
            
            // 如果有 schema 定义，按 schema 显示
            if (fields.length > 0) {
                fields.forEach(field => {
                    const value = formData[field.name];
                    if (value !== undefined && value !== null && value !== '') {
                        html += `
                            <div class="info-row">
                                <span class="info-label">${field.label || field.name}</span>
                                <span class="info-value">${formatValue(value)}</span>
                            </div>
                        `;
                    }
                });
            } else {
                // 没有 schema，直接遍历 form_data 显示
                for (const [key, value] of Object.entries(formData)) {
                    if (value !== undefined && value !== null && value !== '') {
                        html += `
                            <div class="info-row">
                                <span class="info-label">${key}</span>
                                <span class="info-value">${formatValue(value)}</span>
                            </div>
                        `;
                    }
                }
            }
            
            document.getElementById('formDataList').innerHTML = html || '<div style="color: #999; padding: 20px;">暂无详细内容</div>';
        }
        
        // 格式化显示值
        function formatValue(value) {
            if (typeof value === 'object') {
                if (Array.isArray(value)) {
                    return value.join(', ');
                }
                return JSON.stringify(value);
            }
            return String(value);
        }
        
        function renderAttachments() {
            const html = appData.attachments.map(att => `
                <div class="file-item" onclick="viewFile('${att.file_url}')">${att.file_name}</div>
            `).join('');
            
            document.getElementById('fileList').innerHTML = html;
            document.getElementById('attachmentSection').style.display = 'block';
        }
        
        function renderTimeline() {
            const history = appData.approve_history || [];
            
            let html = `
                <div class="timeline-item">
                    <div class="timeline-dot" style="background: #667eea;"></div>
                    <div class="timeline-content">
                        <div>提交申请</div>
                        <div class="timeline-time">${new Date(appData.created_at).toLocaleString('zh-CN')}</div>
                    </div>
                </div>
            `;
            
            history.forEach(item => {
                const actionText = { 'approve': '通过', 'reject': '拒绝', 'transfer': '转交' }[item.action] || item.action;
                html += `
                    <div class="timeline-item">
                        <div class="timeline-dot" style="background: ${item.action === 'reject' ? '#f44336' : '#667eea'};"></div>
                        <div class="timeline-content">
                            <div>${item.approver_name} ${actionText}了申请</div>
                            ${item.remark ? `<div class="timeline-remark">${item.remark}</div>` : ''}
                            <div class="timeline-time">${item.time}</div>
                        </div>
                    </div>
                `;
            });
            
            document.getElementById('timeline').innerHTML = html;
        }
        
        function adjustColor(color, amount) {
            const num = parseInt(color.replace('#', ''), 16);
            const r = Math.max(0, Math.min(255, (num >> 16) + amount));
            const g = Math.max(0, Math.min(255, ((num >> 8) & 0x00FF) + amount));
            const b = Math.max(0, Math.min(255, (num & 0x0000FF) + amount));
            return `#${(0x1000000 + r * 0x10000 + g * 0x100 + b).toString(16).slice(1)}`;
        }
        
        function showModal(action) {
            currentAction = action;
            document.getElementById('modalTitle').textContent = action === 'approve' ? '通过申请' : '拒绝申请';
            document.getElementById('approveRemark').value = '';
            document.getElementById('approveModal').classList.add('show');
        }
        
        function closeModal() {
            document.getElementById('approveModal').classList.remove('show');
            currentAction = null;
        }
        
        async function submitApprove() {
            if (!currentAction) return;
            
            const remark = document.getElementById('approveRemark').value.trim();
            
            try {
                const res = await fetch(`${API_BASE}/api/staff/applications/v2/${appId}/approve?access_token=${token}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Token': token },
                    body: JSON.stringify({ action: currentAction, remark })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    alert(currentAction === 'approve' ? '已通过申请' : '已拒绝申请');
                    closeModal();
                    location.reload();
                } else {
                    alert(data.msg || '操作失败');
                }
            } catch (e) {
                alert('操作失败');
            }
        }
        
        function viewFile(url) {
            window.open(url, '_blank');
        }
        
        // 初始化
        loadDetail();
    </script>
</body>
</html>
