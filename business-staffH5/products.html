<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>商品管理</title>
    <link rel="stylesheet" href="/business-common/common.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }
        
        .header-fixed { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: #fff; }
        
        .search-bar { display: flex; gap: 10px; padding: 12px 20px; border-bottom: 1px solid #f0f0f0; }
        .search-input { flex: 1; display: flex; align-items: center; background: #f5f5f5; border-radius: 20px; padding: 8px 15px; }
        .search-input input { flex: 1; border: none; background: transparent; font-size: 14px; outline: none; }
        .add-btn { width: 40px; height: 40px; background: #30c2b3; color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        
        .filter-bar { display: flex; padding: 0 20px; border-bottom: 1px solid #f0f0f0; overflow-x: auto; }
        .filter-item { padding: 12px 16px; font-size: 14px; color: #666; white-space: nowrap; position: relative; }
        .filter-item.active { color: #30c2b3; font-weight: 500; }
        .filter-item.active::after { content: ''; position: absolute; bottom: 0; left: 16px; right: 16px; height: 2px; background: #30c2b3; }
        
        .content { padding-top: 105px; padding-bottom: 20px; }
        
        .product-card { display: flex; background: #fff; margin: 12px 20px; padding: 16px; border-radius: 12px; }
        .product-image { width: 80px; height: 80px; border-radius: 8px; background: #f5f5f5; margin-right: 12px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 32px; }
        .product-info { flex: 1; min-width: 0; }
        .product-name { font-size: 15px; font-weight: 500; color: #333; margin-bottom: 6px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .product-desc { font-size: 12px; color: #999; margin-bottom: 8px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .product-meta { display: flex; justify-content: space-between; align-items: center; }
        .product-price { font-size: 16px; color: #f44336; font-weight: 500; }
        .product-stock { font-size: 12px; color: #666; }
        .product-status { padding: 2px 8px; border-radius: 4px; font-size: 11px; }
        .status-on { background: #e8f5e9; color: #4caf50; }
        .status-off { background: #f5f5f5; color: #999; }
        
        .product-actions { display: flex; gap: 8px; margin-top: 12px; padding-top: 12px; border-top: 1px solid #f0f0f0; }
        .btn { flex: 1; padding: 8px; text-align: center; border-radius: 6px; font-size: 13px; border: none; }
        .btn-primary { background: #30c2b3; color: #fff; }
        .btn-default { background: #f5f5f5; color: #666; }
        .btn-danger { background: #ffebee; color: #f44336; }
        
        .loading, .empty { text-align: center; padding: 40px; color: #999; font-size: 14px; }
        
        .panel { position: fixed; left: 0; right: 0; bottom: 0; background: #fff; border-radius: 16px 16px 0 0; transform: translateY(100%); transition: transform 0.3s; z-index: 200; max-height: 80vh; overflow-y: auto; }
        .panel.show { transform: translateY(0); }
        .panel-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid #f0f0f0; }
        .panel-title { font-size: 16px; font-weight: 500; }
        .panel-close { font-size: 20px; color: #999; }
        .panel-body { padding: 20px; }
        .form-item { margin-bottom: 16px; }
        .form-label { font-size: 14px; color: #666; margin-bottom: 8px; display: block; }
        .form-input { width: 100%; padding: 12px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 14px; }
        .form-textarea { width: 100%; height: 80px; padding: 12px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 14px; resize: none; }
        
        .mask { position: fixed; inset: 0; background: rgba(0,0,0,0.5); opacity: 0; visibility: hidden; transition: all 0.3s; z-index: 150; }
        .mask.show { opacity: 1; visibility: visible; }
        
        #toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.7); color: #fff; padding: 12px 24px; border-radius: 6px; font-size: 14px; display: none; z-index: 300; }
    </style>
</head>
<body>
    <div class="header-fixed">
        <div class="search-bar">
            <div class="search-input">
                <span>🔍</span>
                <input type="text" id="keyword" placeholder="搜索商品名称">
            </div>
            <div class="add-btn" onclick="showAddPanel()">+</div>
        </div>
        <div class="filter-bar">
            <div class="filter-item active" data-status="" onclick="switchTab(this, '')">全部</div>
            <div class="filter-item" data-status="on" onclick="switchTab(this, 'on')">在售</div>
            <div class="filter-item" data-status="off" onclick="switchTab(this, 'off')">下架</div>
        </div>
    </div>

    <div class="content" id="productList"></div>

    <div class="mask" id="mask" onclick="closePanel()"></div>
    <div class="panel" id="productPanel">
        <div class="panel-header">
            <span class="panel-title" id="panelTitle">新增商品</span>
            <span class="panel-close" onclick="closePanel()">×</span>
        </div>
        <div class="panel-body">
            <div class="form-item">
                <label class="form-label">商品名称</label>
                <input type="text" class="form-input" id="prodName" placeholder="请输入商品名称">
            </div>
            <div class="form-item">
                <label class="form-label">商品描述</label>
                <textarea class="form-textarea" id="prodDesc" placeholder="请输入商品描述"></textarea>
            </div>
            <div class="form-item">
                <label class="form-label">价格</label>
                <input type="number" class="form-input" id="prodPrice" placeholder="请输入价格">
            </div>
            <div class="form-item">
                <label class="form-label">库存</label>
                <input type="number" class="form-input" id="prodStock" placeholder="请输入库存">
            </div>
            <button class="btn btn-primary" onclick="saveProduct()" style="width:100%;margin-top:20px;">保存</button>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        let currentStatus = '';
        let editingId = null;
        
        const token = localStorage.getItem('access_token') || new URLSearchParams(location.search).get('access_token') || '';
        
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 2000);
        }
        
        function escapeHtml(text) {
            if (text === null || text === undefined) return '';
            return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
        }
        
        function switchTab(el, status) {
            document.querySelectorAll('.filter-item').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            currentStatus = status;
            loadProducts();
        }
        
        function showAddPanel() {
            editingId = null;
            document.getElementById('panelTitle').textContent = '新增商品';
            document.getElementById('prodName').value = '';
            document.getElementById('prodDesc').value = '';
            document.getElementById('prodPrice').value = '';
            document.getElementById('prodStock').value = '';
            document.getElementById('mask').classList.add('show');
            document.getElementById('productPanel').classList.add('show');
        }
        
        function showEditPanel(id) {
            editingId = id;
            document.getElementById('panelTitle').textContent = '编辑商品';
            document.getElementById('mask').classList.add('show');
            document.getElementById('productPanel').classList.add('show');
        }
        
        function closePanel() {
            document.getElementById('mask').classList.remove('show');
            document.getElementById('productPanel').classList.remove('show');
        }
        
        function saveProduct() {
            const name = document.getElementById('prodName').value.trim();
            if (!name) { showToast('请输入商品名称'); return; }
            closePanel();
            showToast(editingId ? '修改成功' : '添加成功');
            loadProducts();
        }
        
        function toggleStatus(id, current) {
            showToast(current === 'on' ? '已下架' : '已上架');
        }
        
        function loadProducts() {
            const list = document.getElementById('productList');
            list.innerHTML = '<div class="loading">加载中...</div>';
            
            // 模拟数据
            const mockData = [
                { id: 1, name: '办公桌椅套装', desc: '人体工学设计，舒适办公', price: 1299, stock: 50, status: 'on' },
                { id: 2, name: '会议室白板', desc: '磁性可擦写，120x90cm', price: 399, stock: 20, status: 'on' },
                { id: 3, name: '投影仪', desc: '高清1080P，无线投屏', price: 2899, stock: 5, status: 'off' },
                { id: 4, name: '文件柜', desc: '四层抽屉，带锁设计', price: 599, stock: 15, status: 'on' }
            ];
            
            setTimeout(() => {
                let html = '';
                mockData.forEach(p => {
                    html += `
                        <div class="product-card">
                            <div class="product-image">📦</div>
                            <div class="product-info">
                                <div class="product-name">${escapeHtml(p.name)}</div>
                                <div class="product-desc">${escapeHtml(p.desc)}</div>
                                <div class="product-meta">
                                    <span class="product-price">¥${p.price}</span>
                                    <span class="product-stock">库存: ${p.stock}</span>
                                    <span class="product-status status-${p.status}">${p.status === 'on' ? '在售' : '下架'}</span>
                                </div>
                                <div class="product-actions">
                                    <button class="btn btn-primary" onclick="showEditPanel(${p.id})">编辑</button>
                                    <button class="btn btn-default" onclick="toggleStatus(${p.id}, '${p.status}')">${p.status === 'on' ? '下架' : '上架'}</button>
                                    <button class="btn btn-danger">删除</button>
                                </div>
                            </div>
                        </div>
                    `;
                });
                list.innerHTML = html;
            }, 300);
        }
        
        document.getElementById('keyword').addEventListener('input', function() {
            clearTimeout(window.searchTimer);
            window.searchTimer = setTimeout(loadProducts, 300);
        });
        
        loadProducts();
    </script>
</body>
</html>
