<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订单管理 - 员工端</title>
    <link rel="stylesheet" href="../business-common/list-style.css">
    <style>
        /* 页面特有样式 */
        .actions .link { color: var(--el-color-primary); cursor: pointer; margin-right: 10px; }
        .actions .link:hover { text-decoration: underline; }
        .actions .link.danger { color: var(--el-color-danger); }
        /* 弹窗样式保留 */
        /* 发货弹窗 */
        .modal-mask { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.5); z-index: 100; }
    </style>
</head>
<body class="wy-design-list">
    <!-- 顶部区域 -->
    <div class="wy-design-list_top">
        <div class="wy-design-list_top_title">
            <h1 class="wy-design-list_title">订单管理 - 员工端</h1>
            <div class="wy-design-list_space"></div>
            <div class="wy-design-list_btn-group">
                <div class="wy-design-list_btn">
                    <button type="button" class="el-button el-button--primary el-button--small" onclick="loadList(1)">
                        <span>搜索</span>
                    </button>
                </div>
                <div class="wy-design-list_btn">
                    <button type="button" class="el-button el-button--small" onclick="resetSearch()">
                        <span>重置</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 筛选区域 -->
    <div class="wy-design-list_filter">
        <div class="wy-design-list_other">
            <div class="el-input el-input--small" style="width: 200px;">
                <input type="text" id="searchInput" placeholder="搜索订单号、用户名..." class="el-input__inner">
            </div>
        </div>
        <div class="wy-design-list_other">
            <select id="filter1" class="el-input__inner" style="width: 130px;">
                
                <option value="">请选择物流公司</option>
                <option value="顺丰速运">顺丰速运</option>
                <option value="圆通速递">圆通速递</option>
                <option value="中通快递">中通快递</option>
                <option value="韵达快递">韵达快递</option>
                <option value="申通快递">申通快递</option>
                <option value="邮政EMS">邮政EMS</option>
                <option value="京东物流">京东物流</option>
                <option value="极兔速递">极兔速递</option>
                <option value="其他">其他</option>
            
            </select>
        </div>
    </div>

    <!-- 表格区域 -->
    <div class="wy-design-table wy-design-table_main wy-design-table_has-bar">
        <div class="wy-design-table_bar">
            <i class="wy-design-table_set el-icon-setting" title="列设置"></i>
            <span class="wy-design-table_total">共 <em id="totalCount">0</em> 条</span>
            <div class="wy-pages">
                <div class="wy-pages_total">第<em id="currentPage">1</em>/<em id="totalPages">1</em>页</div>
                <div class="wy-pages_prev el-icon-arrow-left" id="prevBtn" onclick="changePage(-1)"></div>
                <div class="wy-pages_next el-icon-arrow-right" id="nextBtn" onclick="changePage(1)"></div>
            </div>
        </div>
        <table class="el-table el-table--fit el-table--border el-table--enable-row-hover">
            <thead class="el-table__header">
                <tr>
                    <th><div class="cell">名称</div></th>
                    <th><div class="cell">操作</div></th>
                </tr>
            </thead>
            <tbody class="el-table__body" id="listBody">
                <tr><td colspan="10" style="text-align: center; padding: 60px; color: var(--el-text-secondary);">加载中...</td></tr>
            </tbody>
        </table>
    </div>

    
    <div class="modal-mask" id="shipModal">
        <div class="modal">
            <h3>📦 确认发货</h3>
            <select id="logisticsCompany">
                <option value="">请选择物流公司</option>
                <option value="顺丰速运">顺丰速运</option>
                <option value="圆通速递">圆通速递</option>
                <option value="中通快递">中通快递</option>
                <option value="韵达快递">韵达快递</option>
                <option value="申通快递">申通快递</option>
                <option value="邮政EMS">邮政EMS</option>
                <option value="京东物流">京东物流</option>
                <option value="极兔速递">极兔速递</option>
                <option value="其他">其他</option>
            </select>
            <input id="trackingNo" type="text" placeholder="请输入运单号（可选）">
            <div class="modal-btns">
                <button class="btn-cancel-modal" onclick="closeShipModal()">取消</button>
                <button class="btn-confirm" onclick="confirmShip()">确认发货</button>
            </div>
        </div>
    </div>

    

    <script>
    const urlParams = new URLSearchParams(location.search);
        let token = urlParams.get('access_token');
        let isdev = urlParams.get('isdev') || '0';
        
        if (token) {
            localStorage.setItem('staff_token', token);
            localStorage.setItem('staff_isdev', isdev);
        } else {
            token = localStorage.getItem('staff_token');
            isdev = localStorage.getItem('staff_isdev') || '0';
        }

        if (!token) {
            document.body.innerHTML = '<div class="login-tip"><h2>请先登录</h2></div>';
            throw new Error('No token');
        }

        function goBack() {
            location.href = 'index.html?access_token=' + encodeURIComponent(token) + '&isdev=' + isdev;
            return false;
        }

        function api(url, method, body) {
            const sep = url.includes('?') ? '&' : '?';
            return fetch(url + sep + 'access_token=' + encodeURIComponent(token) + '&isdev=' + isdev, {
                method: method || 'GET',
                headers: body ? { 'Content-Type': 'application/json' } : {},
                body: body ? JSON.stringify(body) : undefined
            }).then(r => r.json());
        }

        let currentStatus = '';
        let currentPage = 1;
        let totalPages = 1;
        let searchTimer = null;
        let shipOrderId = null;

        const STATUS_TEXT = {
            pending: '待支付', paid: '待发货', shipped: '已发货',
            completed: '已完成', cancelled: '已取消',
            refunding: '退款中', refunded: '已退款'
        };

        function getStatusText(s) { return STATUS_TEXT[s] || s; }
        function getStatusClass(s) { return 'order-status status-' + (s || 'pending'); }

        function onSearch() {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(() => { currentPage = 1; loadList(); }, 400);
        }

        function changePage(delta) {
            const np = currentPage + delta;
            if (np < 1 || np > totalPages) return;
            currentPage = np;
            loadList();
        }

        // 渲染操作按钮
        function renderActions(o) {
            const status = o.order_status || o.status || 'pending';
            const id = o.id;
            let btns = '';
            if (status === 'paid') {
                btns += '<button class="action-btn btn-ship" onclick="openShipModal(' + id + ')">📦 发货</button>';
            }
            if (status === 'shipped') {
                btns += '<button class="action-btn btn-complete" onclick="completeOrder(' + id + ')">✅ 确认完成</button>';
            }
            if (status === 'refunding') {
                btns += '<button class="action-btn btn-refund-approve" onclick="handleRefund(' + id + ',\'approve\')">✅ 同意退款</button>';
                btns += '<button class="action-btn btn-refund-reject" onclick="handleRefund(' + id + ',\'reject\')">❌ 拒绝退款</button>';
            }
            btns += '<button class="action-btn btn-view" onclick="viewOrder(' + id + ')">查看详情</button>';
            return btns;
        }

        async function loadList() {
            const keyword = document.getElementById('searchInput').value.trim();
            let url = '/api/staff/orders?page=' + currentPage + '&page_size=15' +
                (currentStatus ? '&status=' + currentStatus : '') +
                (keyword ? '&keyword=' + encodeURIComponent(keyword) : '');
            document.getElementById('list').innerHTML = '<div style="text-align: center; padding: 60px; color: var(--el-text-secondary);">加载中...</div>';
            try {
                const data = await api(url);
                if (data.success && data.data && data.data.items && data.data.items.length > 0) {
                    document.getElementById('list').innerHTML = data.data.items.map(o => {
                        const status = o.order_status || o.status || 'pending';
                        const amount = parseFloat(o.actual_amount || o.total_amount || 0).toFixed(2);
                        const goods = o.goods_name ? '<div class="order-goods">商品: ' + o.goods_name + '</div>' : '';
                        const logistics = o.tracking_no ? '<span>物流: ' + (o.logistics_company || '') + ' ' + o.tracking_no + '</span>' : '';
                        return '<div class="item">' +
                            '<div class="item-header">' +
                                '<span class="order-no">📦 ' + (o.order_no || '') + '</span>' +
                                '<span class="' + getStatusClass(status) + '">' + getStatusText(status) + '</span>' +
                            '</div>' +
                            '<div class="order-amount">¥' + amount + '</div>' +
                            goods +
                            '<div class="order-info">' +
                                '<span>👤 ' + (o.user_name || '-') + '</span>' +
                                '<span>🕐 ' + (o.created_at || o.create_time || '') + '</span>' +
                                logistics +
                            '</div>' +
                            '<div class="order-actions">' + renderActions(o) + '</div>' +
                        '</div>';
                    }).join('');

                    totalPages = data.data.pages || 1;
                    if (totalPages > 1) {
                        document.getElementById('pagination').style.display = 'flex';
                        document.getElementById('pageInfo').textContent = currentPage + ' / ' + totalPages + ' 页，共 ' + data.data.total + ' 条';
                        document.getElementById('btnPrev').disabled = currentPage <= 1;
                        document.getElementById('btnNext').disabled = currentPage >= totalPages;
                    } else {
                        document.getElementById('pagination').style.display = 'none';
                    }
                } else {
                    document.getElementById('list').innerHTML = '<div class="empty">暂无订单</div>';
                    document.getElementById('pagination').style.display = 'none';
                }
            } catch(e) {
                document.getElementById('list').innerHTML = '<div class="empty">加载失败</div>';
            }
        }

        // 发货
        function openShipModal(orderId) {
            shipOrderId = orderId;
            document.getElementById('trackingNo').value = '';
            document.getElementById('logisticsCompany').value = '';
            document.getElementById('shipModal').classList.add('show');
        }

        function closeShipModal() {
            document.getElementById('shipModal').classList.remove('show');
            shipOrderId = null;
        }

        async function confirmShip() {
            if (!shipOrderId) return;
            const company = document.getElementById('logisticsCompany').value;
            const trackingNo = document.getElementById('trackingNo').value.trim();
            try {
                const data = await api('/api/staff/orders/' + shipOrderId + '/status', 'POST', {
                    status: 'shipped',
                    logistics_company: company,
                    tracking_no: trackingNo
                });
                if (data.success) {
                    closeShipModal();
                    alert('发货成功！');
                    loadList();
                } else {
                    alert(data.msg || '发货失败');
                }
            } catch(e) {
                alert('操作失败，请稍后重试');
            }
        }

        // 确认完成
        async function completeOrder(orderId) {
            if (!confirm('确认将订单标记为已完成？')) return;
            try {
                const data = await api('/api/staff/orders/' + orderId + '/status', 'POST', { status: 'completed' });
                if (data.success) {
                    alert('操作成功');
                    loadList();
                } else {
                    alert(data.msg || '操作失败');
                }
            } catch(e) {
                alert('操作失败，请稍后重试');
            }
        }

        // 退款处理
        async function handleRefund(orderId, action) {
            const actionText = action === 'approve' ? '同意退款' : '拒绝退款';
            if (!confirm('确认' + actionText + '？')) return;
            const reason = action === 'reject' ? prompt('请输入拒绝原因：') : '';
            try {
                const data = await api('/api/staff/orders/' + orderId + '/refund', 'POST', {
                    action: action,
                    reason: reason || ''
                });
                if (data.success) {
                    alert(actionText + '成功');
                    loadList();
                } else {
                    alert(data.msg || '操作失败');
                }
            } catch(e) {
                alert('操作失败，请稍后重试');
            }
        }

        // 查看详情
        async function viewOrder(orderId) {
            try {
                const data = await api('/api/staff/orders/' + orderId);
                if (!data.success || !data.data) {
                    alert('获取订单详情失败');
                    return;
                }
                const o = data.data;
                const STATUS_TEXT_MAP = {pending:'待支付',paid:'待发货',shipped:'已发货',completed:'已完成',cancelled:'已取消',refunding:'退款中',refunded:'已退款'};
                const PAY_TEXT = {unpaid:'未支付',paid:'已支付',refunded:'已退款',partial_refund:'部分退款'};
                let detail = '【订单详情】\n';
                detail += '订单号: ' + (o.order_no || '-') + '\n';
                detail += '用户: ' + (o.user_name || '-') + '  ' + (o.user_phone || '') + '\n';
                detail += '商品: ' + (o.goods_name || '-') + '\n';
                detail += '总金额: ¥' + parseFloat(o.total_amount || 0).toFixed(2) + '\n';
                detail += '实付: ¥' + parseFloat(o.actual_amount || 0).toFixed(2) + '\n';
                detail += '支付状态: ' + (PAY_TEXT[o.pay_status] || o.pay_status || '-') + '\n';
                detail += '订单状态: ' + (STATUS_TEXT_MAP[o.order_status] || o.order_status || '-') + '\n';
                if (o.tracking_no) detail += '物流: ' + (o.logistics_company || '') + ' ' + o.tracking_no + '\n';
                if (o.address_info) detail += '收货地址: ' + o.address_info + '\n';
                if (o.remark) detail += '备注: ' + o.remark + '\n';
                detail += '创建时间: ' + (o.created_at || '-');
                alert(detail);
            } catch(e) {
                alert('加载失败，请稍后重试');
            }
        }

        document.querySelectorAll('.filter-item').forEach(el => {
            el.addEventListener('click', () => {
                document.querySelectorAll('.filter-item').forEach(e => e.classList.remove('active'));
                el.classList.add('active');
                currentStatus = el.dataset.status;
                currentPage = 1;
                loadList();
            });
        });

        // 点击遮罩关闭弹窗
        document.getElementById('shipModal').addEventListener('click', function(e) {
            if (e.target === this) closeShipModal();
        });

        loadList();
    </script>
</body>
</html>
