<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工作台 - 员工端</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f5f5f5; min-height: 100vh; }
        
        .header { background: linear-gradient(135deg, #11998e, #38ef7d); color: white; padding: 20px; }
        .header-top { display: flex; justify-content: space-between; align-items: flex-start; }
        .header h1 { font-size: 20px; margin-bottom: 5px; }
        .header-sub { font-size: 13px; opacity: 0.9; }
        .ws-status { font-size: 11px; padding: 3px 8px; border-radius: 10px; background: rgba(255,255,255,0.2); display: flex; align-items: center; gap: 4px; }
        .ws-dot { width: 6px; height: 6px; border-radius: 50%; background: #90ee90; animation: ws-pulse 2s infinite; }
        .ws-dot.offline { background: #ff9999; animation: none; }
        @keyframes ws-pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
        
        .stats-row { display: flex; gap: 10px; margin-top: 15px; }
        .stat-card { background: rgba(255,255,255,0.2); padding: 12px; border-radius: 10px; flex: 1; text-align: center; cursor: pointer; }
        .stat-card:active { background: rgba(255,255,255,0.3); }
        .stat-num { font-size: 24px; font-weight: 600; }
        .stat-label { font-size: 11px; opacity: 0.85; margin-top: 2px; }
        
        /* 菜单行 */
        .menu-row { display: flex; gap: 10px; padding: 15px; background: white; margin: 10px 15px; border-radius: 12px; }
        .menu-item { flex: 1; text-align: center; padding: 12px 8px; border-radius: 8px; cursor: pointer; position: relative; }
        .menu-item:active { background: #f5f5f5; }
        .menu-icon { font-size: 26px; margin-bottom: 4px; }
        .menu-text { font-size: 12px; color: #333; font-weight: 500; }
        /* 角标 */
        .m-badge { position: absolute; top: 4px; right: 10px; background: #f5222d; color: white; font-size: 10px; min-width: 16px; height: 16px; line-height: 16px; border-radius: 8px; padding: 0 4px; text-align: center; display: none; }
        
        /* 实时提醒悬浮气泡 */
        .alert-bubble { position: fixed; top: 10px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 20px; border-radius: 24px; font-size: 13px; z-index: 1000; box-shadow: 0 4px 16px rgba(0,0,0,0.2); display: flex; align-items: center; gap: 10px; max-width: 90%; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
        .alert-bubble.show { opacity: 1; pointer-events: auto; }
        .alert-bubble .close-btn { color: rgba(255,255,255,0.7); font-size: 16px; cursor: pointer; flex-shrink: 0; }
        
        .section { background: white; margin: 0 15px 15px; border-radius: 12px; overflow: hidden; }
        .section-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; border-bottom: 1px solid #f5f5f5; }
        .section-title { font-size: 15px; font-weight: 600; color: #333; }
        .section-more { font-size: 12px; color: #11998e; text-decoration: none; }
        
        .filter-bar { display: flex; gap: 8px; padding: 10px 15px; background: #fafafa; overflow-x: auto; }
        .filter-tag { padding: 5px 12px; border-radius: 15px; font-size: 12px; white-space: nowrap; background: #f0f0f0; color: #666; cursor: pointer; }
        .filter-tag.active { background: #11998e; color: white; }
        
        .record-item { display: flex; padding: 12px 15px; border-bottom: 1px solid #f5f5f5; cursor: pointer; }
        .record-item:last-child { border-bottom: none; }
        .record-item:active { background: #fafafa; }
        .record-icon { width: 36px; height: 36px; background: #f5f5f5; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; margin-right: 10px; }
        .record-info { flex: 1; min-width: 0; }
        .record-title { font-size: 14px; color: #333; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .record-desc { font-size: 12px; color: #999; margin-top: 2px; }
        .record-status { font-size: 11px; padding: 2px 6px; border-radius: 4px; flex-shrink: 0; }
        
        .status-pending { background: #fff7e6; color: #fa8c16; }
        .status-processing { background: #e6f7ff; color: #1890ff; }
        .status-completed { background: #f6ffed; color: #52c41a; }
        
        .chart-section { padding: 15px; }
        .chart-bar { display: flex; align-items: center; margin-bottom: 8px; }
        .chart-label { width: 70px; font-size: 12px; color: #666; }
        .chart-bar-outer { flex: 1; height: 18px; background: #f0f0f0; border-radius: 4px; overflow: hidden; }
        .chart-bar-inner { height: 100%; background: linear-gradient(90deg, #11998e, #38ef7d); border-radius: 4px; }
        .chart-value { width: 40px; text-align: right; font-size: 12px; color: #333; margin-left: 8px; }
        
        .empty { text-align: center; padding: 25px; color: #bbb; font-size: 13px; }
        .login-tip { text-align: center; padding: 60px 20px; color: #999; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-top">
            <div>
                <h1>🏢 工作台</h1>
                <div class="header-sub" id="staffName">员工端</div>
            </div>
            <div class="ws-status" id="wsStatus">
                <span class="ws-dot offline" id="wsDot"></span>
                <span id="wsLabel">连接中</span>
            </div>
        </div>
        <div class="stats-row">
            <div class="stat-card" onclick="goTo('application_list.html?status=pending')"><div class="stat-num" id="statPending">0</div><div class="stat-label">待处理</div></div>
            <div class="stat-card" onclick="goTo('application_list.html?status=processing')"><div class="stat-num" id="statProcessing">0</div><div class="stat-label">处理中</div></div>
            <div class="stat-card" onclick="goTo('order_list.html')"><div class="stat-num" id="statTodayOrders">0</div><div class="stat-label">今日订单</div></div>
            <div class="stat-card"><div class="stat-num" id="statIncome">¥0</div><div class="stat-label">今日收入</div></div>
        </div>
    </div>

    <!-- 实时提醒气泡 -->
    <div class="alert-bubble" id="alertBubble">
        <span id="alertText">新消息</span>
        <span class="close-btn" onclick="document.getElementById('alertBubble').classList.remove('show')">×</span>
    </div>

    <div class="menu-row">
        <div class="menu-item" onclick="goTo('application_list.html')">
            <span class="m-badge" id="badge-app">0</span>
            <div class="menu-icon">📋</div>
            <div class="menu-text">申请单</div>
        </div>
        <div class="menu-item" onclick="goTo('order_list.html')">
            <span class="m-badge" id="badge-order">0</span>
            <div class="menu-icon">📦</div>
            <div class="menu-text">订单</div>
        </div>
        <div class="menu-item" onclick="goTo('refunds.html')">
            <span class="m-badge" id="badge-refund">0</span>
            <div class="menu-icon">💰</div>
            <div class="menu-text">退款</div>
        </div>
        <div class="menu-item" onclick="goTo('members.html')">
            <div class="menu-icon">👥</div>
            <div class="menu-text">会员</div>
        </div>
        <div class="menu-item" onclick="goTo('bookings.html')">
            <span class="m-badge" id="badge-booking">0</span>
            <div class="menu-icon">📅</div>
            <div class="menu-text">预约</div>
        </div>
    </div>

    <div class="menu-row" style="margin-top:0">
        <div class="menu-item" onclick="goTo('bookings.html?tab=verify')">
            <div class="menu-icon">✅</div>
            <div class="menu-text">核销站</div>
        </div>
        <div class="menu-item" onclick="goTo('statistics.html')">
            <div class="menu-icon">📊</div>
            <div class="menu-text">统计</div>
        </div>
        <div class="menu-item" onclick="goTo('products.html')">
            <div class="menu-icon">🛒</div>
            <div class="menu-text">商品</div>
        </div>
        <div class="menu-item" onclick="goTo('checkin_stats.html')">
            <div class="menu-icon">📅</div>
            <div class="menu-text">签到</div>
        </div>
    </div>

    <div class="menu-row" style="margin-top:0">
        <div class="menu-item" onclick="goTo('notifications.html')">
            <div class="menu-icon">🔔</div>
            <div class="menu-text">通知</div>
        </div>
        <div class="menu-item" onclick="goTo('feedback.html')">
            <div class="menu-icon">💬</div>
            <div class="menu-text">反馈</div>
        </div>
        <div class="menu-item" onclick="goTo('reviews.html')">
            <span class="m-badge" id="badge-review"></span>
            <div class="menu-icon">⭐</div>
            <div class="menu-text">评价管理</div>
        </div>
        <div class="menu-item" style="flex:0;visibility:hidden">
            <div class="menu-icon"></div>
            <div class="menu-text"></div>
        </div>
    </div>

    <!-- V31.0 新增：今日概览 + 待办聚合 -->
    <div style="margin:0 15px 15px;background:white;border-radius:12px;padding:14px;box-shadow:0 1px 4px rgba(0,0,0,.06)">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
            <span style="font-size:15px;font-weight:600;color:#333">📋 今日概览</span>
            <div style="display:flex;gap:16px;font-size:12px;color:#666">
                <span>收入 <b id="todayIncome" style="color:#f44336">¥0</b></span>
                <span>订单 <b id="todayOrderCnt" style="color:#1890ff">0</b> 单</span>
            </div>
        </div>
        <div style="display:flex;gap:8px" id="todoRow">
            <div style="flex:1;text-align:center;padding:16px;color:#bbb">加载中...</div>
        </div>
    </div>

    <div class="section">
        <div class="section-header">
            <span class="section-title">待处理申请</span>
            <a href="javascript:void(0)" class="section-more" onclick="goTo('application_list.html?status=pending')">更多 ></a>
        </div>
        <div class="filter-bar">
            <div class="filter-tag active" data-type="">全部</div>
            <div class="filter-tag" data-type="repair">报修</div>
            <div class="filter-tag" data-type="booking">预约</div>
            <div class="filter-tag" data-type="complaint">投诉</div>
        </div>
        <div id="pendingList"><div class="empty">加载中...</div></div>
    </div>

    <div class="section">
        <div class="section-header"><span class="section-title">申请统计</span></div>
        <div class="chart-section" id="appChart"><div class="empty">加载中...</div></div>
    </div>

    <div class="section">
        <div class="section-header"><span class="section-title">订单统计</span></div>
        <div class="chart-section" id="orderChart"><div class="empty">加载中...</div></div>
    </div>

    <script>
        var urlParams = new URLSearchParams(location.search);
        var token = urlParams.get('access_token');
        var isdev = urlParams.get('isdev') || '0';
        var currentType = '';
        
        function escapeHtml(text) {
            if (!text) return '';
            return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
        }
        if (token) {
            localStorage.setItem('staff_token', token);
            localStorage.setItem('staff_isdev', isdev);
        } else {
            token = localStorage.getItem('staff_token');
            isdev = localStorage.getItem('staff_isdev') || '0';
        }

        if (!token) {
            document.body.innerHTML = '<div class="login-tip"><h2>请先登录</h2></div>';
            throw new Error('No token');
        }

        function goTo(url) {
            var sep = url.indexOf('?') >= 0 ? '&' : '?';
            location.href = url + sep + 'access_token=' + encodeURIComponent(token) + '&isdev=' + isdev;
        }

        function loadStats() {
            fetch('/api/staff/statistics?access_token=' + encodeURIComponent(token) + '&isdev=' + isdev)
            .then(function(r){return r.json()})
            .then(function(d){
                if(d.success && d.data) {
                    document.getElementById('statPending').textContent = d.data.pending_applications || 0;
                    document.getElementById('statProcessing').textContent = d.data.processing_applications || d.data.today?.applications || 0;
                    document.getElementById('statTodayOrders').textContent = d.data.today_orders || d.data.today?.orders || 0;
                    var income = d.data.today_income || d.data.today?.income || 0;
                    document.getElementById('statIncome').textContent = '¥' + (parseFloat(income) || 0).toFixed(0);
                    
                    // 申请统计图
                    if(d.data.application_stats && d.data.application_stats.length > 0) {
                        var maxApp = Math.max.apply(null, d.data.application_stats.map(function(s){return s.cnt}));
                        var statusMap = {pending:'待处理',processing:'处理中',completed:'已完成',rejected:'已拒绝',cancelled:'已撤销'};
                        document.getElementById('appChart').innerHTML = d.data.application_stats.map(function(s){
                            var pct = maxApp > 0 ? Math.round(s.cnt/maxApp*100) : 0;
                            return '<div class="chart-bar"><span class="chart-label">' + (statusMap[s.status]||s.status) + '</span><div class="chart-bar-outer"><div class="chart-bar-inner" style="width:' + pct + '%"></div></div><span class="chart-value">' + s.cnt + '</span></div>';
                        }).join('');
                    } else {
                        document.getElementById('appChart').innerHTML = '<div class="empty">暂无数据</div>';
                    }
                    
                    // 订单统计图
                    if(d.data.order_stats && d.data.order_stats.length > 0) {
                        var maxOrder = Math.max.apply(null, d.data.order_stats.map(function(s){return s.cnt}));
                        var statusMap2 = {pending:'待支付',paid:'已支付',completed:'已完成',cancelled:'已取消',total:'全部'};
                        document.getElementById('orderChart').innerHTML = d.data.order_stats.map(function(s){
                            var pct = maxOrder > 0 ? Math.round(s.cnt/maxOrder*100) : 0;
                            return '<div class="chart-bar"><span class="chart-label">' + (statusMap2[s.status]||s.status) + '</span><div class="chart-bar-outer"><div class="chart-bar-inner" style="width:' + pct + '%"></div></div><span class="chart-value">' + s.cnt + '</span></div>';
                        }).join('');
                    } else {
                        document.getElementById('orderChart').innerHTML = '<div class="empty">暂无数据</div>';
                    }
                }
            });
        }

        // V31.0 新增：加载待办聚合（合并stats接口，减少网络请求）
        function loadTodoSummary() {
            fetch('/api/staff/stats?access_token=' + encodeURIComponent(token) + '&isdev=' + isdev)
            .then(function(r){ return r.json(); })
            .then(function(d) {
                if (!d.success || !d.data) return;
                var s = d.data;
                // 角标
                setBadge('badge-app', s.pending || 0);
                setBadge('badge-order', s.pending_ship || 0);
                setBadge('badge-refund', s.pending_refund || 0);

                // 待办卡片 HTML
                var items = [
                    { icon: '📦', label: '待发货', count: s.pending_ship || 0, url: 'order_list.html?status=paid', color: '#fa8c16' },
                    { icon: '💰', label: '待退款', count: s.pending_refund || 0, url: 'refunds.html?status=pending', color: '#f5222d' },
                    { icon: '⭐', label: '待回复', count: s.pending_reviews || 0, url: 'reviews.html?filter=unreplied', color: '#722ed1' },
                    { icon: '📋', label: '待处理申请', count: s.pending || 0, url: 'application_list.html?status=pending', color: '#1890ff' }
                ];
                var todoHtml = '';
                items.forEach(function(item) {
                    var urgent = item.count > 0 ? 'border-left:3px solid ' + item.color + ';' : '';
                    todoHtml += '<div style="flex:1;background:white;border-radius:10px;padding:12px;cursor:pointer;min-width:70px;box-shadow:0 1px 4px rgba(0,0,0,.06);' + urgent + '" onclick="goTo(\'' + item.url + '\')">'
                        + '<div style="font-size:22px;margin-bottom:4px">' + item.icon + '</div>'
                        + '<div style="font-size:20px;font-weight:700;color:' + (item.count > 0 ? item.color : '#333') + '">' + item.count + '</div>'
                        + '<div style="font-size:11px;color:#888;margin-top:2px">' + item.label + '</div>'
                        + '</div>';
                });
                document.getElementById('todoRow').innerHTML = todoHtml;
                document.getElementById('todayIncome').textContent = '¥' + parseFloat(s.today_income || 0).toFixed(0);
                document.getElementById('todayOrderCnt').textContent = s.today_orders || 0;
            })
            .catch(function(e){ console.warn('loadTodoSummary error:', e); });
        }

        function loadPending() {
            var url = '/api/staff/applications?page=1&page_size=5&status=pending';
            if(currentType) url += '&app_type=' + currentType;
            url += '&access_token=' + encodeURIComponent(token) + '&isdev=' + isdev;
            
            fetch(url).then(function(r){return r.json()}).then(function(d){
                if(d.success && d.data && d.data.items && d.data.items.length > 0) {
                    document.getElementById('pendingList').innerHTML = d.data.items.map(function(item){
                        return '<div class="record-item" onclick="goTo(\'application_detail.html?id=' + item.id + '\')"><div class="record-icon">📋</div><div class="record-info"><div class="record-title">' + escapeHtml(item.title||'') + '</div><div class="record-desc">' + escapeHtml(item.user_name||'') + ' | ' + escapeHtml(item.created_at||'') + '</div></div><span class="record-status status-pending">待处理</span></div>';
                    }).join('');
                } else {
                    document.getElementById('pendingList').innerHTML = '<div class="empty">暂无待处理申请</div>';
                }
            });
        }

        document.querySelectorAll('.filter-tag').forEach(function(el){
            el.addEventListener('click', function(){
                document.querySelectorAll('.filter-tag').forEach(function(e){e.classList.remove('active')});
                el.classList.add('active');
                currentType = el.dataset.type;
                loadPending();
            });
        });

        loadStats();
        loadPending();
        loadTodoSummary();
        initWebSocket();

        // 加载各模块待处理数角标
        function loadBadges() {
            // 待处理退款数
            fetch('/api/staff/refunds?page=1&page_size=1&status=pending&access_token=' + encodeURIComponent(token) + '&isdev=' + isdev)
            .then(function(r){return r.json()})
            .then(function(d){
                if(d.success && d.data) setBadge('badge-refund', d.data.total || 0);
            }).catch(function(){});

            // 今日待核销预约数
            fetch('/api/staff/bookings?page=1&page_size=1&status=paid&access_token=' + encodeURIComponent(token) + '&isdev=' + isdev)
            .then(function(r){return r.json()})
            .then(function(d){
                if(d.success && d.data) setBadge('badge-booking', d.data.total || 0);
            }).catch(function(){});
        }

        function setBadge(id, cnt) {
            var el = document.getElementById(id);
            if (!el) return;
            if (cnt > 0) { el.textContent = cnt > 99 ? '99+' : cnt; el.style.display = 'block'; }
            else { el.style.display = 'none'; }
        }

        // WebSocket实时提醒
        var ws = null, wsRetry = 0, wsTimer = null;
        function initWebSocket() {
            if (!token) return;
            var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
            var wsUrl = proto + '//' + location.host + '/ws/staff?token=' + encodeURIComponent(token);
            try {
                ws = new WebSocket(wsUrl);
                ws.onopen = function() {
                    wsRetry = 0;
                    document.getElementById('wsDot').classList.remove('offline');
                    document.getElementById('wsLabel').textContent = '实时';
                };
                ws.onmessage = function(e) {
                    try {
                        var msg = JSON.parse(e.data);
                        handleWsMsg(msg);
                    } catch(ex) {}
                };
                ws.onclose = function() {
                    document.getElementById('wsDot').classList.add('offline');
                    document.getElementById('wsLabel').textContent = '已断开';
                    wsRetry++;
                    var delay = Math.min(30000, wsRetry * 3000);
                    clearTimeout(wsTimer);
                    wsTimer = setTimeout(initWebSocket, delay);
                };
                ws.onerror = function() {
                    document.getElementById('wsLabel').textContent = '连接失败';
                };
            } catch(e) {
                document.getElementById('wsLabel').textContent = '不支持';
            }
        }

        var ALERT_ICONS = {
            refund_request: '💰 新退款申请', new_application: '📋 新申请单',
            new_booking: '📅 新预约', new_order: '📦 新订单', review_new: '⭐ 新评价'
        };

        function handleWsMsg(msg) {
            if (!msg || !msg.type) return;
            var label = ALERT_ICONS[msg.type] || '📢 新消息';
            var detail = msg.user_name ? '来自：' + msg.user_name : (msg.order_no || msg.app_no || '');
            showAlert(label + (detail ? ' · ' + detail : ''));
            // 刷新待办聚合角标
            loadTodoSummary();
            // 刷新首页统计
            loadStats();
            if (msg.type === 'new_application' || msg.type === 'refund_request') loadPending();
        }

        var alertTimer = null;
        function showAlert(text) {
            var el = document.getElementById('alertBubble');
            document.getElementById('alertText').textContent = text;
            el.classList.add('show');
            clearTimeout(alertTimer);
            alertTimer = setTimeout(function(){ el.classList.remove('show'); }, 4000);
        }

        // 每60秒轮询刷新（作为WS的降级方案）
        setInterval(function() {
            if (!ws || ws.readyState !== 1) { loadTodoSummary(); loadStats(); }
        }, 60000);
    </script>
</body>
</html>
