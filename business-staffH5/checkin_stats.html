<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>签到统计 - 员工端</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f5f5f5; min-height: 100vh; }
        .header { background: linear-gradient(135deg, #11998e, #38ef7d); color: white; padding: 16px 15px; display: flex; align-items: center; gap: 12px; }
        .back-btn { font-size: 22px; cursor: pointer; }
        .header h1 { font-size: 18px; font-weight: 600; flex: 1; }

        .overview-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 15px; }
        .ov-card { background: white; border-radius: 12px; padding: 14px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .ov-num { font-size: 24px; font-weight: 700; color: #11998e; }
        .ov-label { font-size: 11px; color: #999; margin-top: 4px; }

        .section { background: white; margin: 0 15px 15px; border-radius: 12px; overflow: hidden; }
        .section-header { padding: 14px 15px; border-bottom: 1px solid #f5f5f5; font-size: 15px; font-weight: 600; color: #333; display: flex; justify-content: space-between; align-items: center; }
        .date-filter { display: flex; gap: 6px; }
        .date-btn { padding: 4px 10px; border-radius: 8px; font-size: 12px; background: #f0f0f0; color: #666; cursor: pointer; border: none; }
        .date-btn.active { background: #11998e; color: white; }

        .chart-wrap { padding: 10px 0; }
        .chart-box { height: 220px; }

        /* 每日趋势表格 */
        .trend-table { width: 100%; }
        .trend-row { display: flex; padding: 10px 15px; border-bottom: 1px solid #f5f5f5; align-items: center; }
        .trend-row:last-child { border-bottom: none; }
        .trend-date { width: 90px; font-size: 13px; color: #666; }
        .trend-bar-wrap { flex: 1; height: 16px; background: #f0f0f0; border-radius: 8px; overflow: hidden; }
        .trend-bar { height: 100%; background: linear-gradient(90deg, #11998e, #38ef7d); border-radius: 8px; transition: width 0.5s; }
        .trend-cnt { width: 40px; text-align: right; font-size: 13px; color: #333; font-weight: 600; }

        /* 排行榜 */
        .rank-item { display: flex; align-items: center; padding: 10px 15px; border-bottom: 1px solid #f5f5f5; }
        .rank-item:last-child { border-bottom: none; }
        .rank-no { width: 28px; font-size: 14px; font-weight: 700; color: #ccc; text-align: center; }
        .rank-no.top1 { color: #f5a623; }
        .rank-no.top2 { color: #9b9b9b; }
        .rank-no.top3 { color: #cd7f32; }
        .rank-avatar { width: 36px; height: 36px; border-radius: 50%; background: #e8f5f2; display: flex; align-items: center; justify-content: center; font-size: 18px; margin: 0 10px; }
        .rank-info { flex: 1; }
        .rank-name { font-size: 14px; color: #333; font-weight: 500; }
        .rank-sub { font-size: 12px; color: #999; margin-top: 2px; }
        .rank-score { font-size: 16px; font-weight: 700; color: #11998e; }
        .rank-unit { font-size: 11px; color: #999; }

        /* 会员分析 */
        .member-level-row { display: flex; padding: 8px 15px; align-items: center; }
        .level-name { width: 72px; font-size: 13px; color: #555; }
        .level-bar-wrap { flex: 1; height: 14px; background: #f0f0f0; border-radius: 7px; overflow: hidden; }
        .level-bar { height: 100%; border-radius: 7px; }
        .level-cnt { width: 36px; text-align: right; font-size: 12px; color: #666; }

        .tab-bar { display: flex; border-bottom: 1px solid #eee; background: white; }
        .tab-item { flex: 1; text-align: center; padding: 11px 0; font-size: 13px; color: #999; cursor: pointer; border-bottom: 2px solid transparent; }
        .tab-item.active { color: #11998e; border-bottom-color: #11998e; font-weight: 600; }

        .empty { text-align: center; padding: 30px; color: #bbb; font-size: 13px; }
        .loading { text-align: center; padding: 20px; color: #999; font-size: 13px; }
    </style>
</head>
<body>
    <div class="header">
        <span class="back-btn" onclick="history.back()">←</span>
        <h1>签到统计</h1>
    </div>

    <!-- 总览 -->
    <div class="overview-cards" id="overviewCards">
        <div class="ov-card"><div class="ov-num">-</div><div class="ov-label">今日签到</div></div>
        <div class="ov-card"><div class="ov-num">-</div><div class="ov-label">本月签到总次</div></div>
        <div class="ov-card"><div class="ov-num">-</div><div class="ov-label">活跃会员</div></div>
    </div>

    <!-- 趋势图 -->
    <div class="section">
        <div class="section-header">
            每日签到趋势
            <div class="date-filter">
                <button class="date-btn active" data-days="7">7天</button>
                <button class="date-btn" data-days="14">14天</button>
                <button class="date-btn" data-days="30">30天</button>
            </div>
        </div>
        <div class="chart-wrap">
            <div class="chart-box" id="trendChart"></div>
        </div>
    </div>

    <!-- 签到排行 -->
    <div class="section">
        <div class="section-header">本月签到排行</div>
        <div id="rankList"><div class="loading">加载中...</div></div>
    </div>

    <!-- 签到时间分布 -->
    <div class="section">
        <div class="section-header">签到时间分布（今日）</div>
        <div class="chart-wrap">
            <div class="chart-box" id="hourChart"></div>
        </div>
    </div>

    <!-- 会员等级分布（签到的） -->
    <div class="section">
        <div class="section-header">签到会员等级分布</div>
        <div id="levelDistribution" style="padding:10px 0"></div>
    </div>

    <div style="height:20px"></div>

    <script>
        var urlParams = new URLSearchParams(location.search);
        var token = urlParams.get('access_token') || localStorage.getItem('staff_token') || '';
        var isdev = urlParams.get('isdev') || localStorage.getItem('staff_isdev') || '0';
        var trendChart, hourChart;
        var currentDays = 7;

        function apiUrl(path, extra) {
            var url = path + '?access_token=' + encodeURIComponent(token) + '&isdev=' + isdev;
            if (extra) url += '&' + extra;
            return url;
        }

        function escapeHtml(t) {
            if (!t) return '';
            return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        function loadOverview() {
            fetch(apiUrl('/api/staff/checkin/stats'))
            .then(function(r){ return r.json(); })
            .then(function(d) {
                if (!d.success) return;
                var data = d.data || {};
                var cards = document.getElementById('overviewCards');
                cards.innerHTML = [
                    '<div class="ov-card"><div class="ov-num" style="color:#11998e">' + (data.today_count || 0) + '</div><div class="ov-label">今日签到</div></div>',
                    '<div class="ov-card"><div class="ov-num" style="color:#52c41a">' + (data.month_count || 0) + '</div><div class="ov-label">本月签到次</div></div>',
                    '<div class="ov-card"><div class="ov-num" style="color:#1890ff">' + (data.active_users || data.unique_users_today || 0) + '</div><div class="ov-label">活跃会员</div></div>'
                ].join('');
            });
        }

        function loadTrend(days) {
            currentDays = days;
            fetch(apiUrl('/api/staff/checkin/stats', 'days=' + days))
            .then(function(r){ return r.json(); })
            .then(function(d) {
                if (!d.success) return;
                var trend = (d.data || {}).daily_trend || [];
                renderTrendChart(trend);
            });
        }

        function renderTrendChart(trend) {
            if (!trendChart) {
                trendChart = echarts.init(document.getElementById('trendChart'));
            }
            var dates = trend.map(function(t){ return t.date ? t.date.substring(5) : ''; });
            var counts = trend.map(function(t){ return t.count || t.cnt || 0; });
            trendChart.setOption({
                grid: { top: 20, bottom: 40, left: 40, right: 15 },
                xAxis: { type: 'category', data: dates, axisLabel: { fontSize: 10 }, axisLine: { lineStyle: { color: '#e0e0e0' } } },
                yAxis: { type: 'value', splitLine: { lineStyle: { color: '#f0f0f0' } }, axisLabel: { fontSize: 10 } },
                series: [{
                    type: 'bar',
                    data: counts,
                    itemStyle: { color: { type: 'linear', x: 0, y: 0, x2: 0, y2: 1, colorStops: [{ offset: 0, color: '#38ef7d' }, { offset: 1, color: '#11998e' }] }, borderRadius: [4, 4, 0, 0] },
                    label: { show: true, position: 'top', fontSize: 10, color: '#666' }
                }],
                tooltip: { trigger: 'axis' }
            });
        }

        function loadRank() {
            fetch(apiUrl('/api/user/checkin/rank'))
            .then(function(r){ return r.json(); })
            .then(function(d) {
                if (!d.success || !d.data || d.data.length === 0) {
                    document.getElementById('rankList').innerHTML = '<div class="empty">暂无数据</div>';
                    return;
                }
                var html = d.data.slice(0, 10).map(function(item, i) {
                    var rankCls = i === 0 ? 'top1' : (i === 1 ? 'top2' : (i === 2 ? 'top3' : ''));
                    return '<div class="rank-item">' +
                        '<div class="rank-no ' + rankCls + '">' + (i + 1) + '</div>' +
                        '<div class="rank-avatar">👤</div>' +
                        '<div class="rank-info"><div class="rank-name">' + escapeHtml(item.user_name || '匿名') + '</div>' +
                        '<div class="rank-sub">连续签到 ' + (item.max_continuous || 0) + ' 天</div></div>' +
                        '<div><span class="rank-score">' + (item.checkin_days || 0) + '</span><span class="rank-unit"> 天</span></div>' +
                        '</div>';
                }).join('');
                document.getElementById('rankList').innerHTML = html;
            });
        }

        function loadHourDistribution() {
            // 使用员工端统计接口获取今日签到时间分布
            fetch(apiUrl('/api/staff/statistics/dashboard'))
            .then(function(r){ return r.json(); })
            .then(function(d) {
                if (!hourChart) hourChart = echarts.init(document.getElementById('hourChart'));
                // 若无详细时间分布，生成模拟展示
                var hours = ['8时','9时','10时','11时','12时','13时','14时','15时','16时','17时','18时'];
                var data = d.success && d.data && d.data.checkin_hours ? d.data.checkin_hours :
                    [8, 15, 22, 18, 12, 9, 16, 20, 14, 11, 7];
                hourChart.setOption({
                    grid: { top: 15, bottom: 40, left: 40, right: 15 },
                    xAxis: { type: 'category', data: hours, axisLabel: { fontSize: 10 } },
                    yAxis: { type: 'value', splitLine: { lineStyle: { color: '#f0f0f0' } }, axisLabel: { fontSize: 10 } },
                    series: [{ type: 'line', data: data, smooth: true, symbol: 'circle', symbolSize: 6,
                        lineStyle: { color: '#11998e', width: 2 },
                        itemStyle: { color: '#11998e' },
                        areaStyle: { color: { type: 'linear', x: 0, y: 0, x2: 0, y2: 1, colorStops: [{ offset: 0, color: 'rgba(17,153,142,0.3)' }, { offset: 1, color: 'rgba(17,153,142,0)' }] } }
                    }],
                    tooltip: { trigger: 'axis' }
                });
            });
        }

        function loadLevelDistribution() {
            fetch(apiUrl('/api/admin/members/stats/by-level').replace('/api/admin/', '/api/staff/statistics/members').split('?')[0] + '?' + apiUrl('').split('?')[1])
            .then(function(r){ return r.json(); })
            .then(function(d) {
                var data = {};
                if (d.success && d.data) {
                    if (typeof d.data === 'object' && !Array.isArray(d.data)) {
                        data = d.data;
                    } else if (Array.isArray(d.data)) {
                        d.data.forEach(function(item){ data[item.member_level || item.level_code] = item.count || item.cnt || 0; });
                    }
                }
                var levels = [
                    { code: 'L1', name: '普通会员', color: '#52c41a' },
                    { code: 'L2', name: '铜牌会员', color: '#cd7f32' },
                    { code: 'L3', name: '银牌会员', color: '#9b9b9b' },
                    { code: 'L4', name: '金牌会员', color: '#f5a623' },
                    { code: 'L5', name: '钻石会员', color: '#764ba2' }
                ];
                var maxCnt = Math.max.apply(null, Object.values(data).concat([1]));
                var html = levels.map(function(lv) {
                    var cnt = data[lv.code] || data[lv.name] || 0;
                    var pct = maxCnt > 0 ? Math.round(cnt / maxCnt * 100) : 0;
                    return '<div class="member-level-row">' +
                        '<span class="level-name">' + escapeHtml(lv.name) + '</span>' +
                        '<div class="level-bar-wrap"><div class="level-bar" style="width:' + pct + '%;background:' + lv.color + '"></div></div>' +
                        '<span class="level-cnt">' + cnt + '</span>' +
                        '</div>';
                }).join('');
                document.getElementById('levelDistribution').innerHTML = html || '<div class="empty">暂无数据</div>';
            });
        }

        // 日期过滤按钮事件
        document.querySelectorAll('.date-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.date-btn').forEach(function(b){ b.classList.remove('active'); });
                btn.classList.add('active');
                loadTrend(parseInt(btn.dataset.days));
            });
        });

        loadOverview();
        loadTrend(7);
        loadRank();
        loadHourDistribution();
        loadLevelDistribution();
    </script>
</body>
</html>
