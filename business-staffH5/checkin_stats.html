<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>签到统计</title>
    <link rel="stylesheet" href="/business-common/common.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }
        
        .header-fixed { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: #fff; }
        
        .filter-bar { display: flex; padding: 0 20px; border-bottom: 1px solid #f0f0f0; overflow-x: auto; }
        .filter-item { padding: 12px 16px; font-size: 14px; color: #666; white-space: nowrap; position: relative; }
        .filter-item.active { color: #30c2b3; font-weight: 500; }
        .filter-item.active::after { content: ''; position: absolute; bottom: 0; left: 16px; right: 16px; height: 2px; background: #30c2b3; }
        
        .content { padding-top: 50px; padding-bottom: 20px; }
        
        .stat-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 16px 20px; }
        .stat-card { background: #fff; padding: 16px 8px; border-radius: 12px; text-align: center; }
        .stat-value { font-size: 24px; font-weight: 600; color: #30c2b3; margin-bottom: 4px; }
        .stat-label { font-size: 12px; color: #666; }
        
        .section { background: #fff; margin: 12px 20px; padding: 16px; border-radius: 12px; }
        .section-title { font-size: 15px; font-weight: 500; color: #333; margin-bottom: 16px; display: flex; align-items: center; }
        .section-title::before { content: ''; width: 4px; height: 16px; background: #30c2b3; margin-right: 8px; border-radius: 2px; }
        
        .user-item { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #f5f5f5; }
        .user-item:last-child { border-bottom: none; }
        .user-rank { width: 28px; height: 28px; border-radius: 50%; background: #f5f5f5; color: #666; font-size: 13px; display: flex; align-items: center; justify-content: center; margin-right: 12px; }
        .user-rank.top { background: #30c2b3; color: #fff; }
        .user-rank.top2 { background: #ffb74d; color: #fff; }
        .user-rank.top3 { background: #90a4ae; color: #fff; }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; background: #e0e0e0; margin-right: 12px; display: flex; align-items: center; justify-content: center; font-size: 16px; color: #666; }
        .user-info { flex: 1; }
        .user-name { font-size: 14px; color: #333; margin-bottom: 2px; }
        .user-dept { font-size: 12px; color: #999; }
        .user-stat { text-align: right; }
        .user-count { font-size: 16px; color: #30c2b3; font-weight: 500; }
        .user-rate { font-size: 12px; color: #999; }
        
        .checkin-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f5f5f5; }
        .checkin-item:last-child { border-bottom: none; }
        .checkin-date { font-size: 14px; color: #333; }
        .checkin-status { padding: 4px 10px; border-radius: 4px; font-size: 12px; }
        .status-normal { background: #e8f5e9; color: #4caf50; }
        .status-late { background: #fff3e0; color: #ff9800; }
        .status-early { background: #ffebee; color: #f44336; }
        .status-absent { background: #f5f5f5; color: #999; }
        
        .loading, .empty { text-align: center; padding: 40px; color: #999; font-size: 14px; }
    </style>
</head>
<body>
    <div class="header-fixed">
        <div class="filter-bar">
            <div class="filter-item active" onclick="switchRange('today', this)">今日</div>
            <div class="filter-item" onclick="switchRange('week', this)">本周</div>
            <div class="filter-item" onclick="switchRange('month', this)">本月</div>
            <div class="filter-item" onclick="switchRange('my', this)">我的</div>
        </div>
    </div>

    <div class="content">
        <div class="stat-cards">
            <div class="stat-card">
                <div class="stat-value" id="totalUsers">48</div>
                <div class="stat-label">应到人数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="checkinUsers">45</div>
                <div class="stat-label">实到人数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="checkinRate">93.8%</div>
                <div class="stat-label">出勤率</div>
            </div>
        </div>
        
        <div class="section">
            <div class="section-title">签到排行榜</div>
            <div id="rankList">
                <div class="user-item">
                    <div class="user-rank top">1</div>
                    <div class="user-avatar">张</div>
                    <div class="user-info">
                        <div class="user-name">张三</div>
                        <div class="user-dept">技术部</div>
                    </div>
                    <div class="user-stat">
                        <div class="user-count">22天</div>
                        <div class="user-rate">全勤</div>
                    </div>
                </div>
                <div class="user-item">
                    <div class="user-rank top2">2</div>
                    <div class="user-avatar">李</div>
                    <div class="user-info">
                        <div class="user-name">李四</div>
                        <div class="user-dept">产品部</div>
                    </div>
                    <div class="user-stat">
                        <div class="user-count">21天</div>
                        <div class="user-rate">缺勤1天</div>
                    </div>
                </div>
                <div class="user-item">
                    <div class="user-rank top3">3</div>
                    <div class="user-avatar">王</div>
                    <div class="user-info">
                        <div class="user-name">王五</div>
                        <div class="user-dept">运营部</div>
                    </div>
                    <div class="user-stat">
                        <div class="user-count">20天</div>
                        <div class="user-rate">缺勤2天</div>
                    </div>
                </div>
                <div class="user-item">
                    <div class="user-rank">4</div>
                    <div class="user-avatar">赵</div>
                    <div class="user-info">
                        <div class="user-name">赵六</div>
                        <div class="user-dept">市场部</div>
                    </div>
                    <div class="user-stat">
                        <div class="user-count">19天</div>
                        <div class="user-rate">缺勤3天</div>
                    </div>
                </div>
                <div class="user-item">
                    <div class="user-rank">5</div>
                    <div class="user-avatar">孙</div>
                    <div class="user-info">
                        <div class="user-name">孙七</div>
                        <div class="user-dept">人事部</div>
                    </div>
                    <div class="user-stat">
                        <div class="user-count">18天</div>
                        <div class="user-rate">缺勤4天</div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="section">
            <div class="section-title">今日签到明细</div>
            <div id="checkinList">
                <div class="checkin-item">
                    <span class="checkin-date">张三 08:52:13</span>
                    <span class="checkin-status status-normal">正常</span>
                </div>
                <div class="checkin-item">
                    <span class="checkin-date">李四 08:45:22</span>
                    <span class="checkin-status status-normal">正常</span>
                </div>
                <div class="checkin-item">
                    <span class="checkin-date">王五 09:05:47</span>
                    <span class="checkin-status status-late">迟到</span>
                </div>
                <div class="checkin-item">
                    <span class="checkin-date">赵六 08:30:15</span>
                    <span class="checkin-status status-normal">正常</span>
                </div>
                <div class="checkin-item">
                    <span class="checkin-date">孙七 未签到</span>
                    <span class="checkin-status status-absent">缺勤</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('access_token') || new URLSearchParams(location.search).get('access_token') || '';
        let currentRange = 'today';
        
        function switchRange(range, el) {
            currentRange = range;
            document.querySelectorAll('.filter-item').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            loadData();
        }
        
        function loadData() {
            // 模拟数据
            const mockData = {
                today: { total: 48, checkin: 45, rate: '93.8%' },
                week: { total: 48, checkin: 320, rate: '95.2%' },
                month: { total: 52, checkin: 1105, rate: '92.1%' },
                my: { total: 1, checkin: 22, rate: '100%' }
            };
            
            const data = mockData[currentRange];
            document.getElementById('totalUsers').textContent = data.total;
            document.getElementById('checkinUsers').textContent = data.checkin;
            document.getElementById('checkinRate').textContent = data.rate;
        }
        
        loadData();
    </script>
</body>
</html>
