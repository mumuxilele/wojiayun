<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>反馈管理 - 员工端</title>
    <link rel="stylesheet" href="../business-common/list-style.css">
    <style>
        /* 页面特有样式 */
        .actions .link { color: var(--el-color-primary); cursor: pointer; margin-right: 10px; }
        .actions .link:hover { text-decoration: underline; }
        .actions .link.danger { color: var(--el-color-danger); }
        /* 弹窗样式保留 */
        /* 回复弹窗 */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: none; align-items: flex-end; justify-content: center; z-index: 999; }
    </style>
</head>
<body class="wy-design-list">
    <!-- 顶部区域 -->
    <div class="wy-design-list_top">
        <div class="wy-design-list_top_title">
            <h1 class="wy-design-list_title">反馈管理 - 员工端</h1>
            <div class="wy-design-list_space"></div>
            <div class="wy-design-list_btn-group">
                <div class="wy-design-list_btn">
                    <button type="button" class="el-button el-button--primary el-button--small" onclick="loadList(1)">
                        <span>搜索</span>
                    </button>
                </div>
                <div class="wy-design-list_btn">
                    <button type="button" class="el-button el-button--small" onclick="resetSearch()">
                        <span>重置</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 筛选区域 -->
    <div class="wy-design-list_filter">
        <div class="wy-design-list_other">
            <div class="el-input el-input--small" style="width: 200px;">
                <input type="text" id="keyword" placeholder="搜索关键词" class="el-input__inner">
            </div>
        </div>
    </div>

    <!-- 表格区域 -->
    <div class="wy-design-table wy-design-table_main wy-design-table_has-bar">
        <div class="wy-design-table_bar">
            <i class="wy-design-table_set el-icon-setting" title="列设置"></i>
            <span class="wy-design-table_total">共 <em id="totalCount">0</em> 条</span>
            <div class="wy-pages">
                <div class="wy-pages_total">第<em id="currentPage">1</em>/<em id="totalPages">1</em>页</div>
                <div class="wy-pages_prev el-icon-arrow-left" id="prevBtn" onclick="changePage(-1)"></div>
                <div class="wy-pages_next el-icon-arrow-right" id="nextBtn" onclick="changePage(1)"></div>
            </div>
        </div>
        <table class="el-table el-table--fit el-table--border el-table--enable-row-hover">
            <thead class="el-table__header">
                <tr>
                    <th><div class="cell">名称</div></th>
                    <th><div class="cell">操作</div></th>
                </tr>
            </thead>
            <tbody class="el-table__body" id="listBody">
                <tr><td colspan="10" style="text-align: center; padding: 60px; color: var(--el-text-secondary);">加载中...</td></tr>
            </tbody>
        </table>
    </div>

    
    <div class="modal-overlay" id="replyModal">
        <div class="modal-box">
            <div class="modal-header">
                <h3>回复反馈</h3>
                <button class="modal-close" onclick="closeReplyModal()">&times;</button>
            </div>
            <div id="replyTargetInfo" style="margin-bottom:10px;font-size:13px;color:#666"></div>
            <textarea class="reply-input" id="replyText" placeholder="请输入回复内容..."></textarea>
            <button class="submit-reply" id="replySubmitBtn" onclick="submitReply()">提交回复</button>
        </div>
    </div>

    

    <script>
    const API = localStorage.getItem('apiBase') || '';
    
    function escapeHtml(text) {
        if (text === null || text === undefined) return '';
        return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }
    let currentFilter = { status: '', feedback_type: '' };
    let currentReplyId = null;
    
    function getToken() {
        return localStorage.getItem('access_token') || new URLSearchParams(location.search).get('access_token') || '';
    }
    
    function filterFeedback(el) {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        
        if (el.dataset.type === '1') {
            currentFilter = { status: '', feedback_type: el.dataset.status };
        } else {
            currentFilter = { status: el.dataset.status, feedback_type: '' };
        }
        loadFeedback();
    }
    
    async function loadFeedback() {
        const list = document.getElementById('feedbackList');
        list.innerHTML = '<div class="loading">加载中...</div>';
        
        let url = `${API}/api/staff/feedback?page=1&page_size=20`;
        if (currentFilter.status) url += `&status=${currentFilter.status}`;
        if (currentFilter.feedback_type) url += `&feedback_type=${currentFilter.feedback_type}`;
        
        try {
            const res = await fetch(url, { headers: { 'Token': getToken() } });
            const json = await res.json();
            if (json.success) {
                const items = json.data.items || [];
                if (items.length === 0) {
                    list.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><p>暂无反馈</p></div>';
                    return;
                }
                
                const typeLabels = { suggestion: '建议', bug: '问题', complaint: '投诉', praise: '表扬' };
                const statusLabels = { pending: '待处理', replied: '已回复', closed: '已关闭' };
                
                list.innerHTML = items.map(fb => `
                    <div class="feedback-item">
                        <div class="feedback-header">
                            <div class="feedback-title">${escapeHtml(fb.title || '')}</div>
                            <span class="feedback-type-tag tag-${fb.feedback_type}">${typeLabels[fb.feedback_type] || '建议'}</span>
                        </div>
                        <div class="feedback-user">👤 ${escapeHtml(fb.user_name || '-')}${fb.contact ? ' | 📞 ' + escapeHtml(fb.contact) : ''}</div>
                        <div class="feedback-content">${escapeHtml(fb.content || '')}</div>
                        ${fb.reply ? `
                        <div class="feedback-reply">
                            <div class="reply-label">💬 回复内容</div>
                            <div class="reply-content">${escapeHtml(fb.reply)}</div>
                        </div>` : ''}
                        <div class="feedback-footer">
                            <span class="feedback-time">${formatTime(fb.created_at)}</span>
                            <div style="display:flex;align-items:center;gap:8px">
                                <span class="feedback-status status-${fb.status}">${statusLabels[fb.status] || '待处理'}</span>
                                <button class="reply-btn" onclick="showReply(${fb.id}, '${(fb.title||'').replace(/'/g,"\\'")}')">回复</button>
                            </div>
                        </div>
                    </div>
                `).join('');
            }
        } catch (e) {
            list.innerHTML = '<div class="empty"><p>加载失败</p></div>';
        }
    }
    
    function showReply(fbId, title) {
        currentReplyId = fbId;
        document.getElementById('replyTargetInfo').textContent = `回复「${title}」`;
        document.getElementById('replyText').value = '';
        document.getElementById('replyModal').classList.add('show');
        setTimeout(() => document.getElementById('replyText').focus(), 100);
    }
    
    function closeReplyModal() {
        document.getElementById('replyModal').classList.remove('show');
        currentReplyId = null;
    }
    
    async function submitReply() {
        const reply = document.getElementById('replyText').value.trim();
        if (!reply) { alert('请输入回复内容'); return; }
        
        const btn = document.getElementById('replySubmitBtn');
        btn.disabled = true;
        btn.textContent = '提交中...';
        
        try {
            const res = await fetch(`${API}/api/staff/feedback/${currentReplyId}/reply`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Token': getToken() },
                body: JSON.stringify({ reply })
            });
            const json = await res.json();
            if (json.success) {
                closeReplyModal();
                loadFeedback();
            } else {
                alert(json.msg || '回复失败');
            }
        } catch (e) {
            alert('网络错误');
        } finally {
            btn.disabled = false;
            btn.textContent = '提交回复';
        }
    }
    
    function formatTime(t) {
        if (!t) return '';
        const d = new Date(t);
        const now = new Date();
        const diff = now - d;
        if (diff < 60000) return '刚刚';
        if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前';
        if (diff < 86400000) return Math.floor(diff / 3600000) + '小时前';
        if (diff < 172800000) return '昨天';
        return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    }
    
    loadFeedback();
    </script>
</body>
</html>
