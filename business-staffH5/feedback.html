<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>反馈管理</title>
    <link rel="stylesheet" href="/business-common/common.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }
        
        .header-fixed { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: #fff; }
        
        .filter-bar { display: flex; padding: 0 20px; border-bottom: 1px solid #f0f0f0; overflow-x: auto; }
        .filter-item { padding: 12px 16px; font-size: 14px; color: #666; white-space: nowrap; position: relative; }
        .filter-item.active { color: #30c2b3; font-weight: 500; }
        .filter-item.active::after { content: ''; position: absolute; bottom: 0; left: 16px; right: 16px; height: 2px; background: #30c2b3; }
        
        .content { padding-top: 50px; padding-bottom: 20px; }
        
        .feedback-card { background: #fff; margin: 12px 20px; padding: 16px; border-radius: 12px; }
        .feedback-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .feedback-title { font-size: 15px; font-weight: 500; color: #333; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .feedback-type { padding: 2px 8px; border-radius: 4px; font-size: 11px; margin-left: 8px; }
        .type-suggestion { background: #e3f2fd; color: #2196f3; }
        .type-bug { background: #ffebee; color: #f44336; }
        .type-complaint { background: #fff3e0; color: #ff9800; }
        .type-praise { background: #e8f5e9; color: #4caf50; }
        
        .feedback-user { font-size: 13px; color: #666; margin-bottom: 10px; }
        .feedback-content { font-size: 14px; color: #333; line-height: 1.6; margin-bottom: 12px; }
        
        .feedback-reply { background: #f8f8f8; padding: 10px; border-radius: 8px; margin-bottom: 12px; }
        .reply-label { font-size: 12px; color: #30c2b3; font-weight: 500; margin-bottom: 4px; }
        .reply-content { font-size: 13px; color: #666; }
        
        .feedback-footer { display: flex; justify-content: space-between; align-items: center; padding-top: 12px; border-top: 1px solid #f0f0f0; }
        .feedback-time { font-size: 12px; color: #999; }
        .feedback-status { padding: 2px 8px; border-radius: 4px; font-size: 11px; }
        .status-pending { background: #fff3e0; color: #ff9800; }
        .status-replied { background: #e8f5e9; color: #4caf50; }
        .status-closed { background: #f5f5f5; color: #999; }
        
        .feedback-actions { display: flex; gap: 10px; margin-top: 12px; }
        .btn { flex: 1; padding: 10px; text-align: center; border-radius: 6px; font-size: 14px; border: none; }
        .btn-primary { background: #30c2b3; color: #fff; }
        .btn-default { background: #f5f5f5; color: #666; }
        
        .loading, .empty { text-align: center; padding: 40px; color: #999; font-size: 14px; }
        
        .panel { position: fixed; left: 0; right: 0; bottom: 0; background: #fff; border-radius: 16px 16px 0 0; transform: translateY(100%); transition: transform 0.3s; z-index: 200; }
        .panel.show { transform: translateY(0); }
        .panel-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid #f0f0f0; }
        .panel-title { font-size: 16px; font-weight: 500; }
        .panel-close { font-size: 20px; color: #999; }
        .panel-body { padding: 20px; }
        .reply-textarea { width: 100%; height: 120px; padding: 12px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 14px; resize: none; }
        
        .mask { position: fixed; inset: 0; background: rgba(0,0,0,0.5); opacity: 0; visibility: hidden; transition: all 0.3s; z-index: 150; }
        .mask.show { opacity: 1; visibility: visible; }
        
        #toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.7); color: #fff; padding: 12px 24px; border-radius: 6px; font-size: 14px; display: none; z-index: 300; }
    </style>
</head>
<body>
    <div class="header-fixed">
        <div class="filter-bar">
            <div class="filter-item active" data-type="" onclick="switchTab(this, '')">全部</div>
            <div class="filter-item" data-type="pending" onclick="switchTab(this, 'pending')">待处理</div>
            <div class="filter-item" data-type="replied" onclick="switchTab(this, 'replied')">已回复</div>
            <div class="filter-item" data-type="suggestion" onclick="switchTab(this, 'suggestion')">建议</div>
            <div class="filter-item" data-type="complaint" onclick="switchTab(this, 'complaint')">投诉</div>
        </div>
    </div>

    <div class="content" id="feedbackList"></div>

    <div class="mask" id="mask" onclick="closePanel()"></div>
    <div class="panel" id="replyPanel">
        <div class="panel-header">
            <span class="panel-title">回复反馈</span>
            <span class="panel-close" onclick="closePanel()">×</span>
        </div>
        <div class="panel-body">
            <textarea class="reply-textarea" id="replyText" placeholder="请输入回复内容..."></textarea>
            <button class="btn btn-primary" onclick="submitReply()" style="width:100%;margin-top:16px;">提交回复</button>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        let currentFilter = { status: '', feedback_type: '' };
        let currentReplyId = null;
        
        const token = localStorage.getItem('access_token') || new URLSearchParams(location.search).get('access_token') || '';
        
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 2000);
        }
        
        function escapeHtml(text) {
            if (text === null || text === undefined) return '';
            return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
        }
        
        function switchTab(el, type) {
            document.querySelectorAll('.filter-item').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            
            if (['suggestion','bug','complaint','praise'].includes(type)) {
                currentFilter = { status: '', feedback_type: type };
            } else {
                currentFilter = { status: type, feedback_type: '' };
            }
            loadFeedback();
        }
        
        function showReply(id) {
            currentReplyId = id;
            document.getElementById('mask').classList.add('show');
            document.getElementById('replyPanel').classList.add('show');
        }
        
        function closePanel() {
            document.getElementById('mask').classList.remove('show');
            document.getElementById('replyPanel').classList.remove('show');
            document.getElementById('replyText').value = '';
        }
        
        function submitReply() {
            const text = document.getElementById('replyText').value.trim();
            if (!text) { showToast('请输入回复内容'); return; }
            closePanel();
            showToast('回复成功');
        }
        
        function formatTime(t) {
            if (!t) return '-';
            return new Date(t).toLocaleString('zh-CN', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        }
        
        async function loadFeedback() {
            const list = document.getElementById('feedbackList');
            list.innerHTML = '<div class="loading">加载中...</div>';
            
            // 模拟数据
            const mockData = [
                { id: 1, title: '建议增加更多会议室', feedback_type: 'suggestion', user_name: '张三', contact: '13800138000', content: '目前会议室数量不够，希望能增加预约时段。', reply: '', status: 'pending', created_at: '2024-01-15 14:30' },
                { id: 2, title: '空调温度不适', feedback_type: 'complaint', user_name: '李四', contact: '', content: '最近空调温度太低了，希望能调高几度。', reply: '已调整至26度，感谢您的反馈！', status: 'replied', created_at: '2024-01-15 10:00' },
                { id: 3, title: '服务态度很好', feedback_type: 'praise', user_name: '王五', contact: '', content: '前台小姐姐服务态度特别好，点赞！', reply: '', status: 'pending', created_at: '2024-01-14 16:00' }
            ];
            
            setTimeout(() => {
                const typeLabels = { suggestion: '建议', bug: '问题', complaint: '投诉', praise: '表扬' };
                const statusLabels = { pending: '待处理', replied: '已回复', closed: '已关闭' };
                
                let html = '';
                mockData.forEach(fb => {
                    html += `
                        <div class="feedback-card">
                            <div class="feedback-header">
                                <div class="feedback-title">${escapeHtml(fb.title || '')}</div>
                                <span class="feedback-type type-${fb.feedback_type}">${typeLabels[fb.feedback_type] || '建议'}</span>
                            </div>
                            <div class="feedback-user">👤 ${escapeHtml(fb.user_name || '-')} ${fb.contact ? '| 📞 ' + escapeHtml(fb.contact) : ''}</div>
                            <div class="feedback-content">${escapeHtml(fb.content || '')}</div>
                            ${fb.reply ? `
                                <div class="feedback-reply">
                                    <div class="reply-label">💬 回复内容</div>
                                    <div class="reply-content">${escapeHtml(fb.reply)}</div>
                                </div>
                            ` : ''}
                            <div class="feedback-footer">
                                <span class="feedback-time">${formatTime(fb.created_at)}</span>
                                <span class="feedback-status status-${fb.status}">${statusLabels[fb.status] || '待处理'}</span>
                            </div>
                            ${fb.status === 'pending' ? `
                                <div class="feedback-actions">
                                    <button class="btn btn-primary" onclick="showReply(${fb.id})">回复</button>
                                    <button class="btn btn-default">关闭</button>
                                </div>
                            ` : ''}
                        </div>
                    `;
                });
                list.innerHTML = html;
            }, 300);
        }
        
        loadFeedback();
    </script>
</body>
</html>
