<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>预约管理</title>
    <link rel="stylesheet" href="/business-common/common.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }
        
        .header-fixed { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: #fff; }
        
        .search-bar { display: flex; gap: 10px; padding: 12px 20px; border-bottom: 1px solid #f0f0f0; }
        .search-input { flex: 1; display: flex; align-items: center; background: #f5f5f5; border-radius: 20px; padding: 8px 15px; }
        .search-input input { flex: 1; border: none; background: transparent; font-size: 14px; outline: none; }
        
        .filter-bar { display: flex; padding: 0 20px; border-bottom: 1px solid #f0f0f0; overflow-x: auto; }
        .filter-item { padding: 12px 16px; font-size: 14px; color: #666; white-space: nowrap; position: relative; }
        .filter-item.active { color: #30c2b3; font-weight: 500; }
        .filter-item.active::after { content: ''; position: absolute; bottom: 0; left: 16px; right: 16px; height: 2px; background: #30c2b3; }
        
        .content { padding-top: 100px; padding-bottom: 20px; }
        
        .booking-card { background: #fff; margin: 12px 20px; padding: 16px; border-radius: 12px; }
        .booking-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .venue-name { font-size: 16px; font-weight: 600; color: #333; }
        .status { padding: 4px 10px; border-radius: 4px; font-size: 12px; }
        .status-pending { background: #fff3e0; color: #ff9800; }
        .status-confirmed { background: #e3f2fd; color: #2196f3; }
        .status-completed { background: #e8f5e9; color: #4caf50; }
        .status-cancelled { background: #ffebee; color: #f44336; }
        
        .booking-info { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 20px; }
        .info-item { display: flex; flex-direction: column; }
        .info-label { font-size: 12px; color: #999; margin-bottom: 4px; }
        .info-value { font-size: 14px; color: #333; }
        .info-value.price { color: #f44336; font-weight: 500; }
        .info-value.code { font-weight: 600; letter-spacing: 2px; color: #30c2b3; }
        
        .booking-actions { display: flex; gap: 10px; margin-top: 16px; padding-top: 12px; border-top: 1px solid #f0f0f0; }
        .btn { flex: 1; padding: 10px; text-align: center; border-radius: 6px; font-size: 14px; border: none; }
        .btn-primary { background: #30c2b3; color: #fff; }
        .btn-danger { background: #ffebee; color: #f44336; }
        .btn-default { background: #f5f5f5; color: #666; }
        
        .loading, .empty { text-align: center; padding: 40px; color: #999; font-size: 14px; }
        
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 200; }
        .modal.show { display: flex; }
        .modal-content { background: #fff; border-radius: 12px; padding: 24px; width: 80%; max-width: 300px; text-align: center; }
        .modal-title { font-size: 17px; font-weight: 500; margin-bottom: 12px; }
        .modal-msg { font-size: 14px; color: #666; margin-bottom: 20px; }
        .modal-btns { display: flex; gap: 12px; }
        .modal-btns .btn { flex: 1; }
        
        #toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.7); color: #fff; padding: 12px 24px; border-radius: 6px; font-size: 14px; display: none; z-index: 300; }
    </style>
</head>
<body>
    <div class="header-fixed">
        <div class="search-bar">
            <div class="search-input">
                <span>🔍</span>
                <input type="text" id="keyword" placeholder="搜索场地/用户/电话">
            </div>
        </div>
        <div class="filter-bar">
            <div class="filter-item active" data-status="" onclick="switchTab(this, '')">全部</div>
            <div class="filter-item" data-status="pending" onclick="switchTab(this, 'pending')">待确认</div>
            <div class="filter-item" data-status="confirmed" onclick="switchTab(this, 'confirmed')">已确认</div>
            <div class="filter-item" data-status="completed" onclick="switchTab(this, 'completed')">已完成</div>
            <div class="filter-item" data-status="cancelled" onclick="switchTab(this, 'cancelled')">已取消</div>
        </div>
    </div>

    <div class="content" id="bookingList"></div>
    
    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-title" id="modalTitle">提示</div>
            <div class="modal-msg" id="modalMsg"></div>
            <div class="modal-btns">
                <button class="btn btn-default" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" id="modalConfirm">确定</button>
            </div>
        </div>
    </div>
    
    <div id="toast"></div>

    <script>
        var urlParams = new URLSearchParams(location.search);
        var token = urlParams.get('access_token');
        var isdev = urlParams.get('isdev') || '0';
        if (token) {
            localStorage.setItem('staff_token', token);
            localStorage.setItem('staff_isdev', isdev);
        } else {
            token = localStorage.getItem('staff_token');
            isdev = localStorage.getItem('staff_isdev') || '0';
        }
        
        var currentStatus = '';
        var page = 1;
        var hasMore = true;
        var currentAction = null;
        
        function escapeHtml(text) {
            if (!text) return '';
            return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
        }
        
        function showToast(msg) {
            var t = document.getElementById('toast');
            t.textContent = msg; t.style.display = 'block';
            setTimeout(function(){ t.style.display = 'none'; }, 2000);
        }
        
        function showModal(title, msg, confirmFn) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalMsg').textContent = msg;
            document.getElementById('modal').classList.add('show');
            currentAction = confirmFn;
            document.getElementById('modalConfirm').onclick = function() {
                closeModal();
                if (currentAction) currentAction();
            };
        }
        
        function closeModal() {
            document.getElementById('modal').classList.remove('show');
            currentAction = null;
        }
        
        function api(method, url, data) {
            var opts = { method: method, headers: {} };
            if (data) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(data); }
            return fetch(url + '&access_token=' + encodeURIComponent(token) + '&isdev=' + isdev, opts).then(function(r){return r.json()});
        }
        
        function switchTab(el, status) {
            document.querySelectorAll('.filter-item').forEach(function(e){e.classList.remove('active')});
            el.classList.add('active');
            currentStatus = status;
            page = 1;
            hasMore = true;
            loadBookings();
        }
        
        function loadBookings() {
            var list = document.getElementById('bookingList');
            if (page === 1) list.innerHTML = '<div class="loading">加载中...</div>';
            
            var url = '/api/staff/bookings?page=' + page + '&page_size=20';
            if (currentStatus) url += '&status=' + currentStatus;
            api('GET', url)
            .then(function(d){
                if (!d.success) {
                    list.innerHTML = '<div class="empty">加载失败</div>';
                    return;
                }
                var items = d.data.items || [];
                hasMore = items.length >= 20;
                if (page === 1 && items.length === 0) {
                    list.innerHTML = '<div class="empty">暂无预约记录</div>';
                    return;
                }
                var html = '';
                var statusMap = {pending:'待确认',confirmed:'已确认',completed:'已完成',cancelled:'已取消'};
                var payMap = {paid:'已支付',unpaid:'未支付'};
                
                for (var i = 0; i < items.length; i++) {
                    var b = items[i];
                    html += '<div class="booking-card">'
                        + '<div class="booking-header">'
                        + '<div class="venue-name">' + escapeHtml(b.venue_name || '未知场地') + '</div>'
                        + '<span class="status status-' + (b.status||'pending') + '">' + (statusMap[b.status]||b.status) + '</span>'
                        + '</div>'
                        + '<div class="booking-info">'
                        + '<div class="info-item"><div class="info-label">预约人</div><div class="info-value">' + escapeHtml(b.user_name||'-') + '</div></div>'
                        + '<div class="info-item"><div class="info-label">联系电话</div><div class="info-value">' + escapeHtml(b.user_phone||'-') + '</div></div>'
                        + '<div class="info-item"><div class="info-label">预约日期</div><div class="info-value">' + (b.book_date||'-') + '</div></div>'
                        + '<div class="info-item"><div class="info-label">时段</div><div class="info-value">' + (b.start_time||'') + ' ~ ' + (b.end_time||'') + '</div></div>'
                        + '<div class="info-item"><div class="info-label">金额</div><div class="info-value price">¥' + parseFloat(b.total_price||0).toFixed(2) + '</div></div>'
                        + '<div class="info-item"><div class="info-label">支付</div><div class="info-value">' + (payMap[b.pay_status]||b.pay_status||'-') + '</div></div>'
                        + '</div>'
                        + '<div class="booking-actions">';
                    
                    if (b.status === 'pending') {
                        html += '<button class="btn btn-primary" onclick="confirmBooking(' + b.id + ')">确认</button>';
                        html += '<button class="btn btn-danger" onclick="cancelBooking(' + b.id + ')">取消</button>';
                    } else if (b.status === 'confirmed') {
                        html += '<button class="btn btn-primary" onclick="completeBooking(' + b.id + ')">核销完成</button>';
                    }
                    html += '</div></div>';
                }
                if (page === 1) {
                    list.innerHTML = html;
                } else {
                    list.innerHTML += html;
                }
            })
            .catch(function(){
                list.innerHTML = '<div class="empty">加载失败</div>';
            });
        }
        
        function confirmBooking(id) {
            showModal('确认预约', '确认此预约？确认后用户可到场使用', function(){
                api('POST', '/api/staff/bookings/' + id + '/complete', {action:'confirm'})
                .then(function(d){
                    showToast(d.success ? '已确认' : (d.msg || '操作失败'));
                    if (d.success) { page = 1; loadBookings(); }
                });
            });
        }
        
        function completeBooking(id) {
            showModal('完成核销', '确认完成此预约的核销？', function(){
                api('POST', '/api/staff/bookings/' + id + '/complete', {})
                .then(function(d){
                    showToast(d.success ? '核销成功' : (d.msg || '操作失败'));
                    if (d.success) { page = 1; loadBookings(); }
                });
            });
        }
        
        function cancelBooking(id) {
            showModal('取消预约', '确认取消此预约？此操作不可撤销', function(){
                api('POST', '/api/staff/bookings/' + id + '/status', {status:'cancelled'})
                .then(function(d){
                    showToast(d.success ? '已取消' : (d.msg || '操作失败'));
                    if (d.success) { page = 1; loadBookings(); }
                });
            });
        }
        
        document.getElementById('keyword').addEventListener('input', function() {
            clearTimeout(window.searchTimer);
            window.searchTimer = setTimeout(function(){
                page = 1;
                loadBookings();
            }, 300);
        });
        
        loadBookings();
    </script>
</body>
</html>
