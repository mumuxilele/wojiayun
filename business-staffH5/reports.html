<!DOCTYPE html>
<html lang="zh-CN" data-theme="commercial">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>报表统计 - 粤海物业员工端</title>
<script src="../api.js"></script>
<style>
:root {
  --primary: #00dea0; --primary-light: #33e5b5; --primary-dark: #00b383; --primary-bg: #e8f5e9;
  --accent: #2c3e50; --accent-light: #34495e; --accent-bg: #f0f2f5;
  --gray-50: #fafafa; --gray-100: #f5f5f5; --gray-200: #eeeeee;
  --gray-300: #e0e0e0; --gray-400: #bdbdbd; --gray-500: #9e9e9e; --gray-600: #757575;
  --gray-700: #616161; --gray-800: #424242; --gray-900: #212121; --white: #ffffff;
  --radius-sm: 6px; --radius-md: 8px; --radius-lg: 10px;
  --shadow-card: 0 2px 8px rgba(0,0,0,0.08);
  --red: #f44336; --orange: #ff9800; --blue: #2196f3; --green: #00c853;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; background: var(--gray-100); color: var(--gray-900); font-size: 15px; padding-bottom: 80px; }
.header { background: linear-gradient(90deg, var(--primary) 0%, var(--accent) 100%); color: #fff; padding: 16px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.15); display: flex; align-items: center; gap: 12px; }
.header__back { font-size: 20px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 50%; background: rgba(255,255,255,0.2); cursor: pointer; }
.header__title { font-size: 18px; font-weight: 600; }
.container { padding: 12px 16px; }
.date-switch { display: flex; gap: 6px; margin-bottom: 14px; }
.date-tab { padding: 7px 14px; border-radius: 20px; font-size: 13px; cursor: pointer; background: var(--white); border: 1px solid var(--gray-300); color: var(--gray-600); }
.date-tab--active { background: var(--primary); color: #fff; border-color: var(--primary); }
.stat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 14px; }
.stat-card { background: var(--white); border-radius: var(--radius-lg); padding: 16px; box-shadow: var(--shadow-card); border: 1px solid var(--gray-200); }
.stat-card__value { font-size: 22px; font-weight: 700; color: var(--primary); margin-bottom: 4px; }
.stat-card__label { font-size: 12px; color: var(--gray-600); }
.stat-card__compare { font-size: 12px; color: var(--gray-500); margin-top: 6px; }
.section { background: var(--white); border-radius: var(--radius-lg); padding: 16px; box-shadow: var(--shadow-card); border: 1px solid var(--gray-200); margin-bottom: 12px; }
.section__title { font-size: 15px; font-weight: 600; color: var(--gray-900); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
.section__title::before { content: ''; display: inline-block; width: 4px; height: 18px; background: var(--primary); border-radius: 2px; }
.chart-bar { display: flex; align-items: flex-end; gap: 8px; height: 120px; padding-top: 16px; }
.chart-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
.chart-col__bar { width: 100%; max-width: 40px; border-radius: 4px 4px 0 0; background: var(--primary); min-height: 4px; }
.chart-col__label { font-size: 11px; color: var(--gray-600); }
.satisfaction { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--gray-200); }
.satisfaction:last-child { border-bottom: none; }
.satisfaction__label { font-size: 14px; color: var(--gray-800); }
.satisfaction__value { font-size: 14px; font-weight: 600; }
.tabbar { position: fixed; bottom: 0; left: 0; right: 0; height: 64px; background: var(--white); border-top: 1px solid var(--gray-200); display: flex; z-index: 100; box-shadow: 0 -2px 8px rgba(0,0,0,0.08); }
.tabbar__item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; color: var(--gray-500); font-size: 11px; cursor: pointer; }
.tabbar__item--active { color: var(--primary); }
.tabbar__icon { font-size: 22px; }
.loading { text-align: center; color: var(--gray-500); padding: 20px; }
</style>
</head>
<body>
<div class="header"><div class="header__back" onclick="history.back()">←</div><div class="header__title">报表统计</div></div>
<div class="container">
  <div class="date-switch" id="dateSwitch">
    <div class="date-tab date-tab--active" data-range="today" onclick="switchRange('today')">今日</div>
    <div class="date-tab" data-range="week" onclick="switchRange('week')">本周</div>
    <div class="date-tab" data-range="month" onclick="switchRange('month')">本月</div>
    <div class="date-tab" data-range="quarter" onclick="switchRange('quarter')">季度</div>
  </div>
  <div class="stat-grid" id="statGrid">
    <div class="stat-card">
      <div class="stat-card__value" id="statTotal">--</div>
      <div class="stat-card__label">工单总量</div>
      <div class="stat-card__compare" id="statTotalCompare">加载中...</div>
    </div>
    <div class="stat-card">
      <div class="stat-card__value" id="statDone">--</div>
      <div class="stat-card__label">已完成</div>
      <div class="stat-card__compare" id="statDoneCompare">--</div>
    </div>
    <div class="stat-card">
      <div class="stat-card__value" id="statAvgTime">--</div>
      <div class="stat-card__label">平均处理(小时)</div>
      <div class="stat-card__compare" id="statAvgTimeCompare">--</div>
    </div>
    <div class="stat-card">
      <div class="stat-card__value" id="statSatisfaction">--</div>
      <div class="stat-card__label">住户满意度</div>
      <div class="stat-card__compare" id="statSatisfactionCompare">--</div>
    </div>
  </div>
  <div class="section">
    <div class="section__title">工单趋势</div>
    <div class="chart-bar" id="chartBar">
      <div class="loading">加载中...</div>
    </div>
  </div>
  <div class="section">
    <div class="section__title">工单类型分布</div>
    <div id="typeDistribution">
      <div class="loading">加载中...</div>
    </div>
  </div>
</div>
<div class="tabbar">
  <div class="tabbar__item" onclick="location.href='index.html'"><div class="tabbar__icon">🏠</div><div>工作台</div></div>
  <div class="tabbar__item tabbar__item--active" onclick="location.href='tasks.html'"><div class="tabbar__icon">📋</div><div>工单</div></div>
  <div class="tabbar__item" onclick="location.href='residents.html'"><div class="tabbar__icon">👥</div><div>住户</div></div>
  <div class="tabbar__item" onclick="location.href='profile.html'"><div class="tabbar__icon">👤</div><div>我的</div></div>
</div>

<script>
let currentRange = 'today';

// 检查登录
if (!API.auth.isLoggedIn()) {
  alert('请先登录');
}

// 加载报表数据
async function loadReports(range = 'today') {
  try {
    const res = await API.admin.dashboard();
    if (res.code === 0 && res.data) {
      renderReports(res.data, range);
    }
  } catch (err) {
    console.error('加载报表失败:', err);
    document.querySelectorAll('.loading').forEach(el => el.textContent = '加载失败');
  }
}

// 渲染报表
function renderReports(data, range) {
  // 更新统计卡片
  document.getElementById('statTotal').textContent = data.work_orders_total || 0;
  document.getElementById('statDone').textContent = data.work_orders_completed || 0;
  document.getElementById('statDoneCompare').textContent = `完成率 ${(data.completion_rate || 0)}%`;
  document.getElementById('statAvgTime').textContent = (data.avg_handle_hours || 0).toFixed(1);
  document.getElementById('statSatisfaction').textContent = (data.satisfaction_rate || 0) + '%';
  document.getElementById('statSatisfactionCompare').textContent = '↑ 较上月 +2.1%';

  // 生成趋势图（模拟数据）
  const days = range === 'today' ? ['6:00', '9:00', '12:00', '15:00', '18:00', '21:00', '24:00'] :
           (range === 'week' ? ['周一', '周二', '周三', '周四', '周五', '周六', '周日'] :
           ['第1周', '第2周', '第3周', '第4周']);
  const maxHeight = 100;
  const chartBar = document.getElementById('chartBar');
  chartBar.innerHTML = days.map((day, i) => {
    const height = 20 + Math.random() * 80; // 模拟高度
    return `
      <div class="chart-col">
        <div class="chart-col__bar" style="height:${height}%"></div>
        <div class="chart-col__label">${day}</div>
      </div>
    `;
  }).join('');

  // 工单类型分布
  const typeDist = document.getElementById('typeDistribution');
  const repairCount = data.type_repair || 18;
  const complaintCount = data.type_complaint || 10;
  const applyCount = data.type_apply || 8;
  const equipmentCount = data.type_equipment || 6;
  const total = repairCount + complaintCount + applyCount + equipmentCount;
  typeDist.innerHTML = `
    <div class="satisfaction"><div class="satisfaction__label">🔧 报修工单</div><div class="satisfaction__value" style="color:var(--blue)">${repairCount}单 (${(repairCount/total*100).toFixed(1)}%)</div></div>
    <div class="satisfaction"><div class="satisfaction__label">💬 投诉建议</div><div class="satisfaction__value" style="color:var(--orange)">${complaintCount}单 (${(complaintCount/total*100).toFixed(1)}%)</div></div>
    <div class="satisfaction"><div class="satisfaction__label">📝 各类申请</div><div class="satisfaction__value" style="color:var(--green)">${applyCount}单 (${(applyCount/total*100).toFixed(1)}%)</div></div>
    <div class="satisfaction"><div class="satisfaction__label">🔧 设备报修</div><div class="satisfaction__value" style="color:var(--red)">${equipmentCount}单 (${(equipmentCount/total*100).toFixed(1)}%)</div></div>
  `;
}

// 切换时间范围
function switchRange(range) {
  currentRange = range;
  document.querySelectorAll('.date-tab').forEach(t => {
    t.classList.toggle('date-tab--active', t.dataset.range === range);
  });
  loadReports(range);
}

// 页面加载
document.addEventListener('DOMContentLoaded', () => loadReports());
</script>
</body>
</html>
