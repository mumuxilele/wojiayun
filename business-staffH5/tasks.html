<!DOCTYPE html>
<html lang="zh-CN" data-theme="commercial">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>工单管理 - 粤海物业员工端</title>
<script src="../api.js"></script>
<style>
:root {
  --primary: #00dea0; --primary-light: #33e5b5; --primary-dark: #00b383; --primary-bg: #e8f5e9;
  --accent: #2c3e50; --accent-light: #34495e; --accent-bg: #f0f2f5;
  --gray-50: #fafafa; --gray-100: #f5f5f5; --gray-200: #eeeeee;
  --gray-300: #e0e0e0; --gray-400: #bdbdbd; --gray-500: #9e9e9e; --gray-600: #757575;
  --gray-700: #616161; --gray-800: #424242; --gray-900: #212121; --white: #ffffff;
  --radius-sm: 6px; --radius-md: 8px; --radius-lg: 10px;
  --shadow-card: 0 2px 8px rgba(0,0,0,0.08);
  --red: #f44336; --orange: #ff9800; --blue: #2196f3; --green: #00c853;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; background: var(--gray-100); color: var(--gray-900); font-size: 15px; padding-bottom: 80px; }
.header { background: linear-gradient(90deg, var(--primary) 0%, var(--accent) 100%); color: #fff; padding: 16px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.15); display: flex; align-items: center; gap: 12px; }
.header__back { font-size: 20px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 50%; background: rgba(255,255,255,0.2); cursor: pointer; }
.header__title { font-size: 18px; font-weight: 600; }
.container { padding: 12px 16px; }
.tabs { display: flex; background: var(--white); border-radius: var(--radius-lg); box-shadow: var(--shadow-card); overflow: hidden; margin-bottom: 12px; }
.tab { flex: 1; text-align: center; padding: 12px 0; font-size: 14px; color: var(--gray-600); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; }
.tab--active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 600; }
.search-bar { display: flex; gap: 8px; margin-bottom: 12px; }
.search-input { flex: 1; padding: 10px 12px; border: 1px solid var(--gray-300); border-radius: var(--radius-md); font-size: 14px; outline: none; background: var(--white); }
.search-input:focus { border-color: var(--primary); }
.filter-btn { padding: 10px 16px; background: var(--white); border: 1px solid var(--gray-300); border-radius: var(--radius-md); font-size: 14px; color: var(--gray-600); cursor: pointer; white-space: nowrap; }
.order-list { display: flex; flex-direction: column; gap: 10px; }
.order-card { background: var(--white); border-radius: var(--radius-lg); padding: 14px; box-shadow: var(--shadow-card); border-left: 4px solid var(--primary); }
.order-card--urgent { border-left-color: var(--red); }
.order-card--pending { border-left-color: var(--orange); }
.order-card--done { border-left-color: var(--green); }
.order-card__top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.order-card__title { font-size: 15px; font-weight: 600; color: var(--gray-900); }
.order-card__badge { font-size: 11px; padding: 3px 8px; border-radius: 20px; color: #fff; font-weight: 500; white-space: nowrap; }
.badge--urgent { background: var(--red); }
.badge--pending { background: var(--orange); }
.badge--done { background: var(--green); }
.badge--normal { background: var(--primary); }
.order-card__desc { font-size: 13px; color: var(--gray-600); margin-bottom: 10px; }
.order-card__meta { display: flex; gap: 16px; font-size: 12px; color: var(--gray-500); }
.order-card__actions { display: flex; gap: 8px; margin-top: 10px; justify-content: flex-end; }
.btn { padding: 7px 14px; border-radius: var(--radius-sm); font-size: 13px; border: none; cursor: pointer; }
.btn--primary { background: var(--primary); color: #fff; }
.btn--outline { background: transparent; border: 1px solid var(--primary); color: var(--primary); }
.btn--red { background: var(--red); color: #fff; }
.tabbar { position: fixed; bottom: 0; left: 0; right: 0; height: 64px; background: var(--white); border-top: 1px solid var(--gray-200); display: flex; z-index: 100; box-shadow: 0 -2px 8px rgba(0,0,0,0.08); }
.tabbar__item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; color: var(--gray-500); font-size: 11px; cursor: pointer; }
.tabbar__item--active { color: var(--primary); }
.tabbar__icon { font-size: 22px; }
.loading { text-align: center; color: var(--gray-500); padding: 20px; }
</style>
</head>
<body>
<div class="header"><div class="header__back" onclick="history.back()">←</div><div class="header__title">工单管理</div></div>
<div class="container">
  <div class="tabs" id="tabBar">
    <div class="tab tab--active" data-status="" onclick="switchTab('')">全部</div>
    <div class="tab" data-status="待派单" onclick="switchTab('待派单')">待派单</div>
    <div class="tab" data-status="处理中" onclick="switchTab('处理中')">进行中</div>
    <div class="tab" data-status="已完成" onclick="switchTab('已完成')">已完成</div>
  </div>
  <div class="search-bar">
    <input class="search-input" id="searchInput" placeholder="🔍 搜索工单号/住户/楼栋..." oninput="searchOrders()">
    <button class="filter-btn">☰ 筛选</button>
  </div>
  <div class="order-list" id="orderList">
    <div class="loading">加载中...</div>
  </div>
</div>
<div class="tabbar">
  <div class="tabbar__item" onclick="location.href='index.html'"><div class="tabbar__icon">🏠</div><div>工作台</div></div>
  <div class="tabbar__item tabbar__item--active"><div class="tabbar__icon">📋</div><div>工单</div></div>
  <div class="tabbar__item" onclick="location.href='residents.html'"><div class="tabbar__icon">👥</div><div>住户</div></div>
  <div class="tabbar__item" onclick="location.href='profile.html'"><div class="tabbar__icon">👤</div><div>我的</div></div>
</div>

<script>
let orders = [];
let currentStatus = '';

// 检查登录
if (!API.auth.isLoggedIn()) {
  alert('请先登录');
}

// 加载工单数据
async function loadOrders(status = '', keyword = '') {
  try {
    const res = await API.workOrders.list(status, '', keyword);
    if (res.code === 0 && res.data) {
      orders = res.data.items || [];
      renderOrders(orders);
      updateTabCounts();
    }
  } catch (err) {
    console.error('加载工单失败:', err);
    document.getElementById('orderList').innerHTML = '<div class="loading">加载失败，请刷新重试</div>';
  }
}

// 渲染工单列表
function renderOrders(list) {
  const container = document.getElementById('orderList');
  if (list.length === 0) {
    container.innerHTML = '<div class="loading">暂无工单数据</div>';
    return;
  }
  container.innerHTML = list.map(o => {
    const levelClass = o.level === '紧急' ? 'order-card--urgent' : (o.level === '普通' ? '' : 'order-card--pending');
    const badgeClass = o.level === '紧急' ? 'badge--urgent' : (o.level === '普通' ? 'badge--normal' : 'badge--pending');
    return `
      <div class="order-card ${levelClass}">
        <div class="order-card__top">
          <div class="order-card__title">${o.title || o.description || '未命名工单'}</div>
          <span class="order-card__badge ${badgeClass}">${o.level || '普通'}</span>
        </div>
        <div class="order-card__desc">${o.enterprise_name || ''} ${o.house_no || ''} · ${o.contact_person || ''}</div>
        <div class="order-card__meta">
          <span>📍 ${o.enterprise_name || '未指定'}</span>
          <span>⏰ ${o.create_time?.slice(11,16) || ''}</span>
        </div>
        <div class="order-card__actions">
          ${o.status === '待派单' ? `<button class="btn btn--red" onclick="assignOrder('${o.fid}')">派单</button>` : ''}
          ${o.status === '处理中' ? `<button class="btn btn--primary" onclick="completeOrder('${o.fid}')">完成</button>` : ''}
          <button class="btn btn--outline" onclick="viewOrder('${o.fid}')">详情</button>
        </div>
      </div>
    `;
  }).join('');
}

// 更新Tab计数
function updateTabCounts() {
  const tabs = document.querySelectorAll('.tab');
  const allCount = orders.length;
  const pendingCount = orders.filter(o => !o.status || o.status === '待派单').length;
  const processingCount = orders.filter(o => o.status === '处理中').length;
  const doneCount = orders.filter(o => o.status === '已完成').length;
  
  tabs[0].textContent = `全部(${allCount})`;
  tabs[1].textContent = `待派单(${pendingCount})`;
  tabs[2].textContent = `进行中(${processingCount})`;
  tabs[3].textContent = `已完成(${doneCount})`;
}

// 切换Tab
function switchTab(status) {
  currentStatus = status;
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('tab--active', t.dataset.status === status);
  });
  const keyword = document.getElementById('searchInput').value.trim();
  loadOrders(status, keyword);
}

// 搜索
function searchOrders() {
  const keyword = document.getElementById('searchInput').value.trim();
  loadOrders(currentStatus, keyword);
}

// 派单
async function assignOrder(fid) {
  const assigneeName = prompt('请输入派单给（员工姓名）:');
  if (!assigneeName) return;
  try {
    const res = await API.workOrders.assign(fid, '', assigneeName);
    if (res.code === 0) {
      alert('派单成功');
      loadOrders(currentStatus);
    } else {
      alert(res.message || '派单失败');
    }
  } catch (err) {
    alert('派单失败: ' + err.message);
  }
}

// 完成工单
async function completeOrder(fid) {
  const rating = prompt('请评分(1-5):', '5');
  if (!rating) return;
  try {
    const res = await API.workOrders.complete(fid, parseInt(rating));
    if (res.code === 0) {
      alert('工单已完成');
      loadOrders(currentStatus);
    } else {
      alert(res.message || '操作失败');
    }
  } catch (err) {
    alert('操作失败: ' + err.message);
  }
}

// 查看详情
function viewOrder(fid) {
  alert('工单FID: ' + fid + '\n（详情页待开发）');
}

// 页面加载
document.addEventListener('DOMContentLoaded', () => loadOrders());
</script>
</body>
</html>
