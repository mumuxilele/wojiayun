<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>申请单列表</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif; 
            background: #F8F9FA; 
            height: 100%;
            overflow: hidden;
        }
        
        /* 固定头部区域 */
        .header-fixed {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: #F8F9FA;
            padding: 12px 20px 16px;
            z-index: 100;
            border-bottom: 1px solid transparent;
        }
        .header-fixed.scrolled {
            border-bottom-color: #E5E6EB;
        }
        
        /* 搜索框 */
        .search-bar {
            background: #FFFFFF;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.05);
        }
        .search-input {
            width: 100%;
            height: 40px;
            padding: 0 12px;
            border: 1px solid #E5E6EB;
            border-radius: 8px;
            font-size: 14px;
            color: #1D2129;
            background: #F8F9FA;
            outline: none;
        }
        .search-input:focus {
            border-color: #30c2b3;
        }
        .search-input::placeholder {
            color: #86909C;
        }
        
        /* 筛选栏 */
        .filter-bar {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 4px;
        }
        .filter-bar::-webkit-scrollbar {
            display: none;
        }
        .filter-item {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            white-space: nowrap;
            background: #FFFFFF;
            color: #4E5969;
            border: 1px solid #E5E6EB;
            cursor: pointer;
            transition: all 0.2s;
        }
        .filter-item.active {
            background: #30c2b3;
            color: #FFFFFF;
            border-color: #30c2b3;
        }
        
        /* 可滚动内容区域 */
        .content-scroll {
            height: 100%;
            padding: 140px 20px 20px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        
        /* 列表卡片 */
        .list-card {
            background: #FFFFFF;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.05);
        }
        .list-card:active {
            background: #fafafa;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: #1D2129;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .status-tag {
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
            color: #FFFFFF;
            margin-left: 12px;
            flex-shrink: 0;
        }
        .status-pending { background: #30c2b3; }
        .status-processing { background: #FF7D00; }
        .status-completed { background: #00B42A; }
        .status-rejected { background: #F53F3F; }
        
        .card-info {
            font-size: 14px;
            color: #4E5969;
            line-height: 1.8;
        }
        .card-info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
        }
        .card-label {
            color: #86909C;
        }
        .card-value {
            color: #1D2129;
            font-weight: 500;
        }
        .card-time {
            font-size: 12px;
            color: #86909C;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid #F0F0F0;
        }
        
        /* 空状态 */
        .empty {
            text-align: center;
            padding: 60px 20px;
            color: #86909C;
        }
        .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        .empty-text {
            font-size: 14px;
        }
        
        /* 加载更多 */
        .load-more {
            text-align: center;
            padding: 20px;
            color: #86909C;
            font-size: 14px;
        }
        
        /* 优先级标记 */
        .priority {
            color: #F53F3F;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <!-- 固定头部 -->
    <div class="header-fixed" id="headerFixed">
        <!-- 搜索框 -->
        <div class="search-bar">
            <input type="text" class="search-input" id="keywordInput" placeholder="搜索申请人、标题">
        </div>
        
        <!-- 筛选栏 -->
        <div class="filter-bar">
            <div class="filter-item active" data-status="">全部</div>
            <div class="filter-item" data-status="pending">待处理</div>
            <div class="filter-item" data-status="processing">处理中</div>
            <div class="filter-item" data-status="completed">已完成</div>
            <div class="filter-item" data-status="rejected">已拒绝</div>
        </div>
    </div>
    
    <!-- 可滚动内容区域 -->
    <div class="content-scroll" id="contentScroll">
        <!-- 列表容器 -->
        <div id="listContainer">
            <div class="empty">
                <div class="empty-icon">📋</div>
                <div class="empty-text">加载中...</div>
            </div>
        </div>
    </div>

    <script>
        // Token 管理
        const urlParams = new URLSearchParams(location.search);
        let token = urlParams.get('access_token');
        let isdev = urlParams.get('isdev') || '0';
        
        if (token) {
            localStorage.setItem('staff_token', token);
            localStorage.setItem('staff_isdev', isdev);
        } else {
            token = localStorage.getItem('staff_token');
            isdev = localStorage.getItem('staff_isdev') || '0';
        }

        if (!token) {
            document.getElementById('listContainer').innerHTML = '<div class="empty"><div class="empty-text">请先登录</div></div>';
            throw new Error('No token');
        }

        let currentStatus = '';
        let currentKeyword = '';
        let currentPage = 1;
        let isLoading = false;
        
        function getStatusClass(s) { 
            return 'status-tag status-' + (s || 'pending'); 
        }
        
        function getStatusText(s) { 
            return {pending:'待处理', processing:'处理中', completed:'已完成', rejected:'已拒绝'}[s] || s; 
        }
        
        function formatTime(timeStr) {
            if (!timeStr) return '';
            let d = new Date(timeStr);
            if (isNaN(d.getTime())) {
                d = new Date(timeStr.replace(' ', 'T'));
            }
            if (isNaN(d.getTime())) return timeStr;
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            const hour = String(d.getHours()).padStart(2, '0');
            const minute = String(d.getMinutes()).padStart(2, '0');
            return `${month}-${day} ${hour}:${minute}`;
        }
        
        async function loadList(append = false) {
            if (isLoading) return;
            isLoading = true;
            
            if (!append) {
                currentPage = 1;
                document.getElementById('listContainer').innerHTML = '<div class="empty"><div class="empty-text">加载中...</div></div>';
            }
            
            let url = '/api/staff/applications?page=' + currentPage + '&page_size=20';
            if (currentStatus) url += '&status=' + currentStatus;
            if (currentKeyword) url += '&keyword=' + encodeURIComponent(currentKeyword);
            url += '&access_token=' + encodeURIComponent(token) + '&isdev=' + isdev;
            
            try {
                const res = await fetch(url);
                const data = await res.json();
                
                if (data.success && data.data && data.data.items && data.data.items.length > 0) {
                    const html = data.data.items.map(item => {
                        const priorityHtml = item.priority > 1 ? '<span class="priority">!优先</span>' : '';
                        return `
                            <div class="list-card" onclick="goToDetail(${item.id})">
                                <div class="card-header">
                                    <div class="card-title">${escapeHtml(item.title || '无标题')}</div>
                                    <span class="${getStatusClass(item.status)}">${getStatusText(item.status)}</span>
                                </div>
                                <div class="card-info">
                                    <div class="card-info-row">
                                        <span><span class="card-label">申请人：</span>${escapeHtml(item.user_name || '-')}</span>
                                        ${priorityHtml}
                                    </div>
                                    <div class="card-info-row">
                                        <span><span class="card-label">类型：</span>${escapeHtml(item.app_type_name || item.app_type || '-')}</span>
                                    </div>
                                </div>
                                <div class="card-time">提交时间：${formatTime(item.created_at)}</div>
                            </div>
                        `;
                    }).join('');
                    
                    if (append) {
                        document.getElementById('listContainer').insertAdjacentHTML('beforeend', html);
                    } else {
                        document.getElementById('listContainer').innerHTML = html;
                    }
                    
                    // 检查是否有更多数据
                    if (data.data.items.length >= 20) {
                        if (!document.getElementById('loadMore')) {
                            document.getElementById('listContainer').insertAdjacentHTML('afterend', 
                                '<div class="load-more" id="loadMore" onclick="loadMore()">点击加载更多</div>');
                        }
                    } else {
                        const loadMoreEl = document.getElementById('loadMore');
                        if (loadMoreEl) loadMoreEl.remove();
                    }
                } else if (data.msg && data.msg.includes('登录')) {
                    localStorage.removeItem('staff_token');
                    location.reload();
                } else {
                    if (!append) {
                        document.getElementById('listContainer').innerHTML = 
                            '<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">暂无申请单</div></div>';
                    }
                }
            } catch(e) {
                if (!append) {
                    document.getElementById('listContainer').innerHTML = 
                        '<div class="empty"><div class="empty-text">加载失败</div></div>';
                }
            } finally {
                isLoading = false;
            }
        }
        
        function loadMore() {
            currentPage++;
            loadList(true);
        }
        
        function goToDetail(id) {
            location.href = 'application_detail.html?id=' + id + '&access_token=' + encodeURIComponent(token) + '&isdev=' + isdev;
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // 筛选事件
        document.querySelectorAll('.filter-item').forEach(el => {
            el.addEventListener('click', () => {
                document.querySelectorAll('.filter-item').forEach(e => e.classList.remove('active'));
                el.classList.add('active');
                currentStatus = el.dataset.status;
                loadList();
            });
        });
        
        // 搜索事件
        document.getElementById('keywordInput').addEventListener('input', (e) => {
            currentKeyword = e.target.value;
            clearTimeout(window.searchTimer);
            window.searchTimer = setTimeout(() => loadList(), 500);
        });
        
        // 滚动监听
        const contentScroll = document.getElementById('contentScroll');
        const headerFixed = document.getElementById('headerFixed');
        contentScroll.addEventListener('scroll', () => {
            if (contentScroll.scrollTop > 10) {
                headerFixed.classList.add('scrolled');
            } else {
                headerFixed.classList.remove('scrolled');
            }
        });
        
        // 初始化加载
        loadList();
    </script>
</body>
</html>
