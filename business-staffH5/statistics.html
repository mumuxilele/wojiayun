<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据统计 - 员工端</title>
    <link rel="stylesheet" href="../business-common/list-style.css">
    <style>
        /* 页面特有样式 */
        .actions .link { color: var(--el-color-primary); cursor: pointer; margin-right: 10px; }
        .actions .link:hover { text-decoration: underline; }
        .actions .link.danger { color: var(--el-color-danger); }
        /* 弹窗样式保留 */
        
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.45); z-index: 200; }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background: var(--el-bg-white); border-radius: 4px; width: 580px; max-width: 95vw; max-height: 85vh; flex-direction: column; z-index: 201; box-shadow: 0 4px 20px rgba(0,0,0,.18); }
        .modal.show { display: flex; }
        .modal-header { padding: 16px 20px; border-bottom: 1px solid var(--el-border-color-light); display: flex; justify-content: space-between; align-items: center; }
        .modal-title { font-size: 16px; font-weight: 600; color: var(--el-text-primary); }
        .modal-close { background: none; border: none; width: 32px; height: 32px; border-radius: 4px; cursor: pointer; font-size: 16px; color: var(--el-text-secondary); display: flex; align-items: center; justify-content: center; }
        .modal-close:hover { background: var(--el-bg-light); }
        .modal-body { padding: 20px; overflow-y: auto; flex: 1; }
        .modal-footer { padding: 12px 20px; border-top: 1px solid var(--el-border-color-light); display: flex; justify-content: flex-end; gap: 10px; }
    </style>
</head>
<body class="wy-design-list">
    <!-- 顶部区域 -->
    <div class="wy-design-list_top">
        <div class="wy-design-list_top_title">
            <h1 class="wy-design-list_title">数据统计 - 员工端</h1>
            <div class="wy-design-list_space"></div>
            <div class="wy-design-list_btn-group">
                <div class="wy-design-list_btn">
                    <button type="button" class="el-button el-button--primary el-button--small" onclick="loadList(1)">
                        <span>搜索</span>
                    </button>
                </div>
                <div class="wy-design-list_btn">
                    <button type="button" class="el-button el-button--small" onclick="resetSearch()">
                        <span>重置</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 筛选区域 -->
    <div class="wy-design-list_filter">
        <div class="wy-design-list_other">
            <div class="el-input el-input--small" style="width: 200px;">
                <input type="text" id="keyword" placeholder="搜索关键词" class="el-input__inner">
            </div>
        </div>
    </div>

    <!-- 表格区域 -->
    <div class="wy-design-table wy-design-table_main wy-design-table_has-bar">
        <div class="wy-design-table_bar">
            <i class="wy-design-table_set el-icon-setting" title="列设置"></i>
            <span class="wy-design-table_total">共 <em id="totalCount">0</em> 条</span>
            <div class="wy-pages">
                <div class="wy-pages_total">第<em id="currentPage">1</em>/<em id="totalPages">1</em>页</div>
                <div class="wy-pages_prev el-icon-arrow-left" id="prevBtn" onclick="changePage(-1)"></div>
                <div class="wy-pages_next el-icon-arrow-right" id="nextBtn" onclick="changePage(1)"></div>
            </div>
        </div>
        <table class="el-table el-table--fit el-table--border el-table--enable-row-hover">
            <thead class="el-table__header">
                <tr>
                    <th><div class="cell">名称</div></th>
                    <th><div class="cell">操作</div></th>
                </tr>
            </thead>
            <tbody class="el-table__body" id="listBody">
                <tr><td colspan="10" style="text-align: center; padding: 60px; color: var(--el-text-secondary);">加载中...</td></tr>
            </tbody>
        </table>
    </div>

    

    <script>
    const urlParams = new URLSearchParams(location.search);
        let token = urlParams.get('access_token');
        let isdev = urlParams.get('isdev') || '0';

        if (token) {
            localStorage.setItem('staff_token', token);
            localStorage.setItem('staff_isdev', isdev);
        } else {
            token = localStorage.getItem('staff_token');
            isdev = localStorage.getItem('staff_isdev') || '0';
        }

        if (!token) {
            document.body.innerHTML = '<div class="login-tip"><h2>请先登录</h2></div>';
            throw new Error('No token');
        }

        function goBack() {
            location.href = 'index.html?access_token=' + encodeURIComponent(token) + '&isdev=' + isdev;
            return false;
        }

        let currentRange = 'today';
        let trendChart, incomeChart, appStatusChart, orderStatusChart;

        function switchRange(range, el) {
            currentRange = range;
            document.querySelectorAll('.time-tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('customDatePanel').style.display = range === 'custom' ? 'flex' : 'none';
            if (range !== 'custom') loadAll();
        }

        function loadCustomRange() {
            const from = document.getElementById('dateFrom').value;
            const to = document.getElementById('dateTo').value;
            if (!from || !to) { alert('请选择日期范围'); return; }
            loadAll(from, to);
        }

        async function apiGet(url) {
            try {
                const res = await fetch(url + '&access_token=' + encodeURIComponent(token) + '&isdev=' + isdev);
                return await res.json();
            } catch(e) {
                console.error(e);
                return null;
            }
        }

        function calcChange(current, previous) {
            if (!previous || previous === 0) return current > 0 ? '+100%' : '';
            const change = ((current - previous) / previous * 100).toFixed(1);
            return change > 0 ? '+' + change + '%' : change + '%';
        }

        async function loadAll(dateFrom, dateTo) {
            let params = '';
            if (dateFrom) params += '&date_from=' + dateFrom;
            if (dateTo) params += '&date_to=' + dateTo;

            // 加载基础统计
            const statsData = await apiGet('/api/staff/statistics?range=' + currentRange + params);
            if (statsData && statsData.success && statsData.data) {
                const s = statsData.data;
                document.getElementById('statOrders').textContent = s.total_orders || 0;
                document.getElementById('statIncome').textContent = '\u00a5' + (s.total_income || 0).toFixed(2);
                document.getElementById('statApps').textContent = s.total_applications || 0;
                document.getElementById('statPending').textContent = s.pending_applications || 0;

                if (s.prev_orders !== undefined) {
                    const changeText = calcChange(s.total_orders || 0, s.prev_orders);
                    const el = document.getElementById('statOrdersChange');
                    el.textContent = changeText ? '较上期 ' + changeText : '';
                    el.className = 'stat-change ' + (changeText.startsWith('+') ? 'up' : 'down');
                }
                if (s.prev_income !== undefined) {
                    const changeText = calcChange(s.total_income || 0, s.prev_income);
                    const el = document.getElementById('statIncomeChange');
                    el.textContent = changeText ? '较上期 ' + changeText : '';
                    el.className = 'stat-change ' + (changeText.startsWith('+') ? 'up' : 'down');
                }
                if (s.prev_apps !== undefined) {
                    const changeText = calcChange(s.total_applications || 0, s.prev_apps);
                    const el = document.getElementById('statAppsChange');
                    el.textContent = changeText ? '较上期 ' + changeText : '';
                    el.className = 'stat-change ' + (changeText.startsWith('+') ? 'up' : 'down');
                }

                // 申请状态分布（饼图）
                renderAppStatusChart(s.application_stats || []);
                // 订单状态分布（饼图）
                renderOrderStatusChart(s.order_stats || []);
            }

            // 加载趋势数据
            const trendData = await apiGet('/api/staff/statistics/trend?range=' + currentRange + params);
            if (trendData && trendData.success && trendData.data) {
                renderTrendChart(trendData.data.trend || []);
                renderIncomeChart(trendData.data.trend || []);
            }

            // 加载个人绩效
            const perfData = await apiGet('/api/staff/statistics/performance?range=' + currentRange + params);
            if (perfData && perfData.success && perfData.data) {
                const p = perfData.data;
                document.getElementById('myProcessed').textContent = p.processed_count || 0;
                document.getElementById('myCompleted').textContent = p.completed_orders || 0;
                document.getElementById('myCompletionRate').textContent = (p.completion_rate || 0) + '%';
            }
        }

        function renderIncomeChart(trend) {
            if (!incomeChart) {
                incomeChart = echarts.init(document.getElementById('incomeChart'));
            }
            const dates = trend.map(t => t.date ? t.date.substring(5) : '');
            const values = trend.map(t => t.income || 0);
            incomeChart.setOption({
                tooltip: { trigger: 'axis', formatter: '{b}<br/>收入: \u00a5{c}' },
                grid: { top: 10, right: 10, bottom: 20, left: 45 },
                xAxis: { type: 'category', data: dates, axisLabel: { fontSize: 11 } },
                yAxis: { type: 'value', axisLabel: { fontSize: 11, formatter: v => v >= 1000 ? (v/1000).toFixed(1)+'k' : v } },
                series: [{
                    data: values,
                    type: 'line',
                    smooth: true,
                    areaStyle: { color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [{offset: 0, color: 'rgba(17,153,142,0.3)'}, {offset: 1, color: 'rgba(17,153,142,0.02)'}]) },
                    lineStyle: { color: '#11998e', width: 2 },
                    itemStyle: { color: '#11998e' }
                }]
            });
        }

        function renderTrendChart(trend) {
            if (!trendChart) {
                trendChart = echarts.init(document.getElementById('trendChart'));
            }
            const dates = trend.map(t => t.date ? t.date.substring(5) : '');
            trendChart.setOption({
                tooltip: { trigger: 'axis' },
                legend: { data: ['订单', '申请'], bottom: 0 },
                grid: { top: 10, right: 10, bottom: 30, left: 35 },
                xAxis: { type: 'category', data: dates, axisLabel: { fontSize: 11 } },
                yAxis: { type: 'value', axisLabel: { fontSize: 11 } },
                series: [
                    { name: '订单', type: 'bar', data: trend.map(t => t.order_cnt || 0), itemStyle: { color: '#1890ff' }, barWidth: '30%' },
                    { name: '申请', type: 'line', data: trend.map(t => t.app_cnt || 0), smooth: true, lineStyle: { color: '#fa8c16' }, itemStyle: { color: '#fa8c16' } }
                ]
            });
        }

        function renderAppStatusChart(stats) {
            if (!appStatusChart) {
                appStatusChart = echarts.init(document.getElementById('appStatusChart'));
            }
            const statusMap = { pending: '待处理', processing: '处理中', completed: '已完成', rejected: '已拒绝', cancelled: '已取消' };
            const colorMap = { pending: '#faad14', processing: '#1890ff', completed: '#52c41a', rejected: '#f5222d', cancelled: '#999' };
            appStatusChart.setOption({
                tooltip: { trigger: 'item', formatter: '{b}: {c} ({d}%)' },
                series: [{
                    type: 'pie', radius: ['40%', '65%'], center: ['50%', '50%'],
                    data: stats.map(s => ({
                        name: statusMap[s.status] || s.status,
                        value: s.cnt,
                        itemStyle: { color: colorMap[s.status] || '#ccc' }
                    })),
                    label: { fontSize: 11, formatter: '{b}\n{d}%' },
                    emphasis: { itemStyle: { shadowBlur: 10, shadowOffsetX: 0, shadowColor: 'rgba(0, 0, 0, 0.2)' } }
                }]
            });
        }

        function renderOrderStatusChart(stats) {
            if (!orderStatusChart) {
                orderStatusChart = echarts.init(document.getElementById('orderStatusChart'));
            }
            const statusMap = { pending: '待支付', paid: '已支付', processing: '处理中', shipped: '已发货', completed: '已完成', cancelled: '已取消', refunding: '退款中', refunded: '已退款' };
            const colorMap = { pending: '#faad14', paid: '#1890ff', processing: '#722ed1', shipped: '#13c2c2', completed: '#52c41a', cancelled: '#999', refunding: '#fa8c16', refunded: '#f5222d' };
            orderStatusChart.setOption({
                tooltip: { trigger: 'item', formatter: '{b}: {c} ({d}%)' },
                series: [{
                    type: 'pie', radius: ['40%', '65%'], center: ['50%', '50%'],
                    data: stats.map(s => ({
                        name: statusMap[s.status] || s.status,
                        value: s.cnt,
                        itemStyle: { color: colorMap[s.status] || '#ccc' }
                    })),
                    label: { fontSize: 11, formatter: '{b}\n{d}%' },
                    emphasis: { itemStyle: { shadowBlur: 10, shadowOffsetX: 0, shadowColor: 'rgba(0, 0, 0, 0.2)' } }
                }]
            });
        }

        // 初始化加载
        loadAll();

        // 窗口大小变化时重绘图表
        window.addEventListener('resize', () => {
            if (incomeChart) incomeChart.resize();
            if (trendChart) trendChart.resize();
            if (appStatusChart) appStatusChart.resize();
            if (orderStatusChart) orderStatusChart.resize();
        });
    </script>
</body>
</html>
