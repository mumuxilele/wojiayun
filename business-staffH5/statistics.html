<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>数据统计</title>
    <link rel="stylesheet" href="/business-common/common.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }
        
        .header-fixed { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: #fff; }
        
        .filter-bar { display: flex; padding: 0 20px; border-bottom: 1px solid #f0f0f0; overflow-x: auto; }
        .filter-item { padding: 12px 16px; font-size: 14px; color: #666; white-space: nowrap; position: relative; }
        .filter-item.active { color: #30c2b3; font-weight: 500; }
        .filter-item.active::after { content: ''; position: absolute; bottom: 0; left: 16px; right: 16px; height: 2px; background: #30c2b3; }
        
        .content { padding-top: 50px; padding-bottom: 20px; }
        
        .stat-cards { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 16px 20px; }
        .stat-card { background: #fff; padding: 16px; border-radius: 12px; text-align: center; }
        .stat-value { font-size: 28px; font-weight: 600; color: #30c2b3; margin-bottom: 4px; }
        .stat-label { font-size: 13px; color: #666; }
        .stat-change { font-size: 12px; margin-top: 4px; }
        .stat-change.up { color: #4caf50; }
        .stat-change.down { color: #f44336; }
        
        .section { background: #fff; margin: 12px 20px; padding: 16px; border-radius: 12px; }
        .section-title { font-size: 15px; font-weight: 500; color: #333; margin-bottom: 16px; display: flex; align-items: center; }
        .section-title::before { content: ''; width: 4px; height: 16px; background: #30c2b3; margin-right: 8px; border-radius: 2px; }
        
        .chart-placeholder { height: 180px; background: #f8f8f8; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #999; font-size: 14px; }
        
        .rank-list { margin-top: 12px; }
        .rank-item { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #f5f5f5; }
        .rank-item:last-child { border-bottom: none; }
        .rank-num { width: 24px; height: 24px; border-radius: 50%; background: #f5f5f5; color: #666; font-size: 12px; display: flex; align-items: center; justify-content: center; margin-right: 12px; }
        .rank-num.top { background: #30c2b3; color: #fff; }
        .rank-name { flex: 1; font-size: 14px; color: #333; }
        .rank-value { font-size: 14px; color: #666; }
        
        .loading, .empty { text-align: center; padding: 40px; color: #999; font-size: 14px; }
    </style>
</head>
<body>
    <div class="header-fixed">
        <div class="filter-bar">
            <div class="filter-item active" onclick="switchRange('today', this)">今日</div>
            <div class="filter-item" onclick="switchRange('week', this)">本周</div>
            <div class="filter-item" onclick="switchRange('month', this)">本月</div>
            <div class="filter-item" onclick="switchRange('year', this)">本年</div>
        </div>
    </div>

    <div class="content">
        <div class="stat-cards">
            <div class="stat-card">
                <div class="stat-value" id="statOrders">128</div>
                <div class="stat-label">订单数</div>
                <div class="stat-change up">+12.5%</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statIncome">¥8,520</div>
                <div class="stat-label">收入</div>
                <div class="stat-change up">+8.3%</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statApps">45</div>
                <div class="stat-label">申请单</div>
                <div class="stat-change down">-2.1%</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statUsers">89</div>
                <div class="stat-label">新增用户</div>
                <div class="stat-change up">+15.2%</div>
            </div>
        </div>
        
        <div class="section">
            <div class="section-title">趋势分析</div>
            <div class="chart-placeholder">📊 趋势图表区域</div>
        </div>
        
        <div class="section">
            <div class="section-title">热门服务TOP5</div>
            <div class="rank-list">
                <div class="rank-item">
                    <div class="rank-num top">1</div>
                    <div class="rank-name">会议室A</div>
                    <div class="rank-value">56次</div>
                </div>
                <div class="rank-item">
                    <div class="rank-num top">2</div>
                    <div class="rank-name">工位B区</div>
                    <div class="rank-value">42次</div>
                </div>
                <div class="rank-item">
                    <div class="rank-num top">3</div>
                    <div class="rank-name">洽谈室C</div>
                    <div class="rank-value">38次</div>
                </div>
                <div class="rank-item">
                    <div class="rank-num">4</div>
                    <div class="rank-name">打印服务</div>
                    <div class="rank-value">25次</div>
                </div>
                <div class="rank-item">
                    <div class="rank-num">5</div>
                    <div class="rank-name">储物柜</div>
                    <div class="rank-value">18次</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('access_token') || new URLSearchParams(location.search).get('access_token') || '';
        let currentRange = 'today';
        
        function switchRange(range, el) {
            currentRange = range;
            document.querySelectorAll('.filter-item').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            loadData();
        }
        
        function loadData() {
            // 模拟数据加载
            const mockData = {
                today: { orders: 128, income: 8520, apps: 45, users: 89 },
                week: { orders: 856, income: 52300, apps: 312, users: 456 },
                month: { orders: 3521, income: 215600, apps: 1245, users: 1890 },
                year: { orders: 42156, income: 2580000, apps: 15230, users: 22500 }
            };
            
            const data = mockData[currentRange];
            document.getElementById('statOrders').textContent = data.orders;
            document.getElementById('statIncome').textContent = '¥' + data.income.toLocaleString();
            document.getElementById('statApps').textContent = data.apps;
            document.getElementById('statUsers').textContent = data.users;
        }
        
        loadData();
    </script>
</body>
</html>
