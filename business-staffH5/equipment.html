<!DOCTYPE html>
<html lang="zh-CN" data-theme="commercial">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>设备管理 - 粤海物业员工端</title>
<script src="../api.js"></script>
<style>
:root {
  --primary: #00dea0; --primary-light: #33e5b5; --primary-dark: #00b383; --primary-bg: #e8f5e9;
  --accent: #2c3e50; --accent-light: #34495e; --accent-bg: #f0f2f5;
  --gray-50: #fafafa; --gray-100: #f5f5f5; --gray-200: #eeeeee;
  --gray-300: #e0e0e0; --gray-400: #bdbdbd; --gray-500: #9e9e9e; --gray-600: #757575;
  --gray-700: #616161; --gray-800: #424242; --gray-900: #212121; --white: #ffffff;
  --radius-sm: 6px; --radius-md: 8px; --radius-lg: 10px;
  --shadow-card: 0 2px 8px rgba(0,0,0,0.08);
  --red: #f44336; --orange: #ff9800; --green: #00c853;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; background: var(--gray-100); color: var(--gray-900); font-size: 15px; padding-bottom: 80px; }
.header { background: linear-gradient(90deg, var(--primary) 0%, var(--accent) 100%); color: #fff; padding: 16px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.15); display: flex; align-items: center; gap: 12px; }
.header__back { font-size: 20px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 50%; background: rgba(255,255,255,0.2); cursor: pointer; }
.header__title { font-size: 18px; font-weight: 600; }
.container { padding: 12px 16px; }
.summary { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 14px; }
.summary-card { background: var(--white); border-radius: var(--radius-lg); padding: 14px; box-shadow: var(--shadow-card); text-align: center; }
.summary-card__num { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
.summary-card__num--green { color: var(--primary); }
.summary-card__num--red { color: var(--red); }
.summary-card__label { font-size: 12px; color: var(--gray-600); }
.category-tabs { display: flex; gap: 6px; margin-bottom: 12px; overflow-x: auto; }
.cat-tab { padding: 7px 14px; border-radius: 20px; font-size: 13px; cursor: pointer; white-space: nowrap; background: var(--white); border: 1px solid var(--gray-300); color: var(--gray-600); }
.cat-tab--active { background: var(--primary); color: #fff; border-color: var(--primary); }
.equip-list { display: flex; flex-direction: column; gap: 10px; }
.equip-card { background: var(--white); border-radius: var(--radius-lg); padding: 14px; box-shadow: var(--shadow-card); cursor: pointer; transition: transform 0.2s; }
.equip-card:active { transform: scale(0.98); }
.equip-card__top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.equip-card__name { font-size: 15px; font-weight: 600; color: var(--gray-900); }
.status { display: inline-block; padding: 3px 8px; border-radius: 12px; font-size: 11px; font-weight: 500; }
.status--normal { background: var(--primary-bg); color: var(--primary); }
.status--fault { background: #ffebee; color: var(--red); }
.status--maint { background: #fff3e0; color: var(--orange); }
.equip-card__info { font-size: 12px; color: var(--gray-600); margin-bottom: 8px; display: flex; gap: 16px; }
.equip-card__footer { display: flex; justify-content: space-between; font-size: 11px; color: var(--gray-500); }
.btn { padding: 7px 14px; border-radius: var(--radius-sm); font-size: 13px; border: none; cursor: pointer; }
.btn--primary { background: var(--primary); color: #fff; }
.tabbar { position: fixed; bottom: 0; left: 0; right: 0; height: 64px; background: var(--white); border-top: 1px solid var(--gray-200); display: flex; z-index: 100; box-shadow: 0 -2px 8px rgba(0,0,0,0.08); }
.tabbar__item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; color: var(--gray-500); font-size: 11px; cursor: pointer; }
.tabbar__item--active { color: var(--primary); }
.tabbar__icon { font-size: 22px; }
.loading { text-align: center; color: var(--gray-500); padding: 20px; }
</style>
</head>
<body>
<div class="header"><div class="header__back" onclick="history.back()">←</div><div class="header__title">设备管理</div></div>
<div class="container">
  <div class="summary">
    <div class="summary-card"><div class="summary-card__num summary-card__num--green" id="totalEquip">--</div><div class="summary-card__label">设备总数</div></div>
    <div class="summary-card"><div class="summary-card__num summary-card__num--red" id="faultEquip">--</div><div class="summary-card__label">故障待修</div></div>
  </div>
  <div class="category-tabs" id="catTabs">
    <div class="cat-tab cat-tab--active" data-type="" onclick="switchCat('')">全部</div>
    <div class="cat-tab" data-type="电梯" onclick="switchCat('电梯')">电梯</div>
    <div class="cat-tab" data-type="消防" onclick="switchCat('消防')">消防</div>
    <div class="cat-tab" data-type="监控" onclick="switchCat('监控')">监控</div>
    <div class="cat-tab" data-type="门禁" onclick="switchCat('门禁')">门禁</div>
    <div class="cat-tab" data-type="配电" onclick="switchCat('配电')">配电</div>
  </div>
  <div class="equip-list" id="equipList">
    <div class="loading">加载中...</div>
  </div>
</div>
<div class="tabbar">
  <div class="tabbar__item" onclick="location.href='index.html'"><div class="tabbar__icon">🏠</div><div>工作台</div></div>
  <div class="tabbar__item" onclick="location.href='tasks.html'"><div class="tabbar__icon">📋</div><div>工单</div></div>
  <div class="tabbar__item" onclick="location.href='residents.html'"><div class="tabbar__icon">👥</div><div>住户</div></div>
  <div class="tabbar__item tabbar__item--active" onclick="location.href='profile.html'"><div class="tabbar__icon">👤</div><div>我的</div></div>
</div>

<script>
let equipments = [];
let currentCat = '';

// 检查登录
if (!API.auth.isLoggedIn()) {
  alert('请先登录');
}

// 加载设备数据（使用后端API，这里用模拟数据）
async function loadEquipments() {
  try {
    // 实际应调用 API.equipments.list()，这里用模拟数据
    equipments = [
      { fid: 'e1', name: 'B栋2号电梯 (三菱GPS-3)', type: '电梯', status: '故障', location: 'B栋2号井道', issue: '变频器故障', last_maint: '2026-04-15' },
      { fid: 'e2', name: '消防泵 (XBD-50)', type: '消防', status: '正常', location: '地下室泵房', issue: '运行平稳', next_maint: '2026-05-10' },
      { fid: 'e3', name: 'C栋大厅监控摄像头', type: '监控', status: '维护中', location: 'C栋大堂', issue: '镜头更换中', maintainer: '赵工' },
      { fid: 'e4', name: '生活水泵 (XBD-40)', type: '配电', status: '正常', location: '地下室泵房', issue: '压力正常', next_maint: '2026-05-10' }
    ];
    renderEquipments(equipments);
    updateSummary();
    updateCatCounts();
  } catch (err) {
    console.error('加载设备失败:', err);
    document.getElementById('equipList').innerHTML = '<div class="loading">加载失败，请刷新重试</div>';
  }
}

// 渲染设备列表
function renderEquipments(list) {
  const container = document.getElementById('equipList');
  // 按类型过滤
  const filtered = currentCat ? list.filter(e => e.type === currentCat) : list;
  
  if (filtered.length === 0) {
    container.innerHTML = '<div class="loading">暂无设备数据</div>';
    return;
  }
  container.innerHTML = filtered.map(e => `
    <div class="equip-card" onclick="viewEquip('${e.fid}')">
      <div class="equip-card__top">
        <div class="equip-card__name">${e.name || '未命名设备'}</div>
        <span class="status ${e.status === '故障' ? 'status--fault' : (e.status === '维护中' ? 'status--maint' : 'status--normal')}">${e.status === '故障' ? '⚠ 故障' : (e.status === '维护中' ? '🔧 维护中' : '✓ 正常')}</span>
      </div>
      <div class="equip-card__info">
        <span>📍 ${e.location || '未指定'}</span>
        <span>📝 ${e.issue || ''}</span>
      </div>
      <div class="equip-card__footer">
        <span>上次维保: ${e.last_maint || '无'}</span>
        ${e.status === '故障' ? `<button class="btn btn--primary" onclick="event.stopPropagation();reportFault('${e.fid}')">报修</button>` : ''}
      </div>
    </div>
  `).join('');
}

// 更新概览
function updateSummary() {
  document.getElementById('totalEquip').textContent = equipments.length;
  document.getElementById('faultEquip').textContent = equipments.filter(e => e.status === '故障').length;
}

// 更新类型Tab计数
function updateCatCounts() {
  const tabs = document.querySelectorAll('.cat-tab');
  tabs.forEach(tab => {
    const type = tab.dataset.type;
    const count = type ? equipments.filter(e => e.type === type).length : equipments.length;
    tab.textContent = type ? `${type}(${count})` : `全部(${count})`;
  });
}

// 切换设备类型
function switchCat(type) {
  currentCat = type;
  document.querySelectorAll('.cat-tab').forEach(t => {
    t.classList.toggle('cat-tab--active', t.dataset.type === type);
  });
  renderEquipments(equipments);
}

// 查看设备详情
function viewEquip(fid) {
  const e = equipments.find(x => x.fid === fid);
  alert(`设备: ${e?.name || '未知'}\n状态: ${e?.status || '未知'}\n位置: ${e?.location || '未指定'}`);
}

// 报修
function reportFault(fid) {
  if (confirm('确认提交报修工单？')) {
    alert('报修工单已提交（模拟）');
  }
}

// 页面加载
document.addEventListener('DOMContentLoaded', loadEquipments);
</script>
</body>
</html>
