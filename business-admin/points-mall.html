<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>积分商品管理 - 管理后台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #1890ff; --success: #52c41a; --warning: #faad14; --danger: #ff4d4f; --border: #ebeef5; --bg: #f5f7fa; --text: #303133; --text2: #606266; --text3: #909399; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg); font-size: 14px; color: var(--text2); }
        .layout { display: flex; min-height: 100vh; }
        .sidebar { width: 200px; background: #2c3e50; min-height: 100vh; position: fixed; top: 0; left: 0; z-index: 100; overflow-y: auto; }
        .sidebar-header { padding: 16px 20px; border-bottom: 1px solid #3d4f5f; }
        .sidebar-header h5 { color: white; font-size: 16px; font-weight: 600; }
        .sidebar a { color: #ecf0f1; text-decoration: none; padding: 12px 20px; display: block; font-size: 14px; transition: all .2s; }
        .sidebar a:hover { background: #34495e; }
        .sidebar a.active { background: #34495e; border-left: 3px solid var(--primary); }
        .main { flex: 1; margin-left: 200px; padding: 20px; }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .page-title { font-size: 18px; font-weight: 600; color: var(--text); }
        .toolbar { background: white; padding: 14px 16px; border-radius: 6px; margin-bottom: 16px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
        .toolbar input, .toolbar select { padding: 8px 12px; border: 1px solid var(--border); border-radius: 4px; font-size: 13px; background: white; }
        .toolbar input:focus, .toolbar select:focus { border-color: var(--primary); outline: none; }
        .toolbar input { width: 180px; }
        .btn { padding: 8px 16px; border-radius: 4px; font-size: 13px; cursor: pointer; border: 1px solid var(--border); background: white; color: var(--text2); transition: all .2s; }
        .btn:hover { color: var(--primary); border-color: var(--primary); }
        .btn-primary { background: var(--primary); border-color: var(--primary); color: white; }
        .btn-primary:hover { background: #40a9ff; border-color: #40a9ff; color: white; }
        .btn-danger { background: var(--danger); border-color: var(--danger); color: white; }
        .btn-danger:hover { opacity: .85; }
        .btn-warning { background: var(--warning); border-color: var(--warning); color: white; }
        .btn-success { background: var(--success); border-color: var(--success); color: white; }
        .btn-sm { padding: 4px 10px; font-size: 12px; }
        .card { background: white; border-radius: 6px; box-shadow: 0 1px 4px rgba(0,0,0,.06); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { padding: 12px 10px; background: var(--bg); color: var(--text); font-weight: 500; text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap; }
        td { padding: 10px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
        tr:hover td { background: #fafafa; }
        .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
        .tag-active { background: #f6ffed; color: #52c41a; border: 1px solid #b7eb8f; }
        .tag-inactive { background: #f5f5f5; color: #999; border: 1px solid #d9d9d9; }
        .tag-low { background: #fff2e8; color: #fa541c; border: 1px solid #ffbb96; }
        .goods-img { width: 50px; height: 50px; object-fit: cover; border-radius: 6px; border: 1px solid #f0f0f0; background: #f5f5f5; }
        .pagination { display: flex; gap: 4px; padding: 14px; justify-content: flex-end; align-items: center; }
        .page-btn { padding: 5px 10px; border: 1px solid var(--border); border-radius: 4px; cursor: pointer; font-size: 12px; background: white; }
        .page-btn.active { background: var(--primary); border-color: var(--primary); color: white; }
        .page-info { font-size: 12px; color: var(--text3); margin: 0 8px; }
        .empty { text-align: center; padding: 60px; color: var(--text3); }
        .loading { text-align: center; padding: 40px; color: var(--text3); }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.5); z-index: 300; align-items: center; justify-content: center; }
        .modal-overlay.show { display: flex; }
        .modal { background: white; border-radius: 8px; padding: 24px; width: 600px; max-width: 95vw; max-height: 85vh; overflow-y: auto; }
        .modal-title { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
        .form-row.full { grid-template-columns: 1fr; }
        .form-group label { display: block; font-size: 13px; color: var(--text2); margin-bottom: 5px; }
        .form-group label.required::before { content: '* '; color: var(--danger); }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 4px;
            font-size: 13px; transition: border .2s;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--primary); outline: none; }
        .form-group textarea { resize: vertical; min-height: 80px; }
        .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }
        .close-btn { background: none; border: none; font-size: 24px; cursor: pointer; color: var(--text3); }
        .close-btn:hover { color: var(--text); }
        .points-value { color: #fa8c16; font-weight: 600; font-size: 15px; }
        .stock-warning { color: var(--danger); }
        .actions { display: flex; gap: 6px; }
    </style>
</head>
<body>
<div class="layout">
    <div class="sidebar">
        <div class="sidebar-header"><h5>管理后台</h5></div>
        <a href="index.html">🏠 首页</a>
        <a href="statistics.html">📊 数据统计</a>
        <a href="venues.html">🏟️ 场地管理</a>
        <a href="shops.html">🏪 门店管理</a>
        <a href="products.html">📦 商品管理</a>
        <a href="applications.html">📋 申请单</a>
        <a href="orders.html">🧾 订单管理</a>
        <a href="points.html">💎 积分管理</a>
        <a href="coupons.html">🎫 优惠券</a>
        <a href="promotions.html">🔥 促销活动</a>
        <a href="points-mall.html" class="active">🎁 积分商城</a>
        <a href="group-buy.html">👥 拼团活动</a>
        <a href="member-levels.html">🏆 会员等级</a>
        <a href="feedback.html">💬 反馈</a>
        <a href="notifications.html">🔔 通知</a>
        <a href="notices.html">📢 公告</a>
    </div>
    <div class="main">
        <div class="page-header">
            <h1 class="page-title">🎁 积分商品管理</h1>
            <button class="btn btn-primary" onclick="openModal()">+ 添加积分商品</button>
        </div>
        
        <!-- 筛选工具栏 -->
        <div class="toolbar">
            <input type="text" id="searchName" placeholder="搜索商品名称" onkeyup="handleSearch(event)">
            <select id="filterCategory">
                <option value="">全部分类</option>
                <option value="gift">礼品兑换</option>
                <option value="voucher">优惠券</option>
                <option value="service">服务体验</option>
                <option value="other">其他</option>
            </select>
            <select id="filterStatus">
                <option value="">全部状态</option>
                <option value="active">上架中</option>
                <option value="inactive">已下架</option>
            </select>
            <button class="btn" onclick="loadData(1)">🔍 搜索</button>
            <button class="btn" onclick="resetFilters()">🔄 重置</button>
        </div>
        
        <!-- 数据表格 -->
        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>商品图片</th>
                        <th>商品名称</th>
                        <th>分类</th>
                        <th>积分价格</th>
                        <th>划线价</th>
                        <th>库存/已兑</th>
                        <th>每人限制</th>
                        <th>状态</th>
                        <th>排序</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="10" class="loading">加载中...</td></tr>
                </tbody>
            </table>
            <div class="pagination" id="pagination"></div>
        </div>
    </div>
</div>

<!-- 添加/编辑弹窗 -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <div class="modal-title">
            <span id="modalTitle">添加积分商品</span>
            <button class="close-btn" onclick="closeModal()">×</button>
        </div>
        <form id="goodsForm">
            <input type="hidden" id="goodsId">
            <div class="form-row full">
                <div class="form-group">
                    <label class="required">商品名称</label>
                    <input type="text" id="goodsName" maxlength="100" placeholder="请输入商品名称" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label class="required">商品分类</label>
                    <select id="goodsCategory" required>
                        <option value="">请选择分类</option>
                        <option value="gift">礼品兑换</option>
                        <option value="voucher">优惠券</option>
                        <option value="service">服务体验</option>
                        <option value="other">其他</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="required">积分价格</label>
                    <input type="number" id="pointsPrice" min="1" placeholder="所需积分" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>划线价(原价)</label>
                    <input type="number" id="originalPrice" min="0" step="0.01" placeholder="用于展示原价">
                </div>
                <div class="form-group">
                    <label class="required">总库存</label>
                    <input type="number" id="totalStock" min="0" placeholder="-1表示不限量" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>每人限制兑换数量</label>
                    <input type="number" id="perLimit" min="0" value="0" placeholder="0表示不限">
                </div>
                <div class="form-group">
                    <label>排序权重</label>
                    <input type="number" id="sortOrder" min="0" value="0" placeholder="数字越大越靠前">
                </div>
            </div>
            <div class="form-row full">
                <div class="form-group">
                    <label>商品图片URL</label>
                    <input type="text" id="goodsImage" placeholder="请输入图片URL地址">
                </div>
            </div>
            <div class="form-row full">
                <div class="form-group">
                    <label>商品描述</label>
                    <textarea id="goodsDesc" rows="3" placeholder="请输入商品详细描述"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn" onclick="closeModal()">取消</button>
                <button type="submit" class="btn btn-primary">保存</button>
            </div>
        </form>
    </div>
</div>

<script>
// ============ 配置 ============
const API_BASE = '/api/admin';
let currentPage = 1;
let pageSize = 15;
let editId = null;

// ============ 工具函数 ============
function getToken() {
    return localStorage.getItem('admin_token') || new URLSearchParams(window.location.search).get('access_token') || '';
}

function getHeaders() {
    return {
        'Content-Type': 'application/json',
        'Token': getToken()
    };
}

function api(url, options = {}) {
    return fetch(API_BASE + url + '?access_token=' + getToken(), {
        ...options,
        headers: getHeaders(),
        ...options.body && !(options.body instanceof FormData) ? { body: JSON.stringify(options.body) } : {}
    }).then(r => r.json());
}

function formatPoints(v) { return v ? v.toLocaleString() + ' 积分' : '-'; }
function formatPrice(v) { return v ? '¥' + Number(v).toFixed(2) : '-'; }
function getCategoryName(c) { return { gift:'礼品兑换', voucher:'优惠券', service:'服务体验', other:'其他' }[c] || c; }
function getStatusName(s) { return { active:'上架中', inactive:'已下架' }[s] || s; }

// ============ 数据加载 ============
function loadData(page = 1) {
    currentPage = page;
    const name = document.getElementById('searchName').value.trim();
    const category = document.getElementById('filterCategory').value;
    const status = document.getElementById('filterStatus').value;
    
    const params = new URLSearchParams({
        page, page_size: pageSize
    });
    if (name) params.append('name', name);
    if (category) params.append('category', category);
    if (status) params.append('status', status);
    
    document.getElementById('tableBody').innerHTML = '<tr><td colspan="10" class="loading">加载中...</td></tr>';
    
    api('/points-mall/goods?' + params.toString())
        .then(res => {
            if (res.success) {
                renderTable(res.data.items || []);
                renderPagination(res.data);
            } else {
                document.getElementById('tableBody').innerHTML = '<tr><td colspan="10" class="empty">' + (res.msg || '加载失败') + '</td></tr>';
            }
        })
        .catch(() => {
            document.getElementById('tableBody').innerHTML = '<tr><td colspan="10" class="empty">网络错误，请重试</td></tr>';
        });
}

function renderTable(items) {
    if (!items || items.length === 0) {
        document.getElementById('tableBody').innerHTML = '<tr><td colspan="10" class="empty">暂无数据</td></tr>';
        return;
    }
    const html = items.map(item => {
        const stockDisplay = item.total_stock < 0 ? '不限量' : `${item.stock || 0}/${item.total_stock}`;
        const stockClass = item.stock === 0 ? 'stock-warning' : '';
        const imgHtml = item.goods_image 
            ? `<img src="${item.goods_image}" class="goods-img" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><span class="goods-img" style="display:none">🎁</span>`
            : `<span class="goods-img">🎁</span>`;
        return `<tr data-id="${item.id}">
            <td>${imgHtml}</td>
            <td>${escapeHtml(item.goods_name)}</td>
            <td>${getCategoryName(item.category)}</td>
            <td class="points-value">${formatPoints(item.points_price)}</td>
            <td>${formatPrice(item.original_price)}</td>
            <td class="${stockClass}">${stockDisplay}<br><small>已兑: ${item.sold_count || 0}</small></td>
            <td>${item.per_limit || 0}件</td>
            <td><span class="tag ${item.status === 'active' ? 'tag-active' : 'tag-inactive'}">${getStatusName(item.status)}</span></td>
            <td>${item.sort_order || 0}</td>
            <td class="actions">
                <button class="btn btn-sm" onclick="editGoods(${item.id})">编辑</button>
                <button class="btn btn-sm ${item.status === 'active' ? 'btn-warning' : 'btn-success'}" onclick="toggleStatus(${item.id}, '${item.status}')">
                    ${item.status === 'active' ? '下架' : '上架'}
                </button>
                <button class="btn btn-sm btn-danger" onclick="deleteGoods(${item.id})">删除</button>
            </td>
        </tr>`;
    }).join('');
    document.getElementById('tableBody').innerHTML = html;
}

function renderPagination(data) {
    const total = data.total || 0;
    const pages = Math.ceil(total / pageSize);
    if (pages <= 1) {
        document.getElementById('pagination').innerHTML = '';
        return;
    }
    let html = `<span class="page-info">共 ${total} 条</span>`;
    for (let i = 1; i <= pages; i++) {
        if (i === 1 || i === pages || (i >= currentPage - 2 && i <= currentPage + 2)) {
            html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="loadData(${i})">${i}</button>`;
        } else if (i === currentPage - 3 || i === currentPage + 3) {
            html += '<span style="padding:0 4px">...</span>';
        }
    }
    document.getElementById('pagination').innerHTML = html;
}

// ============ 弹窗操作 ============
function openModal(id = null) {
    editId = id;
    document.getElementById('modalOverlay').classList.add('show');
    document.getElementById('modalTitle').textContent = id ? '编辑积分商品' : '添加积分商品';
    document.getElementById('goodsForm').reset();
    document.getElementById('goodsId').value = '';
    if (id) {
        api('/points-mall/goods/' + id).then(res => {
            if (res.success && res.data) {
                const item = res.data;
                document.getElementById('goodsId').value = item.id;
                document.getElementById('goodsName').value = item.goods_name || '';
                document.getElementById('goodsCategory').value = item.category || '';
                document.getElementById('pointsPrice').value = item.points_price || '';
                document.getElementById('originalPrice').value = item.original_price || '';
                document.getElementById('totalStock').value = item.total_stock ?? '';
                document.getElementById('perLimit').value = item.per_limit || 0;
                document.getElementById('sortOrder').value = item.sort_order || 0;
                document.getElementById('goodsImage').value = item.goods_image || '';
                document.getElementById('goodsDesc').value = item.description || '';
            }
        });
    }
}

function closeModal() {
    document.getElementById('modalOverlay').classList.remove('show');
    editId = null;
}

function editGoods(id) { openModal(id); }

// ============ CRUD操作 ============
document.getElementById('goodsForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const id = document.getElementById('goodsId').value;
    const data = {
        goods_name: document.getElementById('goodsName').value.trim(),
        category: document.getElementById('goodsCategory').value,
        points_price: parseInt(document.getElementById('pointsPrice').value) || 0,
        original_price: parseFloat(document.getElementById('originalPrice').value) || 0,
        total_stock: parseInt(document.getElementById('totalStock').value) || -1,
        per_limit: parseInt(document.getElementById('perLimit').value) || 0,
        sort_order: parseInt(document.getElementById('sortOrder').value) || 0,
        goods_image: document.getElementById('goodsImage').value.trim(),
        description: document.getElementById('goodsDesc').value.trim()
    };
    
    if (!data.goods_name || !data.category || data.points_price <= 0) {
        alert('请填写必填项');
        return;
    }
    
    const method = id ? 'PUT' : 'POST';
    const url = id ? '/points-mall/goods/' + id : '/points-mall/goods';
    
    api(url, { method, body: data }).then(res => {
        if (res.success) {
            closeModal();
            loadData(currentPage);
            alert(id ? '修改成功' : '添加成功');
        } else {
            alert(res.msg || '操作失败');
        }
    });
});

function toggleStatus(id, currentStatus) {
    const newStatus = currentStatus === 'active' ? 'inactive' : 'active';
    api('/points-mall/goods/' + id + '/status', {
        method: 'PUT',
        body: { status: newStatus }
    }).then(res => {
        if (res.success) {
            loadData(currentPage);
            alert('状态更新成功');
        } else {
            alert(res.msg || '操作失败');
        }
    });
}

function deleteGoods(id) {
    if (!confirm('确定要删除该积分商品吗？删除后不可恢复。')) return;
    api('/points-mall/goods/' + id, { method: 'DELETE' }).then(res => {
        if (res.success) {
            loadData(currentPage);
            alert('删除成功');
        } else {
            alert(res.msg || '删除失败');
        }
    });
}

// ============ 工具 ============
function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function handleSearch(e) {
    if (e.key === 'Enter') loadData(1);
}

function resetFilters() {
    document.getElementById('searchName').value = '';
    document.getElementById('filterCategory').value = '';
    document.getElementById('filterStatus').value = '';
    loadData(1);
}

// ============ 初始化 ============
document.addEventListener('DOMContentLoaded', function() {
    loadData(1);
});
</script>
</body>
</html>
