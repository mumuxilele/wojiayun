<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会员等级管理 - 管理后台</title>
    <link rel="stylesheet" href="/business-common/list-style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-ui@2.15.13/lib/theme-chalk/index.css">
    <style>
        /* 页面特有样式 */
        .actions .link { color: var(--el-color-primary); cursor: pointer; margin-right: 10px; }
        .actions .link:hover { text-decoration: underline; }
        .actions .link.danger { color: var(--el-color-danger); }
        
        /* 弹窗样式 */
        .dialog-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .dialog {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            max-width: 90%;
            max-height: 90vh;
            overflow: auto;
        }
        .dialog-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid #e4e7ed;
        }
        .dialog-header h3 {
            margin: 0;
            font-size: 18px;
            color: #303133;
        }
        .dialog-close {
            background: none;
            border: none;
            font-size: 24px;
            color: #909399;
            cursor: pointer;
            line-height: 1;
        }
        .dialog-close:hover { color: #409eff; }
        .dialog-body { padding: 20px; }
        .dialog-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            padding: 12px 20px;
            border-top: 1px solid #e4e7ed;
        }
        
        /* 表单样式 */
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #606266;
        }
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #dcdfe6;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
        }
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #409eff;
        }
        .form-row {
            display: flex;
            gap: 16px;
        }
        .form-row .form-group {
            flex: 1;
        }
        
        /* 按钮样式 */
        .btn {
            padding: 9px 20px;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            border: 1px solid #dcdfe6;
            background: #fff;
            color: #606266;
        }
        .btn-primary {
            background: #409eff;
            border-color: #409eff;
            color: #fff;
        }
        .btn-primary:hover { background: #66b1ff; }
        .btn-info {
            background: #909399;
            border-color: #909399;
            color: #fff;
        }
        .btn-info:hover { background: #a6a9ad; }
    </style>
</head>
<body class="wy-design-list">
    <!-- 顶部区域 -->
    <div class="wy-design-list_top">
        <div class="wy-design-list_top_title">
            <h1 class="wy-design-list_title">会员等级管理 - 管理后台</h1>
            <div class="wy-design-list_space"></div>
            <div class="wy-design-list_btn-group">
                <div class="wy-design-list_btn">
                    <button type="button" class="el-button el-button--primary el-button--small" onclick="loadList(1)">
                        <span>搜索</span>
                    </button>
                </div>
                <div class="wy-design-list_btn">
                    <button type="button" class="el-button el-button--small" onclick="resetSearch()">
                        <span>重置</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 筛选区域 -->
    <div class="wy-design-list_filter">
        <div class="wy-design-list_other">
            <div class="el-input el-input--small" style="width: 200px;">
                <input type="text" id="keyword" placeholder="请输入手机号" class="el-input__inner">
            </div>
        </div>
        <div class="wy-design-list_other">
            <select id="filter1" class="el-input__inner" style="width: 130px;">
                
                            <option value="">全部</option>
                            <option v-for="l in levels" :key="l.level_code" :value="l.level_code">{{ l.level_name }}</option>
                        
            </select>
        </div>
        <div class="wy-design-list_other">
            <select id="filter2" class="el-input__inner" style="width: 130px;">
                
                        <option :value="10">10条/页</option>
                        <option :value="20">20条/页</option>
                        <option :value="50">50条/页</option>
                    
            </select>
        </div>
    </div>

    <!-- 表格区域 -->
    <div class="wy-design-table wy-design-table_main wy-design-table_has-bar">
        <div class="wy-design-table_bar">
            <i class="wy-design-table_set el-icon-setting" title="列设置"></i>
            <span class="wy-design-table_total">共 <em id="totalCount">0</em> 条</span>
            <div class="wy-pages">
                <div class="wy-pages_total">第<em id="currentPage">1</em>/<em id="totalPages">1</em>页</div>
                <div class="wy-pages_prev el-icon-arrow-left" id="prevBtn" onclick="changePage(-1)"></div>
                <div class="wy-pages_next el-icon-arrow-right" id="nextBtn" onclick="changePage(1)"></div>
            </div>
        </div>
        <table class="el-table el-table--fit el-table--border el-table--enable-row-hover">
            <thead class="el-table__header">
                <tr>
                    <th><div class="cell">等级</div></th>
                    <th><div class="cell">会员数量</div></th>
                    <th><div class="cell">累计消费总额</div></th>
                    <th><div class="cell">人均消费</div></th>
                    <th><div class="cell">会员ID</div></th>
                    <th><div class="cell">姓名</div></th>
                    <th><div class="cell">手机号</div></th>
                    <th><div class="cell">当前等级</div></th>
                    <th><div class="cell">累计消费</div></th>
                    <th><div class="cell">当前积分</div></th>
                </tr>
            </thead>
            <tbody class="el-table__body" id="listBody">
                <tr><td colspan="10" style="text-align: center; padding: 60px; color: var(--el-text-secondary);">加载中...</td></tr>
            </tbody>
        </table>
    </div>

    
        <div v-if="levelDialogVisible" class="dialog-overlay" @click.self="levelDialogVisible = false">
            <div class="dialog" style="width: 500px;">
                <div class="dialog-header">
                    <h3>{{ isEdit ? '编辑等级' : '新增等级' }}</h3>
                    <button class="dialog-close" @click="levelDialogVisible = false">&times;</button>
                </div>
                <div class="dialog-body">
                    <div class="form-group">
                        <label>等级编码 *</label>
                        <input v-model="levelForm.level_code" placeholder="如：L1, L2, L3" :disabled="isEdit">
                    </div>
                    <div class="form-group">
                        <label>等级名称 *</label>
                        <input v-model="levelForm.level_name" placeholder="如：普通会员、铜牌会员">
                    </div>
                    <div class="form-group">
                        <label>升级门槛（累计消费金额）</label>
                        <input type="number" v-model="levelForm.min_amount" placeholder="0">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>折扣率</label>
                            <input type="number" step="0.01" v-model="levelForm.discount_rate" placeholder="1.00">
                            <small style="color: #909399;">1=无折扣, 0.9=9折</small>
                        </div>
                        <div class="form-group">
                            <label>积分倍率</label>
                            <input type="number" step="0.1" v-model="levelForm.points_rate" placeholder="1.0">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>权益说明（JSON格式）</label>
                        <textarea v-model="levelForm.privileges" placeholder='["权益1", "权益2"]'></textarea>
                    </div>
                    <div class="form-group">
                        <label>排序</label>
                        <input type="number" v-model="levelForm.sort_order" placeholder="0">
                    </div>
                </div>
                <div class="dialog-footer">
                    <button class="btn btn-info" @click="levelDialogVisible = false">取消</button>
                    <button class="btn btn-primary" @click="saveLevel">保存</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/element-ui@2.15.13/lib/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios@0.27.2/dist/axios.min.js"></script>
    

    <script>
    // XSS防护工具
    function escapeHtml(text) {
        if (!text) return '';
        return text.replace(/&/g, '&amp;')
                   .replace(/</g, '&lt;')
                   .replace(/>/g, '&gt;')
                   .replace(/"/g, '&quot;')
                   .replace(/'/g, '&#039;');
    }
    
    const app = new Vue({
        el: '#app',
        data: {
            userInfo: {},
            levels: [],
            statistics: [],
            members: [],
            totalMembers: 0,
            currentPage: 1,
            pageSize: 10,
            searchParams: {
                phone: '',
                level: ''
            },
            levelDialogVisible: false,
            isEdit: false,
            levelForm: {
                id: null,
                level_code: '',
                level_name: '',
                min_amount: 0,
                discount_rate: 1.00,
                points_rate: 1.00,
                privileges: '[]',
                sort_order: 0
            }
        },
        computed: {
            totalPages() {
                return Math.ceil(this.totalMembers / this.pageSize) || 1;
            }
        },
        mounted() {
            this.checkLogin();
            this.loadLevels();
            this.loadStatistics();
            this.loadMembers();
        },
        methods: {
            checkLogin() {
                const token = this.getQueryParam('access_token') || localStorage.getItem('admin_token');
                if (!token) {
                    this.$message.error('请先登录');
                    setTimeout(() => window.location.href = 'index.html', 1500);
                    return;
                }
                this.loadUserInfo(token);
            },
            getQueryParam(name) {
                const url = new URL(window.location.href);
                return url.searchParams.get(name);
            },
            async loadUserInfo(token) {
                try {
                    const res = await axios.get('/api/admin/userinfo?access_token=' + token);
                    if (res.data.success) {
                        this.userInfo = res.data.data;
                    }
                } catch (e) { console.error(e); }
            },
            async loadLevels() {
                try {
                    const token = this.getQueryParam('access_token') || localStorage.getItem('admin_token');
                    const res = await axios.get('/api/admin/member-levels?access_token=' + token);
                    if (res.data.success) {
                        this.levels = res.data.data || [];
                    }
                } catch (e) {
                    console.error('加载等级失败:', e);
                    // 使用默认等级
                    this.levels = [
                        { id: 1, level_code: 'L1', level_name: '普通会员', min_amount: 0, discount_rate: 1.00, points_rate: 1.00, sort_order: 1 },
                        { id: 2, level_code: 'L2', level_name: '铜牌会员', min_amount: 500, discount_rate: 0.95, points_rate: 1.20, sort_order: 2 },
                        { id: 3, level_code: 'L3', level_name: '银牌会员', min_amount: 2000, discount_rate: 0.90, points_rate: 1.50, sort_order: 3 },
                        { id: 4, level_code: 'L4', level_name: '金牌会员', min_amount: 5000, discount_rate: 0.85, points_rate: 2.00, sort_order: 4 },
                        { id: 5, level_code: 'L5', level_name: '钻石会员', min_amount: 10000, discount_rate: 0.80, points_rate: 3.00, sort_order: 5 },
                    ];
                }
            },
            async loadStatistics() {
                try {
                    const token = this.getQueryParam('access_token') || localStorage.getItem('admin_token');
                    const res = await axios.get('/api/admin/member-levels/statistics?access_token=' + token);
                    if (res.data.success) {
                        this.statistics = res.data.data || [];
                    }
                } catch (e) {
                    console.error('加载统计失败:', e);
                    this.statistics = [];
                }
            },
            async loadMembers() {
                try {
                    const token = this.getQueryParam('access_token') || localStorage.getItem('admin_token');
                    const params = new URLSearchParams({
                        access_token: token,
                        page: this.currentPage,
                        page_size: this.pageSize,
                        phone: this.searchParams.phone,
                        level: this.searchParams.level
                    });
                    const res = await axios.get('/api/admin/members?' + params);
                    if (res.data.success) {
                        this.members = (res.data.data.items || []).map(m => ({
                            ...m,
                            member_level_name: this.getLevelName(m.member_level)
                        }));
                        this.totalMembers = res.data.data.total || 0;
                    }
                } catch (e) {
                    console.error('加载会员失败:', e);
                    this.members = [];
                }
            },
            searchMembers() {
                this.currentPage = 1;
                this.loadMembers();
            },
            resetSearch() {
                this.searchParams = { phone: '', level: '' };
                this.currentPage = 1;
                this.loadMembers();
            },
            refreshData() {
                this.loadLevels();
                this.loadStatistics();
                this.loadMembers();
                this.$message.success('刷新成功');
            },
            getLevelName(code) {
                const level = this.levels.find(l => l.level_code === code);
                return level ? level.level_name : '普通会员';
            },
            getLevelClass(code) {
                if (code === 'L5') return 'gold';
                if (code === 'L4') return 'gold';
                if (code === 'L3') return 'silver';
                if (code === 'L2') return 'bronze';
                return '';
            },
            getLevelTagClass(code) {
                if (code === 'L5' || code === 'L4') return 'tag-success';
                if (code === 'L3') return 'tag-warning';
                if (code === 'L2') return 'tag-info';
                return 'tag-info';
            },
            showAddDialog() {
                this.isEdit = false;
                this.levelForm = {
                    id: null,
                    level_code: '',
                    level_name: '',
                    min_amount: 0,
                    discount_rate: 1.00,
                    points_rate: 1.00,
                    privileges: '[]',
                    sort_order: this.levels.length + 1
                };
                this.levelDialogVisible = true;
            },
            editLevel(level) {
                this.isEdit = true;
                this.levelForm = { ...level };
                this.levelDialogVisible = true;
            },
            async saveLevel() {
                if (!this.levelForm.level_code || !this.levelForm.level_name) {
                    this.$message.error('请填写等级编码和名称');
                    return;
                }
                try {
                    const token = this.getQueryParam('access_token') || localStorage.getItem('admin_token');
                    const res = await axios.post('/api/admin/member-levels/save?access_token=' + token, this.levelForm);
                    if (res.data.success) {
                        this.$message.success(this.isEdit ? '修改成功' : '创建成功');
                        this.levelDialogVisible = false;
                        this.loadLevels();
                    } else {
                        this.$message.error(res.data.msg || '操作失败');
                    }
                } catch (e) {
                    this.$message.error('保存失败');
                }
            },
            viewMemberDetail(member) {
                this.$message.info('查看会员详情: ' + escapeHtml(member.user_name || member.user_id));
            },
            goBack() {
                window.location.href = 'index.html?access_token=' + (this.getQueryParam('access_token') || localStorage.getItem('admin_token'));
            }
        }
    });
    </script>
</body>
</html>
