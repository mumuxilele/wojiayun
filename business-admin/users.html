<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理 - 管理后台</title>
    <link rel="stylesheet" href="../business-common/list-style.css">
    <style>
        /* 页面特有样式 */
        .actions .link { color: var(--el-color-primary); cursor: pointer; margin-right: 10px; }
        .actions .link:hover { text-decoration: underline; }
        .actions .link.danger { color: var(--el-color-danger); }
        /* 弹窗样式保留 */
        
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.45); z-index: 200; }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background: var(--el-bg-white); border-radius: 4px; width: 580px; max-width: 95vw; max-height: 85vh; flex-direction: column; z-index: 201; box-shadow: 0 4px 20px rgba(0,0,0,.18); }
        .modal.show { display: flex; }
        .modal-header { padding: 16px 20px; border-bottom: 1px solid var(--el-border-color-light); display: flex; justify-content: space-between; align-items: center; }
        .modal-title { font-size: 16px; font-weight: 600; color: var(--el-text-primary); }
        .modal-close { background: none; border: none; width: 32px; height: 32px; border-radius: 4px; cursor: pointer; font-size: 16px; color: var(--el-text-secondary); display: flex; align-items: center; justify-content: center; }
        .modal-close:hover { background: var(--el-bg-light); }
        .modal-body { padding: 20px; overflow-y: auto; flex: 1; }
        .modal-footer { padding: 12px 20px; border-top: 1px solid var(--el-border-color-light); display: flex; justify-content: flex-end; gap: 10px; }
    </style>
</head>
<body class="wy-design-list">
    <!-- 顶部区域 -->
    <div class="wy-design-list_top">
        <div class="wy-design-list_top_title">
            <h1 class="wy-design-list_title">用户管理 - 管理后台</h1>
            <div class="wy-design-list_space"></div>
            <div class="wy-design-list_btn-group">
                <div class="wy-design-list_btn">
                    <button type="button" class="el-button el-button--primary el-button--small" onclick="loadList(1)">
                        <span>搜索</span>
                    </button>
                </div>
                <div class="wy-design-list_btn">
                    <button type="button" class="el-button el-button--small" onclick="resetSearch()">
                        <span>重置</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 筛选区域 -->
    <div class="wy-design-list_filter">
        <div class="wy-design-list_other">
            <div class="el-input el-input--small" style="width: 200px;">
                <input type="text" id="keyword" placeholder="搜索用户名/手机号" class="el-input__inner">
            </div>
        </div>
        <div class="wy-design-list_other">
            <select id="filter1" class="el-input__inner" style="width: 130px;">
                
            <option value="">全部等级</option>
            <option value="bronze">青铜会员</option>
            <option value="silver">白银会员</option>
            <option value="gold">黄金会员</option>
            <option value="platinum">铂金会员</option>
        
            </select>
        </div>
    </div>

    <!-- 表格区域 -->
    <div class="wy-design-table wy-design-table_main wy-design-table_has-bar">
        <div class="wy-design-table_bar">
            <i class="wy-design-table_set el-icon-setting" title="列设置"></i>
            <span class="wy-design-table_total">共 <em id="totalCount">0</em> 条</span>
            <div class="wy-pages">
                <div class="wy-pages_total">第<em id="currentPage">1</em>/<em id="totalPages">1</em>页</div>
                <div class="wy-pages_prev el-icon-arrow-left" id="prevBtn" onclick="changePage(-1)"></div>
                <div class="wy-pages_next el-icon-arrow-right" id="nextBtn" onclick="changePage(1)"></div>
            </div>
        </div>
        <table class="el-table el-table--fit el-table--border el-table--enable-row-hover">
            <thead class="el-table__header">
                <tr>
                    <th><div class="cell">ID</div></th>
                    <th><div class="cell">用户名</div></th>
                    <th><div class="cell">手机号</div></th>
                    <th><div class="cell">会员等级</div></th>
                    <th><div class="cell">当前积分</div></th>
                    <th><div class="cell">累计积分</div></th>
                    <th><div class="cell">账户余额</div></th>
                    <th><div class="cell">注册时间</div></th>
                    <th><div class="cell">操作</div></th>
                </tr>
            </thead>
            <tbody class="el-table__body" id="listBody">
                <tr><td colspan="10" style="text-align: center; padding: 60px; color: var(--el-text-secondary);">加载中...</td></tr>
            </tbody>
        </table>
    </div>

    

    <script>
    const token = localStorage.getItem('admin_token') || new URLSearchParams(location.search).get('access_token') || '';
        const isdev = new URLSearchParams(location.search).get('isdev') || '0';
        let currentPage = 1;
        let totalPages = 1;

        const LEVEL_MAP = { bronze: '青铜', silver: '白银', gold: '黄金', platinum: '铂金' };
        const LEVEL_TAG = { bronze: 'info', silver: 'primary', gold: 'warning', platinum: 'danger' };

        function authUrl(url) {
            const sep = url.includes('?') ? '&' : '?';
            return url + sep + 'access_token=' + encodeURIComponent(token) + '&isdev=' + isdev;
        }

        async function loadList(page) {
            currentPage = page || 1;
            const keyword = document.getElementById('keyword').value;
            const level = document.getElementById('levelFilter').value;
            let url = '/api/admin/users?page=' + currentPage + '&page_size=20';
            if (keyword) url += '&keyword=' + encodeURIComponent(keyword);
            if (level) url += '&level=' + level;
            try {
                const res = await fetch(authUrl(url));
                const data = await res.json();
                if (data.success && data.data) {
                    const total = data.data.total || 0;
                    totalPages = Math.ceil(total / 20) || 1;
                    document.getElementById('totalCount').textContent = total; document.getElementById('currentPage').textContent = currentPage; document.getElementById('totalPages').textContent = totalPages;
                    document.getElementById('prevBtn').disabled = currentPage <= 1;
                    document.getElementById('nextBtn').disabled = currentPage >= totalPages;

                    const items = data.data.items || [];
                    if (items.length === 0) {
                        document.getElementById('listBody').innerHTML = '<tr><td colspan="9" class="empty">暂无用户数据</td></tr>';
                        return;
                    }
                    document.getElementById('listBody').innerHTML = items.map(m =>
                        `<tr>
                            <td>${m.id}</td>
                            <td>${m.user_name || '-'}</td>
                            <td>${m.phone || '-'}</td>
                            <td><span class="el-tag el-tag--${LEVEL_TAG[m.member_level] || 'info'}">${LEVEL_MAP[m.member_level] || m.member_level || '-'}</span></td>
                            <td class="points-num">${m.points || 0}</td>
                            <td>${m.total_points || 0}</td>
                            <td class="balance-num">¥${parseFloat(m.balance || 0).toFixed(2)}</td>
                            <td>${(m.created_at || '').substring(0, 10) || '-'}</td>
                            <td class="actions">
                                <a href="member-profile.html?access_token=${encodeURIComponent(token)}&isdev=${isdev}&user_id=${m.user_id}" target="_blank">画像</a>
                                <a href="points.html?access_token=${encodeURIComponent(token)}&isdev=${isdev}" target="_blank">积分管理</a>
                            </td>
                        </tr>`
                    ).join('');
                }
            } catch (e) {
                document.getElementById('listBody').innerHTML = '<tr><td colspan="9" class="empty">加载失败</td></tr>';
            }
        }

        function changePage(delta) { loadList(currentPage + delta); }
        function resetSearch() {
            document.getElementById('keyword').value = '';
            document.getElementById('levelFilter').value = '';
            loadList(1);
        }

        function exportMembers() {
            const keyword = document.getElementById('keyword').value;
            const level = document.getElementById('levelFilter').value;
            let url = '/api/admin/export/members?access_token=' + encodeURIComponent(token) + '&isdev=' + isdev;
            if (keyword) url += '&keyword=' + encodeURIComponent(keyword);
            if (level) url += '&member_level=' + level;
            const a = document.createElement('a');
            a.href = url;
            a.download = '会员数据_' + new Date().toISOString().substring(0,10) + '.csv';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }



        document.getElementById('keyword').addEventListener('keydown', e => { if (e.key === 'Enter') loadList(1); });

        loadList(1);
    </script>
</body>
</html>
