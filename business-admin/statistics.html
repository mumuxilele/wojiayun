<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据统计 - 管理后台</title>
    <link rel="stylesheet" href="/business-common/list-style.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        /* 页面特有样式 */
        .actions .link { color: var(--el-color-primary); cursor: pointer; margin-right: 10px; }
        .actions .link:hover { text-decoration: underline; }
        .actions .link.danger { color: var(--el-color-danger); }
        /* 弹窗样式保留 */
        
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.45); z-index: 200; }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background: var(--el-bg-white); border-radius: 4px; width: 580px; max-width: 95vw; max-height: 85vh; flex-direction: column; z-index: 201; box-shadow: 0 4px 20px rgba(0,0,0,.18); }
        .modal.show { display: flex; }
        .modal-header { padding: 16px 20px; border-bottom: 1px solid var(--el-border-color-light); display: flex; justify-content: space-between; align-items: center; }
        .modal-title { font-size: 16px; font-weight: 600; color: var(--el-text-primary); }
        .modal-close { background: none; border: none; width: 32px; height: 32px; border-radius: 4px; cursor: pointer; font-size: 16px; color: var(--el-text-secondary); display: flex; align-items: center; justify-content: center; }
        .modal-close:hover { background: var(--el-bg-light); }
        .modal-body { padding: 20px; overflow-y: auto; flex: 1; }
        .modal-footer { padding: 12px 20px; border-top: 1px solid var(--el-border-color-light); display: flex; justify-content: flex-end; gap: 10px; }
    </style>
</head>
<body class="wy-design-list">
    <!-- 顶部区域 -->
    <div class="wy-design-list_top">
        <div class="wy-design-list_top_title">
            <h1 class="wy-design-list_title">数据统计 - 管理后台</h1>
            <div class="wy-design-list_space"></div>
            <div class="wy-design-list_btn-group">
                <div class="wy-design-list_btn">
                    <button type="button" class="el-button el-button--primary el-button--small" onclick="loadList(1)">
                        <span>搜索</span>
                    </button>
                </div>
                <div class="wy-design-list_btn">
                    <button type="button" class="el-button el-button--small" onclick="resetSearch()">
                        <span>重置</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 筛选区域 -->
    <div class="wy-design-list_filter">
        <div class="wy-design-list_other">
            <div class="el-input el-input--small" style="width: 200px;">
                <input type="text" id="keyword" placeholder="搜索关键词" class="el-input__inner">
            </div>
        </div>
    </div>

    <!-- 表格区域 -->
    <div class="wy-design-table wy-design-table_main wy-design-table_has-bar">
        <div class="wy-design-table_bar">
            <i class="wy-design-table_set el-icon-setting" title="列设置"></i>
            <span class="wy-design-table_total">共 <em id="totalCount">0</em> 条</span>
            <div class="wy-pages">
                <div class="wy-pages_total">第<em id="currentPage">1</em>/<em id="totalPages">1</em>页</div>
                <div class="wy-pages_prev el-icon-arrow-left" id="prevBtn" onclick="changePage(-1)"></div>
                <div class="wy-pages_next el-icon-arrow-right" id="nextBtn" onclick="changePage(1)"></div>
            </div>
        </div>
        <table class="el-table el-table--fit el-table--border el-table--enable-row-hover">
            <thead class="el-table__header">
                <tr>
                    <th><div class="cell">场地名称</div></th>
                    <th><div class="cell">类型</div></th>
                    <th><div class="cell">价格(元/时)</div></th>
                    <th><div class="cell">容量</div></th>
                    <th><div class="cell">状态</div></th>
                </tr>
            </thead>
            <tbody class="el-table__body" id="listBody">
                <tr><td colspan="10" style="text-align: center; padding: 60px; color: var(--el-text-secondary);">加载中...</td></tr>
            </tbody>
        </table>
    </div>

    

    <script>
    const token = new URLSearchParams(location.search).get('access_token') || localStorage.getItem('admin_token') || '';
        const isDev = new URLSearchParams(location.search).get('isdev') || '0';

        function authUrl(url) {
            return url + (url.includes('?') ? '&' : '?') + 'access_token=' + encodeURIComponent(token) + '&isdev=' + isDev;
        }

        // ========== 核心统计 ==========
        async function loadStats() {
            try {
                const resp = await fetch(authUrl('/api/admin/statistics'));
                const data = await resp.json();
                if (data.success && data.data) {
                    const d = data.data;
                    // 安全设置元素内容
                    const setText = (id, val) => {
                        const el = document.getElementById(id);
                        if (el) el.textContent = val;
                    };
                    setText('todayOrders', d.today_orders ?? 0);
                    setText('totalOrders', d.total_orders ?? 0);
                    setText('todayApps', d.today_applications ?? 0);
                    setText('pendingApps', d.pending_applications ?? 0);
                    setText('todayIncome', parseFloat(d.today_income || 0).toFixed(2));
                    setText('totalIncome', parseFloat(d.total_income || 0).toFixed(2));
                    // V10 新增指标
                    setText('todayCheckins', d.today_checkins ?? 0);
                    setText('monthCheckins', d.month_checkins ?? 0);
                    setText('usedCouponsToday', d.used_coupons_today ?? 0);
                    setText('activeCoupons', d.total_active_coupons ?? 0);
                    setText('totalMembers', d.total_members ?? 0);
                    setText('todayMembers', d.today_members ?? 0);
                    setText('lowStockProducts', d.low_stock_products ?? 0);
                    setText('pendingBookings', d.pending_bookings ?? 0);
                }
            } catch (e) { console.error('loadStats', e); }
        }

        // ========== 趋势折线图（新接口，一次请求） ==========
        let trendChart = null;
        let currentDays = 7;

        async function loadTrend(days) {
            currentDays = days;
            const chartEl = document.getElementById('trendChart');
            if (!chartEl) return; // 元素不存在则跳过
            try {
                const [orderResp, appResp] = await Promise.all([
                    fetch(authUrl('/api/admin/orders/trend?days=' + days)),
                    fetch(authUrl('/api/admin/applications/trend?days=' + days))
                ]);
                const orderData = await orderResp.json();
                const appData = await appResp.json();

                const orders = (orderData.success && orderData.data) ? orderData.data : [];
                const apps = (appData.success && appData.data) ? appData.data : [];

                const dates = orders.map(r => r.date.substring(5)); // MM-DD
                const orderCnts = orders.map(r => r.order_cnt);
                const incomes = orders.map(r => parseFloat(r.income || 0).toFixed(2));
                const appCnts = apps.map(r => r.app_cnt);

                if (!trendChart) {
                    trendChart = echarts.init(chartEl);
                    window.addEventListener('resize', () => trendChart.resize());
                }
                trendChart.setOption({
                    tooltip: { trigger: 'axis', axisPointer: { type: 'cross' } },
                    legend: { data: ['订单数', '申请数', '收入(元)'], bottom: 0, itemWidth: 12 },
                    grid: { left: '3%', right: '4%', bottom: '40px', top: '20px', containLabel: true },
                    xAxis: { type: 'category', data: dates, axisLabel: { fontSize: 11 } },
                    yAxis: [
                        { type: 'value', name: '数量', nameTextStyle: { fontSize: 11 }, axisLabel: { fontSize: 11 } },
                        { type: 'value', name: '收入', nameTextStyle: { fontSize: 11 }, axisLabel: { fontSize: 11, formatter: '¥{value}' } }
                    ],
                    color: ['#667eea', '#11998e', '#f5576c'],
                    series: [
                        { name: '订单数', type: 'line', smooth: true, data: orderCnts, yAxisIndex: 0, lineStyle: { width: 2 }, areaStyle: { opacity: 0.1 } },
                        { name: '申请数', type: 'line', smooth: true, data: appCnts, yAxisIndex: 0, lineStyle: { width: 2 }, areaStyle: { opacity: 0.1 } },
                        { name: '收入(元)', type: 'bar', data: incomes, yAxisIndex: 1, barMaxWidth: 30, itemStyle: { color: '#f5576c', opacity: 0.7 } }
                    ]
                });
            } catch (e) { console.error('loadTrend', e); }
        }

        function switchTrend(days) {
            [7, 14, 30].forEach(d => {
                const btn = document.getElementById('btn' + d);
                if (btn) btn.classList.toggle('active', d === days);
            });
            loadTrend(days);
        }

        // ========== 申请单状态饼图（新接口，一次请求） ==========
        async function loadAppChart() {
            const chartEl = document.getElementById('appStatusChart');
            if (!chartEl) return; // 元素不存在则跳过
            try {
                const resp = await fetch(authUrl('/api/admin/applications/stats/by-status'));
                const data = await resp.json();
                const STATUS_MAP = { pending: '待处理', processing: '处理中', completed: '已完成', rejected: '已拒绝', cancelled: '已撤销' };
                const COLOR_MAP = { pending: '#faad14', processing: '#00d1a0', completed: '#52c41a', rejected: '#ff4d4f', cancelled: '#909399' };

                const pieData = Object.entries(data.success ? (data.data || {}) : {})
                    .map(([k, v]) => ({ name: STATUS_MAP[k] || k, value: v, itemStyle: { color: COLOR_MAP[k] } }))
                    .filter(d => d.value > 0);

                const chart = echarts.init(chartEl);
                chart.setOption({
                    tooltip: { trigger: 'item', formatter: '{b}: {c} ({d}%)' },
                    legend: { bottom: 0, itemWidth: 12, itemHeight: 12, textStyle: { fontSize: 12 } },
                    series: [{
                        type: 'pie', radius: ['40%', '70%'], center: ['50%', '45%'],
                        label: { show: true, fontSize: 12 },
                        data: pieData.length ? pieData : [{ name: '暂无数据', value: 1, itemStyle: { color: '#e0e0e0' } }]
                    }]
                });
                window.addEventListener('resize', () => chart.resize());
            } catch (e) { console.error('loadAppChart', e); }
        }

        // ========== 申请单类型饼图（新接口） ==========
        async function loadAppTypeChart() {
            const chartEl = document.getElementById('appTypeChart');
            if (!chartEl) return; // 元素不存在则跳过
            try {
                const resp = await fetch(authUrl('/api/admin/applications/stats/by-type'));
                const data = await resp.json();
                const TYPE_MAP = { repair: '报修', booking: '预约', complaint: '投诉', consult: '咨询', other: '其他' };

                const pieData = Object.entries(data.success ? (data.data || {}) : {})
                    .map(([k, v]) => ({ name: TYPE_MAP[k] || k, value: v }))
                    .filter(d => d.value > 0);

                const chart = echarts.init(chartEl);
                chart.setOption({
                    tooltip: { trigger: 'item', formatter: '{b}: {c} ({d}%)' },
                    legend: { bottom: 0, itemWidth: 12, itemHeight: 12, textStyle: { fontSize: 12 } },
                    color: ['#667eea', '#11998e', '#f5576c', '#f093fb', '#4facfe'],
                    series: [{
                        type: 'pie', radius: ['40%', '70%'], center: ['50%', '45%'],
                        label: { show: true, fontSize: 12 },
                        data: pieData.length ? pieData : [{ name: '暂无数据', value: 1, itemStyle: { color: '#e0e0e0' } }]
                    }]
                });
                window.addEventListener('resize', () => chart.resize());
            } catch (e) { console.error('loadAppTypeChart', e); }
        }

        // ========== 预约状态图 ==========
        async function loadBookingChart() {
            const chartEl = document.getElementById('bookingStatusChart');
            if (!chartEl) return; // 元素不存在则跳过
            try {
                const resp = await fetch(authUrl('/api/admin/venue-statistics'));
                const data = await resp.json();
                let total = 0, pending = 0, confirmed = 0, completed = 0;
                if (data.success && data.data) {
                    total = data.data.total_bookings || 0;
                    pending = data.data.pending_bookings || 0;
                    completed = data.data.completed_bookings || 0;
                    confirmed = Math.max(0, total - pending - completed);
                    const setText = (id, val) => {
                        const el = document.getElementById(id);
                        if (el) el.textContent = val;
                    };
                    setText('venueBookings', total);
                    setText('pendingBookings', pending);
                }
                const chart = echarts.init(chartEl);
                const pieData = [
                    { name: '待确认', value: pending },
                    { name: '已确认', value: confirmed },
                    { name: '已完成', value: completed }
                ].filter(d => d.value > 0);
                chart.setOption({
                    tooltip: { trigger: 'item', formatter: '{b}: {c} ({d}%)' },
                    legend: { bottom: 0, itemWidth: 12, itemHeight: 12, textStyle: { fontSize: 12 } },
                    color: ['#faad14', '#00d1a0', '#52c41a'],
                    series: [{
                        type: 'pie', radius: ['40%', '70%'], center: ['50%', '45%'],
                        label: { show: true, fontSize: 12 },
                        data: pieData.length ? pieData : [{ name: '暂无数据', value: 1, itemStyle: { color: '#e0e0e0' } }]
                    }]
                });
                window.addEventListener('resize', () => chart.resize());
            } catch (e) { console.error('loadBookingChart', e); }
        }

        // ========== 场地列表 ==========
        async function loadVenueStats() {
            const el = document.getElementById('venueStats');
            if (!el) return; // 元素不存在则跳过
            try {
                const resp = await fetch(authUrl('/api/admin/venues?page=1&page_size=50'));
                const data = await resp.json();
                if (data.success && data.data && data.data.items && data.data.items.length) {
                    const TYPE_MAP = { yumaoqiu: '🏸 羽毛球', lanqiu: '🏀 篮球', pingpang: '🏓 乒乓球', yujia: '🧘 瑜伽', youyong: '🏊 游泳', gym: '💪 健身', other: '📌 其他' };
                    el.innerHTML = `<table class="el-table">
                        <thead><tr><th>场地名称</th><th>类型</th><th>价格(元/时)</th><th>容量</th><th>状态</th></tr></thead>
                        <tbody>${data.data.items.map(v => `<tr>
                            <td>${v.venue_name || '-'}</td>
                            <td>${TYPE_MAP[v.venue_type] || v.venue_type || '-'}</td>
                            <td style="color:#f57c00;font-weight:600">¥${parseFloat(v.price || 0).toFixed(2)}</td>
                            <td>${v.capacity || '-'}人</td>
                            <td><span style="color:${v.status==='open'?'#52c41a':'#999'}">${v.status==='open'?'开放':'关闭'}</span></td>
                        </tr>`).join('')}</tbody>
                    </table>`;
                } else {
                    el.innerHTML = '<div class="loading">暂无场地数据</div>';
                }
            } catch (e) { 
                if (el) el.innerHTML = '<div class="loading">加载失败</div>'; 
            }
        }

        // ========== 积分概览 ==========
        async function loadPointsStats() {
            const el = document.getElementById('pointsStats');
            if (!el) return; // 元素不存在则跳过
            try {
                const resp = await fetch(authUrl('/api/admin/points/stats'));
                const data = await resp.json();
                if (data.success && data.data) {
                    const d = data.data;
                    el.innerHTML = `
                        <div class="stat-list-item"><span>注册会员数</span><strong>${d.total_members ?? '-'}</strong></div>
                        <div class="stat-list-item"><span>流通积分总量</span><strong style="color:#f57c00">${d.total_points ?? '-'}</strong></div>
                        <div class="stat-list-item"><span>今日积分变动</span><strong style="color:#52c41a">+${d.today_points ?? 0}</strong></div>
                        <div class="stat-list-item"><span>本月积分变动</span><strong style="color:#00d1a0">${d.month_points ?? 0}</strong></div>`;
                } else {
                    el.innerHTML = '<div class="loading">加载失败</div>';
                }
            } catch (e) { el.innerHTML = '<div class="loading">加载失败</div>'; }
        }

        // ========== 会员等级分布图 ==========
        async function loadMemberLevelChart() {
            const chartEl = document.getElementById('memberLevelChart');
            if (!chartEl) return; // 元素不存在则跳过
            try {
                const resp = await fetch(authUrl('/api/admin/members/stats/by-level'));
                const data = await resp.json();
                const LEVEL_MAP = { bronze: '青铜', silver: '白银', gold: '黄金', platinum: '铂金' };
                const LEVEL_COLOR = { bronze: '#cd7f32', silver: '#c0c0c0', gold: '#ffd700', platinum: '#b8a9c9' };
                const pieData = Object.entries(data.success ? (data.data || {}) : {})
                    .map(([k, v]) => ({ name: LEVEL_MAP[k] || k, value: v, itemStyle: { color: LEVEL_COLOR[k] || '#ccc' } }))
                    .filter(d => d.value > 0);
                const chart = echarts.init(chartEl);
                chart.setOption({
                    tooltip: { trigger: 'item', formatter: '{b}: {c}人 ({d}%)' },
                    legend: { bottom: 0, itemWidth: 12, itemHeight: 12, textStyle: { fontSize: 12 } },
                    series: [{
                        type: 'pie', radius: ['40%', '70%'], center: ['50%', '45%'],
                        label: { show: true, fontSize: 12, formatter: '{b}\n{c}人' },
                        data: pieData.length ? pieData : [{ name: '暂无数据', value: 1, itemStyle: { color: '#e0e0e0' } }]
                    }]
                });
                window.addEventListener('resize', () => chart.resize());
            } catch (e) { console.error('loadMemberLevelChart', e); }
        }

        // ========== 场地热度排行榜 ==========
        async function loadVenueHot() {
            const el = document.getElementById('venueHotList');
            if (!el) return; // 元素不存在则跳过
            try {
                const resp = await fetch(authUrl('/api/admin/venues/stats/hot'));
                const data = await resp.json();
                if (data.success && data.data && data.data.length) {
                    const TYPE_MAP = { yumaoqiu: '🏸', lanqiu: '🏀', pingpang: '🏓', yujia: '🧘', youyong: '🏊', gym: '💪', other: '🏟️' };
                    const maxCnt = Math.max(...data.data.map(v => v.book_cnt || 0)) || 1;
                    el.innerHTML = data.data.map((v, i) => {
                        const pct = Math.round((v.book_cnt || 0) / maxCnt * 100);
                        const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `<span style="color:#999;font-size:13px">${i+1}</span>`;
                        return `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f0f0f0">
                            <span style="width:28px;text-align:center;font-size:18px">${medal}</span>
                            <span style="font-size:16px">${TYPE_MAP[v.venue_type]||'🏟️'}</span>
                            <div style="flex:1;min-width:0">
                                <div style="font-size:13px;font-weight:500;color:#333;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${v.venue_name||'-'}</div>
                                <div style="height:6px;background:#f5f5f5;border-radius:3px;margin-top:4px">
                                    <div style="height:6px;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:3px;width:${pct}%;transition:width .6s"></div>
                                </div>
                            </div>
                            <div style="text-align:right;flex-shrink:0">
                                <div style="font-size:15px;font-weight:700;color:#667eea">${v.book_cnt||0}<span style="font-size:11px;font-weight:normal;color:#999">次</span></div>
                                <div style="font-size:11px;color:#f57c00">¥${parseFloat(v.total_income||0).toFixed(0)}</div>
                            </div>
                        </div>`;
                    }).join('');
                } else {
                    el.innerHTML = '<div class="loading">暂无场地预约数据</div>';
                }
            } catch (e) { el.innerHTML = '<div class="loading">加载失败</div>'; }
        }

        function refreshAll() {
            // 并行加载所有数据（各函数内部会检查元素是否存在）
            Promise.all([
                loadStats(),
                loadTrend(currentDays),
                loadAppChart(),
                loadAppTypeChart(),
                loadBookingChart(),
                loadMemberLevelChart(),
                loadVenueStats(),
                loadPointsStats(),
                loadVenueHot()
            ]).then(() => {
                console.log('数据刷新完成');
            }).catch(err => {
                console.error('数据刷新失败:', err);
            });
        }

        refreshAll();
    </script>
</body>
</html>
