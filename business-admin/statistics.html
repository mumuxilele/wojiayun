<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据统计 - 管理后台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f5f7fa; }
        .sidebar { min-height: 100vh; background: #2c3e50; }
        .sidebar a { color: #ecf0f1; text-decoration: none; padding: 12px 20px; display: block; }
        .sidebar a:hover, .sidebar a.active { background: #34495e; border-left: 3px solid #3498db; }
        .stat-card { border: none; border-radius: 10px; color: white; padding: 20px; margin-bottom: 20px; }
        .stat-card.blue { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .stat-card.green { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); }
        .stat-card.orange { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .stat-card.red { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        .stat-card i { font-size: 2.5rem; opacity: 0.8; }
        .stat-card .number { font-size: 2rem; font-weight: bold; }
        .stat-card .label { opacity: 0.9; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- 侧边栏 -->
            <div class="col-md-2 sidebar p-0">
                <div class="p-3 text-center border-bottom border-secondary">
                    <h5 class="text-white">管理后台</h5>
                </div>
                <a href="index.html"><i class="bi bi-house me-2"></i>首页</a>
                <a href="statistics.html" class="active"><i class="bi bi-bar-chart me-2"></i>数据统计</a>
                <a href="venues.html"><i class="bi bi-geo-alt me-2"></i>场地管理</a>
                <a href="bookings.html"><i class="bi bi-calendar-check me-2"></i>预约管理</a>
                <a href="applications.html"><i class="bi bi-file-text me-2"></i>申请单</a>
                <a href="orders.html"><i class="bi bi-receipt me-2"></i>订单</a>
                <a href="shops.html"><i class="bi bi-shop me-2"></i>门店</a>
                <a href="users.html"><i class="bi bi-people me-2"></i>用户</a>
            </div>
            
            <!-- 主内容 -->
            <div class="col-md-10 p-4">
                <h4 class="mb-4"><i class="bi bi-bar-chart me-2"></i>数据统计</h4>
                
                <!-- 统计卡片 -->
                <div class="row">
                    <div class="col-md-3">
                        <div class="stat-card blue">
                            <div class="d-flex justify-content-between">
                                <div>
                                    <div class="number" id="todayOrders">-</div>
                                    <div class="label">今日订单</div>
                                </div>
                                <i class="bi bi-cart-check"></i>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="stat-card green">
                            <div class="d-flex justify-content-between">
                                <div>
                                    <div class="number" id="todayApps">-</div>
                                    <div class="label">今日申请</div>
                                </div>
                                <i class="bi bi-file-earmark-plus"></i>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="stat-card orange">
                            <div class="d-flex justify-content-between">
                                <div>
                                    <div class="number" id="pendingApps">-</div>
                                    <div class="label">待审申请</div>
                                </div>
                                <i class="bi bi-hourglass-split"></i>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="stat-card red">
                            <div class="d-flex justify-content-between">
                                <div>
                                    <div class="number" id="totalIncome">-</div>
                                    <div class="label">总收入(元)</div>
                                </div>
                                <i class="bi bi-currency-dollar"></i>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 累计数据 -->
                <div class="row mt-3">
                    <div class="col-md-4">
                        <div class="card border-0 shadow-sm">
                            <div class="card-body">
                                <h6 class="text-muted mb-3">累计数据</h6>
                                <div class="d-flex justify-content-between mb-2">
                                    <span>总订单</span>
                                    <strong id="totalOrders">-</strong>
                                </div>
                                <div class="d-flex justify-content-between mb-2">
                                    <span>总申请</span>
                                    <strong id="totalApps">-</strong>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-8">
                        <div class="card border-0 shadow-sm">
                            <div class="card-body">
                                <h6 class="text-muted mb-3">场地预约统计</h6>
                                <div id="venueStats">加载中...</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const token = new URLSearchParams(location.search).get('access_token') || '';
        const isDev = new URLSearchParams(location.search).get('isdev') || '0';
        
        // 获取统计数据
        async function loadStats() {
            try {
                const resp = await fetch(`/api/admin/statistics?access_token=${token}&isdev=${isDev}`);
                const data = await resp.json();
                if (data.success) {
                    document.getElementById('todayOrders').textContent = data.data.today_orders || 0;
                    document.getElementById('todayApps').textContent = data.data.today_applications || 0;
                    document.getElementById('pendingApps').textContent = data.data.pending_applications || 0;
                    document.getElementById('totalIncome').textContent = (data.data.total_income || 0).toFixed(2);
                    document.getElementById('totalOrders').textContent = data.data.total_orders || 0;
                    document.getElementById('totalApps').textContent = data.data.total_applications || 0;
                }
            } catch (e) {
                console.error(e);
            }
        }
        
        // 获取场地统计
        async function loadVenueStats() {
            try {
                const resp = await fetch(`/api/admin/venues?access_token=${token}&isdev=${isDev}`);
                const data = await resp.json();
                if (data.success && data.data.items) {
                    let html = '<div class="table-responsive"><table class="table table-sm"><thead><tr><th>场地</th><th>类型</th><th>价格</th><th>容量</th></tr></thead><tbody>';
                    data.data.items.forEach(v => {
                        html += `<tr><td>${v.venue_name}</td><td>${v.venue_type}</td><td>¥${v.price}</td><td>${v.capacity}</td></tr>`;
                    });
                    html += '</tbody></table></div>';
                    document.getElementById('venueStats').innerHTML = html;
                }
            } catch (e) {
                document.getElementById('venueStats').textContent = '加载失败';
            }
        }
        
        loadStats();
        loadVenueStats();
    </script>
</body>
</html>
