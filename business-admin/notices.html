<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>公告管理</title>
<link rel="stylesheet" href="/business-common/list-style.css">
<style>
/* 页面特有样式 */
.actions .link { color: var(--el-color-primary); cursor: pointer; margin-right: 10px; }
.actions .link:hover { text-decoration: underline; }
.actions .link.danger { color: var(--el-color-danger); }
/* 弹窗 */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:1000;display:none;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:white;border-radius:8px;padding:24px;width:600px;max-width:95vw;max-height:90vh;overflow-y:auto}
.modal-title{font-size:18px;font-weight:600;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center}
.modal-close{cursor:pointer;color:#999;font-size:20px;line-height:1}
.modal-close:hover{color:#333}
.form-row{margin-bottom:16px}
.form-row label{display:block;font-size:14px;font-weight:500;color:#333;margin-bottom:6px}
.form-row input,.form-row select,.form-row textarea{width:100%;padding:8px 12px;border:1px solid var(--el-border-color);border-radius:6px;font-size:14px;outline:none;font-family:inherit}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:var(--el-color-primary);box-shadow:0 0 0 2px rgba(0,209,160,.2)}
.form-row textarea{min-height:120px;resize:vertical}
.form-row-inline{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-footer{display:flex;justify-content:flex-end;gap:10px;margin-top:20px;padding-top:16px;border-top:1px solid #f0f0f0}
.required{color:var(--el-color-danger);margin-left:2px}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.stat-mini{background:white;border-radius:8px;padding:16px;text-align:center;box-shadow:0 1px 2px rgba(0,0,0,.06)}
.stat-mini .num{font-size:24px;font-weight:700;color:var(--el-color-primary)}
.stat-mini .label{font-size:12px;color:#999;margin-top:4px}
.el-button--text{background:none;border:none;color:var(--el-color-primary);padding:0 4px;cursor:pointer;font-size:13px}
.el-button--text:hover{color:var(--el-color-primary-light)}
.el-button--text.el-button--danger{color:var(--el-color-danger)}
.el-button--text.el-button--danger:hover{color:#f78989}
.el-button--text.el-button--success{color:var(--el-color-success)}
.el-button--text.el-button--success:hover{color:#85ce61}
.wy-design-list_empty{text-align:center;padding:60px 20px;color:var(--el-text-secondary)}
.wy-design-list_empty-icon{font-size:40px;margin-bottom:12px}
.wy-design-list_pagination{padding:16px 24px;text-align:center;display:flex;justify-content:center;align-items:center;gap:8px}
.wy-design-list_pagination_info{font-size:13px;color:var(--el-text-secondary);margin-right:8px}
</style>
</head>
<body class="wy-design-list">

<!-- 顶部区域 -->
<div class="wy-design-list_top">
    <div class="wy-design-list_top_title">
        <h1 class="wy-design-list_title">📢 公告管理</h1>
        <div class="wy-design-list_space"></div>
        <div class="wy-design-list_btn-group">
            <div class="wy-design-list_btn">
                <button type="button" class="el-button el-button--small" onclick="loadNotices()">
                    <span>刷新</span>
                </button>
            </div>
            <div class="wy-design-list_btn">
                <button type="button" class="el-button el-button--primary el-button--small" onclick="openCreate()">
                    <span>+ 新建公告</span>
                </button>
            </div>
        </div>
    </div>
</div>

<!-- 统计卡片 -->
<div style="padding: 16px 24px 0;">
    <div class="stats-row">
        <div class="stat-mini"><div class="num" id="statTotal">0</div><div class="label">公告总数</div></div>
        <div class="stat-mini"><div class="num" id="statPublished">0</div><div class="label">已发布</div></div>
        <div class="stat-mini"><div class="num" id="statDraft">0</div><div class="label">草稿</div></div>
        <div class="stat-mini"><div class="num" id="statUrgent">0</div><div class="label">紧急公告</div></div>
    </div>
</div>

<!-- 筛选区域 -->
<div class="wy-design-list_filter">
    <div class="wy-design-list_other">
        <div class="el-input el-input--small" style="width: 200px;">
            <input type="text" id="searchInput" placeholder="搜索标题..." class="el-input__inner" oninput="debounceSearch()">
        </div>
    </div>
    <div class="wy-design-list_other">
        <select id="filterStatus" class="el-input__inner" style="width: 130px;" onchange="loadNotices()">
            <option value="">全部状态</option>
            <option value="published">已发布</option>
            <option value="draft">草稿</option>
        </select>
    </div>
    <div class="wy-design-list_other">
        <select id="filterType" class="el-input__inner" style="width: 130px;" onchange="loadNotices()">
            <option value="">全部类型</option>
            <option value="general">普通</option>
            <option value="activity">活动</option>
            <option value="urgent">紧急</option>
        </select>
    </div>
    <div class="wy-design-list_other">
        <button type="button" class="el-button el-button--primary el-button--small" onclick="loadNotices()">
            <span>搜索</span>
        </button>
    </div>
</div>

<!-- 表格区域 -->
<div class="wy-design-table wy-design-table_main wy-design-table_has-bar">
    <div class="wy-design-table_bar">
        <span class="wy-design-table_total">共 <em id="totalCount">0</em> 条</span>
        <div class="wy-pages">
            <div class="wy-pages_total">第<em id="currentPage">1</em>/<em id="totalPages">1</em>页</div>
            <div class="wy-pages_prev el-icon-arrow-left" id="prevBtn" onclick="changePage(-1)"></div>
            <div class="wy-pages_next el-icon-arrow-right" id="nextBtn" onclick="changePage(1)"></div>
        </div>
    </div>
    <table class="el-table el-table--fit el-table--border el-table--enable-row-hover">
        <thead class="el-table__header">
            <tr>
                <th><div class="cell">标题</div></th>
                <th><div class="cell">类型</div></th>
                <th><div class="cell">重要程度</div></th>
                <th><div class="cell">状态</div></th>
                <th><div class="cell">生效期</div></th>
                <th><div class="cell">创建人</div></th>
                <th><div class="cell">创建时间</div></th>
                <th><div class="cell">操作</div></th>
            </tr>
        </thead>
        <tbody class="el-table__body" id="listBody">
            <tr><td colspan="8" style="text-align:center;padding:60px;color:var(--el-text-secondary);">加载中...</td></tr>
        </tbody>
    </table>
</div>

<!-- 新建/编辑弹窗 -->
<div class="modal-overlay" id="editModal">
    <div class="modal">
        <div class="modal-title">
            <span id="modalTitle">新建公告</span>
            <span class="modal-close" onclick="closeModal()">✕</span>
        </div>

        <div class="form-row">
            <label>公告标题<span class="required">*</span></label>
            <input type="text" id="fTitle" placeholder="请输入公告标题" maxlength="255">
        </div>

        <div class="form-row-inline form-row">
            <div>
                <label>公告类型</label>
                <select id="fType">
                    <option value="general">普通</option>
                    <option value="activity">活动</option>
                    <option value="urgent">紧急</option>
                </select>
            </div>
            <div>
                <label>重要程度</label>
                <select id="fImportance">
                    <option value="0">普通</option>
                    <option value="1">重要</option>
                    <option value="2">紧急置顶</option>
                </select>
            </div>
        </div>

        <div class="form-row-inline form-row">
            <div>
                <label>生效日期</label>
                <input type="date" id="fStartDate">
            </div>
            <div>
                <label>失效日期</label>
                <input type="date" id="fEndDate">
            </div>
        </div>

        <div class="form-row">
            <label>发布状态</label>
            <select id="fStatus">
                <option value="published">立即发布</option>
                <option value="draft">保存草稿</option>
            </select>
        </div>

        <div class="form-row">
            <label>公告内容<span class="required">*</span></label>
            <textarea id="fContent" placeholder="请输入公告内容..."></textarea>
        </div>

        <div class="modal-footer">
            <button class="el-button el-button--small" onclick="closeModal()">取消</button>
            <button class="el-button el-button--primary el-button--small" onclick="submitNotice()">保存</button>
        </div>
    </div>
</div>

<script>
const token = localStorage.getItem('admin_token') || new URLSearchParams(location.search).get('access_token') || parent?.token || '';
const isdev = new URLSearchParams(location.search).get('isdev') || '0';

let currentPageNum = 1;
let editingId = null;
let searchTimer = null;

async function api(method, path, data) {
    const sep = path.includes('?') ? '&' : '?';
    const url = `/api/admin${path}${sep}access_token=${encodeURIComponent(token)}&isdev=${isdev}`;
    const opts = { method, headers: {'Content-Type': 'application/json'} };
    if (data) opts.body = JSON.stringify(data);
    const r = await fetch(url, opts);
    return r.json();
}

function debounceSearch() {
    if (searchTimer) clearTimeout(searchTimer);
    searchTimer = setTimeout(() => { currentPageNum = 1; loadNotices(); }, 400);
}

async function loadNotices() {
    const keyword = document.getElementById('searchInput').value.trim();
    const status = document.getElementById('filterStatus').value;
    const notice_type = document.getElementById('filterType').value;

    let q = `?page=${currentPageNum}&page_size=10`;
    if (keyword) q += `&keyword=${encodeURIComponent(keyword)}`;
    if (status) q += `&status=${status}`;
    if (notice_type) q += `&notice_type=${notice_type}`;

    const r = await api('GET', `/notices${q}`);
    if (!r.success) {
        document.getElementById('listBody').innerHTML = 
            `<tr><td colspan="8" style="text-align:center;padding:60px;color:var(--el-color-danger)">加载失败: ${r.msg || '未知错误'}</td></tr>`;
        return;
    }

    const items = r.data.items || [];
    const total = r.data.total || 0;
    const totalPages = Math.ceil(total / 10) || 1;

    // 更新统计
    document.getElementById('statTotal').textContent = total;
    document.getElementById('statPublished').textContent = items.filter(i => i.status === 'published').length;
    document.getElementById('statDraft').textContent = items.filter(i => i.status === 'draft').length;
    document.getElementById('statUrgent').textContent = items.filter(i => i.notice_type === 'urgent').length;

    // 更新分页信息
    document.getElementById('totalCount').textContent = total;
    document.getElementById('currentPage').textContent = currentPageNum;
    document.getElementById('totalPages').textContent = totalPages;
    document.getElementById('prevBtn').classList.toggle('disabled', currentPageNum <= 1);
    document.getElementById('nextBtn').classList.toggle('disabled', currentPageNum >= totalPages);

    const tbody = document.getElementById('listBody');
    if (!items.length) {
        tbody.innerHTML = `<tr><td colspan="8"><div class="wy-design-list_empty"><div class="wy-design-list_empty-icon">📢</div>暂无公告</div></td></tr>`;
        return;
    }

    const typeMap = {general:'普通', activity:'活动', urgent:'紧急'};
    const typeCls = {general:'el-tag--info', activity:'el-tag--primary', urgent:'el-tag--danger'};
    const impMap = {0:'普通', 1:'重要', 2:'紧急置顶'};
    const impCls = {0:'el-tag--info', 1:'el-tag--warning', 2:'el-tag--danger'};

    tbody.innerHTML = items.map(n => `
        <tr>
            <td><div class="cell" style="max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${n.title}">${n.title}</div></td>
            <td><div class="cell"><span class="el-tag el-tag--small ${typeCls[n.notice_type] || 'el-tag--info'}">${typeMap[n.notice_type] || n.notice_type}</span></div></td>
            <td><div class="cell"><span class="el-tag el-tag--small ${impCls[String(n.importance)] || 'el-tag--info'}">${impMap[String(n.importance)] || '普通'}</span></div></td>
            <td><div class="cell"><span class="el-tag el-tag--small ${n.status === 'published' ? 'el-tag--success' : 'el-tag--warning'}">${n.status === 'published' ? '已发布' : '草稿'}</span></div></td>
            <td><div class="cell" style="font-size:12px;color:var(--el-text-secondary)">${n.start_date ? n.start_date : '-'} ${n.end_date ? '~ ' + n.end_date : ''}</div></td>
            <td><div class="cell">${n.created_by_name || '-'}</div></td>
            <td><div class="cell" style="font-size:12px;color:var(--el-text-secondary)">${(n.created_at || '').substring(0,16)}</div></td>
            <td><div class="cell actions">
                <button class="el-button el-button--text el-button--small" onclick="openEdit(${n.id})">编辑</button>
                ${n.status === 'draft' ? `<button class="el-button el-button--text el-button--small el-button--success" onclick="publishNotice(${n.id})">发布</button>` : ''}
                <button class="el-button el-button--text el-button--small el-button--danger" onclick="deleteNotice(${n.id})">删除</button>
            </div></td>
        </tr>
    `).join('');
}

function changePage(delta) {
    currentPageNum += delta;
    loadNotices();
}

function openCreate() {
    editingId = null;
    document.getElementById('modalTitle').textContent = '新建公告';
    document.getElementById('fTitle').value = '';
    document.getElementById('fType').value = 'general';
    document.getElementById('fImportance').value = '0';
    document.getElementById('fStatus').value = 'published';
    document.getElementById('fStartDate').value = '';
    document.getElementById('fEndDate').value = '';
    document.getElementById('fContent').value = '';
    document.getElementById('editModal').classList.add('show');
    document.getElementById('fTitle').focus();
}

async function openEdit(id) {
    const r = await api('GET', `/notices/${id}`);
    if (!r.success) { alert('获取公告失败'); return; }
    const n = r.data;
    editingId = id;
    document.getElementById('modalTitle').textContent = '编辑公告';
    document.getElementById('fTitle').value = n.title || '';
    document.getElementById('fType').value = n.notice_type || 'general';
    document.getElementById('fImportance').value = String(n.importance || 0);
    document.getElementById('fStatus').value = n.status || 'published';
    document.getElementById('fStartDate').value = n.start_date || '';
    document.getElementById('fEndDate').value = n.end_date || '';
    document.getElementById('fContent').value = n.content || '';
    document.getElementById('editModal').classList.add('show');
}

function closeModal() {
    document.getElementById('editModal').classList.remove('show');
    editingId = null;
}

async function submitNotice() {
    const title = document.getElementById('fTitle').value.trim();
    const content = document.getElementById('fContent').value.trim();
    if (!title) { alert('请填写公告标题'); return; }
    if (!content) { alert('请填写公告内容'); return; }

    const payload = {
        title, content,
        notice_type: document.getElementById('fType').value,
        importance: parseInt(document.getElementById('fImportance').value),
        status: document.getElementById('fStatus').value,
        start_date: document.getElementById('fStartDate').value || null,
        end_date: document.getElementById('fEndDate').value || null
    };

    let r;
    if (editingId) {
        r = await api('PUT', `/notices/${editingId}`, payload);
    } else {
        r = await api('POST', '/notices', payload);
    }

    if (r.success) {
        alert(r.msg || '操作成功');
        closeModal();
        loadNotices();
    } else {
        alert(r.msg || '操作失败');
    }
}

async function publishNotice(id) {
    if (!confirm('确定要发布该公告吗？')) return;
    const r = await api('PUT', `/notices/${id}`, {status: 'published'});
    if (r.success) { loadNotices(); }
    else { alert(r.msg || '发布失败'); }
}

async function deleteNotice(id) {
    if (!confirm('确定要删除该公告吗？')) return;
    const r = await api('DELETE', `/notices/${id}`);
    if (r.success) {
        alert('已删除');
        loadNotices();
    } else {
        alert(r.msg || '删除失败');
    }
}

// 初始化
loadNotices();

// 点击遮罩关闭弹窗
document.getElementById('editModal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
});
</script>
</body>
</html>
