<div class="modal-overlay" id="editModal">

    <script>
    // йҚҷоҒғзІ URLйҚҷеӮӣжҡҹй‘ҫеі°еҪҮtoken
const token = new URLSearchParams(location.search).get('access_token') || '';
const isdev = new URLSearchParams(location.search).get('isdev') || '0';

let currentPage = 1;
let editingId = null;
let searchTimer = null;

async function api(method, path, data) {
    const sep = path.includes('?') ? '&' : '?';
    const url = `/api/admin${path}${sep}access_token=${encodeURIComponent(token)}&isdev=${isdev}`;
    const opts = { method, headers: {'Content-Type': 'application/json'} };
    if (data) opts.body = JSON.stringify(data);
    const r = await fetch(url, opts);
    return r.json();
}

function debounceSearch() {
    if (searchTimer) clearTimeout(searchTimer);
    searchTimer = setTimeout(() => { currentPage = 1; loadNotices(); }, 400);
}

async function loadNotices() {
    const keyword = document.getElementById('searchInput') ? document.getElementById('searchInput').value.trim() : '';
    const status = document.getElementById('filterStatus') ? document.getElementById('filterStatus').value : '';
    const notice_type = document.getElementById('filterType') ? document.getElementById('filterType').value : '';

    let q = `?page=${currentPage}&page_size=10`;
    if (keyword) q += `&keyword=${encodeURIComponent(keyword)}`;
    if (status) q += `&status=${status}`;
    if (notice_type) q += `&notice_type=${notice_type}`;

    const r = await api('GET', `/notices${q}`);
    if (!r.success) {
        document.getElementById('listBody').innerHTML = 
            `<tr><td colspan="8" style="text-align:center;padding:40px;color:#ff4d4f">йҚ”зҠәжөҮжҫ¶иҫ«и§Ұ: ${r.msg || 'йҸҲоҒҶз…Ўй–ҝж¬’оҮӨ'}</td></tr>`;
        return;
    }

    const items = r.data.items || [];
    const total = r.data.total || 0;

    // йҸҮеӯҳжҹҠзјҒзҶ»о…ё
    document.getElementById('statTotal').textContent = total;
    document.getElementById('statPublished').textContent = items.filter(i => i.status === 'published').length;
    document.getElementById('statDraft').textContent = items.filter(i => i.status === 'draft').length;
    document.getElementById('statUrgent').textContent = items.filter(i => i.notice_type === 'urgent').length;

    const tbody = document.getElementById('listBody');
    if (!items.length) {
        tbody.innerHTML = `<tr><td colspan="8"><div class="empty"><div class="empty-icon">йҰғж‘ҷ</div>йҸҶеӮӣжЈӨйҚҸо„ҖжҶЎ</div></td></tr>`;
        document.getElementById('pagination').innerHTML = '';
        return;
    }

    const typeMap = {general:'йҸ…оҮҖвӮ¬?, activity:'еЁІиҜІе§©', urgent:'з»ұС„вӮ¬?};
    const typeCls = {general:'tag-general', activity:'tag-activity', urgent:'tag-urgent'};
    const impMap = {0:'йҸ…оҮҖвӮ¬?, 1:'й–Іе¶ҲоӣҰ', 2:'з»ұС„вӮ¬гғ§з–ҶжӨӨ?};
    const impCls = {0:'importance-0', 1:'importance-1', 2:'importance-2'};

    tbody.innerHTML = items.map(n => `
        <tr>
            <td style="max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${n.title}">${n.title}</td>
            <td><span class="tag ${typeCls[n.notice_type] || 'tag-general'}">${typeMap[n.notice_type] || n.notice_type}</span></td>
            <td><span class="${impCls[String(n.importance)] || 'importance-0'}">${impMap[String(n.importance)] || 'йҸ…оҮҖвӮ¬?}</span></td>
            <td><span class="tag ${n.status === 'published' ? 'tag-published' : 'tag-draft'}">${n.status === 'published' ? 'е®ёжҸ’еҪӮз”Ҝ? : 'й‘ҪеӨҢоҹҲ'}</span></td>
            <td style="font-size:12px;color:#999">${n.start_date ? n.start_date : '-'} ${n.end_date ? '~ ' + n.end_date : ''}</td>
            <td>${n.created_by_name || '-'}</td>
            <td style="font-size:12px;color:#999">${(n.created_at || '').substring(0,16)}</td>
            <td>
                <div class="actions">
                    <button class="btn btn-default" onclick="openEdit(${n.id})">зјӮж ¬з·«</button>
                    ${n.status === 'draft' ? `<button class="btn btn-success" style="padding:4px 10px;font-size:12px" onclick="publishNotice(${n.id})">йҚҷжҲқз«·</button>` : ''}
                    <button class="btn btn-danger" onclick="deleteNotice(${n.id})">йҚ’зҠ»ж«Һ</button>
                </div>
            </td>
        </tr>
    `).join('');

    // йҚ’е—ӣгҖү
    const totalPages = Math.ceil(total / 10);
    renderPagination(currentPage, totalPages, total);
}

function renderPagination(page, totalPages, total) {
    const p = document.getElementById('pagination');
    if (totalPages <= 1) { p.innerHTML = `<span class="page-info">йҚҸ?${total} йҸү?/span>`; return; }
    let html = `<span class="page-info">йҚҸ?${total} йҸү?/span>`;
    if (page > 1) html += `<button class="page-btn" onclick="changePage(${page-1})">ж¶“е©Ғз«ҙжӨӨ?/button>`;
    const start = Math.max(1, page - 2);
    const end = Math.min(totalPages, page + 2);
    if (start > 1) html += `<button class="page-btn" onclick="changePage(1)">1</button>${start > 2 ? '<span>...</span>' : ''}`;
    for (let i = start; i <= end; i++) {
        html += `<button class="page-btn ${i === page ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`;
    }
    if (end < totalPages) html += `${end < totalPages - 1 ? '<span>...</span>' : ''}<button class="page-btn" onclick="changePage(${totalPages})">${totalPages}</button>`;
    if (page < totalPages) html += `<button class="page-btn" onclick="changePage(${page+1})">ж¶“е¬©з«ҙжӨӨ?/button>`;
    p.innerHTML = html;
}

function changePage(page) {
    currentPage = page;
    loadNotices();
}

function openCreate() {
    editingId = null;
    document.getElementById('modalTitle').textContent = 'йҸӮжқҝзј“йҚҸо„ҖжҶЎ';
    document.getElementById('fTitle').value = '';
    document.getElementById('fType').value = 'general';
    document.getElementById('fImportance').value = '0';
    document.getElementById('fStatus').value = 'published';
    document.getElementById('fStartDate').value = '';
    document.getElementById('fEndDate').value = '';
    document.getElementById('fContent').value = '';
    document.getElementById('editModal').classList.add('show');
    document.getElementById('fTitle').focus();
}

async function openEdit(id) {
    const r = await api('GET', `/notices/${id}`);
    if (!r.success) { alert('й‘ҫеі°еҪҮйҚҸо„ҖжҶЎжҫ¶иҫ«и§Ұ'); return; }
    const n = r.data;
    editingId = id;
    document.getElementById('modalTitle').textContent = 'зјӮж ¬з·«йҚҸо„ҖжҶЎ';
    document.getElementById('fTitle').value = n.title || '';
    document.getElementById('fType').value = n.notice_type || 'general';
    document.getElementById('fImportance').value = String(n.importance || 0);
    document.getElementById('fStatus').value = n.status || 'published';
    document.getElementById('fStartDate').value = n.start_date || '';
    document.getElementById('fEndDate').value = n.end_date || '';
    document.getElementById('fContent').value = n.content || '';
    document.getElementById('editModal').classList.add('show');
}

function closeModal() {
    document.getElementById('editModal').classList.remove('show');
    editingId = null;
}

async function submitNotice() {
    const title = document.getElementById('fTitle').value.trim();
    const content = document.getElementById('fContent').value.trim();
    if (!title) { alert('з’Үеі°пҪһйҚҗж¬ҸеҸ•йҚӣе©ғзҲЈжЈ°?); return; }
    if (!content) { alert('з’Үеі°пҪһйҚҗж¬ҸеҸ•йҚӣе©Ӯе”ҙзҖ№?); return; }

    const payload = {
        title, content,
        notice_type: document.getElementById('fType').value,
        importance: parseInt(document.getElementById('fImportance').value),
        status: document.getElementById('fStatus').value,
        start_date: document.getElementById('fStartDate').value || null,
        end_date: document.getElementById('fEndDate').value || null
    };

    let r;
    if (editingId) {
        r = await api('PUT', `/notices/${editingId}`, payload);
    } else {
        r = await api('POST', '/notices', payload);
    }

    if (r.success) {
        alert(r.msg || 'йҺҝе¶„з¶”йҺҙж„¬е§ӣ');
        closeModal();
        loadNotices();
    } else {
        alert(r.msg || 'йҺҝе¶„з¶”жҫ¶иҫ«и§Ұ');
    }
}

async function publishNotice(id) {
    if (!confirm('зәӯоҶјз•ҫз‘•дҪёеҪӮз”ҜеҶӯоҮҡйҚҸо„ҖжҶЎйҚҡжҘӢзҙө')) return;
    const r = await api('PUT', `/notices/${id}`, {status: 'published'});
    if (r.success) { loadNotices(); }
    else { alert(r.msg || 'йҚҷжҲқз«·жҫ¶иҫ«и§Ұ'); }
}

async function deleteNotice(id) {
    if (!confirm('зәӯоҶјз•ҫз‘•дҪёеһ№й—„гӮҲоҮҡйҚҸо„ҖжҶЎйҚҡжҘӢзҙө')) return;
    const r = await api('DELETE', `/notices/${id}`);
    if (r.success) {
        alert('е®ёжҸ’еһ№й—„?);
        loadNotices();
    } else {
        alert(r.msg || 'йҚ’зҠ»ж«Һжҫ¶иҫ«и§Ұ');
    }
}

// йҚ’жҝҶоқҗйҚ–?
loadNotices();

// йҗҗз‘°еҡ®й–¬оҶҫеғөйҚҸжҠҪжЈҙеҜ®еңӯзҚҘ
const editModal = document.getElementById('editModal');
if (editModal) editModal.addEventListener('click', function(e) {
    if (e.target === this) closeModal();
});
    </script>
