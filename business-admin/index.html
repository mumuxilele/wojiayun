<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理中心</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f0f2f5; }
        .sidebar { position: fixed; left: 0; top: 0; width: 200px; height: 100vh; background: #001529; color: white; }
        .logo { padding: 20px; font-size: 18px; font-weight: 600; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .menu { padding: 10px 0; }
        .menu-item { padding: 12px 20px; cursor: pointer; display: flex; align-items: center; gap: 10px; color: rgba(255,255,255,0.65); }
        .menu-item:hover, .menu-item.active { background: #1890ff; color: white; }
        .menu-item span { font-size: 14px; }
        .main { margin-left: 200px; min-height: 100vh; display: flex; flex-direction: column; }
        .main-header { background: white; padding: 12px 20px; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; }
        .main-header h2 { font-size: 16px; font-weight: 600; }
        .page-container { flex: 1; position: relative; overflow: hidden; }
        .page-panel { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: none; }
        .page-panel.active { display: block; }
        .page-panel iframe { width: 100%; height: 100%; border: none; }
        .page-panel .inner-content { padding: 20px; height: 100%; overflow-y: auto; }
        /* 概览页样式 */
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 20px; border-radius: 8px; }
        .stat-title { font-size: 14px; color: #666; margin-bottom: 10px; }
        .stat-value { font-size: 28px; font-weight: 600; color: #333; }
        .stat-trend { font-size: 12px; color: #52c41a; margin-top: 5px; }
        .content { background: white; padding: 20px; border-radius: 8px; }
        .content-title { font-size: 16px; font-weight: 600; margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #f0f0f0; }
        th { background: #fafafa; font-weight: 500; color: #666; }
        .status { padding: 4px 8px; border-radius: 4px; font-size: 12px; }
        .status-pending { background: #fff7e6; color: #fa8c16; }
        .status-processing { background: #e6f7ff; color: #1890ff; }
        .status-completed { background: #f6ffed; color: #52c41a; }
        .actions a { color: #1890ff; margin-right: 10px; text-decoration: none; cursor: pointer; }
        .actions a:hover { text-decoration: underline; }
        .user-info { display: flex; align-items: center; gap: 8px; font-size: 14px; color: #666; }
        .user-info .name { font-weight: 500; color: #333; }
        .user-info .role { font-size: 12px; color: #999; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">🏢 管理中心</div>
        <div class="menu">
            <div class="menu-item active" data-page="dashboard" onclick="switchPage('dashboard')"><span>📊</span><span>概览</span></div>
            <div class="menu-item" data-page="applications" onclick="switchPage('applications')"><span>📋</span><span>申请单管理</span></div>
            <div class="menu-item" data-page="orders" onclick="switchPage('orders')"><span>📦</span><span>订单管理</span></div>
            <div class="menu-item" data-page="shops" onclick="switchPage('shops')"><span>🏪</span><span>门店管理</span></div>
            <div class="menu-item" data-page="users" onclick="switchPage('users')"><span>👥</span><span>用户管理</span></div>
            <div class="menu-item" data-page="venues" onclick="switchPage('venues')"><span>🏟️</span><span>场地管理</span></div>
            <div class="menu-item" data-page="points" onclick="switchPage('points')"><span>💰</span><span>积分管理</span></div>
            <div class="menu-item" data-page="statistics" onclick="switchPage('statistics')"><span>📈</span><span>数据统计</span></div>
        </div>
    </div>
    <div class="main">
        <div class="main-header">
            <h2 id="pageTitle">概览</h2>
            <div class="user-info" id="userInfo">
                <span class="name">加载中...</span>
            </div>
        </div>
        <div class="page-container">
            <!-- 概览页 -->
            <div id="panel-dashboard" class="page-panel active">
                <div class="inner-content">
                    <div class="stats">
                        <div class="stat-card"><div class="stat-title">待处理申请</div><div class="stat-value" id="pendingApps">0</div><div class="stat-trend">今日新增</div></div>
                        <div class="stat-card"><div class="stat-title">今日订单</div><div class="stat-value" id="todayOrders">0</div><div class="stat-trend">较昨日 +0</div></div>
                        <div class="stat-card"><div class="stat-title">今日收入</div><div class="stat-value" id="todayIncome">¥0</div><div class="stat-trend">较昨日 +0%</div></div>
                        <div class="stat-card"><div class="stat-title">活跃用户</div><div class="stat-value" id="activeUsers">0</div><div class="stat-trend">本周新增</div></div>
                    </div>
                    <div class="content">
                        <div class="content-title">最近申请</div>
                        <table>
                            <thead><tr><th>申请单号</th><th>标题</th><th>申请人</th><th>状态</th><th>时间</th><th>操作</th></tr></thead>
                            <tbody id="recentApps"><tr><td colspan="6" style="text-align:center;padding:30px;">加载中...</td></tr></tbody>
                        </table>
                    </div>
                </div>
            </div>
            <!-- 场地管理 (iframe) -->
            <div id="panel-venues" class="page-panel">
                <iframe id="iframe-venues" src="about:blank"></iframe>
            </div>
            <!-- 积分管理 (iframe) -->
            <div id="panel-points" class="page-panel">
                <iframe id="iframe-points" src="about:blank"></iframe>
            </div>
            <!-- 数据统计 -->
            <div id="panel-statistics" class="page-panel">
                <div class="inner-content" id="statisticsContent"></div>
            </div>
            <!-- 申请单/订单/门店/用户 (动态加载) -->
            <div id="panel-applications" class="page-panel">
                <div class="inner-content" id="applicationsContent"></div>
            </div>
            <div id="panel-orders" class="page-panel">
                <div class="inner-content" id="ordersContent"></div>
            </div>
            <div id="panel-shops" class="page-panel">
                <div class="inner-content" id="shopsContent"></div>
            </div>
            <div id="panel-users" class="page-panel">
                <div class="inner-content" id="usersContent"></div>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('admin_token') || new URLSearchParams(location.search).get('access_token');
        const isdev = new URLSearchParams(location.search).get('isdev') || '0';
        if (token) localStorage.setItem('admin_token', token);
        
        // 存储用户信息
        let currentUser = null;
        
        const PAGE_TITLES = {
            dashboard:'概览', applications:'申请单管理', orders:'订单管理', 
            shops:'门店管理', users:'用户管理', venues:'场地管理', 
            points:'积分管理', statistics:'数据统计'
        };
        
        // 获取用户信息
        async function loadUserInfo() {
            try {
                const res = await fetch('/api/admin/userinfo?access_token=' + encodeURIComponent(token) + '&isdev=' + isdev);
                const data = await res.json();
                if (data.success && data.data) {
                    currentUser = data.data;
                    // 更新右上角用户名显示
                    const userInfoEl = document.getElementById('userInfo');
                    if (userInfoEl) {
                        userInfoEl.innerHTML = '<span class="name">' + (currentUser.user_name || '用户') + '</span>';
                    }
                }
            } catch(e) {
                console.error('获取用户信息失败:', e);
            }
        }
        
        let currentPage = 'dashboard';
        
        function switchPage(page) {
            // 更新菜单激活状态
            document.querySelectorAll('.menu-item').forEach(e => e.classList.remove('active'));
            document.querySelector(`.menu-item[data-page="${page}"]`)?.classList.add('active');
            
            // 更新标题
            document.getElementById('pageTitle').textContent = PAGE_TITLES[page] || page;
            
            // 隐藏所有面板
            document.querySelectorAll('.page-panel').forEach(p => p.classList.remove('active'));
            
            // 显示目标面板
            const panel = document.getElementById('panel-' + page);
            if (panel) {
                panel.classList.add('active');
            }
            
            // 根据页面类型加载内容
            if (page === 'dashboard') {
                loadDashboard();
            } else if (page === 'venues' || page === 'points') {
                loadIframe(page);
            } else if (page === 'statistics') {
                loadStatistics();
            } else {
                loadList(page);
            }
            
            currentPage = page;
        }
        
        function loadIframe(page) {
            const iframe = document.getElementById('iframe-' + page);
            if (iframe && iframe.src === 'about:blank') {
                iframe.src = page + '.html?access_token=' + encodeURIComponent(token) + '&isdev=' + isdev + '&embed=1';
            }
        }

        async function loadDashboard() {
            // 加载统计
            try {
                const res = await fetch('/api/admin/statistics?access_token=' + encodeURIComponent(token) + '&isdev=' + isdev);
                const data = await res.json();
                if (data.success && data.data) {
                    document.getElementById('todayOrders').textContent = data.data.today_orders || 0;
                    document.getElementById('todayIncome').textContent = '¥' + (data.data.today_income || 0).toFixed(2);
                    document.getElementById('pendingApps').textContent = data.data.pending_applications || 0;
                    document.getElementById('activeUsers').textContent = data.data.total_applications || 0;
                }
            } catch(e) { console.error(e); }

            // 加载申请列表
            try {
                const res = await fetch('/api/admin/applications?page=1&page_size=10&access_token=' + encodeURIComponent(token) + '&isdev=' + isdev);
                const data = await res.json();
                if (data.success && data.data && data.data.items) {
                    document.getElementById('recentApps').innerHTML = data.data.items.map(item => 
                        '<tr><td>' + (item.app_no || '') + '</td><td>' + (item.title || '') + '</td><td>' + (item.user_name || '') + '</td><td><span class="status status-' + (item.status || 'pending') + '">' + (item.status || 'pending') + '</span></td><td>' + (item.created_at || '') + '</td><td class="actions"><a onclick="viewApp(' + item.id + ')">查看</a></td></tr>'
                    ).join('') || '<tr><td colspan="6" style="text-align:center;padding:30px;">暂无数据</td></tr>';
                }
            } catch(e) { console.error(e); }
        }

        async function loadStatistics() {
            const container = document.getElementById('statisticsContent');
            container.innerHTML = '<div style="text-align:center;padding:40px;">加载中...</div>';
            
            try {
                const resp = await fetch(`/api/admin/statistics?access_token=${token}&isdev=${isdev}`);
                const data = await resp.json();
                if (data.success) {
                    const d = data.data;
                    container.innerHTML = `
                        <div class="stats" style="margin-bottom:20px;">
                            <div class="stat-card"><div class="stat-title">今日订单</div><div class="stat-value" style="color:#667eea">${d.today_orders||0}</div></div>
                            <div class="stat-card"><div class="stat-title">今日申请</div><div class="stat-value" style="color:#11998e">${d.today_applications||0}</div></div>
                            <div class="stat-card"><div class="stat-title">待审申请</div><div class="stat-value" style="color:#f5576c">${d.pending_applications||0}</div></div>
                            <div class="stat-card"><div class="stat-title">总收入</div><div class="stat-value" style="color:#4facfe">¥${(d.total_income||0).toFixed(2)}</div></div>
                        </div>
                        <div class="content">
                            <h4 style="margin-bottom:15px;">累计数据</h4>
                            <p>总订单: <strong>${d.total_orders||0}</strong></p>
                            <p>总申请: <strong>${d.total_applications||0}</strong></p>
                        </div>
                    `;
                }
            } catch(e) {
                container.innerHTML = '<div class="content"><p>加载失败</p></div>';
            }
        }
        
        async function loadList(type) {
            const container = document.getElementById(type + 'Content');
            if (!container) return;
            
            const endpoints = {applications:'applications',orders:'orders',shops:'shops',users:'users'};
            const endpoint = endpoints[type];
            if (!endpoint) return;
            
            container.innerHTML = '<div class="content"><table><thead><tr><th>加载中...</th></tr></thead></table></div>';
            
            try {
                const res = await fetch('/api/admin/' + endpoint + '?page=1&page_size=20&access_token=' + encodeURIComponent(token) + '&isdev=' + isdev);
                const data = await res.json();
                if (data.success && data.data) {
                    const items = data.data.items || data.data;
                    if (items.length === 0) {
                        container.innerHTML = '<div class="content"><div style="text-align:center;padding:40px;">暂无数据</div></div>';
                        return;
                    }
                    const keys = Object.keys(items[0]).slice(0, 6);
                    container.innerHTML = '<div class="content"><table><thead><tr>' + keys.map(k => '<th>' + k + '</th>').join('') + '<th>操作</th></tr></thead><tbody>' + items.map(item => '<tr>' + keys.map(k => '<td>' + (item[k] || '-') + '</td>').join('') + '<td class="actions"><a onclick="deleteItem(\'' + type + '\',' + item.id + ')">删除</a></td></tr>').join('') + '</tbody></table></div>';
                }
            } catch(e) { console.error(e); }
        }

        async function deleteItem(type, id) {
            if (!confirm('确定要删除吗？')) return;
            const endpoints = {applications:'applications',orders:'orders',shops:'shops',users:'users'};
            try {
                const res = await fetch('/api/admin/' + endpoints[type] + '/' + id + '?access_token=' + encodeURIComponent(token) + '&isdev=' + isdev, {method: 'DELETE'});
                const data = await res.json();
                if (data.success) {
                    alert('删除成功');
                    loadList(type);
                } else {
                    alert(data.msg || '删除失败');
                }
            } catch(e) { alert('删除失败'); }
        }

        function viewApp(id) { alert('查看申请 ' + id); }

        // 初始化
        loadUserInfo();
        loadDashboard();
    </script>
</body>
</html>
