<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理中心</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f0f2f5; }
        .sidebar { position: fixed; left: 0; top: 0; width: 200px; height: 100vh; background: #001529; color: white; }
        .logo { padding: 20px; font-size: 18px; font-weight: 600; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .menu { padding: 10px 0; }
        .menu-item { padding: 12px 20px; cursor: pointer; display: flex; align-items: center; gap: 10px; color: rgba(255,255,255,0.65); }
        .menu-item:hover, .menu-item.active { background: #1890ff; color: white; }
        .menu-item span { font-size: 14px; }
        .main { margin-left: 200px; min-height: 100vh; display: flex; flex-direction: column; }
        .main-header { background: white; padding: 12px 20px; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; }
        .main-header h2 { font-size: 16px; font-weight: 600; }
        .page-container { flex: 1; position: relative; overflow: hidden; }
        .page-panel { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: none; }
        .page-panel.active { display: block; }
        .page-panel iframe { width: 100%; height: 100%; border: none; }
        .page-panel .inner-content { padding: 20px; height: 100%; overflow-y: auto; }
        /* 概览页样式 */
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 20px; border-radius: 8px; }
        .stat-title { font-size: 14px; color: #666; margin-bottom: 10px; }
        .stat-value { font-size: 28px; font-weight: 600; color: #333; }
        .stat-trend { font-size: 12px; color: #52c41a; margin-top: 5px; }
        .content { background: white; padding: 20px; border-radius: 8px; }
        .content-title { font-size: 16px; font-weight: 600; margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #f0f0f0; }
        th { background: #fafafa; font-weight: 500; color: #666; }
        .status { padding: 4px 8px; border-radius: 4px; font-size: 12px; }
        .status-pending { background: #fff7e6; color: #fa8c16; }
        .status-processing { background: #e6f7ff; color: #1890ff; }
        .status-completed { background: #f6ffed; color: #52c41a; }
        .actions a { color: #1890ff; margin-right: 10px; text-decoration: none; cursor: pointer; }
        .actions a:hover { text-decoration: underline; }
        .user-info { display: flex; align-items: center; gap: 8px; font-size: 14px; color: #666; }
        .user-info .name { font-weight: 500; color: #333; }
        .user-info .role { font-size: 12px; color: #999; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">🏢 管理中心</div>
        <div class="menu">
            <div class="menu-item" data-page="dashboard" onclick="switchPage('dashboard')"><span>📊</span><span>概览</span></div>
            <div class="menu-item" data-page="applications" onclick="switchPage('applications')"><span>📋</span><span>申请单管理</span></div>
            <div class="menu-item" data-page="orders" onclick="switchPage('orders')"><span>📦</span><span>订单管理</span></div>
            <div class="menu-item" onclick="window.open('refunds.html','_blank')"><span>💸</span><span>退款管理</span></div>
            <div class="menu-item" data-page="shops" onclick="switchPage('shops')"><span>🏪</span><span>门店管理</span></div>
            <div class="menu-item" data-page="products" onclick="switchPage('products')"><span>📦</span><span>商品管理</span></div>
            <div class="menu-item" data-page="users" onclick="switchPage('users')"><span>👥</span><span>用户管理</span></div>
            <div class="menu-item" data-page="venues" onclick="switchPage('venues')"><span>🏟️</span><span>场地管理</span></div>
            <div class="menu-item" data-page="points" onclick="switchPage('points')"><span>💰</span><span>积分管理</span></div>
            <div class="menu-item" data-page="coupons" onclick="switchPage('coupons')"><span>🎫</span><span>优惠券</span></div>
            <div class="menu-item" data-page="feedback" onclick="switchPage('feedback')"><span>💬</span><span>反馈管理</span></div>
            <div class="menu-item" data-page="notifications" onclick="switchPage('notifications')"><span>🔔</span><span>通知管理</span></div>
            <div class="menu-item" data-page="notices" onclick="switchPage('notices')"><span>📢</span><span>公告管理</span></div>
            <div class="menu-item" data-page="statistics" onclick="switchPage('statistics')"><span>📈</span><span>数据统计</span></div>
            <div class="menu-item" data-page="visual" onclick="switchPage('visual')"><span>📊</span><span>数据大屏</span></div>
            <div class="menu-item" data-page="member-levels" onclick="switchPage('member-levels')"><span>🏆</span><span>会员等级</span></div>
            <div class="menu-item" data-page="promotions" onclick="switchPage('promotions')"><span>🔥</span><span>营销促销</span></div>
            <div class="menu-item" data-page="points-mall" onclick="switchPage('points-mall')"><span>🎁</span><span>积分商城</span></div>
            <div class="menu-item" data-page="group-buy" onclick="switchPage('group-buy')"><span>👥</span><span>拼团活动</span></div>
            <div class="menu-item" data-page="data-board" onclick="switchPage('data-board')"><span>📊</span><span>运营看板</span></div>
            <div class="menu-item" data-page="api-docs" onclick="switchPage('api-docs')"><span>📖</span><span>API文档</span></div>
        </div>
    </div>
    <div class="main">
        <div class="main-header">
            <h2 id="pageTitle">概览</h2>
            <div class="user-info" id="userInfo">
                <span class="name">加载中...</span>
            </div>
        </div>
        <div class="page-container">
            <!-- 概览页 -->
            <div id="panel-dashboard" class="page-panel active">
                <div class="inner-content">
                    <!-- 统计卡片 -->
                    <div class="stats">
                        <div class="stat-card"><div class="stat-title">待处理申请</div><div class="stat-value" id="pendingApps">0</div><div class="stat-trend">今日新增</div></div>
                        <div class="stat-card"><div class="stat-title">今日订单</div><div class="stat-value" id="todayOrders">0</div><div class="stat-trend">较昨日 +0</div></div>
                        <div class="stat-card"><div class="stat-title">今日收入</div><div class="stat-value" id="todayIncome">¥0</div><div class="stat-trend">较昨日 +0%</div></div>
                        <div class="stat-card"><div class="stat-title">注册会员</div><div class="stat-value" id="activeUsers">0</div><div class="stat-trend">7日活跃</div></div>
                    </div>
                    
                    <!-- V19.0: ECharts图表区域 -->
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                        <div class="content">
                            <div class="content-title">📈 近7天订单趋势</div>
                            <div id="orderTrendChart" style="height: 280px;"></div>
                        </div>
                        <div class="content">
                            <div class="content-title">🥧 申请单状态分布</div>
                            <div id="appStatusChart" style="height: 280px;"></div>
                        </div>
                    </div>
                    
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                        <div class="content">
                            <div class="content-title">💰 收入来源分析</div>
                            <div id="incomeSourceChart" style="height: 260px;"></div>
                        </div>
                        <div class="content">
                            <div class="content-title">⚠️ 超时申请预警</div>
                            <div id="overdueAppsPanel" style="max-height: 260px; overflow-y: auto;">
                                <div style="text-align:center;padding:30px;color:#999;">加载中...</div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="content">
                        <div class="content-title">最近申请</div>
                        <table>
                            <thead><tr><th>申请单号</th><th>标题</th><th>申请人</th><th>状态</th><th>时间</th><th>操作</th></tr></thead>
                            <tbody id="recentApps"><tr><td colspan="6" style="text-align:center;padding:30px;">加载中...</td></tr></tbody>
                        </table>
                    </div>
                </div>
            </div>
            <!-- 场地管理 (iframe) -->
            <div id="panel-venues" class="page-panel">
                <iframe id="iframe-venues" src="about:blank"></iframe>
            </div>
            <!-- 积分管理 (iframe) -->
            <div id="panel-points" class="page-panel">
                <iframe id="iframe-points" src="about:blank"></iframe>
            </div>
            <!-- 数据统计 (iframe) -->
            <div id="panel-statistics" class="page-panel">
                <iframe id="iframe-statistics" src="about:blank"></iframe>
            </div>
            <!-- 申请单/订单/门店/用户 (iframe 模式，功能完整) -->
            <div id="panel-applications" class="page-panel">
                <iframe id="iframe-applications" src="about:blank"></iframe>
            </div>
            <div id="panel-orders" class="page-panel">
                <iframe id="iframe-orders" src="about:blank"></iframe>
            </div>
            <div id="panel-shops" class="page-panel">
                <iframe id="iframe-shops" src="about:blank"></iframe>
            </div>
            <div id="panel-users" class="page-panel">
                <iframe id="iframe-users" src="about:blank"></iframe>
            </div>
            <!-- 优惠券管理 (iframe) -->
            <div id="panel-coupons" class="page-panel">
                <iframe id="iframe-coupons" src="about:blank"></iframe>
            </div>
            <!-- 商品管理 (iframe) -->
            <div id="panel-products" class="page-panel">
                <iframe id="iframe-products" src="about:blank"></iframe>
            </div>
            <!-- 反馈管理 (iframe) -->
            <div id="panel-feedback" class="page-panel">
                <iframe id="iframe-feedback" src="about:blank"></iframe>
            </div>
            <!-- 通知管理 (iframe) -->
            <div id="panel-notifications" class="page-panel">
                <iframe id="iframe-notifications" src="about:blank"></iframe>
            </div>
            <!-- 公告管理 (iframe) -->
            <div id="panel-notices" class="page-panel">
                <iframe id="iframe-notices" src="about:blank"></iframe>
            </div>
            <!-- API文档 (iframe) -->
            <div id="panel-swagger" class="page-panel">
                <iframe id="iframe-swagger" src="about:blank"></iframe>
            </div>
            <!-- 数据大屏 (iframe) -->
            <div id="panel-visual" class="page-panel">
                <iframe id="iframe-visual" src="about:blank"></iframe>
            </div>
            <!-- 会员等级 (iframe) -->
            <div id="panel-member-levels" class="page-panel">
                <iframe id="iframe-member-levels" src="about:blank"></iframe>
            </div>
            <!-- 营销促销 (iframe) -->
            <div id="panel-promotions" class="page-panel">
                <iframe id="iframe-promotions" src="about:blank"></iframe>
            </div>
            <!-- 积分商城 (iframe) -->
            <div id="panel-points-mall" class="page-panel">
                <iframe id="iframe-points-mall" src="about:blank"></iframe>
            </div>
            <!-- 拼团活动 (iframe) -->
            <div id="panel-group-buy" class="page-panel">
                <iframe id="iframe-group-buy" src="about:blank"></iframe>
            </div>
            <!-- 运营看板 (iframe) -->
            <div id="panel-data-board" class="page-panel">
                <iframe id="iframe-data-board" src="about:blank"></iframe>
            </div>
            <!-- API文档V2 (iframe) -->
            <div id="panel-api-docs" class="page-panel">
                <iframe id="iframe-api-docs" src="about:blank"></iframe>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('admin_token') || new URLSearchParams(location.search).get('access_token');
        const isdev = new URLSearchParams(location.search).get('isdev') || '0';
        if (token) localStorage.setItem('admin_token', token);
        
        // V20.0: XSS防护 - 统一HTML转义函数
        function escHtml(str) {
            if (!str) return '';
            return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
        }
        
        // 存储用户信息
        let currentUser = null;
        
        const PAGE_TITLES = {
            dashboard:'概览', applications:'申请单管理', orders:'订单管理', 
            shops:'门店管理', products:'商品管理', users:'用户管理', venues:'场地管理', 
            points:'积分管理', coupons:'优惠券管理', feedback:'反馈管理',
            notifications:'通知管理', notices:'公告管理', statistics:'数据统计',
            swagger:'API文档', visual:'数据大屏', 'member-levels':'会员等级',
            promotions:'营销促销管理', 'api-docs':'API文档V2',
            'points-mall':'积分商城', 'group-buy':'拼团活动', 'data-board':'运营看板'
        };
        
        // 获取用户信息
        async function loadUserInfo() {
            try {
                const res = await fetch('/api/admin/userinfo?access_token=' + encodeURIComponent(token) + '&isdev=' + isdev);
                const data = await res.json();
                if (data.success && data.data) {
                    currentUser = data.data;
                    // 更新右上角用户名显示
                    const userInfoEl = document.getElementById('userInfo');
                    if (userInfoEl) {
                        userInfoEl.textContent = currentUser.user_name || '用户';
                    }
                }
            } catch(e) {
                console.error('获取用户信息失败:', e);
            }
        }
        
        let currentPage = 'dashboard';
        
        function switchPage(page) {
            // 更新菜单激活状态
            document.querySelectorAll('.menu-item').forEach(e => e.classList.remove('active'));
            document.querySelector(`.menu-item[data-page="${page}"]`)?.classList.add('active');
            
            // 更新标题
            document.getElementById('pageTitle').textContent = PAGE_TITLES[page] || page;
            
            // 隐藏所有面板
            document.querySelectorAll('.page-panel').forEach(p => p.classList.remove('active'));
            
            // 显示目标面板
            const panel = document.getElementById('panel-' + page);
            if (panel) {
                panel.classList.add('active');
            }
            
            // 根据页面类型加载内容
            if (page === 'dashboard') {
                loadDashboard();
            } else if (['visual', 'member-levels', 'api-docs'].includes(page)) {
                loadIframe(page);
            } else {
                loadIframe(page);
            }
            
            currentPage = page;
        }
        
        function loadIframe(page) {
            const iframe = document.getElementById('iframe-' + page);
            if (iframe && iframe.src === 'about:blank') {
                iframe.src = page + '.html?access_token=' + encodeURIComponent(token) + '&isdev=' + isdev + '&embed=1';
            }
        }

        // V19.0: ECharts实例
        let orderTrendChart, appStatusChart, incomeSourceChart;
        
        async function loadDashboard() {
            // 加载统计
            let statsData = {};
            try {
                const res = await fetch('/api/admin/statistics?access_token=' + encodeURIComponent(token) + '&isdev=' + isdev);
                const data = await res.json();
                if (data.success && data.data) {
                    statsData = data.data;
                    document.getElementById('todayOrders').textContent = data.data.today_orders || 0;
                    document.getElementById('todayIncome').textContent = '¥' + (data.data.today_income || 0).toFixed(2);
                    document.getElementById('pendingApps').textContent = data.data.pending_applications || 0;
                    // 优先使用 7 日活跃用户，其次注册会员数，最后降级显示总申请数
                    document.getElementById('activeUsers').textContent = data.data.active_users_7d || data.data.total_members || data.data.total_applications || 0;
                }
            } catch(e) { console.error(e); }

            // 加载申请列表
            try {
                const res = await fetch('/api/admin/applications?page=1&page_size=10&access_token=' + encodeURIComponent(token) + '&isdev=' + isdev);
                const data = await res.json();
                if (data.success && data.data && data.data.items) {
                    document.getElementById('recentApps').innerHTML = data.data.items.map(item => 
                        '<tr><td>' + escHtml(item.app_no) + '</td><td>' + escHtml(item.title) + '</td><td>' + escHtml(item.user_name) + '</td><td><span class="status status-' + escHtml(item.status || 'pending') + '">' + escHtml(item.status || 'pending') + '</span></td><td>' + escHtml(item.created_at) + '</td><td class="actions"><a onclick="viewApp(' + item.id + ')">查看</a></td></tr>'
                    ).join('') || '<tr><td colspan="6" style="text-align:center;padding:30px;">暂无数据</td></tr>';
                }
            } catch(e) { console.error(e); }
            
            // V19.0: 初始化ECharts图表
            initCharts(statsData);
            
            // V19.0: 加载超时申请预警
            loadOverdueApps();
        }
        
        // V19.0: 初始化图表
        function initCharts(statsData) {
            // 订单趋势图
            const orderChartDom = document.getElementById('orderTrendChart');
            if (orderChartDom) {
                if (orderTrendChart) orderTrendChart.dispose();
                orderTrendChart = echarts.init(orderChartDom);
                
                const days = ['周一', '周二', '周三', '周四', '周五', '周六', '周日'];
                const orders = statsData.weekly_orders || [120, 132, 101, 134, 90, 230, 210];
                const income = statsData.weekly_income || [2200, 2800, 1900, 3100, 1800, 4500, 4200];
                
                orderTrendChart.setOption({
                    tooltip: { trigger: 'axis' },
                    legend: { data: ['订单数', '收入'], bottom: 0 },
                    grid: { left: '3%', right: '4%', bottom: '15%', top: '10%', containLabel: true },
                    xAxis: { type: 'category', data: days },
                    yAxis: [
                        { type: 'value', name: '订单', axisLabel: { formatter: '{value}' } },
                        { type: 'value', name: '收入', axisLabel: { formatter: '¥{value}' } }
                    ],
                    series: [
                        { name: '订单数', type: 'line', data: orders, smooth: true, itemStyle: { color: '#667eea' } },
                        { name: '收入', type: 'bar', yAxisIndex: 1, data: income, itemStyle: { color: '#11998e' } }
                    ]
                });
            }
            
            // 申请状态分布饼图
            const appChartDom = document.getElementById('appStatusChart');
            if (appChartDom) {
                if (appStatusChart) appStatusChart.dispose();
                appStatusChart = echarts.init(appChartDom);
                
                const appData = statsData.app_status_dist || [
                    { value: statsData.pending_applications || 35, name: '待处理' },
                    { value: statsData.processing_applications || 20, name: '处理中' },
                    { value: statsData.completed_applications || 120, name: '已完成' },
                    { value: statsData.cancelled_applications || 5, name: '已取消' }
                ];
                
                appStatusChart.setOption({
                    tooltip: { trigger: 'item', formatter: '{b}: {c} ({d}%)' },
                    legend: { orient: 'vertical', right: 10, top: 'center' },
                    series: [{
                        type: 'pie',
                        radius: ['40%', '70%'],
                        center: ['40%', '50%'],
                        data: appData,
                        itemStyle: { borderRadius: 8, borderColor: '#fff', borderWidth: 2 },
                        label: { show: false }
                    }]
                });
            }
            
            // 收入来源分析
            const incomeChartDom = document.getElementById('incomeSourceChart');
            if (incomeChartDom) {
                if (incomeSourceChart) incomeSourceChart.dispose();
                incomeSourceChart = echarts.init(incomeChartDom);
                
                incomeSourceChart.setOption({
                    tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
                    grid: { left: '3%', right: '4%', bottom: '3%', top: '10%', containLabel: true },
                    xAxis: { type: 'value', axisLabel: { formatter: '¥{value}' } },
                    yAxis: { 
                        type: 'category', 
                        data: ['商品销售', '场地预约', '服务申请', '会员充值', '其他'],
                        axisLabel: { fontSize: 12 }
                    },
                    series: [{
                        type: 'bar',
                        data: statsData.income_by_source || [4500, 2800, 1200, 3500, 500],
                        itemStyle: {
                            color: new echarts.graphic.LinearGradient(0, 0, 1, 0, [
                                { offset: 0, color: '#667eea' },
                                { offset: 1, color: '#764ba2' }
                            ])
                        },
                        label: { show: true, position: 'right', formatter: '¥{c}' }
                    }]
                });
            }
        }
        
        // V19.0: 加载超时申请预警
        async function loadOverdueApps() {
            const panel = document.getElementById('overdueAppsPanel');
            if (!panel) return;
            
            try {
                const res = await fetch('/api/staff/applications/overdue?access_token=' + encodeURIComponent(token) + '&isdev=' + isdev);
                const data = await res.json();
                
                if (data.success && data.data) {
                    const urgentList = data.data.urgent_list || [];
                    const total = data.data.total_overdue || 0;
                    
                    if (urgentList.length === 0) {
                        panel.innerHTML = '<div style="text-align:center;padding:30px;color:#52c41a;">✅ 暂无超时申请</div>';
                        return;
                    }
                    
                    let html = '<div style="margin-bottom:10px;font-weight:600;color:#f5576c;">共 ' + total + ' 条超时申请</div>';
                    html += urgentList.map(app => {
                        const hours = app.hours_pending || 24;
                        const isUrgent = hours >= 48;
                        return '<div style="padding:10px;border-bottom:1px solid #f0f0f0;' + (isUrgent ? 'background:#fff1f0;' : '') + '">' +
                            '<div style="display:flex;justify-content:space-between;align-items:center;">' +
                            '<span style="font-weight:500;">' + (app.app_no || '') + '</span>' +
                            '<span style="color:' + (isUrgent ? '#cf1322' : '#fa8c16') + ';font-size:12px;">⏰ ' + hours + '小时</span>' +
                            '</div>' +
                            '<div style="font-size:12px;color:#666;margin-top:4px;">' + (app.title || '') + '</div>' +
                            '<div style="font-size:12px;color:#999;margin-top:2px;">申请人: ' + (app.user_name || '') + '</div>' +
                            '</div>';
                    }).join('');
                    
                    panel.innerHTML = html;
                } else {
                    panel.innerHTML = '<div style="text-align:center;padding:30px;color:#999;">暂无数据</div>';
                }
            } catch(e) {
                panel.innerHTML = '<div style="text-align:center;padding:30px;color:#999;">加载失败</div>';
            }
        }
        
        // V19.0: 窗口大小变化时重绘图表
        window.addEventListener('resize', function() {
            if (orderTrendChart) orderTrendChart.resize();
            if (appStatusChart) appStatusChart.resize();
            if (incomeSourceChart) incomeSourceChart.resize();
        });

        async function loadStatistics() {
            const container = document.getElementById('statisticsContent');
            container.innerHTML = '<div style="text-align:center;padding:40px;">加载中...</div>';
            
            try {
                const resp = await fetch(`/api/admin/statistics?access_token=${token}&isdev=${isdev}`);
                const data = await resp.json();
                if (data.success) {
                    const d = data.data;
                    container.innerHTML = `
                        <div class="stats" style="margin-bottom:20px;">
                            <div class="stat-card"><div class="stat-title">今日订单</div><div class="stat-value" style="color:#667eea">${d.today_orders||0}</div></div>
                            <div class="stat-card"><div class="stat-title">今日申请</div><div class="stat-value" style="color:#11998e">${d.today_applications||0}</div></div>
                            <div class="stat-card"><div class="stat-title">待审申请</div><div class="stat-value" style="color:#f5576c">${d.pending_applications||0}</div></div>
                            <div class="stat-card"><div class="stat-title">总收入</div><div class="stat-value" style="color:#4facfe">¥${(d.total_income||0).toFixed(2)}</div></div>
                        </div>
                        <div class="content">
                            <h4 style="margin-bottom:15px;">累计数据</h4>
                            <p>总订单: <strong>${d.total_orders||0}</strong></p>
                            <p>总申请: <strong>${d.total_applications||0}</strong></p>
                        </div>
                    `;
                }
            } catch(e) {
                container.innerHTML = '<div class="content"><p>加载失败</p></div>';
            }
        }
        
        async function loadList(type) {
            const container = document.getElementById(type + 'Content');
            if (!container) return;
            
            const endpoints = {applications:'applications',orders:'orders',shops:'shops',users:'users'};
            const endpoint = endpoints[type];
            if (!endpoint) return;
            
            container.innerHTML = '<div class="content"><table><thead><tr><th>加载中...</th></tr></thead></table></div>';
            
            try {
                const res = await fetch('/api/admin/' + endpoint + '?page=1&page_size=20&access_token=' + encodeURIComponent(token) + '&isdev=' + isdev);
                const data = await res.json();
                if (data.success && data.data) {
                    const items = data.data.items || data.data;
                    if (items.length === 0) {
                        container.innerHTML = '<div class="content"><div style="text-align:center;padding:40px;">暂无数据</div></div>';
                        return;
                    }
                    const keys = Object.keys(items[0]).slice(0, 6);
                    container.innerHTML = '<div class="content"><table><thead><tr>' + keys.map(k => '<th>' + escHtml(k) + '</th>').join('') + '<th>操作</th></tr></thead><tbody>' + items.map(item => '<tr>' + keys.map(k => '<td>' + escHtml(item[k]) + '</td>').join('') + '<td class="actions"><a onclick="deleteItem(\'' + type + '\',' + item.id + ')">删除</a></td></tr>').join('') + '</tbody></table></div>';
                }
            } catch(e) { console.error(e); }
        }

        async function deleteItem(type, id) {
            if (!confirm('确定要删除吗？')) return;
            const endpoints = {applications:'applications',orders:'orders',shops:'shops',users:'users'};
            try {
                const res = await fetch('/api/admin/' + endpoints[type] + '/' + id + '?access_token=' + encodeURIComponent(token) + '&isdev=' + isdev, {method: 'DELETE'});
                const data = await res.json();
                if (data.success) {
                    alert('删除成功');
                    loadList(type);
                } else {
                    alert(data.msg || '删除失败');
                }
            } catch(e) { alert('删除失败'); }
        }

        function viewApp(id) { alert('查看申请 ' + id); }

        // 初始化
        loadUserInfo();
        loadDashboard();
    </script>
</body>
</html>
