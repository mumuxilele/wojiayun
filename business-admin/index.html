<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理中心</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f0f2f5; }
        .sidebar { position: fixed; left: 0; top: 0; width: 200px; height: 100vh; background: #001529; color: white; }
        .logo { padding: 20px; font-size: 18px; font-weight: 600; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .menu { padding: 10px 0; }
        .menu-item { padding: 12px 20px; cursor: pointer; display: flex; align-items: center; gap: 10px; color: rgba(255,255,255,0.65); }
        .menu-item:hover, .menu-item.active { background: #1890ff; color: white; }
        .menu-item span { font-size: 14px; }
        .main { margin-left: 200px; padding: 20px; min-height: 100vh; }
        .header { background: white; padding: 15px 20px; border-radius: 8px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 20px; border-radius: 8px; }
        .stat-title { font-size: 14px; color: #666; margin-bottom: 10px; }
        .stat-value { font-size: 28px; font-weight: 600; color: #333; }
        .stat-trend { font-size: 12px; color: #52c41a; margin-top: 5px; }
        .content { background: white; padding: 20px; border-radius: 8px; }
        .content-title { font-size: 16px; font-weight: 600; margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #f0f0f0; }
        th { background: #fafafa; font-weight: 500; color: #666; }
        .status { padding: 4px 8px; border-radius: 4px; font-size: 12px; }
        .status-pending { background: #fff7e6; color: #fa8c16; }
        .status-processing { background: #e6f7ff; color: #1890ff; }
        .status-completed { background: #f6ffed; color: #52c41a; }
        .actions a { color: #1890ff; margin-right: 10px; text-decoration: none; cursor: pointer; }
        .actions a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">🏢 管理中心</div>
        <div class="menu">
            <div class="menu-item active" onclick="loadPage('dashboard')"><span>📊</span><span>概览</span></div>
            <div class="menu-item" onclick="loadPage('applications')"><span>📋</span><span>申请单管理</span></div>
            <div class="menu-item" onclick="loadPage('orders')"><span>📦</span><span>订单管理</span></div>
            <div class="menu-item" onclick="loadPage('shops')"><span>🏪</span><span>门店管理</span></div>
            <div class="menu-item" onclick="loadPage('users')"><span>👥</span><span>用户管理</span></div>
            <div class="menu-item" onclick="loadPage('statistics')"><span>📈</span><span>数据统计</span></div>
        </div>
    </div>
    <div class="main">
        <div class="header">
            <h2 id="pageTitle">概览</h2>
            <div id="userInfo">管理员</div>
        </div>
        <div id="pageContent">
            <div class="stats">
                <div class="stat-card"><div class="stat-title">待处理申请</div><div class="stat-value" id="pendingApps">0</div><div class="stat-trend">今日新增</div></div>
                <div class="stat-card"><div class="stat-title">今日订单</div><div class="stat-value" id="todayOrders">0</div><div class="stat-trend">较昨日 +0</div></div>
                <div class="stat-card"><div class="stat-title">今日收入</div><div class="stat-value" id="todayIncome">¥0</div><div class="stat-trend">较昨日 +0%</div></div>
                <div class="stat-card"><div class="stat-title">活跃用户</div><div class="stat-value" id="activeUsers">0</div><div class="stat-trend">本周新增</div></div>
            </div>
            <div class="content">
                <div class="content-title">最近申请</div>
                <table>
                    <thead><tr><th>申请单号</th><th>标题</th><th>申请人</th><th>状态</th><th>时间</th><th>操作</th></tr></thead>
                    <tbody id="recentApps"><tr><td colspan="6" style="text-align:center;padding:30px;">加载中...</td></tr></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('admin_token') || new URLSearchParams(location.search).get('access_token');
        const isdev = new URLSearchParams(location.search).get('isdev') || '0';
        if (token) localStorage.setItem('admin_token', token);

        async function loadDashboard() {
            // 加载统计
            try {
                const res = await fetch('/api/admin/statistics?access_token=' + encodeURIComponent(token) + '&isdev=' + isdev);
                const data = await res.json();
                if (data.success && data.data) {
                    document.getElementById('todayOrders').textContent = data.data.today?.orders || 0;
                    document.getElementById('todayIncome').textContent = '¥' + (data.data.today?.income || 0);
                }
            } catch(e) { console.error(e); }

            // 加载申请列表
            try {
                const res = await fetch('/api/admin/applications?page=1&page_size=10&access_token=' + encodeURIComponent(token) + '&isdev=' + isdev);
                const data = await res.json();
                if (data.success && data.data && data.data.items) {
                    document.getElementById('pendingApps').textContent = data.data.total || 0;
                    document.getElementById('recentApps').innerHTML = data.data.items.map(item => 
                        '<tr><td>' + (item.app_no || '') + '</td><td>' + (item.title || '') + '</td><td>' + (item.user_name || '') + '</td><td><span class="status status-' + (item.status || 'pending') + '">' + (item.status || 'pending') + '</span></td><td>' + (item.created_at || '') + '</td><td class="actions"><a onclick="viewApp(' + item.id + ')">查看</a><a onclick="editApp(' + item.id + ')">编辑</a></td></tr>'
                    ).join('');
                }
            } catch(e) { console.error(e); }
        }

        function loadPage(page) {
            document.querySelectorAll('.menu-item').forEach(e => e.classList.remove('active'));
            event.target.closest('.menu-item').classList.add('active');
            
            const titles = {dashboard:'概览',applications:'申请单管理',orders:'订单管理',shops:'门店管理',users:'用户管理',statistics:'数据统计'};
            document.getElementById('pageTitle').textContent = titles[page] || page;
            
            if (page === 'dashboard') {
                loadDashboard();
            } else {
                loadList(page);
            }
        }

        async function loadList(type) {
            const endpoints = {applications:'applications',orders:'orders',shops:'shops',users:'users'};
            const endpoint = endpoints[type];
            if (!endpoint) return;
            
            document.getElementById('pageContent').innerHTML = '<div class="content"><table><thead><tr><th>加载中...</th></tr></thead></table></div>';
            
            try {
                const res = await fetch('/api/admin/' + endpoint + '?page=1&page_size=20&access_token=' + encodeURIComponent(token) + '&isdev=' + isdev);
                const data = await res.json();
                if (data.success && data.data) {
                    const items = data.data.items || data.data;
                    if (items.length === 0) {
                        document.getElementById('pageContent').innerHTML = '<div class="content"><div style="text-align:center;padding:40px;">暂无数据</div></div>';
                        return;
                    }
                    const keys = Object.keys(items[0]).slice(0, 6);
                    document.getElementById('pageContent').innerHTML = '<div class="content"><table><thead><tr>' + keys.map(k => '<th>' + k + '</th>').join('') + '<th>操作</th></tr></thead><tbody>' + items.map(item => '<tr>' + keys.map(k => '<td>' + (item[k] || '-') + '</td>').join('') + '<td class="actions"><a>查看</a><a>编辑</a><a onclick="deleteItem(\'' + type + '\',' + item.id + ')">删除</a></td></tr>').join('') + '</tbody></table></div>';
                }
            } catch(e) { console.error(e); }
        }

        async function deleteItem(type, id) {
            if (!confirm('确定要删除吗？')) return;
            const endpoints = {applications:'applications',orders:'orders',shops:'shops',users:'users'};
            try {
                const res = await fetch('/api/admin/' + endpoints[type] + '/' + id + '?access_token=' + encodeURIComponent(token) + '&isdev=' + isdev, {method: 'DELETE'});
                const data = await res.json();
                if (data.success) {
                    alert('删除成功');
                    loadList(type);
                } else {
                    alert(data.msg || '删除失败');
                }
            } catch(e) { alert('删除失败'); }
        }

        function viewApp(id) { alert('查看申请 ' + id); }
        function editApp(id) { alert('编辑申请 ' + id); }

        loadDashboard();
    </script>
</body>
</html>
