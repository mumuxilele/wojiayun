<!DOCTYPE html>
<html lang="zh-CN" data-theme="commercial">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>粤海物业 · 员工管理</title>
<script src="../api.js"></script>
<style>
  :root {
    --primary: #00dea0; --primary-dark: #00c78e; --deep: #2c3e50;
    --bg: #f5f7fa; --card: #ffffff; --text: #2c3e50;
    --text-secondary: #7f8c8d; --border: #e8ecf1;
    --radius: 10px; --radius-sm: 6px;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --danger: #e74c3c; --warning: #f39c12; --success: #27ae60;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 72px;
  }
  .header {
    background: linear-gradient(90deg, var(--primary), var(--deep));
    padding: 16px 20px; color: #fff;
    display: flex; align-items: center; gap: 12px;
  }
  .header .back { font-size: 20px; color: #fff; text-decoration: none; }
  .header h1 { font-size: 18px; font-weight: 600; flex: 1; }
  .header .add-btn {
    background: rgba(255,255,255,0.2); border: none; color: #fff;
    padding: 6px 14px; border-radius: 20px; font-size: 13px; cursor: pointer;
  }
  .content { padding: 16px; }
  .search-bar {
    display: flex; background: var(--card); border-radius: var(--radius);
    padding: 10px 14px; margin-bottom: 14px; box-shadow: var(--shadow);
    align-items: center; gap: 8px;
  }
  .search-bar input { flex: 1; border: none; outline: none; font-size: 14px; color: var(--text); }
  .filter-tabs {
    display: flex; gap: 8px; margin-bottom: 16px; overflow-x: auto;
  }
  .filter-tab {
    padding: 6px 16px; border-radius: 20px; font-size: 12px;
    background: var(--card); color: var(--text-secondary);
    border: 1px solid var(--border); cursor: pointer; white-space: nowrap;
  }
  .filter-tab.active { background: var(--primary); color: #fff; border-color: var(--primary); }
  .staff-list { display: flex; flex-direction: column; gap: 10px; }
  .staff-card {
    background: var(--card); border-radius: var(--radius);
    padding: 16px; box-shadow: var(--shadow);
    display: flex; gap: 14px; align-items: flex-start; cursor: pointer;
    transition: transform 0.2s;
  }
  .staff-card:active { transform: scale(0.98); }
  .staff-card .avatar {
    width: 48px; height: 48px; border-radius: 50%;
    background: linear-gradient(135deg, var(--primary), var(--deep));
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 20px; font-weight: 600; flex-shrink: 0;
  }
  .staff-card .info { flex: 1; }
  .staff-card .name { font-size: 15px; font-weight: 600; }
  .staff-card .role {
    font-size: 12px; color: var(--text-secondary); margin: 2px 0 6px;
  }
  .staff-card .meta {
    display: flex; gap: 10px; font-size: 11px; color: var(--text-secondary); flex-wrap: wrap;
  }
  .staff-card .status {
    font-size: 11px; padding: 3px 10px; border-radius: 12px;
  }
  .staff-card .status.online { background: #e8f8f3; color: var(--success); }
  .staff-card .status.offline { background: #f0f0f0; color: var(--text-secondary); }
  .staff-card .arrow { font-size: 18px; color: var(--text-secondary); align-self: center; }
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--card); display: flex; border-top: 1px solid var(--border);
    padding: 6px 0 env(safe-area-inset-bottom, 6px);
    box-shadow: 0 -2px 8px rgba(0,0,0,0.04);
  }
  .nav-item {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; padding: 6px 0; text-decoration: none;
    color: var(--text-secondary); font-size: 10px; gap: 3px;
  }
  .nav-item .nav-icon { font-size: 20px; }
  .nav-item.active { color: var(--primary); }
  .loading { text-align: center; color: var(--text-secondary); padding: 20px; }
</style>
</head>
<body>
  <div class="header">
    <a href="index.html" class="back">‹</a>
    <h1>员工管理</h1>
    <button class="add-btn" onclick="showAddDialog()">+ 添加</button>
  </div>

  <div class="content">
    <div class="search-bar">
      <span>🔍</span>
      <input type="text" id="searchInput" placeholder="搜索姓名/工号/部门..." oninput="searchStaff()">
    </div>

    <div class="filter-tabs" id="filterTabs">
      <div class="filter-tab active" data-dept="" onclick="switchDept('')">全部</div>
      <div class="filter-tab" data-dept="客服部" onclick="switchDept('客服部')">客服部</div>
      <div class="filter-tab" data-dept="工程部" onclick="switchDept('工程部')">工程部</div>
      <div class="filter-tab" data-dept="安保部" onclick="switchDept('安保部')">安保部</div>
      <div class="filter-tab" data-dept="行政部" onclick="switchDept('行政部')">行政部</div>
    </div>

    <div class="staff-list" id="staffList">
      <div class="loading">加载中...</div>
    </div>
  </div>

  <div class="bottom-nav">
    <div class="nav-item" onclick="location.href='index.html'">
      <span class="nav-icon">📊</span>仪表盘
    </div>
    <div class="nav-item" onclick="location.href='enterprises.html'">
      <span class="nav-icon">🏢</span>园区
    </div>
    <div class="nav-item" onclick="location.href='workorders.html'">
      <span class="nav-icon">📋</span>工单
    </div>
    <div class="nav-item" onclick="location.href='settings.html'">
      <span class="nav-icon">⚙️</span>设置
    </div>
  </div>

<!-- 新增/编辑员工对话框 -->
<div id="addDialog" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:999;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:10px;width:90%;max-width:400px;padding:20px;max-height:90vh;overflow-y:auto;">
    <h3 id="dialogTitle" style="margin-bottom:16px;">添加员工</h3>
    <input id="inpName" placeholder="姓名" style="width:100%;padding:10px;border:1px solid #e8ecf1;border-radius:6px;margin-bottom:10px;font-size:14px;">
    <input id="inpPhone" placeholder="手机号" style="width:100%;padding:10px;border:1px solid #e8ecf1;border-radius:6px;margin-bottom:10px;font-size:14px;">
    <input id="inpDept" placeholder="部门（如：工程部、客服部）" style="width:100%;padding:10px;border:1px solid #e8ecf1;border-radius:6px;margin-bottom:10px;font-size:14px;">
    <input id="inpRole" placeholder="职位（如：维修技工、客服主管）" style="width:100%;padding:10px;border:1px solid #e8ecf1;border-radius:6px;margin-bottom:10px;font-size:14px;">
    <input id="inpStaffNo" placeholder="工号（如：YH1001）" style="width:100%;padding:10px;border:1px solid #e8ecf1;border-radius:6px;margin-bottom:16px;font-size:14px;">
    <div style="display:flex;gap:10px;">
      <button onclick="closeDialog()" style="flex:1;padding:10px;border:1px solid #e8ecf1;background:#fff;border-radius:6px;cursor:pointer;">取消</button>
      <button onclick="saveStaff()" style="flex:1;padding:10px;border:none;background:var(--primary);color:#fff;border-radius:6px;cursor:pointer;">保存</button>
    </div>
  </div>
</div>

<script>
let staffList = [];
let currentDept = '';
let currentEditId = null;

// 检查登录
if (!API.auth.isLoggedIn()) {
  alert('请先登录');
}

// 加载员工数据
async function loadStaff(department = '', keyword = '') {
  try {
    const res = await API.staff.list(department, keyword);
    if (res.code === 0 && res.data) {
      staffList = res.data.items || [];
      renderStaff(staffList);
      updateFilterCounts();
    }
  } catch (err) {
    console.error('加载员工失败:', err);
    document.getElementById('staffList').innerHTML = '<div class="loading">加载失败，请刷新重试</div>';
  }
}

// 渲染员工列表
function renderStaff(list) {
  const container = document.getElementById('staffList');
  if (list.length === 0) {
    container.innerHTML = '<div class="loading">暂无员工数据</div>';
    return;
  }
  container.innerHTML = list.map(s => `
    <div class="staff-card" onclick="viewStaff('${s.fid}')">
      <div class="avatar">${(s.name || '?')[0]}</div>
      <div class="info">
        <div class="name">${s.name || '未命名'}</div>
        <div class="role">${s.department || '未分配'} · ${s.role || '未设置'} · ${s.staff_no || '无工号'}</div>
        <div class="meta">
          <span>📱 ${s.phone || '无电话'}</span>
          <span>🏢 ${s.enterprise_name || '未分配园区'}</span>
        </div>
      </div>
      <span class="status ${s.status === '在岗' || s.status === '在线' ? 'online' : 'offline'}">${s.status || '离线'}</span>
      <span class="arrow">›</span>
    </div>
  `).join('');
}

// 更新筛选Tab计数
function updateFilterCounts() {
  const tabs = document.querySelectorAll('.filter-tab');
  tabs.forEach(tab => {
    const dept = tab.dataset.dept;
    const count = dept ? staffList.filter(s => s.department === dept).length : staffList.length;
    tab.textContent = dept ? `${dept} (${count})` : `全部 (${count})`;
  });
}

// 切换部门筛选
function switchDept(dept) {
  currentDept = dept;
  document.querySelectorAll('.filter-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.dept === dept);
  });
  loadStaff(dept, document.getElementById('searchInput').value.trim());
}

// 搜索
function searchStaff() {
  const keyword = document.getElementById('searchInput').value.trim();
  loadStaff(currentDept, keyword);
}

// 查看/编辑员工
function viewStaff(fid) {
  const item = staffList.find(s => s.fid === fid);
  if (!item) return;
  currentEditId = fid;
  document.getElementById('dialogTitle').textContent = '编辑员工';
  document.getElementById('inpName').value = item.name || '';
  document.getElementById('inpPhone').value = item.phone || '';
  document.getElementById('inpDept').value = item.department || '';
  document.getElementById('inpRole').value = item.role || '';
  document.getElementById('inpStaffNo').value = item.staff_no || '';
  document.getElementById('addDialog').style.display = 'flex';
}

// 新增对话框
function showAddDialog() {
  currentEditId = null;
  document.getElementById('dialogTitle').textContent = '添加员工';
  document.getElementById('inpName').value = '';
  document.getElementById('inpPhone').value = '';
  document.getElementById('inpDept').value = '';
  document.getElementById('inpRole').value = '';
  document.getElementById('inpStaffNo').value = '';
  document.getElementById('addDialog').style.display = 'flex';
}

function closeDialog() {
  document.getElementById('addDialog').style.display = 'none';
}

// 保存员工
async function saveStaff() {
  const name = document.getElementById('inpName').value.trim();
  const phone = document.getElementById('inpPhone').value.trim();
  const department = document.getElementById('inpDept').value.trim();
  const role = document.getElementById('inpRole').value.trim();
  const staff_no = document.getElementById('inpStaffNo').value.trim();
  
  if (!name) { alert('请输入姓名'); return; }
  
  try {
    let res;
    const data = { name, phone, department, role, staff_no, status: '在岗' };
    if (currentEditId) {
      res = await API.staff.update(currentEditId, data);
    } else {
      res = await API.staff.create(data);
    }
    if (res.code === 0) {
      closeDialog();
      loadStaff(currentDept);
    } else {
      alert(res.message || '保存失败');
    }
  } catch (err) {
    alert('保存失败: ' + err.message);
  }
}

// 页面加载
document.addEventListener('DOMContentLoaded', () => loadStaff());
</script>
</body>
</html>
