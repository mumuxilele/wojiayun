<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>运营数据看板 - 管理后台</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #00d1a0; --success: #52c41a; --warning: #faad14; --danger: #ff4d4f; --border: #ebeef5; --bg: #f5f7fa; --text: #303133; --text2: #606266; --text3: #909399; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg); font-size: 14px; color: var(--text2); }
        .layout { display: flex; min-height: 100vh; }
        .main { flex: 1; padding: 20px; }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .page-title { font-size: 18px; font-weight: 600; color: var(--text); }
        .filter-bar { background: white; padding: 14px 16px; border-radius: 6px; margin-bottom: 20px; display: flex; gap: 12px; align-items: center; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
        .filter-bar select, .filter-bar input { padding: 8px 12px; border: 1px solid var(--border); border-radius: 4px; font-size: 13px; background: white; }
        .btn { padding: 8px 16px; border-radius: 4px; cursor: pointer; border: 1px solid var(--border); background: white; font-size: 13px; }
        .btn-primary { background: var(--primary); border-color: var(--primary); color: white; }
        .stats-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
        .stat-card .stat-icon { width: 48px; height: 48px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 24px; margin-bottom: 12px; }
        .stat-card .stat-label { font-size: 13px; color: var(--text3); margin-bottom: 8px; }
        .stat-card .stat-value { font-size: 28px; font-weight: 600; color: var(--text); }
        .stat-card .stat-trend { font-size: 12px; margin-top: 8px; }
        .stat-card .stat-trend.up { color: var(--success); }
        .stat-card .stat-trend.down { color: var(--danger); }
        .chart-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 20px; }
        .chart-card { background: white; border-radius: 8px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
        .chart-card .chart-title { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
        .chart-container { height: 300px; }
        .data-card { background: white; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
        .data-card .card-header { padding: 16px 20px; border-bottom: 1px solid var(--border); }
        .data-card .card-title { font-size: 16px; font-weight: 600; color: var(--text); }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { padding: 12px 16px; background: var(--bg); color: var(--text); font-weight: 500; text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap; }
        td { padding: 12px 16px; border-bottom: 1px solid var(--border); }
        .rank-badge { display: inline-flex; align-items: center; justify-content: center; width: 24px; height: 24px; border-radius: 50%; font-size: 12px; font-weight: 600; }
        .rank-1 { background: #ffd700; color: #8b6914; }
        .rank-2 { background: #c0c0c0; color: #6b6b6b; }
        .rank-3 { background: #cd7f32; color: #fff; }
        .funnel-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-top: 16px; }
        .funnel-step { text-align: center; padding: 20px 16px; border-radius: 8px; }
        .funnel-step .step-value { font-size: 24px; font-weight: 600; }
        .funnel-step .step-label { font-size: 13px; margin-top: 8px; }
        .funnel-step .step-rate { font-size: 12px; margin-top: 4px; opacity: 0.8; }
    </style>
</head>
<body>
<div class="layout">
    <div class="main">
        <div class="page-header">
            <h1 class="page-title">📈 运营数据看板</h1>
            <div class="filter-bar">
                <select id="dateRange">
                    <option value="7">近7天</option>
                    <option value="14">近14天</option>
                    <option value="30" selected>近30天</option>
                    <option value="90">近90天</option>
                </select>
                <button class="btn btn-primary" onclick="refreshData()">🔄 刷新数据</button>
            </div>
        </div>
        
        <!-- 核心指标 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon" style="background: #e6f7ff;">💰</div>
                <div class="stat-label">总收入</div>
                <div class="stat-value" id="totalIncome">¥0</div>
                <div class="stat-trend up" id="incomeTrend">↑ 0%</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background: #fff7e6;">📦</div>
                <div class="stat-label">订单数</div>
                <div class="stat-value" id="totalOrders">0</div>
                <div class="stat-trend up" id="ordersTrend">↑ 0%</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background: #f6ffed;">👥</div>
                <div class="stat-label">新会员</div>
                <div class="stat-value" id="newMembers">0</div>
                <div class="stat-trend up" id="membersTrend">↑ 0%</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background: #fff1f0;">🏪</div>
                <div class="stat-label">活跃门店</div>
                <div class="stat-value" id="activeShops">0</div>
                <div class="stat-trend" id="shopsTrend">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background: #f9f0ff;">⭐</div>
                <div class="stat-label">平均评分</div>
                <div class="stat-value" id="avgRating">0.0</div>
                <div class="stat-trend" id="ratingTrend">-</div>
            </div>
        </div>
        
        <!-- 图表区域 -->
        <div class="chart-grid">
            <div class="chart-card">
                <div class="chart-title">📊 收入与订单趋势</div>
                <div id="trendChart" class="chart-container"></div>
            </div>
            <div class="chart-card">
                <div class="chart-title">🥧 收入来源分布</div>
                <div id="sourceChart" class="chart-container"></div>
            </div>
        </div>
        
        <!-- 转化漏斗 -->
        <div class="chart-card" style="margin-bottom: 20px;">
            <div class="chart-title">🎯 转化漏斗分析</div>
            <div class="funnel-grid" id="funnelGrid">
                <div class="funnel-step" style="background: #e6f7ff;">
                    <div class="step-value" id="visitorCount">0</div>
                    <div class="step-label">访问用户</div>
                </div>
                <div class="funnel-step" style="background: #bae7ff;">
                    <div class="step-value" id="browseCount">0</div>
                    <div class="step-label">浏览商品</div>
                    <div class="step-rate" id="browseRate">0%</div>
                </div>
                <div class="funnel-step" style="background: #91d5ff;">
                    <div class="step-value" id="cartCount">0</div>
                    <div class="step-label">加入购物车</div>
                    <div class="step-rate" id="cartRate">0%</div>
                </div>
                <div class="funnel-step" style="background: #69c0ff;">
                    <div class="step-value" id="payCount">0</div>
                    <div class="step-label">完成支付</div>
                    <div class="step-rate" id="payRate">0%</div>
                </div>
            </div>
        </div>
        
        <!-- 商品和会员排行榜 -->
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div class="data-card">
                <div class="card-header">
                    <div class="card-title">🏆 热销商品 TOP10</div>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>排名</th>
                            <th>商品名称</th>
                            <th>销量</th>
                            <th>销售额</th>
                        </tr>
                    </thead>
                    <tbody id="productRank"><tr><td colspan="4" style="text-align:center;color:#999;padding:40px">加载中...</td></tr></tbody>
                </table>
            </div>
            <div class="data-card">
                <div class="card-header">
                    <div class="card-title">💎 消费会员 TOP10</div>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>排名</th>
                            <th>会员</th>
                            <th>订单数</th>
                            <th>消费金额</th>
                        </tr>
                    </thead>
                    <tbody id="memberRank"><tr><td colspan="4" style="text-align:center;color:#999;padding:40px">加载中...</td></tr></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
const API_BASE = '/api/admin';
let trendChart, sourceChart;

function getToken() {
    // 只从URL参数获取token
    return new URLSearchParams(window.location.search).get('access_token') || '';
}

function api(url) {
    const separator = url.includes('?') ? '&' : '?';
    return fetch(API_BASE + url + separator + 'access_token=' + getToken()).then(r => r.json());
}


function initCharts() {
    trendChart = echarts.init(document.getElementById('trendChart'));
    sourceChart = echarts.init(document.getElementById('sourceChart'));
    
    trendChart.setOption({
        tooltip: { trigger: 'axis' },
        legend: { data: ['收入', '订单数'], bottom: 0 },
        grid: { left: '3%', right: '4%', bottom: '15%', top: '10%', containLabel: true },
        xAxis: { type: 'category', boundaryGap: false, data: [] },
        yAxis: [
            { type: 'value', name: '收入', axisLabel: { formatter: '¥{value}' } },
            { type: 'value', name: '订单', axisLabel: '{value}' }
        ],
        series: [
            { name: '收入', type: 'line', smooth: true, data: [], itemStyle: { color: '#00d1a0' } },
            { name: '订单数', type: 'line', smooth: true, yAxisIndex: 1, data: [], itemStyle: { color: '#52c41a' } }
        ]
    });
    
    sourceChart.setOption({
        tooltip: { trigger: 'item', formatter: '{b}: ¥{c} ({d}%)' },
        legend: { orient: 'vertical', right: '5%', top: 'center' },
        series: [{
            type: 'pie',
            radius: ['40%', '70%'],
            center: ['35%', '50%'],
            data: [
                { value: 0, name: '商品订单' },
                { value: 0, name: '场地预约' },
                { value: 0, name: '秒杀活动' },
                { value: 0, name: '拼团活动' }
            ]
        }]
    });
    
    window.addEventListener('resize', () => {
        trendChart.resize();
        sourceChart.resize();
    });
}

async function loadStats() {
    const days = document.getElementById('dateRange').value;
    
    try {
        const [overview, trend] = await Promise.all([
            api(`/statistics/overview?days=${days}`),
            api(`/statistics/trend?days=${days}`)
        ]);
        
        if (overview.success && overview.data) {
            const d = overview.data;
            document.getElementById('totalIncome').textContent = '¥' + (d.totalIncome || 0).toLocaleString();
            document.getElementById('totalOrders').textContent = (d.totalOrders || 0).toLocaleString();
            document.getElementById('newMembers').textContent = (d.newMembers || 0).toLocaleString();
            document.getElementById('activeShops').textContent = d.activeShops || 0;
            document.getElementById('avgRating').textContent = d.avgRating ? d.avgRating.toFixed(1) : '0.0';
            
            const change = d.incomeChange || 0;
            document.getElementById('incomeTrend').textContent = change >= 0 ? `↑ ${change}%` : `↓ ${Math.abs(change)}%`;
            document.getElementById('incomeTrend').className = 'stat-trend ' + (change >= 0 ? 'up' : 'down');
        }
        
        if (trend.success && trend.data) {
            trendChart.setOption({
                xAxis: { data: trend.data.dates || [] },
                series: [
                    { data: trend.data.income || [] },
                    { data: trend.data.orders || [] }
                ]
            });
        }
        
        if (overview.success && overview.data) {
            const d = overview.data;
            sourceChart.setOption({
                series: [{
                    data: [
                        { value: d.orderIncome || 0, name: '商品订单' },
                        { value: d.bookingIncome || 0, name: '场地预约' },
                        { value: d.seckillIncome || 0, name: '秒杀活动' },
                        { value: d.groupBuyIncome || 0, name: '拼团活动' }
                    ]
                }]
            });
        }
        
        const funnel = overview.data?.funnel || {};
        const visitors = funnel.visitors ?? overview.data?.visitors ?? 0;
        const browse = funnel.browse ?? overview.data?.browseUsers ?? 0;
        const cart = funnel.cart ?? overview.data?.cartUsers ?? 0;
        const pay = funnel.pay ?? overview.data?.payUsers ?? 0;

        document.getElementById('visitorCount').textContent = Number(visitors || 0).toLocaleString();
        document.getElementById('browseCount').textContent = Number(browse || 0).toLocaleString();
        document.getElementById('cartCount').textContent = Number(cart || 0).toLocaleString();
        document.getElementById('payCount').textContent = Number(pay || 0).toLocaleString();
        document.getElementById('browseRate').textContent = `${Number(funnel.browse_rate || 0).toFixed(1)}%`;
        document.getElementById('cartRate').textContent = `${Number(funnel.cart_rate || 0).toFixed(1)}%`;
        document.getElementById('payRate').textContent = `${Number(funnel.pay_rate || 0).toFixed(1)}%`;
        
        renderProductRank(overview.data?.productRank || []);
        renderMemberRank(overview.data?.memberRank || []);

        
    } catch (e) {
        console.error('加载数据失败:', e);
    }
}

function renderProductRank(items) {
    const tbody = document.getElementById('productRank');
    if (!items || items.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:#999;padding:40px">暂无数据</td></tr>';
        return;
    }
    tbody.innerHTML = items.slice(0, 10).map((item, i) => {
        const rankClass = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : '';
        return `<tr>
            <td><span class="rank-badge ${rankClass}">${i + 1}</span></td>
            <td>${item.product_name || '-'}</td>
            <td>${(item.sales_count || 0).toLocaleString()}</td>
            <td>¥${(item.total_amount || 0).toLocaleString()}</td>
        </tr>`;
    }).join('');
}

function renderMemberRank(items) {
    const tbody = document.getElementById('memberRank');
    if (!items || items.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:#999;padding:40px">暂无数据</td></tr>';
        return;
    }
    tbody.innerHTML = items.slice(0, 10).map((item, i) => {
        const rankClass = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : '';
        return `<tr>
            <td><span class="rank-badge ${rankClass}">${i + 1}</span></td>
            <td>${item.user_name || '-'}</td>
            <td>${item.order_count || 0}</td>
            <td>¥${(item.total_amount || 0).toLocaleString()}</td>
        </tr>`;
    }).join('');
}

function refreshData() { loadStats(); }

document.addEventListener('DOMContentLoaded', function() {
    initCharts();
    loadStats();
    const dateRange = document.getElementById('dateRange');
    if (dateRange) dateRange.addEventListener('change', refreshData);
});
</script>
</body>
</html>
