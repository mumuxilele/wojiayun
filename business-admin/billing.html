<!DOCTYPE html>
<html lang="zh-CN" data-theme="commercial">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>粤海物业 · 费用管理</title>
<script src="../api.js"></script>
<style>
  :root {
    --primary: #00dea0; --primary-dark: #00c78e; --deep: #2c3e50;
    --bg: #f5f7fa; --card: #ffffff; --text: #2c3e50;
    --text-secondary: #7f8c8d; --border: #e8ecf1;
    --radius: 10px; --radius-sm: 6px;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --danger: #e74c3c; --warning: #f39c12; --success: #27ae60;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 72px;
  }
  .header {
    background: linear-gradient(90deg, var(--primary), var(--deep));
    padding: 16px 20px; color: #fff;
    display: flex; align-items: center; gap: 12px;
  }
  .header .back { font-size: 20px; color: #fff; text-decoration: none; }
  .header h1 { font-size: 18px; font-weight: 600; flex: 1; }
  .content { padding: 16px; }
  .overview-cards {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 18px;
  }
  .overview-card {
    background: var(--card); border-radius: var(--radius);
    padding: 14px; box-shadow: var(--shadow); text-align: center;
  }
  .overview-card .label { font-size: 11px; color: var(--text-secondary); margin-bottom: 4px; }
  .overview-card .value { font-size: 22px; font-weight: 700; color: var(--primary); }
  .overview-card.danger .value { color: var(--danger); }
  .tab-bar {
    display: flex; background: var(--card); border-radius: var(--radius);
    padding: 4px; margin-bottom: 16px; box-shadow: var(--shadow);
  }
  .tab {
    flex: 1; text-align: center; padding: 8px 0; font-size: 13px;
    border-radius: var(--radius-sm); color: var(--text-secondary); cursor: pointer;
  }
  .tab.active { background: var(--primary); color: #fff; }
  .section-title {
    font-size: 15px; font-weight: 600; margin-bottom: 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-title::before { content: ''; width: 3px; height: 16px; background: var(--primary); border-radius: 2px; }
  .bill-list { display: flex; flex-direction: column; gap: 10px; }
  .bill-card {
    background: var(--card); border-radius: var(--radius);
    padding: 16px; box-shadow: var(--shadow);
    cursor: pointer; transition: transform 0.2s;
  }
  .bill-card:active { transform: scale(0.98); }
  .bill-card .row1 {
    display: flex; justify-content: space-between; margin-bottom: 4px;
  }
  .bill-card .house { font-size: 14px; font-weight: 600; }
  .bill-card .amount { font-size: 16px; font-weight: 700; color: var(--danger); }
  .bill-card.paid .amount { color: var(--success); }
  .bill-card .detail { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
  .bill-card .row2 {
    display: flex; justify-content: space-between; font-size: 11px; color: var(--text-secondary);
  }
  .bill-card .status {
    padding: 2px 10px; border-radius: 12px; font-size: 11px;
  }
  .bill-card .status.unpaid { background: #fde8e8; color: var(--danger); }
  .bill-card .status.paid { background: #e8f8f3; color: var(--success); }
  .bill-card .status.pending { background: #fef3e2; color: var(--warning); }
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--card); display: flex; border-top: 1px solid var(--border);
    padding: 6px 0 env(safe-area-inset-bottom, 6px);
    box-shadow: 0 -2px 8px rgba(0,0,0,0.04);
  }
  .nav-item {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    padding: 6px 0; text-decoration: none; color: var(--text-secondary);
    font-size: 10px; gap: 3px; cursor: pointer;
  }
  .nav-item .nav-icon { font-size: 20px; }
  .nav-item.active { color: var(--primary); }
  .loading { text-align: center; color: var(--text-secondary); padding: 20px; }
</style>
</head>
<body>
  <div class="header">
    <a href="index.html" class="back">‹</a>
    <h1>费用管理</h1>
  </div>

  <div class="content">
    <div class="overview-cards" id="overviewCards">
      <div class="overview-card">
        <div class="label">本月应收</div>
        <div class="value" id="statReceivable">--</div>
      </div>
      <div class="overview-card">
        <div class="label">已收</div>
        <div class="value" id="statReceived">--</div>
      </div>
      <div class="overview-card danger">
        <div class="label">欠费金额</div>
        <div class="value" id="statArrears">--</div>
      </div>
      <div class="overview-card">
        <div class="label">收缴率</div>
        <div class="value" id="statRate">--</div>
      </div>
    </div>

    <div class="tab-bar" id="tabBar">
      <div class="tab active" data-type="" onclick="switchType('')">全部</div>
      <div class="tab" data-type="物业费" onclick="switchType('物业费')">物业费</div>
      <div class="tab" data-type="水电费" onclick="switchType('水电费')">水电费</div>
      <div class="tab" data-type="停车费" onclick="switchType('停车费')">停车费</div>
    </div>

    <div class="section-title">账单列表</div>
    <div class="bill-list" id="billList">
      <div class="loading">加载中...</div>
    </div>
  </div>

  <div class="bottom-nav">
    <div class="nav-item" onclick="location.href='index.html'">
      <span class="nav-icon">📊</span>仪表盘
    </div>
    <div class="nav-item" onclick="location.href='enterprises.html'">
      <span class="nav-icon">🏢</span>园区
    </div>
    <div class="nav-item" onclick="location.href='workorders.html'">
      <span class="nav-icon">📋</span>工单
    </div>
    <div class="nav-item active" onclick="location.href='billing.html'">
      <span class="nav-icon">💰</span>费用
    </div>
  </div>

<script>
let bills = [];
let currentType = '';

// 检查登录
if (!API.auth.isLoggedIn()) {
  alert('请先登录');
}

// 加载账单数据
async function loadBills(type = '', status = '') {
  try {
    const res = await API.bills.list(type, status);
    if (res.code === 0 && res.data) {
      bills = res.data.items || [];
      renderBills(bills);
      updateOverview(res.data);
    }
  } catch (err) {
    console.error('加载账单失败:', err);
    document.getElementById('billList').innerHTML = '<div class="loading">加载失败，请刷新重试</div>';
  }
}

// 更新概览卡片
function updateOverview(data) {
  // 使用后端返回的统计数据
  const items = data.items || [];
  const receivable = items.filter(b => b.status !== '已缴').reduce((sum, b) => sum + (b.amount || 0), 0);
  const received = items.filter(b => b.status === '已缴').reduce((sum, b) => sum + (b.amount || 0), 0);
  const arrears = items.filter(b => b.status === '未缴').reduce((sum, b) => sum + (b.amount || 0), 0);
  const rate = (receivable + received) > 0 ? Math.round(received / (receivable + received) * 100) : 0;
  
  document.getElementById('statReceivable').textContent = '¥' + (receivable + received).toLocaleString();
  document.getElementById('statReceived').textContent = '¥' + received.toLocaleString();
  document.getElementById('statArrears').textContent = '¥' + arrears.toLocaleString();
  document.getElementById('statRate').textContent = rate + '%';
}

// 渲染账单列表
function renderBills(list) {
  const container = document.getElementById('billList');
  // 按类型过滤
  const filtered = currentType ? list.filter(b => b.type === currentType) : list;
  
  if (filtered.length === 0) {
    container.innerHTML = '<div class="loading">暂无账单数据</div>';
    return;
  }
  container.innerHTML = filtered.map(b => `
    <div class="bill-card ${b.status === '已缴' ? 'paid' : ''}" onclick="viewBill('${b.fid}')">
      <div class="row1">
        <span class="house">${b.house_no || b.resident_name || '未指定住户'}</span>
        <span class="amount">¥${(b.amount || 0).toLocaleString()}</span>
      </div>
      <div class="detail">${b.type || '物业费'} · ${b.period || ''} · ${b.status === '已缴' ? '已于 ' + (b.paid_at || '').slice(0,10) + ' 缴纳' : '最后期限 ' + (b.due_date || '').slice(0,10)}</div>
      <div class="row2">
        <span>账单号: ${b.bill_no || b.fid?.slice(-8) || ''}</span>
        <span class="status ${b.status === '已缴' ? 'paid' : (b.status === '部分缴' ? 'pending' : 'unpaid')}">${b.status || '未缴'}</span>
      </div>
    </div>
  `).join('');
}

// 切换类型Tab
function switchType(type) {
  currentType = type;
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.dataset.type === type);
  });
  renderBills(bills);
}

// 查看账单详情/缴费
async function viewBill(fid) {
  const bill = bills.find(b => b.fid === fid);
  if (!bill) return;
  
  if (bill.status !== '已缴') {
    if (confirm(`确认缴费 ¥${(bill.amount || 0).toLocaleString()}？`)) {
      try {
        const res = await API.bills.pay(bill.bill_no || bill.fid, {
          amount: bill.amount,
          method: '微信支付',
          payer_name: bill.resident_name || '住户'
        });
        if (res.code === 0) {
          alert('缴费成功');
          loadBills(currentType);
        } else {
          alert(res.message || '缴费失败');
        }
      } catch (err) {
        alert('缴费失败: ' + err.message);
      }
    }
  } else {
    alert('该账单已缴清');
  }
}

// 页面加载
document.addEventListener('DOMContentLoaded', () => loadBills());
</script>
</body>
</html>
