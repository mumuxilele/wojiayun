<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>申请单管理</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f0f2f5; }
        .header { background: #001529; color: white; padding: 15px 20px; display: flex; align-items: center; }
        .header h1 { font-size: 18px; flex: 1; }
        .back { color: white; text-decoration: none; font-size: 14px; }
        .toolbar { background: white; padding: 15px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        .search-input { padding: 8px 12px; border: 1px solid #d9d9d9; border-radius: 4px; width: 200px; }
        .select { padding: 8px 12px; border: 1px solid #d9d9d9; border-radius: 4px; }
        .btn { padding: 8px 15px; background: #1890ff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .btn:hover { background: #40a9ff; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #f0f0f0; }
        th { background: #fafafa; font-weight: 500; color: #666; }
        .status { padding: 4px 8px; border-radius: 4px; font-size: 12px; }
        .status-pending { background: #fff7e6; color: #fa8c16; }
        .status-processing { background: #e6f7ff; color: #1890ff; }
        .status-completed { background: #f6ffed; color: #52c41a; }
        .status-rejected { background: #fff1f0; color: #f5222d; }
        .actions a { color: #1890ff; margin-right: 10px; text-decoration: none; cursor: pointer; }
        .actions a:hover { text-decoration: underline; }
        .pagination { background: white; padding: 15px; display: flex; justify-content: center; gap: 10px; }
        .pagination button { padding: 6px 12px; border: 1px solid #d9d9d9; background: white; border-radius: 4px; cursor: pointer; }
        .pagination button:disabled { opacity: 0.5; }
    </style>
</head>
<body>
    <div class="header">
        <a href="index.html" class="back">← 返回</a>
        <h1>申请单管理</h1>
        <span></span>
    </div>
    <div class="toolbar">
        <input type="text" class="search-input" id="keyword" placeholder="搜索标题/申请人/单号">
        <select class="select" id="statusFilter">
            <option value="">全部状态</option>
            <option value="pending">待处理</option>
            <option value="processing">处理中</option>
            <option value="completed">已完成</option>
            <option value="rejected">已拒绝</option>
        </select>
        <select class="select" id="typeFilter">
            <option value="">全部类型</option>
            <option value="repair">报修</option>
            <option value="booking">预约</option>
            <option value="complaint">投诉</option>
            <option value="consult">咨询</option>
            <option value="other">其他</option>
        </select>
        <button class="btn" onclick="loadList(1)">搜索</button>
    </div>
    <table>
        <thead>
            <tr>
                <th>申请单号</th>
                <th>类型</th>
                <th>标题</th>
                <th>申请人</th>
                <th>状态</th>
                <th>优先级</th>
                <th>提交时间</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody id="listBody"><tr><td colspan="8" style="text-align:center;padding:30px;">加载中...</td></tr></tbody>
    </table>
    <div class="pagination">
        <button id="prevBtn" onclick="changePage(-1)">上一页</button>
        <span id="pageInfo">第 1 页</span>
        <button id="nextBtn" onclick="changePage(1)">下一页</button>
    </div>

    <script>
        const token = localStorage.getItem('admin_token') || new URLSearchParams(location.search).get('access_token');
        const isdev = new URLSearchParams(location.search).get('isdev') || '0';
        let currentPage = 1;
        let totalPages = 1;

        async function loadList(page) {
            currentPage = page;
            const keyword = document.getElementById('keyword').value;
            const status = document.getElementById('statusFilter').value;
            const appType = document.getElementById('typeFilter').value;
            
            let url = '/api/admin/applications?page=' + page + '&page_size=20';
            if (keyword) url += '&keyword=' + encodeURIComponent(keyword);
            if (status) url += '&status=' + status;
            if (appType) url += '&app_type=' + appType;
            url += '&access_token=' + encodeURIComponent(token) + '&isdev=' + isdev;

            try {
                const res = await fetch(url);
                const data = await res.json();
                if (data.success && data.data) {
                    totalPages = Math.ceil(data.data.total / 20);
                    document.getElementById('pageInfo').textContent = '第 ' + page + ' 页，共 ' + totalPages + ' 页';
                    document.getElementById('prevBtn').disabled = page <= 1;
                    document.getElementById('nextBtn').disabled = page >= totalPages;

                    if (data.data.items.length === 0) {
                        document.getElementById('listBody').innerHTML = '<tr><td colspan="8" style="text-align:center;padding:30px;">暂无数据</td></tr>';
                        return;
                    }

                    document.getElementById('listBody').innerHTML = data.data.items.map(item => 
                        '<tr><td>' + (item.app_no || '') + '</td><td>' + ({repair:'报修',booking:'预约',complaint:'投诉',consult:'咨询',other:'其他'}[item.app_type] || item.app_type) + '</td><td>' + (item.title || '') + '</td><td>' + (item.user_name || '-') + '</td><td><span class="status status-' + (item.status || 'pending') + '">' + ({pending:'待处理',processing:'处理中',completed:'已完成',rejected:'已拒绝'}[item.status] || item.status) + '</span></td><td>' + (item.priority > 1 ? '⭐' + item.priority : '-') + '</td><td>' + (item.created_at || '') + '</td><td class="actions"><a onclick="viewApp(' + item.id + ')">查看</a><a onclick="editApp(' + item.id + ')">编辑</a><a onclick="deleteApp(' + item.id + ')">删除</a></td></tr>'
                    ).join('');
                }
            } catch(e) {
                document.getElementById('listBody').innerHTML = '<tr><td colspan="8" style="text-align:center;padding:30px;">加载失败</td></tr>';
            }
        }

        function changePage(delta) {
            loadList(currentPage + delta);
        }

        function viewApp(id) { alert('查看申请 ' + id); }
        function editApp(id) { alert('编辑申请 ' + id); }
        async function deleteApp(id) {
            if (!confirm('确定要删除吗？')) return;
            try {
                const res = await fetch('/api/admin/applications/' + id + '?access_token=' + encodeURIComponent(token) + '&isdev=' + isdev, {method: 'DELETE'});
                const data = await res.json();
                if (data.success) { alert('删除成功'); loadList(currentPage); }
                else { alert(data.msg || '删除失败'); }
            } catch(e) { alert('删除失败'); }
        }

        loadList(1);
    </script>
</body>
</html>
