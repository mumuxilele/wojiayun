<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>场地管理 - 管理后台</title>
    <link rel="stylesheet" href="../business-common/list-style.css">
    <style>
        /* 页面特有样式 */
        .actions .link { color: var(--el-color-primary); cursor: pointer; margin-right: 10px; }
        .actions .link:hover { text-decoration: underline; }
        .actions .link.danger { color: var(--el-color-danger); }
        /* 弹窗样式保留 */
        /* 弹窗 */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:200}
    </style>
</head>
<body class="wy-design-list">
    <!-- 顶部区域 -->
    <div class="wy-design-list_top">
        <div class="wy-design-list_top_title">
            <h1 class="wy-design-list_title">场地管理 - 管理后台</h1>
            <div class="wy-design-list_space"></div>
            <div class="wy-design-list_btn-group">
                <div class="wy-design-list_btn">
                    <button type="button" class="el-button el-button--primary el-button--small" onclick="loadList(1)">
                        <span>搜索</span>
                    </button>
                </div>
                <div class="wy-design-list_btn">
                    <button type="button" class="el-button el-button--small" onclick="resetSearch()">
                        <span>重置</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 筛选区域 -->
    <div class="wy-design-list_filter">
        <div class="wy-design-list_other">
            <div class="el-input el-input--small" style="width: 200px;">
                <input type="text" id="kw" placeholder="场地名称/编码" class="el-input__inner">
            </div>
        </div>
        <div class="wy-design-list_other">
            <select id="filter1" class="el-input__inner" style="width: 130px;">
                
            <option value="">全部状态</option><option value="open">开放</option><option value="closed">关闭</option><option value="maintenance">维护中</option>
          
            </select>
        </div>
        <div class="wy-design-list_other">
            <select id="filter2" class="el-input__inner" style="width: 130px;">
                
            <option value="">全部状态</option><option value="pending">待确认</option><option value="confirmed">已确认</option><option value="completed">已完成</option><option value="cancelled">已取消</option>
          
            </select>
        </div>
    </div>

    <!-- 表格区域 -->
    <div class="wy-design-table wy-design-table_main wy-design-table_has-bar">
        <div class="wy-design-table_bar">
            <i class="wy-design-table_set el-icon-setting" title="列设置"></i>
            <span class="wy-design-table_total">共 <em id="totalCount">0</em> 条</span>
            <div class="wy-pages">
                <div class="wy-pages_total">第<em id="currentPage">1</em>/<em id="totalPages">1</em>页</div>
                <div class="wy-pages_prev el-icon-arrow-left" id="prevBtn" onclick="changePage(-1)"></div>
                <div class="wy-pages_next el-icon-arrow-right" id="nextBtn" onclick="changePage(1)"></div>
            </div>
        </div>
        <table class="el-table el-table--fit el-table--border el-table--enable-row-hover">
            <thead class="el-table__header">
                <tr>
                    <th><div class="cell">ID</div></th>
                    <th><div class="cell">场地名称</div></th>
                    <th><div class="cell">类型</div></th>
                    <th><div class="cell">价格/时</div></th>
                    <th><div class="cell">容纳</div></th>
                    <th><div class="cell">状态</div></th>
                    <th><div class="cell">简介</div></th>
                    <th><div class="cell">操作</div></th>
                    <th><div class="cell">核销码</div></th>
                    <th><div class="cell">场地</div></th>
                </tr>
            </thead>
            <tbody class="el-table__body" id="listBody">
                <tr><td colspan="10" style="text-align: center; padding: 60px; color: var(--el-text-secondary);">加载中...</td></tr>
            </tbody>
        </table>
    </div>

    
<div class="modal-overlay" id="vOverlay" onclick="if(event.target===this)closeVM()"></div>
<div class="modal" id="vModal">
  <div class="modal-header">
    <span class="modal-title" id="vMTitle">新增场地</span>
    <span class="modal-close" onclick="closeVM()">✕</span>
  </div>
  <div class="modal-body">
    <input type="hidden" id="vId">
    <div class="form-row">
      <div class="form-item"><label class="form-label">场地名称 *</label><input type="text" class="form-input" id="vName" placeholder="如：羽毛球馆A区"></div>
      <div class="form-item"><label class="form-label">场地编码</label><input type="text" class="form-input" id="vCode" placeholder="如：BADM-001"></div>
    </div>
    <div class="form-row">
      <div class="form-item">
        <label class="form-label">场地类型</label>
        <select class="form-select" id="vType">
          <option value="yumaoqiu">🏸 羽毛球</option><option value="lanqiu">🏀 篮球</option><option value="pingpang">🏓 乒乓球</option>
          <option value="yujia">🧘 瑜伽</option><option value="youyong">🏊 游泳</option><option value="gym">💪 健身</option><option value="other">其他</option>
        </select>
      </div>
      <div class="form-item">
        <label class="form-label">状态</label>
        <select class="form-select" id="vStatus">
          <option value="open">🟢 开放</option><option value="closed">🔴 关闭</option><option value="maintenance">🟡 维护中</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-item">
        <label class="form-label">每小时价格（元）</label>
        <div class="price-input-group">
          <input type="number" class="form-input" id="vPrice" placeholder="30.00" step="0.01" min="0" style="border-radius:4px">
          <span>元/小时</span>
        </div>
      </div>
      <div class="form-item"><label class="form-label">容纳人数</label><input type="number" class="form-input" id="vCap" placeholder="20"></div>
    </div>
    <div class="form-item">
      <label class="form-label">🖼️ 场地图片（点击 + 添加，建议尺寸 800×600）</label>
      <div class="img-upload" id="vImgs"><div class="img-item img-add" onclick="document.getElementById('vFileInput').click()">+</div></div>
      <input type="file" id="vFileInput" accept="image/*" multiple style="display:none" onchange="handleImgUpload(this)">
      <input type="hidden" id="vImgsData">
    </div>
    <div class="form-item">
      <label class="form-label">📝 详细介绍</label>
      <textarea class="form-textarea" id="vDesc" placeholder="描述场地的特点、设施、服务、周边配套等信息..."></textarea>
    </div>
    <div class="form-item">
      <label class="form-label">📋 使用规则</label>
      <textarea class="form-textarea" id="vRules" placeholder="1. 请提前10分钟到场&#10;2. 爱护场地设施&#10;3. 不得在场内饮食&#10;4. 超过30分钟未使用则自动取消"></textarea>
    </div>
  </div>
  <div class="modal-footer">
    <button class="btn btn-default" onclick="closeVM()">取消</button>
    <button class="btn btn-primary" onclick="saveVenue()">💾 保存</button>
  </div>
</div>



    <script>
    var UP={};var CP={venues:1,bookings:1};
var urlP=new URLSearchParams(location.search);
var TOKEN=urlP.get('access_token');
var ISDEV=urlP.get('isdev')||'0';
var EMBED=urlP.get('embed')||'0';
if(EMBED==='1'){document.body.classList.add('embed-mode');}
if(!TOKEN){document.body.innerHTML='<div style="padding:60px;text-align:center;color:#999">需要 access_token 参数</div>';throw 0;}

function A(path,method,body){
  var url='/api/admin'+path+(path.includes('?')?'&':'?')+'access_token='+encodeURIComponent(TOKEN)+'&isdev='+ISDEV;
  return fetch(url,{method:method||'GET',headers:body?{'Content-Type':'application/json'}:{},body:body?JSON.stringify(body):undefined}).then(function(r){return r.json()});
}

function switchPage(page,el){
  document.querySelectorAll('.sidebar-item').forEach(function(e){e.classList.remove('active')});
  if(el)el.classList.add('active');
  document.getElementById('pageVenues').style.display=page==='venues'?'block':'none';
  document.getElementById('pageBookings').style.display=page==='bookings'?'block':'none';
  document.getElementById('pageStatistics').style.display=page==='statistics'?'block':'none';
  if(page==='venues')loadVenues();
  if(page==='bookings'){loadBookings();loadVenueOpts();}
  if(page==='statistics')loadStats();
}

// ===== 场地管理 =====
function loadVenues(p){
  if(p)CP.venues=p;
  var kw=document.getElementById('kw').value;
  var st=document.getElementById('st').value;
  var url='/venues?page='+CP.venues+'&page_size=10'+(kw?'&keyword='+encodeURIComponent(kw):'')+(st?'&status='+st:'');
  A(url).then(function(d){
    if(d.success&&d.data&&d.data.items){
      var TM={yumaoqiu:'🏸 羽毛球',lanqiu:'🏀 篮球',pingpang:'🏓 乒乓球',yujia:'🧘 瑜伽',youyong:'🏊 游泳',gym:'💪 健身',other:'其他'};
      var SM={open:'开放',closed:'关闭',maintenance:'维护中'};
      var ST={open:'success',closed:'danger',maintenance:'warning'};
      document.getElementById('vTbl').innerHTML=d.data.items.length?d.data.items.map(function(v){
        var imgs='';
        try{var arr=JSON.parse(v.images||'[]');if(arr.length)imgs='<img src="'+arr[0]+'" style="width:50px;height:50px;border-radius:4px;object-fit:cover">';}catch(e){}
        return '<tr>'+
          '<td>'+v.id+'</td>'+
          '<td><b>'+(v.venue_name||'')+'</b><br><span style="color:var(--text-secondary);font-size:11px">'+(v.venue_code||'')+'</span></td>'+
          '<td>'+(TM[v.venue_type]||v.venue_type||'')+'</td>'+
          '<td style="color:#f57c00;font-weight:600">¥'+parseFloat(v.price||0).toFixed(2)+'</td>'+
          '<td>'+(v.capacity||'-')+'人</td>'+
          '<td><span class="el-tag el-tag--'+(ST[v.status]||'info')+'">'+(SM[v.status]||v.status||'')+'</span></td>'+
          '<td><div class="desc-text">'+(v.description||'') +'</div></td>'+
          '<td><div class="action-btns">'+
            '<button class="btn btn-default btn-sm" onclick="editVenue('+v.id+')">编辑</button>'+
            '<button class="btn btn-danger btn-sm" onclick="delVenue('+v.id+')">删除</button>'+
          '</div></td></tr>';
      }).join(''):'<tr><td colspan="8" class="empty">暂无场地</td></tr>';
      renderPager('vPager',d.data.pages||1,CP.venues,function(pg){loadVenues(pg)});
    }else document.getElementById('vTbl').innerHTML='<tr><td colspan="8" class="empty">加载失败</td></tr>';
  });
}

function openVenueModal(venue){
  UP={};
  document.getElementById('vId').value=venue?venue.id:'';
  document.getElementById('vMTitle').textContent=venue?'编辑场地':'新增场地';
  document.getElementById('vName').value=venue?(venue.venue_name||''):'';
  document.getElementById('vCode').value=venue?(venue.venue_code||''):'';
  document.getElementById('vType').value=venue?(venue.venue_type||'other'):'yumaoqiu';
  document.getElementById('vStatus').value=venue?(venue.status||'open'):'open';
  document.getElementById('vPrice').value=venue?parseFloat(venue.price||0):'';
  document.getElementById('vCap').value=venue?(venue.capacity||''):'';
  document.getElementById('vDesc').value=venue?(venue.description||''):'';
  document.getElementById('vRules').value=venue?(venue.rules||''):'';
  var imgs=[];
  try{imgs=venue&&venue.images?JSON.parse(venue.images):[];}catch(e){}
  renderImgs(imgs);
  document.getElementById('vOverlay').style.display='block';
  document.getElementById('vModal').style.display='block';
}
function closeVM(){
  document.getElementById('vOverlay').style.display='none';
  document.getElementById('vModal').style.display='none';
}

function renderImgs(imgs){
  UP.imgs=imgs||[];
  var el=document.getElementById('vImgs');
  var html='';
  (UP.imgs||[]).forEach(function(url,i){
    html+='<div class="img-item"><img src="'+url+'"><span class="del" onclick="removeImg('+i+')">×</span></div>';
  });
  html+='<div class="img-item img-add" onclick="document.getElementById(\'vFileInput\').click()">+</div>';
  el.innerHTML=html;
  document.getElementById('vImgsData').value=JSON.stringify(UP.imgs||[]);
}

function handleImgUpload(input){
  var imgs=UP.imgs||[];
  Array.from(input.files).forEach(function(file){
    var reader=new FileReader();
    reader.onload=function(e){
      imgs.push(e.target.result);
      renderImgs(imgs);
    };
    reader.readAsDataURL(file);
  });
  input.value='';
}
function removeImg(i){
  (UP.imgs||[]).splice(i,1);
  renderImgs(UP.imgs);
}

function saveVenue(){
  var id=document.getElementById('vId').value;
  var data={
    venue_name:document.getElementById('vName').value.trim(),
    venue_code:document.getElementById('vCode').value.trim(),
    venue_type:document.getElementById('vType').value,
    status:document.getElementById('vStatus').value,
    price:parseFloat(document.getElementById('vPrice').value)||0,
    capacity:parseInt(document.getElementById('vCap').value)||0,
    description:document.getElementById('vDesc').value,
    rules:document.getElementById('vRules').value,
    images:JSON.parse(document.getElementById('vImgsData').value||'[]')
  };
  if(!data.venue_name){alert('请填写场地名称');return;}
  var method=id?'PUT':'POST';
  var path=id?'/venues/'+id:'/venues';
  A(path,method,data).then(function(d){
    if(d.success){alert(id?'更新成功':'创建成功');closeVM();loadVenues();}
    else alert(d.msg||'保存失败');
  });
}

function editVenue(id){A('/venues/'+id).then(function(d){if(d.success&&d.data)openVenueModal(d.data);else alert(d.msg||'加载失败');});}
function delVenue(id){if(!confirm('确定删除该场地？'))return;A('/venues/'+id,'DELETE').then(function(d){if(d.success){alert('删除成功');loadVenues();}else alert(d.msg||'删除失败');});}

// ===== 预约管理 =====
function loadVenueOpts(){A('/venues?page=1&page_size=100').then(function(d){if(d.success&&d.data&&d.data.items){var h='<option value="">全部场地</option>';d.data.items.forEach(function(v){h+='<option value="'+v.id+'">'+(v.venue_name||'')+'</option>';});document.getElementById('bkVenue').innerHTML=h;}});}

function resetBookingFilter(){
  document.getElementById('bkVenue').value='';
  document.getElementById('bkDate').value='';
  document.getElementById('bkStatus').value='';
  document.getElementById('bkKeyword').value='';
  loadBookings(1);
}

function loadBookings(p){
  if(p)CP.bookings=p;
  var venue=document.getElementById('bkVenue').value;
  var status=document.getElementById('bkStatus').value;
  var date=document.getElementById('bkDate').value;
  var keyword=(document.getElementById('bkKeyword')||{}).value||'';
  var url='/venue-bookings?page='+CP.bookings+'&page_size=10'+(venue?'&venue_id='+venue:'')+(status?'&status='+status:'')+(date?'&date='+date:'')+(keyword?'&keyword='+encodeURIComponent(keyword):'');
  A(url).then(function(d){
    if(d.success&&d.data&&d.data.items){
      var SM={pending:'待确认',confirmed:'已确认',completed:'已完成',cancelled:'已取消'};
      var ST={pending:'warning',confirmed:'primary',completed:'success',cancelled:'info'};
      var PM={unpaid:'未付款',paid:'已付款'};
      var PT={unpaid:'warning',paid:'success'};
      document.getElementById('bkTbl').innerHTML=d.data.items.length?d.data.items.map(function(b){
        var t1=(b.start_time||'00:00:00').substr(0,5);
        var t2=(b.end_time||'00:00:00').substr(0,5);
        var btns='<div class="action-btns">';
        if(b.status==='pending')btns+='<button class="btn btn-success btn-sm" onclick="confirmB('+b.id+')">确认</button>';
        if(b.status==='confirmed')btns+='<button class="btn btn-primary btn-sm" onclick="completeB('+b.id+')">完成</button>';
        if(b.status!=='completed'&&b.status!=='cancelled')btns+='<button class="btn btn-danger btn-sm" onclick="cancelB('+b.id+')">取消</button>';
        btns+='</div>';
        return '<tr>'+
          '<td><strong style="color:var(--primary-color);font-size:15px;letter-spacing:1px">'+ (b.verify_code||'') +'</strong></td>'+
          '<td>'+(b.venue_name||'-')+'</td>'+
          '<td>'+(b.user_name||'')+'<br><span style="color:var(--text-secondary);font-size:11px">'+(b.user_phone||'')+'</span></td>'+
          '<td>'+(b.book_date||'')+'</td>'+
          '<td>'+t1+'~'+t2+'</td>'+
          '<td>'+(b.total_hours||0)+'h</td>'+
          '<td style="color:#f57c00;font-weight:600">¥'+(parseFloat(b.total_price||0)).toFixed(2)+'</td>'+
          '<td><span class="el-tag el-tag--'+(ST[b.status]||'info')+'">'+(SM[b.status]||b.status)+'</span></td>'+
          '<td><span class="el-tag el-tag--'+(PT[b.pay_status]||'warning')+'">'+(PM[b.pay_status]||'未付款')+'</span></td>'+
          '<td>'+btns+'</td></tr>';
      }).join(''):'<tr><td colspan="10" class="empty">暂无预约记录</td></tr>';
      renderPager('bkPager',d.data.pages||1,CP.bookings,function(pg){loadBookings(pg)});
    }else document.getElementById('bkTbl').innerHTML='<tr><td colspan="10" class="empty">加载失败</td></tr>';
  });
}

function confirmB(id){if(!confirm('确认该预约并标记已付款？'))return;A('/venue-bookings/'+id+'/pay','POST',{pay_status:'paid'}).then(function(d){if(d.success){alert('确认成功');loadBookings();loadStats();}else alert(d.msg||'操作失败');});}
function completeB(id){if(!confirm('确认该预约已使用完成（核销）？'))return;A('/venue-bookings/'+id+'/complete','POST',{}).then(function(d){if(d.success){alert('已标记完成');loadBookings();}else alert(d.msg||'操作失败');});}
function cancelB(id){if(!confirm('确定取消该预约？'))return;A('/venue-bookings/'+id,'PUT',{status:'cancelled'}).then(function(d){if(d.success){alert('已取消');loadBookings();}else alert(d.msg||'操作失败');});}

// 核销码验证
function verifyCode(){
  var code=(document.getElementById('verifyInput').value||'').trim().toUpperCase();
  var resultEl=document.getElementById('verifyResult');
  if(!code||code.length<4){resultEl.innerHTML='<span style="color:#f5222d">请输入有效核销码</span>';return;}
  resultEl.innerHTML='<span style="color:#909399">验证中...</span>';
  A('/venue-bookings/verify','POST',{verify_code:code}).then(function(d){
    if(d.success){
      var b=d.data||{};
      resultEl.innerHTML='<span style="color:#52c41a;font-weight:600">✅ 核销成功！</span>'
        +' <span style="color:#333">'+(b.venue_name||'')+'</span>'
        +' <span style="color:#666">'+(b.book_date||'')+' '+(b.start_time||'').substr(0,5)+'~'+(b.end_time||'').substr(0,5)+'</span>'
        +' <span style="color:#00d1a0">'+(b.user_name||'')+'</span>';
      document.getElementById('verifyInput').value='';
      loadBookings();
    }else{
      resultEl.innerHTML='<span style="color:#f5222d">❌ '+( d.msg||'核销失败')+'</span>';
    }
  }).catch(function(){resultEl.innerHTML='<span style="color:#f5222d">网络错误，请重试</span>';});
}

// ===== 统计 =====
function loadStats(){
  var dFrom=document.getElementById('dFrom').value;
  var dTo=document.getElementById('dTo').value;
  var url='/venue-statistics'+(dFrom?'?date_from='+dFrom:'')+(dTo?(dFrom?'&':'?')+'date_to='+dTo:'');
  A(url).then(function(d){
    if(d.success&&d.data){
      document.getElementById('sTotal').textContent=d.data.total_bookings||0;
      document.getElementById('sPending').textContent=d.data.pending_bookings||0;
      document.getElementById('sCompleted').textContent=d.data.completed_bookings||0;
      document.getElementById('sIncome').textContent='¥'+(d.data.total_income||0).toFixed(2);
    }
  });
  A('/venue-bookings?page=1&page_size=100'+(dFrom?'&date='+dFrom:'')).then(function(d){
    if(d.success&&d.data&&d.data.items){
      var SM={pending:'待确认',confirmed:'已确认',completed:'已完成',cancelled:'已取消'};
      var ST={pending:'warning',confirmed:'primary',completed:'success',cancelled:'info'};
      document.getElementById('stTbl').innerHTML=d.data.items.map(function(b){
        return '<tr><td>'+(b.book_date||'')+'</td><td>'+(b.venue_name||'')+'</td><td>'+(b.user_name||'')+'</td><td>'+(b.start_time||'').substr(0,5)+'~'+(b.end_time||'').substr(0,5)+'</td><td style="color:#f57c00">¥'+(parseFloat(b.total_price||0)).toFixed(2)+'</td><td><span class="el-tag el-tag--'+(ST[b.status]||'info')+'">'+(SM[b.status]||b.status)+'</span></td></tr>';
      }).join('');
    }else document.getElementById('stTbl').innerHTML='<tr><td colspan="6" style="text-align: center; padding: 60px; color: var(--el-text-secondary);">暂无数据</td></tr>';
  });
}

// 分页
function renderPager(elId,total,current,fn){
  var el=document.getElementById(elId);
  if(!el||total<=1){if(el)el.innerHTML='';return;}
  var html='<span class="el-pagination__total">共 '+total+' 页</span>';
  for(var i=1;i<=total;i++){
    if(i===1||i===total||Math.abs(i-current)<=2){
      html+='<li class="el-pager'+(i===current?' active':'')+'" onclick="'+fn.name+'('+i+')">'+i+'</li>';
    }else if(Math.abs(i-current)===3){
      html+='<span style="color:var(--text-secondary);padding:0 4px">...</span>';
    }
  }
  el.innerHTML=html;
}

// init
loadVenues();
    </script>
</body>
