<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据大屏 - 管理后台</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { 
            --bg-dark: #0a1628; 
            --bg-card: rgba(16, 42, 88, 0.6);
            --primary: #00d1a0; 
            --primary-glow: rgba(0, 209, 160, 0.3);
            --text: #fff; 
            --text2: rgba(255,255,255,0.7); 
            --border: rgba(0, 209, 160, 0.2);
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif; 
            background: var(--bg-dark); 
            font-size: 14px; 
            color: var(--text2);
            min-height: 100vh;
            overflow-x: hidden;
        }
        /* 背景装饰 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(0, 209, 160, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(0, 150, 255, 0.08) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }
        .layout { 
            position: relative;
            z-index: 1;
            padding: 20px;
            min-height: 100vh;
        }
        /* 头部 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            margin-bottom: 20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }
        .header-title {
            font-size: 28px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: 4px;
            text-shadow: 0 0 20px var(--primary-glow);
        }
        .header-time {
            font-size: 16px;
            color: var(--text2);
            font-family: 'Courier New', monospace;
        }
        /* 统计卡片 */
        .stats-grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 20px; 
            margin-bottom: 20px; 
        }
        .stat-card { 
            background: var(--bg-card); 
            padding: 24px; 
            border-radius: 12px; 
            border: 1px solid var(--border);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        .stat-card:hover {
            border-color: var(--primary);
            box-shadow: 0 0 20px var(--primary-glow);
        }
        .stat-card .stat-icon { 
            width: 56px; 
            height: 56px; 
            border-radius: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 28px; 
            margin-bottom: 16px;
            background: linear-gradient(135deg, rgba(0, 209, 160, 0.2), rgba(0, 150, 255, 0.2));
            border: 1px solid var(--border);
        }
        .stat-card .stat-label { 
            font-size: 14px; 
            color: var(--text2); 
            margin-bottom: 12px;
            letter-spacing: 1px;
        }
        .stat-card .stat-value { 
            font-size: 36px; 
            font-weight: 700; 
            color: var(--text);
            text-shadow: 0 0 10px var(--primary-glow);
        }
        .stat-card .stat-trend { 
            font-size: 13px; 
            margin-top: 12px; 
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .stat-card .stat-trend.up { color: var(--primary); }
        .stat-card .stat-trend.down { color: #ff4d4f; }
        /* 图表区域 */
        .chart-grid { 
            display: grid; 
            grid-template-columns: 2fr 1fr; 
            gap: 20px; 
            margin-bottom: 20px; 
        }
        .chart-card { 
            background: var(--bg-card); 
            border-radius: 12px; 
            padding: 20px; 
            border: 1px solid var(--border);
            backdrop-filter: blur(10px);
        }
        .chart-card .chart-title { 
            font-size: 16px; 
            font-weight: 600; 
            color: var(--text); 
            margin-bottom: 16px; 
            padding-bottom: 12px; 
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .chart-container { 
            height: 320px; 
        }
        /* 底部区域 */
        .bottom-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .data-card { 
            background: var(--bg-card); 
            border-radius: 12px; 
            border: 1px solid var(--border);
            backdrop-filter: blur(10px);
        }
        .data-card .card-header { 
            padding: 16px 20px; 
            border-bottom: 1px solid var(--border); 
        }
        .data-card .card-title { 
            font-size: 16px; 
            font-weight: 600; 
            color: var(--text); 
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .data-card .card-body {
            padding: 16px 20px;
            max-height: 280px;
            overflow-y: auto;
        }
        /* 表格样式 */
        table { 
            width: 100%; 
            border-collapse: collapse; 
            font-size: 13px; 
        }
        th { 
            padding: 12px 16px; 
            color: var(--text2); 
            font-weight: 500; 
            text-align: left; 
            border-bottom: 1px solid var(--border); 
        }
        td { 
            padding: 12px 16px; 
            border-bottom: 1px solid rgba(0, 209, 160, 0.1); 
            color: var(--text);
        }
        tr:hover td {
            background: rgba(0, 209, 160, 0.05);
        }
        .rank-badge { 
            display: inline-flex; 
            align-items: center; 
            justify-content: center; 
            width: 24px; 
            height: 24px; 
            border-radius: 50%; 
            font-size: 12px; 
            font-weight: 600; 
        }
        .rank-1 { background: linear-gradient(135deg, #ffd700, #ffaa00); color: #8b6914; }
        .rank-2 { background: linear-gradient(135deg, #c0c0c0, #a0a0a0); color: #4a4a4a; }
        .rank-3 { background: linear-gradient(135deg, #cd7f32, #b87333); color: #fff; }
        /* 滚动条 */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary);
        }
        /* 动画 */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        .pulse {
            animation: pulse 2s ease-in-out infinite;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text2);
        }
    </style>
</head>
<body>
<div class="layout">
    <!-- 头部 -->
    <div class="header">
        <div class="header-title">📊 数据大屏</div>
        <div class="header-time" id="currentTime">--</div>
    </div>
    
    <!-- 统计卡片 -->
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-icon">💰</div>
            <div class="stat-label">今日收入</div>
            <div class="stat-value" id="todayIncome">¥0</div>
            <div class="stat-trend up" id="incomeTrend">↑ 0%</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">📦</div>
            <div class="stat-label">今日订单</div>
            <div class="stat-value" id="todayOrders">0</div>
            <div class="stat-trend up" id="orderTrend">↑ 0%</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">👥</div>
            <div class="stat-label">新增会员</div>
            <div class="stat-value" id="newMembers">0</div>
            <div class="stat-trend up" id="memberTrend">↑ 0%</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">📋</div>
            <div class="stat-label">待处理申请</div>
            <div class="stat-value" id="pendingApps">0</div>
            <div class="stat-trend" id="appTrend">--</div>
        </div>
    </div>
    
    <!-- 图表区域 -->
    <div class="chart-grid">
        <div class="chart-card">
            <div class="chart-title">📈 近7天收入趋势</div>
            <div class="chart-container" id="incomeTrendChart"></div>
        </div>
        <div class="chart-card">
            <div class="chart-title">🥧 订单状态分布</div>
            <div class="chart-container" id="orderStatusChart"></div>
        </div>
    </div>
    
    <!-- 底部区域 -->
    <div class="bottom-grid">
        <div class="data-card">
            <div class="card-header">
                <div class="card-title">🏆 热销商品TOP5</div>
            </div>
            <div class="card-body">
                <table>
                    <thead>
                        <tr><th>排名</th><th>商品名称</th><th>销量</th><th>销售额</th></tr>
                    </thead>
                    <tbody id="topProducts">
                        <tr><td colspan="4" class="loading">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div class="data-card">
            <div class="card-header">
                <div class="card-title">⚠️ 最新待处理申请</div>
            </div>
            <div class="card-body">
                <table>
                    <thead>
                        <tr><th>申请单号</th><th>类型</th><th>申请人</th><th>时间</th></tr>
                    </thead>
                    <tbody id="recentApps">
                        <tr><td colspan="4" class="loading">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    // 获取token
    const urlParams = new URLSearchParams(location.search);
    const token = urlParams.get('access_token') || '';
    const isdev = urlParams.get('isdev') || '0';
    
    // 更新时间
    function updateTime() {
        const now = new Date();
        const str = now.getFullYear() + '-' + 
            String(now.getMonth()+1).padStart(2,'0') + '-' + 
            String(now.getDate()).padStart(2,'0') + ' ' + 
            String(now.getHours()).padStart(2,'0') + ':' + 
            String(now.getMinutes()).padStart(2,'0') + ':' + 
            String(now.getSeconds()).padStart(2,'0');
        document.getElementById('currentTime').textContent = str;
    }
    setInterval(updateTime, 1000);
    updateTime();
    
    // 初始化图表
    let incomeTrendChart, orderStatusChart;
    
    function initCharts() {
        // 收入趋势图
        incomeTrendChart = echarts.init(document.getElementById('incomeTrendChart'));
        incomeTrendChart.setOption({
            backgroundColor: 'transparent',
            grid: { left: 60, right: 20, top: 20, bottom: 30 },
            xAxis: {
                type: 'category',
                data: ['周一', '周二', '周三', '周四', '周五', '周六', '周日'],
                axisLine: { lineStyle: { color: 'rgba(255,255,255,0.2)' } },
                axisLabel: { color: 'rgba(255,255,255,0.6)' }
            },
            yAxis: {
                type: 'value',
                axisLine: { show: false },
                splitLine: { lineStyle: { color: 'rgba(255,255,255,0.1)' } },
                axisLabel: { color: 'rgba(255,255,255,0.6)', formatter: '¥{value}' }
            },
            series: [{
                data: [8200, 9320, 9010, 9340, 12900, 13300, 13200],
                type: 'line',
                smooth: true,
                symbol: 'circle',
                symbolSize: 8,
                lineStyle: { color: '#00d1a0', width: 3 },
                itemStyle: { color: '#00d1a0', borderWidth: 2, borderColor: '#fff' },
                areaStyle: {
                    color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                        { offset: 0, color: 'rgba(0, 209, 160, 0.3)' },
                        { offset: 1, color: 'rgba(0, 209, 160, 0)' }
                    ])
                }
            }]
        });
        
        // 订单状态饼图
        orderStatusChart = echarts.init(document.getElementById('orderStatusChart'));
        orderStatusChart.setOption({
            backgroundColor: 'transparent',
            series: [{
                type: 'pie',
                radius: ['40%', '70%'],
                center: ['50%', '50%'],
                avoidLabelOverlap: false,
                itemStyle: {
                    borderRadius: 8,
                    borderColor: '#0a1628',
                    borderWidth: 2
                },
                label: {
                    show: true,
                    color: 'rgba(255,255,255,0.8)',
                    formatter: '{b}\n{c} ({d}%)'
                },
                data: [
                    { value: 335, name: '已完成', itemStyle: { color: '#00d1a0' } },
                    { value: 210, name: '待支付', itemStyle: { color: '#faad14' } },
                    { value: 148, name: '已取消', itemStyle: { color: '#ff4d4f' } },
                    { value: 80, name: '退款中', itemStyle: { color: '#1890ff' } }
                ]
            }]
        });
    }
    
    // 加载数据
    async function loadData() {
        try {
            // 加载统计数据
            const statsRes = await fetch('/api/admin/statistics?access_token=' + encodeURIComponent(token) + '&isdev=' + isdev);
            const statsData = await statsRes.json();
            
            if (statsData.success && statsData.data) {
                document.getElementById('todayIncome').textContent = '¥' + (statsData.data.today_income || 0).toFixed(2);
                document.getElementById('todayOrders').textContent = statsData.data.today_orders || 0;
                document.getElementById('pendingApps').textContent = statsData.data.pending_applications || 0;
                document.getElementById('newMembers').textContent = statsData.data.new_members || 0;
            }
            
            // 加载热销商品
            const productsRes = await fetch('/api/admin/products?access_token=' + encodeURIComponent(token) + '&isdev=' + isdev);
            const productsData = await productsRes.json();
            if (productsData.success && productsData.data && productsData.data.items) {
                const topProducts = productsData.data.items.slice(0, 5);
                document.getElementById('topProducts').innerHTML = topProducts.map((p, i) => `
                    <tr>
                        <td><span class="rank-badge rank-${i+1}">${i+1}</span></td>
                        <td>${p.name}</td>
                        <td>${p.sales || 0}</td>
                        <td>¥${(p.sales * p.price || 0).toFixed(2)}</td>
                    </tr>
                `).join('');
            }
            
            // 加载待处理申请
            const appsRes = await fetch('/api/admin/applications?status=pending&page=1&page_size=5&access_token=' + encodeURIComponent(token) + '&isdev=' + isdev);
            const appsData = await appsRes.json();
            if (appsData.success && appsData.data && appsData.data.items) {
                document.getElementById('recentApps').innerHTML = appsData.data.items.map(app => `
                    <tr>
                        <td>${app.app_no || '-'}</td>
                        <td>${app.type || '-'}</td>
                        <td>${app.user_name || '-'}</td>
                        <td>${app.created_at ? new Date(app.created_at).toLocaleString('zh-CN') : '-'}</td>
                    </tr>
                `).join('');
            } else {
                document.getElementById('recentApps').innerHTML = '<tr><td colspan="4" style="text-align:center;padding:20px;">暂无待处理申请</td></tr>';
            }
        } catch (e) {
            console.error('加载数据失败:', e);
        }
    }
    
    // 窗口大小改变时重绘图表
    window.addEventListener('resize', () => {
        incomeTrendChart && incomeTrendChart.resize();
        orderStatusChart && orderStatusChart.resize();
    });
    
    // 初始化
    initCharts();
    loadData();
    // 定时刷新
    setInterval(loadData, 30000);
</script>
</body>
</html>
