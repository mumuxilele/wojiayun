<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI智能助手 - React版</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- AI Chat SDK -->
    <script src="/sdk/umd/aichat-sdk.min.js"></script>
    <link rel="stylesheet" href="/sdk/styles.css">
    
    <!-- Markdown 和代码高亮 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css">
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #f5f5f5;
        }

        #root {
            height: 100%;
            width: 100%;
        }

        .chat-container {
            height: 100%;
            max-height: 100vh;
        }

        /* 加载状态 */
        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            background: #f5f5f5;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #1890ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            margin-top: 16px;
            color: #8c8c8c;
            font-size: 14px;
        }

        /* 错误状态 */
        .error-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 20px;
            background: #f5f5f5;
        }

        .error-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .error-text {
            color: #ff4d4f;
            font-size: 14px;
            text-align: center;
            margin-bottom: 16px;
        }

        .retry-btn {
            padding: 8px 24px;
            background: #1890ff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        .retry-btn:hover {
            background: #40a9ff;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script>
        // 从 URL 获取 access_token
        const urlParams = new URLSearchParams(window.location.search);
        const accessToken = urlParams.get('access_token');

        if (!accessToken) {
            document.getElementById('root').innerHTML = `
                <div class="error-container">
                    <div class="error-icon">⚠️</div>
                    <div class="error-text">缺少 access_token 参数<br>请在 URL 中提供 access_token</div>
                </div>
            `;
        } else {
            // React 应用
            const { useState, useEffect, useRef } = React;
            const { ChatContainer, useChat, ChatService } = AIChatSDK;

            // 自定义 Hook 来处理用户信息和消息
            function useAichat(accessToken) {
                const [userInfo, setUserInfo] = useState(null);
                const [messages, setMessages] = useState([]);
                const [isStreaming, setIsStreaming] = useState(false);
                const [error, setError] = useState(null);
                const [visitorId, setVisitorId] = useState(null);
                const [sessionId] = useState(() => 
                    'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, (c) => {
                        const r = Math.random() * 16 | 0;
                        const v = c === 'x' ? r : (r & 0x3 | 0x8);
                        return v.toString(16);
                    })
                );

                const chatServiceRef = useRef(null);
                const currentMessageRef = useRef('');
                const abortControllerRef = useRef(null);

                // 初始化
                useEffect(() => {
                    initChat();
                }, [accessToken]);

                const initChat = async () => {
                    try {
                        setError(null);
                        
                        // 创建 ChatService 实例
                        chatServiceRef.current = new ChatService({
                            accessToken: accessToken,
                            apiUrl: '/api'
                        });

                        // 获取用户信息
                        const info = await chatServiceRef.current.getUserInfo();
                        setUserInfo(info);
                        setVisitorId(info.userId || info.empId || info.id);
                    } catch (err) {
                        console.error('初始化失败:', err);
                        setError(err.message || '初始化失败，请刷新页面重试');
                    }
                };

                // 发送消息
                const sendMessage = async (content) => {
                    if (!content.trim() || !visitorId || isStreaming) return;

                    setError(null);
                    setIsStreaming(true);

                    // 添加用户消息
                    const userMessage = {
                        id: `user_${Date.now()}`,
                        role: 'user',
                        content: content.trim(),
                        timestamp: new Date().toISOString(),
                    };
                    setMessages(prev => [...prev, userMessage]);

                    // 创建助手消息占位
                    const assistantMessageId = `assistant_${Date.now()}`;
                    setMessages(prev => [...prev, {
                        id: assistantMessageId,
                        role: 'assistant',
                        content: '',
                        timestamp: new Date().toISOString(),
                        isStreaming: true,
                    }]);

                    currentMessageRef.current = '';

                    try {
                        // 准备 custom_variables
                        const customVariables = {
                            access_token: accessToken,
                            empName: userInfo?.empName || '',
                            userName: userInfo?.userName || '',
                            empId: userInfo?.empId || '',
                            userId: userInfo?.userId || userInfo?.id || ''
                        };

                        // 使用 generator 处理流式响应
                        const generator = chatServiceRef.current.sendMessage(
                            content,
                            visitorId,
                            sessionId,
                            customVariables
                        );

                        for await (const event of generator) {
                            handleSSEEvent(event, assistantMessageId);
                        }

                        // 标记流式结束
                        setMessages(prev => prev.map(m => 
                            m.id === assistantMessageId ? { ...m, isStreaming: false } : m
                        ));
                    } catch (err) {
                        console.error('发送消息失败:', err);
                        setError(err.message || '发送失败，请重试');
                        setMessages(prev => prev.map(m => 
                            m.id === assistantMessageId 
                                ? { ...m, content: '❌ 请求失败，请重试', isStreaming: false }
                                : m
                        ));
                    } finally {
                        setIsStreaming(false);
                    }
                };

                // 处理 SSE 事件
                const handleSSEEvent = (event, messageId) => {
                    switch (event.type) {
                        case 'reply':
                            if (event.payload?.content) {
                                currentMessageRef.current += event.payload.content;
                                setMessages(prev => prev.map(m => 
                                    m.id === messageId 
                                        ? { ...m, content: currentMessageRef.current }
                                        : m
                                ));
                            }
                            break;
                        case 'error':
                            setError(event.error?.message || '发生错误');
                            setMessages(prev => prev.map(m => 
                                m.id === messageId 
                                    ? { ...m, content: `❌ ${event.error?.message || '发生错误'}`, isStreaming: false }
                                    : m
                            ));
                            break;
                    }
                };

                // 清空消息
                const clearMessages = () => {
                    setMessages([]);
                };

                return {
                    userInfo,
                    messages,
                    isStreaming,
                    error,
                    visitorId,
                    sendMessage,
                    clearMessages,
                    initChat,
                };
            }

            // 主应用组件
            function AichatApp() {
                const {
                    userInfo,
                    messages,
                    isStreaming,
                    error,
                    visitorId,
                    sendMessage,
                    clearMessages,
                    initChat,
                } = useAichat(accessToken);

                const [inputValue, setInputValue] = useState('');
                const [isRecording, setIsRecording] = useState(false);
                const messagesEndRef = useRef(null);
                const inputRef = useRef(null);
                const recognitionRef = useRef(null);

                // 自动滚动到底部
                useEffect(() => {
                    messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
                }, [messages]);

                // 初始化语音识别
                useEffect(() => {
                    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                    if (SpeechRecognition) {
                        recognitionRef.current = new SpeechRecognition();
                        recognitionRef.current.continuous = false;
                        recognitionRef.current.interimResults = true;
                        recognitionRef.current.lang = 'zh-CN';

                        recognitionRef.current.onresult = (event) => {
                            const result = event.results[event.results.length - 1];
                            if (result.isFinal) {
                                const text = result[0].transcript;
                                setInputValue(prev => prev + text);
                            }
                        };

                        recognitionRef.current.onerror = (event) => {
                            console.error('语音识别错误:', event.error);
                            setIsRecording(false);
                        };

                        recognitionRef.current.onend = () => {
                            setIsRecording(false);
                        };
                    }
                }, []);

                // 发送消息
                const handleSend = () => {
                    const trimmedValue = inputValue.trim();
                    if (trimmedValue && !isStreaming && visitorId) {
                        sendMessage(trimmedValue);
                        setInputValue('');
                        inputRef.current?.focus();
                    }
                };

                // 按键处理
                const handleKeyDown = (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        handleSend();
                    }
                };

                // 语音按钮处理
                const handleVoiceStart = () => {
                    if (recognitionRef.current && !isRecording && !isStreaming) {
                        try {
                            recognitionRef.current.start();
                            setIsRecording(true);
                        } catch (error) {
                            console.error('启动语音识别失败:', error);
                        }
                    }
                };

                const handleVoiceEnd = () => {
                    if (recognitionRef.current && isRecording) {
                        try {
                            recognitionRef.current.stop();
                            setIsRecording(false);
                        } catch (error) {
                            console.error('停止语音识别失败:', error);
                        }
                    }
                };

                // 加载状态
                if (!userInfo && !error) {
                    return React.createElement('div', { className: 'loading-container' },
                        React.createElement('div', { className: 'loading-spinner' }),
                        React.createElement('div', { className: 'loading-text' }, '加载中...')
                    );
                }

                // 错误状态
                if (error && !userInfo) {
                    return React.createElement('div', { className: 'error-container' },
                        React.createElement('div', { className: 'error-icon' }, '⚠️'),
                        React.createElement('div', { className: 'error-text' }, error),
                        React.createElement('button', { 
                            className: 'retry-btn',
                            onClick: initChat
                        }, '重试')
                    );
                }

                // 主界面
                return React.createElement('div', { className: 'chat-container' },
                    // 消息列表
                    React.createElement('div', { className: 'chat-messages' },
                        messages.map(msg => 
                            React.createElement('div', { 
                                key: msg.id, 
                                className: `message ${msg.role === 'user' ? 'user-message' : 'assistant-message'} ${msg.isStreaming ? 'streaming' : ''}`
                            },
                                React.createElement('div', { className: 'message-avatar' }, 
                                    msg.role === 'user' ? '👤' : '🤖'
                                ),
                                React.createElement('div', { className: 'message-content' },
                                    React.createElement('div', { 
                                        className: 'message-text',
                                        dangerouslySetInnerHTML: { 
                                            __html: renderMarkdown(msg.content) 
                                        }
                                    })
                                )
                            )
                        ),
                        React.createElement('div', { ref: messagesEndRef })
                    ),
                    
                    // 输入区域
                    React.createElement('div', { className: 'input-area' },
                        React.createElement('div', { className: 'input-container' },
                            React.createElement('textarea', {
                                ref: inputRef,
                                className: 'message-input',
                                value: inputValue,
                                onChange: (e) => setInputValue(e.target.value),
                                onKeyDown: handleKeyDown,
                                placeholder: '输入消息或长按语音按钮...',
                                disabled: isStreaming || !visitorId,
                                rows: 1
                            }),
                            React.createElement('div', { className: 'input-actions' },
                                // 语音按钮
                                recognitionRef.current && React.createElement('button', {
                                    className: `action-btn voice-btn ${isRecording ? 'recording' : ''}`,
                                    onTouchStart: (e) => { e.preventDefault(); handleVoiceStart(); },
                                    onTouchEnd: (e) => { e.preventDefault(); handleVoiceEnd(); },
                                    onMouseDown: (e) => { e.preventDefault(); handleVoiceStart(); },
                                    onMouseUp: (e) => { e.preventDefault(); handleVoiceEnd(); },
                                    onMouseLeave: handleVoiceEnd,
                                    disabled: isStreaming,
                                    title: '长按说话'
                                }, '🎤'),
                                // 发送按钮
                                React.createElement('button', {
                                    className: 'send-btn',
                                    onClick: handleSend,
                                    disabled: isStreaming || !visitorId || !inputValue.trim()
                                }, '➤')
                            )
                        )
                    )
                );
            }

            // Markdown 渲染函数
            function renderMarkdown(content) {
                if (!content) return '';
                
                try {
                    // 配置 marked
                    marked.setOptions({
                        highlight: function(code, lang) {
                            if (lang && hljs.getLanguage(lang)) {
                                try {
                                    return hljs.highlight(code, { language: lang }).value;
                                } catch (e) {}
                            }
                            return hljs.highlightAuto(code).value;
                        },
                        breaks: true,
                        gfm: true
                    });

                    // 渲染并净化
                    const html = marked.parse(content);
                    return DOMPurify.sanitize(html);
                } catch (error) {
                    console.error('Markdown 渲染错误:', error);
                    return content;
                }
            }

            // 渲染应用
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(React.createElement(AichatApp));
        }
    </script>

    <style>
        /* 消息样式 */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background: #f5f5f5;
            -webkit-overflow-scrolling: touch;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user-message {
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
            margin: 0 12px;
        }

        .user-message .message-avatar {
            background: #1890ff;
        }

        .assistant-message .message-avatar {
            background: #52c41a;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            word-wrap: break-word;
            word-break: break-word;
        }

        .user-message .message-content {
            background: #1890ff;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .assistant-message .message-content {
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .message-text {
            line-height: 1.6;
        }

        .message-text pre {
            margin: 8px 0;
            padding: 12px;
            background: #282c34;
            border-radius: 6px;
            overflow-x: auto;
        }

        .message-text code {
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 14px;
        }

        .streaming::after {
            content: '▊';
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        /* 输入区域 */
        .input-area {
            padding: 16px;
            background: white;
            border-top: 1px solid #e8e8e8;
        }

        .input-container {
            display: flex;
            align-items: flex-end;
            gap: 12px;
        }

        .message-input {
            flex: 1;
            min-height: 40px;
            max-height: 120px;
            padding: 10px 14px;
            border: 1px solid #d9d9d9;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.5;
            resize: none;
            outline: none;
            font-family: inherit;
        }

        .message-input:focus {
            border-color: #1890ff;
            box-shadow: 0 0 0 2px rgba(24, 144, 255, 0.1);
        }

        .input-actions {
            display: flex;
            gap: 8px;
        }

        .action-btn, .send-btn {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f0f0f0;
            font-size: 18px;
            transition: all 0.2s;
        }

        .action-btn:hover, .send-btn:hover {
            background: #e6e6e6;
        }

        .send-btn:not(:disabled) {
            background: #1890ff;
            color: white;
        }

        .send-btn:not(:disabled):hover {
            background: #40a9ff;
        }

        .voice-btn.recording {
            background: #ff4d4f;
            color: white;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 77, 79, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(255, 77, 79, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 77, 79, 0); }
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 滚动条 */
        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: #d9d9d9;
            border-radius: 3px;
        }

        .chat-messages::-webkit-scrollbar-thumb:hover {
            background: #bfbfbf;
        }
    </style>
</body>
</html>
