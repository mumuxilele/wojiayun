<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat 测试页面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 32px;
            color: #333;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 16px;
        }

        .input-group {
            margin-bottom: 30px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e8e8e8;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .version-cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .version-card {
            border: 2px solid #e8e8e8;
            border-radius: 12px;
            padding: 24px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .version-card:hover {
            border-color: #667eea;
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.2);
        }

        .version-card.selected {
            border-color: #667eea;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .version-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .version-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .version-desc {
            font-size: 13px;
            opacity: 0.8;
        }

        .start-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .start-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .note {
            margin-top: 20px;
            padding: 16px;
            background: #f5f5f5;
            border-radius: 8px;
            font-size: 13px;
            color: #666;
        }

        .note strong {
            color: #333;
        }

        .features {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid #e8e8e8;
        }

        .features h3 {
            font-size: 16px;
            color: #333;
            margin-bottom: 16px;
        }

        .feature-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #666;
        }

        .feature-item::before {
            content: '✓';
            color: #52c41a;
            font-weight: bold;
        }

        @media (max-width: 600px) {
            .version-cards {
                grid-template-columns: 1fr;
            }

            .feature-list {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 AI Chat 测试</h1>
            <p>选择版本并输入 access_token 开始测试</p>
        </div>

        <div class="input-group">
            <label>Access Token</label>
            <input type="text" id="accessToken" placeholder="请输入 access_token">
        </div>

        <div class="version-cards">
            <div class="version-card selected" data-version="html" onclick="selectVersion('html')">
                <div class="version-icon">📄</div>
                <div class="version-title">HTML 版本</div>
                <div class="version-desc">原生实现，快速集成</div>
            </div>
            <div class="version-card" data-version="react" onclick="selectVersion('react')">
                <div class="version-icon">⚛️</div>
                <div class="version-title">React 版本</div>
                <div class="version-desc">组件化，易扩展</div>
            </div>
        </div>

        <button class="start-btn" onclick="startChat()" id="startBtn">
            开始对话
        </button>

        <div class="note">
            <strong>提示：</strong>
            <ul style="margin-top: 8px; padding-left: 20px;">
                <li>两个版本功能完全一致</li>
                <li>HTML 版本适合快速集成</li>
                <li>React 版本适合定制开发</li>
            </ul>
        </div>

        <div class="features">
            <h3>功能特性</h3>
            <div class="feature-list">
                <div class="feature-item">长按语音输入</div>
                <div class="feature-item">流式响应</div>
                <div class="feature-item">Markdown 渲染</div>
                <div class="feature-item">代码高亮</div>
                <div class="feature-item">用户信息传递</div>
                <div class="feature-item">响应式设计</div>
            </div>
        </div>
    </div>

    <script>
        let selectedVersion = 'html';

        // 从 URL 获取 token
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('access_token');
        if (token) {
            document.getElementById('accessToken').value = token;
        }

        function selectVersion(version) {
            selectedVersion = version;
            
            // 更新卡片样式
            document.querySelectorAll('.version-card').forEach(card => {
                card.classList.remove('selected');
            });
            document.querySelector(`[data-version="${version}"]`).classList.add('selected');
        }

        function startChat() {
            const accessToken = document.getElementById('accessToken').value.trim();
            
            if (!accessToken) {
                alert('请输入 access_token');
                return;
            }

            let url;
            if (selectedVersion === 'html') {
                url = `/?access_token=${encodeURIComponent(accessToken)}`;
            } else {
                url = `/react-index.html?access_token=${encodeURIComponent(accessToken)}`;
            }

            window.location.href = url;
        }

        // 回车键提交
        document.getElementById('accessToken').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                startChat();
            }
        });
    </script>
</body>
</html>
