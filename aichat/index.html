<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI智能助手</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css">
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #f5f5f5;
            display: flex;
            flex-direction: column;
        }

        .chat-container {
            width: 100%;
            height: 100%;
            background: #f5f5f5;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background: #f5f5f5;
            -webkit-overflow-scrolling: touch;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 16px;
            line-height: 1.6;
            word-wrap: break-word;
            font-size: 15px;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.assistant .message-content {
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
        }

        .message.assistant .message-content pre {
            background: #1e1e1e;
            border-radius: 8px;
            padding: 12px;
            overflow-x: auto;
            margin: 8px 0;
        }

        .message.assistant .message-content code {
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 13px;
        }

        .message.assistant .message-content p {
            margin: 8px 0;
        }

        .message.assistant .message-content p:first-child {
            margin-top: 0;
        }

        .message.assistant .message-content p:last-child {
            margin-bottom: 0;
        }

        .message.assistant .message-content ul,
        .message.assistant .message-content ol {
            margin: 8px 0;
            padding-left: 20px;
        }

        .message.assistant .message-content li {
            margin: 4px 0;
        }

        .message.assistant .message-content h1,
        .message.assistant .message-content h2,
        .message.assistant .message-content h3,
        .message.assistant .message-content h4 {
            margin: 12px 0 8px 0;
            font-weight: 600;
        }

        .message.assistant .message-content h1:first-child,
        .message.assistant .message-content h2:first-child,
        .message.assistant .message-content h3:first-child {
            margin-top: 0;
        }

        .message.assistant .message-content blockquote {
            border-left: 3px solid #667eea;
            padding-left: 12px;
            margin: 8px 0;
            color: #666;
        }

        .message.assistant .message-content table {
            border-collapse: collapse;
            width: 100%;
            margin: 8px 0;
        }

        .message.assistant .message-content th,
        .message.assistant .message-content td {
            border: 1px solid #ddd;
            padding: 6px 10px;
            text-align: left;
        }

        .message.assistant .message-content th {
            background: #f5f5f5;
            font-weight: 600;
        }

        .message.assistant .message-content a {
            color: #667eea;
            text-decoration: none;
        }

        .message.assistant .message-content a:hover {
            text-decoration: underline;
        }

        /* 图片样式 */
        .message.assistant .message-content img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin: 8px 0;
            display: block;
            cursor: pointer;
        }

        /* 选项卡片 */
        .option-cards {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .option-card {
            background: #f0f0f0;
            border: 1px solid #ddd;
            border-radius: 20px;
            padding: 8px 16px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .option-card:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .option-card.clicked {
            background: #e0e0e0;
            color: #999;
            border-color: #ccc;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .option-card.clicked:hover {
            background: #e0e0e0;
            color: #999;
            border-color: #ccc;
        }

        .typing-indicator {
            display: inline-block;
        }

        .typing-indicator span {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #667eea;
            margin: 0 2px;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-8px);
            }
        }

        .chat-input-area {
            padding: 10px;
            background: white;
            border-top: 1px solid #e5e5e5;
        }

        .input-wrapper {
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }

        .input-container {
            flex: 1;
            position: relative;
        }

        #userInput {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e5e5e5;
            border-radius: 24px;
            font-size: 16px;
            resize: none;
            max-height: 100px;
            min-height: 44px;
            line-height: 1.4;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        #userInput:focus {
            outline: none;
            border-color: #667eea;
        }

        /* 模式切换按钮 */
        .mode-switch-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: #f5f5f5;
            color: #666;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            flex-shrink: 0;
        }

        .mode-switch-btn:hover {
            background: #e5e5e5;
        }

        .mode-switch-btn svg {
            width: 20px;
            height: 20px;
        }

        /* 发送按钮 */
        .action-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            flex-shrink: 0;
        }

        .action-btn:hover {
            transform: scale(1.05);
        }

        .action-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .action-btn svg {
            width: 20px;
            height: 20px;
        }

        .action-btn.recording {
            background: #ff4444;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
        }

        .error-message {
            background: #fee;
            border: 1px solid #fcc;
            color: #c33;
            padding: 10px 15px;
            border-radius: 8px;
            margin: 10px 15px;
            display: none;
            font-size: 14px;
        }

        .error-message.active {
            display: block;
        }

        .welcome-message {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .welcome-message h2 {
            font-size: 20px;
            margin-bottom: 10px;
            color: #666;
        }

        .welcome-message p {
            font-size: 14px;
            line-height: 1.6;
        }

        /* 图片放大模态框 */
        .image-modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            justify-content: center;
            align-items: center;
        }

        .image-modal.active {
            display: flex;
        }

        .image-modal img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 8px;
        }

        .image-modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #fff;
            font-size: 30px;
            cursor: pointer;
        }

        /* 录音提示 */
        .recording-tip {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 20px 30px;
            border-radius: 10px;
            display: none;
            z-index: 1000;
            text-align: center;
        }

        .recording-tip.active {
            display: block;
        }

        .recording-tip .mic-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        /* 滚动条样式 */
        .chat-messages::-webkit-scrollbar {
            width: 4px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 2px;
        }

        /* 代码块复制按钮 */
        .code-block-wrapper {
            position: relative;
        }

        .copy-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: #fff;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .code-block-wrapper:hover .copy-btn {
            opacity: 1;
        }

        .copy-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* 切换按钮 */
        .switch-btn {
            position: absolute;
            right: 12px;
            bottom: 12px;
            background: none;
            border: none;
            color: #667eea;
            cursor: pointer;
            font-size: 20px;
            padding: 5px;
        }

        /* 长按语音按钮样式 */
        /* 语音模式容器 */
        .voice-mode-wrapper {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        /* 语音输入按钮（微信风格） */
        .voice-input-btn {
            flex: 1;
            height: 44px;
            border: none;
            border-radius: 22px;
            background: #f5f5f5;
            color: #333;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .voice-input-btn:active {
            background: #e5e5e5;
        }

        .voice-input-btn.recording {
            background: #e5e5e5;
            color: #667eea;
        }

        .voice-input-btn.cancelled {
            background: #ff4444;
            color: white;
        }

        .voice-btn-text {
            font-size: 16px;
            font-weight: 500;
        }

        /* 录音状态提示 */
        .voice-status {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.85);
            color: white;
            padding: 30px 40px;
            border-radius: 16px;
            text-align: center;
            z-index: 1000;
            display: none;
        }

        .voice-status.active {
            display: block;
        }

        .voice-status .mic-icon {
            font-size: 48px;
            margin-bottom: 15px;
            animation: micPulse 1s infinite;
        }

        @keyframes micPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .voice-status .status-text {
            font-size: 16px;
            margin-bottom: 8px;
        }

        .voice-status .tip-text {
            font-size: 13px;
            color: #aaa;
        }

        .voice-status .wave-bars {
            display: flex;
            justify-content: center;
            gap: 4px;
            margin: 15px 0;
        }

        .voice-status .wave-bar {
            width: 4px;
            height: 20px;
            background: #667eea;
            border-radius: 2px;
            animation: wave 0.5s ease-in-out infinite;
        }

        .voice-status .wave-bar:nth-child(2) { animation-delay: 0.1s; }
        .voice-status .wave-bar:nth-child(3) { animation-delay: 0.2s; }
        .voice-status .wave-bar:nth-child(4) { animation-delay: 0.3s; }
        .voice-status .wave-bar:nth-child(5) { animation-delay: 0.4s; }

        @keyframes wave {
            0%, 100% { height: 10px; }
            50% { height: 30px; }
        }

        /* 取消提示 */
        .voice-cancel-tip {
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 999;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .voice-cancel-tip.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <!-- 图片放大模态框 -->
    <div class="image-modal" id="imageModal" onclick="closeImageModal()">
        <span class="image-modal-close">&times;</span>
        <img id="modalImage" src="" alt="放大图片">
    </div>

    <!-- 录音提示 -->
    <div class="recording-tip" id="recordingTip">
        <div class="mic-icon">🎤</div>
        <div>正在录音...</div>
        <div style="font-size: 12px; margin-top: 5px;">松开发送，上滑取消</div>
    </div>

    <!-- 语音状态提示 -->
    <div class="voice-status" id="voiceStatus">
        <div class="mic-icon">🎤</div>
        <div class="wave-bars">
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
        </div>
        <div class="status-text" id="voiceStatusText">正在录音...</div>
        <div class="tip-text">松开发送，上滑取消</div>
    </div>

    <!-- 取消提示 -->
    <div class="voice-cancel-tip" id="voiceCancelTip">↑ 上滑取消录音</div>

    <div class="chat-container">
        <div class="error-message" id="errorMessage"></div>

        <div class="chat-messages" id="chatMessages">
            <div class="welcome-message">
                <h2>👋 AI智能助手</h2>
                <p>我是您的智能助手，可以帮助您解答各种问题</p>
            </div>
        </div>

        <div class="chat-input-area">
            <!-- 文字输入模式 -->
            <div class="input-wrapper text-mode" id="textModeWrapper">
                <button class="mode-switch-btn" id="switchToVoiceBtn" title="切换到语音输入">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                        <line x1="12" y1="19" x2="12" y2="23"/>
                        <line x1="8" y1="23" x2="16" y2="23"/>
                    </svg>
                </button>
                <div class="input-container">
                    <textarea id="userInput" placeholder="输入您的问题..." rows="1"></textarea>
                </div>
                <button class="action-btn send-btn" id="sendBtn" onclick="sendMessage()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                    </svg>
                </button>
            </div>
            
            <!-- 语音输入模式 -->
            <div class="voice-mode-wrapper" id="voiceModeWrapper" style="display: none;">
                <button class="mode-switch-btn" id="switchToTextBtn" title="切换到文字输入">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                        <line x1="7" y1="8" x2="17" y2="8"/>
                        <line x1="7" y1="12" x2="17" y2="12"/>
                        <line x1="7" y1="16" x2="13" y2="16"/>
                    </svg>
                </button>
                <button class="voice-input-btn" id="voiceInputBtn">
                    <span class="voice-btn-text">按住 说话</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        // 配置marked选项
        marked.setOptions({
            highlight: function(code, lang) {
                if (lang && hljs.getLanguage(lang)) {
                    try {
                        return hljs.highlight(code, { language: lang }).value;
                    } catch (e) {}
                }
                return hljs.highlightAuto(code).value;
            },
            breaks: true,
            gfm: true
        });

        // 状态管理
        let isStreaming = false;
        let currentAssistantMessage = null;
        let currentContent = '';
        let currentReferences = [];
        let currentOptionCards = [];
        let visitorId = null;
        let sessionId = null;
        let isVoiceMode = false;
        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;
        let accessToken = null;  // 保存 access_token
        let userInfo = null;     // 保存用户信息

        // 生成UUID
        function generateUUID() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                const r = Math.random() * 16 | 0;
                const v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }

        // 获取URL参数
        function getUrlParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        // 显示错误消息
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.classList.add('active');
            setTimeout(() => {
                errorDiv.classList.remove('active');
            }, 5000);
        }

        // 初始化用户信息
        async function initUserInfo() {
            accessToken = getUrlParam('access_token');
            
            if (!accessToken) {
                showError('缺少 access_token 参数');
                return;
            }

            try {
                const response = await fetch(`/api/userinfo?access_token=${accessToken}`);
                const result = await response.json();

                if (result.success && result.data) {
                    const userData = result.data.data || result.data;
                    userInfo = userData;  // 保存完整用户信息
                    visitorId = userData.id || userData.userId || userData.user_id || userData.empId;
                    sessionId = generateUUID();
                    console.log('用户信息加载成功:', { visitorId, empName: userData.empName });
                } else {
                    throw new Error(result.error || '获取用户信息失败');
                }
            } catch (error) {
                console.error('获取用户信息失败:', error);
                showError('获取用户信息失败');
            }
        }

        // 图片模态框
        function openImageModal(src) {
            document.getElementById('modalImage').src = src;
            document.getElementById('imageModal').classList.add('active');
        }

        function closeImageModal() {
            document.getElementById('imageModal').classList.remove('active');
        }

        // 添加消息到聊天区域
        function addMessage(role, content, references = [], optionCards = []) {
            const messagesDiv = document.getElementById('chatMessages');
            
            // 移除欢迎消息
            const welcomeMsg = messagesDiv.querySelector('.welcome-message');
            if (welcomeMsg) {
                welcomeMsg.remove();
            }

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            
            if (role === 'user') {
                contentDiv.textContent = content;
            } else {
                contentDiv.innerHTML = DOMPurify.sanitize(marked.parse(content));
                
                // 添加图片点击放大功能
                contentDiv.querySelectorAll('img').forEach(img => {
                    img.onclick = () => openImageModal(img.src);
                    img.onerror = () => {
                        img.style.display = 'none';
                        const errorMsg = document.createElement('div');
                        errorMsg.style.cssText = 'color: #999; font-size: 12px; padding: 8px; background: #f5f5f5; border-radius: 4px;';
                        errorMsg.textContent = '图片加载失败';
                        img.parentNode.insertBefore(errorMsg, img);
                    };
                });
                
                // 添加代码块复制功能
                contentDiv.querySelectorAll('pre').forEach(pre => {
                    const wrapper = document.createElement('div');
                    wrapper.className = 'code-block-wrapper';
                    pre.parentNode.insertBefore(wrapper, pre);
                    wrapper.appendChild(pre);
                    
                    const copyBtn = document.createElement('button');
                    copyBtn.className = 'copy-btn';
                    copyBtn.textContent = '复制';
                    copyBtn.onclick = () => {
                        navigator.clipboard.writeText(pre.textContent);
                        copyBtn.textContent = '已复制';
                        setTimeout(() => copyBtn.textContent = '复制', 2000);
                    };
                    wrapper.appendChild(copyBtn);
                });
                
                // 添加选项卡片
                if (optionCards && optionCards.length > 0) {
                    const cardsDiv = document.createElement('div');
                    cardsDiv.className = 'option-cards';
                    optionCards.forEach(card => {
                        const cardBtn = document.createElement('button');
                        cardBtn.className = 'option-card';
                        cardBtn.textContent = card;
                        cardBtn.onclick = function() {
                            // 检查是否已点击
                            if (this.classList.contains('clicked')) {
                                return;
                            }
                            
                            // 标记为已点击
                            this.classList.add('clicked');
                            
                            // 禁用同一消息的所有卡片
                            const siblingCards = this.parentElement.querySelectorAll('.option-card');
                            siblingCards.forEach(c => c.classList.add('clicked'));
                            
                            // 发送消息
                            document.getElementById('userInput').value = card;
                            sendMessage();
                        };
                        cardsDiv.appendChild(cardBtn);
                    });
                    contentDiv.appendChild(cardsDiv);
                }
            }
            
            messageDiv.appendChild(contentDiv);
            messagesDiv.appendChild(messageDiv);
            
            // 滚动到底部
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            
            return contentDiv;
        }

        // 更新助手消息（流式）
        function updateAssistantMessage(contentDiv, content, references = [], optionCards = []) {
            contentDiv.innerHTML = DOMPurify.sanitize(marked.parse(content));
            
            // 添加图片点击放大功能
            contentDiv.querySelectorAll('img').forEach(img => {
                img.onclick = () => openImageModal(img.src);
            });
            
            // 添加代码块复制功能
            contentDiv.querySelectorAll('pre').forEach(pre => {
                const wrapper = document.createElement('div');
                wrapper.className = 'code-block-wrapper';
                pre.parentNode.insertBefore(wrapper, pre);
                wrapper.appendChild(pre);
                
                const copyBtn = document.createElement('button');
                copyBtn.className = 'copy-btn';
                copyBtn.textContent = '复制';
                copyBtn.onclick = () => {
                    navigator.clipboard.writeText(pre.textContent);
                    copyBtn.textContent = '已复制';
                    setTimeout(() => copyBtn.textContent = '复制', 2000);
                };
                wrapper.appendChild(copyBtn);
            });
            
            // 添加选项卡片
            if (optionCards && optionCards.length > 0) {
                const cardsDiv = document.createElement('div');
                cardsDiv.className = 'option-cards';
                optionCards.forEach(card => {
                    const cardBtn = document.createElement('button');
                    cardBtn.className = 'option-card';
                    cardBtn.textContent = card;
                    cardBtn.onclick = function() {
                        // 检查是否已点击
                        if (this.classList.contains('clicked')) {
                            return;
                        }
                        
                        // 标记为已点击
                        this.classList.add('clicked');
                        
                        // 禁用同一消息的所有卡片
                        const siblingCards = this.parentElement.querySelectorAll('.option-card');
                        siblingCards.forEach(c => c.classList.add('clicked'));
                        
                        // 发送消息
                        document.getElementById('userInput').value = card;
                        sendMessage();
                    };
                    cardsDiv.appendChild(cardBtn);
                });
                contentDiv.appendChild(cardsDiv);
            }
            
            // 滚动到底部
            const messagesDiv = document.getElementById('chatMessages');
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        // 发送消息
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const sendBtn = document.getElementById('sendBtn');
            const content = input.value.trim();
            
            if (!content) return;
            
            if (!visitorId) {
                showError('用户信息未加载，请刷新页面重试');
                return;
            }
            
            // 禁用输入
            input.value = '';
            input.disabled = true;
            sendBtn.disabled = true;
            isStreaming = true;
            
            // 添加用户消息
            addMessage('user', content);
            
            // 创建助手消息占位
            currentAssistantMessage = addMessage('assistant', '<div class="typing-indicator"><span></span><span></span><span></span></div>');
            currentContent = '';
            currentReferences = [];
            currentOptionCards = [];
            
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        session_id: sessionId,
                        visitor_biz_id: visitorId,
                        content: content,
                        // 自定义变量，传递给腾讯云 AI
                        custom_variables: {
                            access_token: accessToken,
                            empName: userInfo?.empName || '',
                            userName: userInfo?.userName || '',
                            empId: userInfo?.empId || '',
                            userId: userInfo?.userId || userInfo?.id || ''
                        }
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';
                    
                    for (const line of lines) {
                        if (line.startsWith('data:')) {
                            try {
                                const data = JSON.parse(line.substring(5).trim());
                                handleSSEEvent(data);
                            } catch (e) {
                                console.error('Parse error:', e);
                            }
                        }
                    }
                }
                
            } catch (error) {
                console.error('Error:', error);
                showError(`请求失败: ${error.message}`);
                if (currentAssistantMessage) {
                    currentAssistantMessage.innerHTML = '<span style="color: #c33;">❌ 请求失败，请重试</span>';
                }
            } finally {
                input.disabled = false;
                sendBtn.disabled = false;
                isStreaming = false;
                input.focus();
            }
        }

        // 处理SSE事件
        function handleSSEEvent(data) {
            // 调试日志：查看腾讯云返回的完整数据
            console.log('SSE Event:', JSON.stringify(data, null, 2));
            
            switch (data.type) {
                case 'reply':
                    if (data.payload) {
                        // 关键修复：检查 is_from_self 字段
                        // is_from_self: true 表示用户消息，false 表示机器人消息
                        // 我们只需要处理机器人消息，跳过用户消息
                        if (data.payload.is_from_self === true) {
                            console.log('跳过用户消息:', data.payload.content);
                            break;
                        }
                        
                        if (data.payload.content) {
                            console.log('机器人回复:', data.payload.content, 'Current accumulated:', currentContent);
                            currentContent += data.payload.content;
                        }
                        // 处理选项卡片
                        if (data.payload.option_cards && data.payload.option_cards.length > 0) {
                            currentOptionCards = data.payload.option_cards;
                        }
                        updateAssistantMessage(currentAssistantMessage, currentContent, currentReferences, currentOptionCards);
                    }
                    break;
                    
                case 'reference':
                    if (data.payload && data.payload.references) {
                        currentReferences = data.payload.references;
                        updateAssistantMessage(currentAssistantMessage, currentContent, currentReferences, currentOptionCards);
                    }
                    break;
                    
                case 'token_stat':
                    console.log('Token统计:', data.payload);
                    break;
                    
                case 'thought':
                    if (data.payload && data.payload.procedures) {
                        const thoughtContent = data.payload.procedures
                            .map(p => p.debugging?.content)
                            .filter(Boolean)
                            .join('\n');
                        if (thoughtContent) {
                            console.log('思考过程:', thoughtContent);
                        }
                    }
                    break;
                    
                case 'error':
                    showError(`错误: ${data.error?.message || '未知错误'}`);
                    if (currentAssistantMessage) {
                        currentAssistantMessage.innerHTML = `<span style="color: #c33;">❌ ${data.error?.message || '发生错误'}</span>`;
                    }
                    break;
            }
        }

        // 切换语音模式
        function toggleVoiceMode() {
            // 不再使用切换模式，改为长按录音
        }

        // 长按录音相关变量
        let pressTimer = null;
        let startY = 0;
        let isLongPress = false;
        const LONG_PRESS_DURATION = 300; // 长按触发时间（毫秒）
        
        // Web Speech API 实例（全局变量，只创建一次）
        let webSpeechRecognition = null;
        let webSpeechSupported = false;

        // 初始化 Web Speech API
        function initWebSpeechAPI() {
            if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                console.log('浏览器不支持 Web Speech API');
                return false;
            }

            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            const recognition = new SpeechRecognition();
            
            recognition.lang = 'zh-CN';
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;

            recognition.onstart = function() {
                console.log('语音识别已启动');
            };

            recognition.onresult = function(event) {
                const text = event.results[0][0].transcript;
                console.log('识别结果:', text);
                
                // 切换到文字模式并填入识别结果
                document.getElementById('voiceModeWrapper').style.display = 'none';
                document.getElementById('textModeWrapper').style.display = 'flex';
                document.getElementById('userInput').value = text;
                sendMessage();
                resetVoiceUI();
            };

            recognition.onerror = function(event) {
                console.error('语音识别错误:', event.error);
                let errorMsg = '语音识别失败';
                switch(event.error) {
                    case 'no-speech':
                        errorMsg = '未检测到语音';
                        break;
                    case 'audio-capture':
                        errorMsg = '无法访问麦克风';
                        break;
                    case 'not-allowed':
                        errorMsg = '麦克风权限被拒绝';
                        break;
                    case 'network':
                        errorMsg = '网络错误';
                        break;
                }
                showError(errorMsg);
                resetVoiceUI();
            };

            recognition.onend = function() {
                console.log('语音识别已结束');
                resetVoiceUI();
            };

            return recognition;
        }

        // 初始化语音按钮长按事件
        function initVoiceButton() {
            const voiceInputBtn = document.getElementById('voiceInputBtn');
            const switchToVoiceBtn = document.getElementById('switchToVoiceBtn');
            const switchToTextBtn = document.getElementById('switchToTextBtn');
            const textModeWrapper = document.getElementById('textModeWrapper');
            const voiceModeWrapper = document.getElementById('voiceModeWrapper');
            
            // 初始化 Web Speech API
            webSpeechRecognition = initWebSpeechAPI();
            webSpeechSupported = !!webSpeechRecognition;
            
            if (webSpeechSupported) {
                console.log('✅ 使用 Web Speech API 进行语音识别');
            } else {
                console.log('⚠️ 浏览器不支持 Web Speech API，将使用录音上传方式');
            }
            
            // 切换到语音模式
            switchToVoiceBtn.addEventListener('click', function() {
                textModeWrapper.style.display = 'none';
                voiceModeWrapper.style.display = 'flex';
            });
            
            // 切换到文字模式
            switchToTextBtn.addEventListener('click', function() {
                voiceModeWrapper.style.display = 'none';
                textModeWrapper.style.display = 'flex';
                document.getElementById('userInput').focus();
            });
            
            // 如果支持 Web Speech API，使用更简单的方式
            if (webSpeechSupported) {
                // 长按开始录音
                voiceInputBtn.addEventListener('touchstart', function(e) {
                    e.preventDefault();
                    startY = e.touches[0].clientY;
                    isLongPress = false;
                    
                    pressTimer = setTimeout(function() {
                        isLongPress = true;
                        voiceInputBtn.classList.add('recording');
                        voiceInputBtn.querySelector('.voice-btn-text').textContent = '松开 结束';
                        document.getElementById('voiceStatus').classList.add('active');
                        document.getElementById('voiceStatusText').textContent = '正在录音...';
                        
                        try {
                            webSpeechRecognition.start();
                        } catch (err) {
                            console.error('Web Speech API 启动失败:', err);
                            showError('语音识别启动失败，请检查麦克风权限');
                            resetVoiceUI();
                        }
                    }, LONG_PRESS_DURATION);
                }, { passive: false });
                
                // 触摸移动（检测上滑取消）
                voiceInputBtn.addEventListener('touchmove', function(e) {
                    if (!isLongPress) return;
                    
                    const currentY = e.touches[0].clientY;
                    const diff = startY - currentY;
                    
                    if (diff > 50) {
                        voiceInputBtn.classList.add('cancelled');
                        voiceInputBtn.classList.remove('recording');
                        voiceInputBtn.querySelector('.voice-btn-text').textContent = '松开 取消';
                        document.getElementById('voiceCancelTip').classList.add('show');
                        document.getElementById('voiceStatusText').textContent = '松开取消';
                    } else {
                        voiceInputBtn.classList.remove('cancelled');
                        voiceInputBtn.classList.add('recording');
                        voiceInputBtn.querySelector('.voice-btn-text').textContent = '松开 结束';
                        document.getElementById('voiceCancelTip').classList.remove('show');
                        document.getElementById('voiceStatusText').textContent = '正在录音...';
                    }
                }, { passive: false });
                
                // 触摸结束
                voiceInputBtn.addEventListener('touchend', function(e) {
                    e.preventDefault();
                    clearTimeout(pressTimer);
                    
                    const isCancelled = voiceInputBtn.classList.contains('cancelled');
                    
                    if (isLongPress && isCancelled) {
                        webSpeechRecognition.stop();
                        showError('录音已取消');
                    }
                    
                    resetVoiceUI();
                }, { passive: false });
                
                // 触摸取消
                voiceInputBtn.addEventListener('touchcancel', function(e) {
                    clearTimeout(pressTimer);
                    if (isLongPress) {
                        webSpeechRecognition.stop();
                    }
                    resetVoiceUI();
                });
                
                // PC端：点击开始/停止
                voiceInputBtn.addEventListener('mousedown', function(e) {
                    e.preventDefault();
                    startY = e.clientY;
                    isLongPress = false;
                    
                    pressTimer = setTimeout(function() {
                        isLongPress = true;
                        voiceInputBtn.classList.add('recording');
                        voiceInputBtn.querySelector('.voice-btn-text').textContent = '松开 结束';
                        document.getElementById('voiceStatus').classList.add('active');
                        document.getElementById('voiceStatusText').textContent = '正在录音...';
                        
                        try {
                            webSpeechRecognition.start();
                        } catch (err) {
                            console.error('Web Speech API 启动失败:', err);
                            showError('语音识别启动失败，请检查麦克风权限');
                            resetVoiceUI();
                        }
                    }, LONG_PRESS_DURATION);
                });
                
                voiceInputBtn.addEventListener('mousemove', function(e) {
                    if (!isLongPress) return;
                    
                    const currentY = e.clientY;
                    const diff = startY - currentY;
                    
                    if (diff > 50) {
                        voiceInputBtn.classList.add('cancelled');
                        voiceInputBtn.classList.remove('recording');
                        voiceInputBtn.querySelector('.voice-btn-text').textContent = '松开 取消';
                        document.getElementById('voiceCancelTip').classList.add('show');
                        document.getElementById('voiceStatusText').textContent = '松开取消';
                    } else {
                        voiceInputBtn.classList.remove('cancelled');
                        voiceInputBtn.classList.add('recording');
                        voiceInputBtn.querySelector('.voice-btn-text').textContent = '松开 结束';
                        document.getElementById('voiceCancelTip').classList.remove('show');
                        document.getElementById('voiceStatusText').textContent = '正在录音...';
                    }
                });
                
                voiceInputBtn.addEventListener('mouseup', function(e) {
                    e.preventDefault();
                    clearTimeout(pressTimer);
                    
                    const isCancelled = voiceInputBtn.classList.contains('cancelled');
                    
                    if (isLongPress && isCancelled) {
                        webSpeechRecognition.stop();
                        showError('录音已取消');
                    }
                    
                    resetVoiceUI();
                });
                
                voiceInputBtn.addEventListener('mouseleave', function(e) {
                    if (isLongPress) {
                        webSpeechRecognition.stop();
                    }
                    clearTimeout(pressTimer);
                    resetVoiceUI();
                });
                
                return;
            }
            
            // 不支持 Web Speech API，使用录音上传方式
            console.log('使用录音上传方式进行语音识别');
            
            // 触摸开始
            voiceBtn.addEventListener('touchstart', function(e) {
                e.preventDefault();
                startY = e.touches[0].clientY;
                isLongPress = false;
                
                pressTimer = setTimeout(function() {
                    isLongPress = true;
                    startRecording();
                }, LONG_PRESS_DURATION);
            }, { passive: false });
            
            // 触摸移动（检测上滑取消）
            voiceBtn.addEventListener('touchmove', function(e) {
                if (!isLongPress) return;
                
                const currentY = e.touches[0].clientY;
                const diff = startY - currentY;
                
                // 上滑超过50px显示取消提示
                if (diff > 50) {
                    document.getElementById('voiceCancelTip').classList.add('show');
                    document.getElementById('voiceStatusText').textContent = '松开取消';
                } else {
                    document.getElementById('voiceCancelTip').classList.remove('show');
                    document.getElementById('voiceStatusText').textContent = '正在录音...';
                }
            }, { passive: false });
            
            // 触摸结束
            voiceBtn.addEventListener('touchend', function(e) {
                e.preventDefault();
                clearTimeout(pressTimer);
                
                const cancelTip = document.getElementById('voiceCancelTip');
                const isCancelled = cancelTip.classList.contains('show');
                
                if (isLongPress) {
                    if (isCancelled) {
                        // 取消录音
                        cancelRecording();
                    } else {
                        // 发送录音
                        stopRecording();
                    }
                }
                
                cancelTip.classList.remove('show');
            }, { passive: false });
            
            // 触摸取消
            voiceBtn.addEventListener('touchcancel', function(e) {
                clearTimeout(pressTimer);
                if (isLongPress) {
                    cancelRecording();
                }
                document.getElementById('voiceCancelTip').classList.remove('show');
            });
            
            // 鼠标事件（PC端支持）
            voiceBtn.addEventListener('mousedown', function(e) {
                e.preventDefault();
                startY = e.clientY;
                isLongPress = false;
                
                pressTimer = setTimeout(function() {
                    isLongPress = true;
                    startRecording();
                }, LONG_PRESS_DURATION);
            });
            
            voiceBtn.addEventListener('mousemove', function(e) {
                if (!isLongPress) return;
                
                const currentY = e.clientY;
                const diff = startY - currentY;
                
                if (diff > 50) {
                    document.getElementById('voiceCancelTip').classList.add('show');
                    document.getElementById('voiceStatusText').textContent = '松开取消';
                } else {
                    document.getElementById('voiceCancelTip').classList.remove('show');
                    document.getElementById('voiceStatusText').textContent = '正在录音...';
                }
            });
            
            voiceBtn.addEventListener('mouseup', function(e) {
                e.preventDefault();
                clearTimeout(pressTimer);
                
                const cancelTip = document.getElementById('voiceCancelTip');
                const isCancelled = cancelTip.classList.contains('show');
                
                if (isLongPress) {
                    if (isCancelled) {
                        cancelRecording();
                    } else {
                        stopRecording();
                    }
                }
                
                cancelTip.classList.remove('show');
            });
            
            voiceBtn.addEventListener('mouseleave', function(e) {
                if (isLongPress) {
                    cancelRecording();
                }
                clearTimeout(pressTimer);
            });
        }

        // 开始录音
        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                
                mediaRecorder.ondataavailable = (event) => {
                    audioChunks.push(event.data);
                };
                
                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    await sendAudioToServer(audioBlob);
                };
                
                mediaRecorder.start();
                isRecording = true;
                
                // 显示录音状态
                document.getElementById('voiceBtn').classList.add('recording');
                document.getElementById('voiceStatus').classList.add('active');
                document.getElementById('voiceStatusText').textContent = '正在录音...';
                
            } catch (error) {
                console.error('录音失败:', error);
                showError('无法访问麦克风，请检查权限设置');
                resetVoiceUI();
            }
        }

        // 停止录音并发送
        function stopRecording() {
            if (mediaRecorder && isRecording) {
                mediaRecorder.stop();
                isRecording = false;
                
                // 停止音频流
                if (mediaRecorder.stream) {
                    mediaRecorder.stream.getTracks().forEach(track => track.stop());
                }
            }
            resetVoiceUI();
        }

        // 取消录音
        function cancelRecording() {
            if (mediaRecorder && isRecording) {
                mediaRecorder.stop();
                isRecording = false;
                
                // 停止音频流
                if (mediaRecorder.stream) {
                    mediaRecorder.stream.getTracks().forEach(track => track.stop());
                }
                
                // 清空录音数据
                audioChunks = [];
            }
            resetVoiceUI();
            showError('录音已取消');
        }

        // 重置语音UI
        function resetVoiceUI() {
            const voiceInputBtn = document.getElementById('voiceInputBtn');
            if (voiceInputBtn) {
                voiceInputBtn.classList.remove('recording', 'cancelled');
                const textSpan = voiceInputBtn.querySelector('.voice-btn-text');
                if (textSpan) {
                    textSpan.textContent = '按住 说话';
                }
            }
            document.getElementById('voiceStatus').classList.remove('active');
            document.getElementById('voiceCancelTip').classList.remove('show');
            isLongPress = false;
        }

        // 发送音频到服务器进行语音识别
        async function sendAudioToServer(audioBlob) {
            if (!visitorId) {
                showError('用户信息未加载，请刷新页面重试');
                return;
            }
            
            const accessToken = getUrlParam('access_token');
            const formData = new FormData();
            formData.append('audio', audioBlob, 'recording.webm');
            formData.append('access_token', accessToken);
            
            try {
                // 显示识别中状态
                document.getElementById('voiceStatusText').textContent = '正在识别...';
                document.getElementById('voiceStatus').classList.add('active');
                
                const response = await fetch('/api/speech-to-text', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (result.success && result.text) {
                    // 将识别结果填入输入框并发送
                    document.getElementById('userInput').value = result.text;
                    sendMessage();
                } else {
                    showError(result.error || '语音识别失败，请重试');
                }
            } catch (error) {
                console.error('语音识别失败:', error);
                showError('语音识别失败，请检查网络连接');
            } finally {
                resetVoiceUI();
            }
        }

        // 输入框自动调整高度
        document.getElementById('userInput').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 100) + 'px';
        });

        // 回车发送（Shift+回车换行）
        document.getElementById('userInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                if (!isStreaming) {
                    sendMessage();
                }
            }
        });

        // 页面加载时初始化
        window.onload = function() {
            initUserInfo();
            initVoiceButton();
            document.getElementById('userInput').focus();
        };
    </script>
