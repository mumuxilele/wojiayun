<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI智能助手</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css">
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/core.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/javascript.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/python.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/java.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/cpp.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/css.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/sql.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/bash.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/json.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/xml.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/markdown.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .chat-container {
            width: 100%;
            max-width: 900px;
            height: 90vh;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-header h1 {
            font-size: 22px;
            font-weight: 600;
        }

        .user-info {
            font-size: 14px;
            opacity: 0.9;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }

        .message {
            margin-bottom: 20px;
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 70%;
            padding: 15px 20px;
            border-radius: 18px;
            line-height: 1.6;
            word-wrap: break-word;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.assistant .message-content {
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .message.assistant .message-content pre {
            background: #1e1e1e;
            border-radius: 8px;
            padding: 15px;
            overflow-x: auto;
            margin: 10px 0;
        }

        .message.assistant .message-content code {
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 13px;
        }

        .message.assistant .message-content p {
            margin: 10px 0;
        }

        .message.assistant .message-content p:first-child {
            margin-top: 0;
        }

        .message.assistant .message-content p:last-child {
            margin-bottom: 0;
        }

        .message.assistant .message-content ul,
        .message.assistant .message-content ol {
            margin: 10px 0;
            padding-left: 25px;
        }

        .message.assistant .message-content li {
            margin: 5px 0;
        }

        .message.assistant .message-content h1,
        .message.assistant .message-content h2,
        .message.assistant .message-content h3,
        .message.assistant .message-content h4 {
            margin: 15px 0 10px 0;
            font-weight: 600;
        }

        .message.assistant .message-content h1:first-child,
        .message.assistant .message-content h2:first-child,
        .message.assistant .message-content h3:first-child {
            margin-top: 0;
        }

        .message.assistant .message-content blockquote {
            border-left: 4px solid #667eea;
            padding-left: 15px;
            margin: 10px 0;
            color: #666;
        }

        .message.assistant .message-content table {
            border-collapse: collapse;
            width: 100%;
            margin: 10px 0;
        }

        .message.assistant .message-content th,
        .message.assistant .message-content td {
            border: 1px solid #ddd;
            padding: 8px 12px;
            text-align: left;
        }

        .message.assistant .message-content th {
            background: #f5f5f5;
            font-weight: 600;
        }

        .message.assistant .message-content a {
            color: #667eea;
            text-decoration: none;
        }

        .message.assistant .message-content a:hover {
            text-decoration: underline;
        }

        .typing-indicator {
            display: inline-block;
        }

        .typing-indicator span {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #667eea;
            margin: 0 2px;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-10px);
            }
        }

        .chat-input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #e9ecef;
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .input-container {
            flex: 1;
            position: relative;
        }

        #userInput {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e9ecef;
            border-radius: 25px;
            font-size: 15px;
            resize: none;
            max-height: 120px;
            min-height: 50px;
            line-height: 1.5;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        #userInput:focus {
            outline: none;
            border-color: #667eea;
        }

        #sendBtn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            flex-shrink: 0;
        }

        #sendBtn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        #sendBtn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        #sendBtn svg {
            width: 20px;
            height: 20px;
        }

        .error-message {
            background: #fee;
            border: 1px solid #fcc;
            color: #c33;
            padding: 10px 15px;
            border-radius: 8px;
            margin: 10px 20px;
            display: none;
        }

        .error-message.active {
            display: block;
        }

        .welcome-message {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .welcome-message h2 {
            font-size: 28px;
            margin-bottom: 15px;
            color: #333;
        }

        .welcome-message p {
            font-size: 16px;
            line-height: 1.8;
        }

        .reference-section {
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px dashed #ddd;
        }

        .reference-title {
            font-size: 12px;
            color: #999;
            margin-bottom: 8px;
        }

        .reference-item {
            font-size: 12px;
            color: #667eea;
            margin: 5px 0;
            text-decoration: none;
            display: block;
        }

        .reference-item:hover {
            text-decoration: underline;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .loading-content {
            text-align: center;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 16px;
            color: #666;
        }

        /* 滚动条样式 */
        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 3px;
        }

        .chat-messages::-webkit-scrollbar-thumb:hover {
            background: #999;
        }

        /* 代码块复制按钮 */
        .code-block-wrapper {
            position: relative;
        }

        .copy-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: #fff;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .code-block-wrapper:hover .copy-btn {
            opacity: 1;
        }

        .copy-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* 图片样式优化 */
        .message.assistant .message-content img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin: 10px 0;
            display: block;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .message.assistant .message-content img:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
        }

        /* 图片放大模态框 */
        .image-modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            justify-content: center;
            align-items: center;
        }

        .image-modal.active {
            display: flex;
        }

        .image-modal img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .image-modal-close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: #fff;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.3s;
        }

        .image-modal-close:hover {
            color: #ccc;
        }
    </style>
</head>
<body>
    <!-- 图片放大模态框 -->
    <div class="image-modal" id="imageModal" onclick="closeImageModal()">
        <span class="image-modal-close">&times;</span>
        <img id="modalImage" src="" alt="放大图片">
    </div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-content">
            <div class="loading-spinner"></div>
            <div class="loading-text">正在加载用户信息...</div>
        </div>
    </div>

    <div class="chat-container">
        <div class="chat-header">
            <h1>🤖 AI智能助手</h1>
            <div class="user-info" id="userInfo"></div>
        </div>

        <div class="error-message" id="errorMessage"></div>

        <div class="chat-messages" id="chatMessages">
            <div class="welcome-message">
                <h2>👋 欢迎使用AI智能助手</h2>
                <p>我是您的智能助手，可以帮助您解答各种问题<br>
                请随时向我提问！</p>
            </div>
        </div>

        <div class="chat-input-area">
            <div class="input-wrapper">
                <div class="input-container">
                    <textarea id="userInput" placeholder="输入您的问题..." rows="1"></textarea>
                </div>
                <button id="sendBtn" onclick="sendMessage()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        // 配置marked选项
        marked.setOptions({
            highlight: function(code, lang) {
                if (lang && hljs.getLanguage(lang)) {
                    try {
                        return hljs.highlight(code, { language: lang }).value;
                    } catch (e) {}
                }
                return hljs.highlightAuto(code).value;
            },
            breaks: true,
            gfm: true
        });

        // 状态管理
        let isStreaming = false;
        let currentAssistantMessage = null;
        let currentContent = '';
        let currentReferences = [];
        let visitorId = null;
        let sessionId = null;

        // 生成UUID
        function generateUUID() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                const r = Math.random() * 16 | 0;
                const v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }

        // 获取URL参数
        function getUrlParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        // 显示错误消息
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.classList.add('active');
            setTimeout(() => {
                errorDiv.classList.remove('active');
            }, 5000);
        }

        // 隐藏加载层
        function hideLoading() {
            document.getElementById('loadingOverlay').style.display = 'none';
        }

        // 初始化用户信息
        async function initUserInfo() {
            const accessToken = getUrlParam('access_token');
            
            if (!accessToken) {
                hideLoading();
                showError('缺少 access_token 参数，请从正确的入口访问');
                document.getElementById('userInfo').textContent = '未登录';
                return;
            }

            try {
                const response = await fetch(`/api/userinfo?access_token=${accessToken}`);
                const result = await response.json();

                if (result.success && result.data) {
                    // 假设用户信息结构为 { id: xxx, name: xxx, ... }
                    const userData = result.data.data || result.data;
                    visitorId = userData.id || userData.userId || userData.user_id;
                    const userName = userData.name || userData.userName || userData.user_name || userData.nickname || '用户';
                    
                    document.getElementById('userInfo').textContent = `👤 ${userName}`;
                    sessionId = generateUUID();
                    
                    console.log('用户信息加载成功:', { visitorId, userName });
                } else {
                    throw new Error(result.error || '获取用户信息失败');
                }
            } catch (error) {
                console.error('获取用户信息失败:', error);
                showError('获取用户信息失败: ' + error.message);
                document.getElementById('userInfo').textContent = '获取用户信息失败';
            } finally {
                hideLoading();
            }
        }

        // 添加消息到聊天区域
        function addMessage(role, content, references = []) {
            const messagesDiv = document.getElementById('chatMessages');
            
            // 移除欢迎消息
            const welcomeMsg = messagesDiv.querySelector('.welcome-message');
            if (welcomeMsg) {
                welcomeMsg.remove();
            }

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            
            if (role === 'user') {
                contentDiv.textContent = content;
            } else {
                contentDiv.innerHTML = DOMPurify.sanitize(marked.parse(content));
                
                // 添加图片点击放大功能
                contentDiv.querySelectorAll('img').forEach(img => {
                    img.onclick = () => openImageModal(img.src);
                    img.onerror = () => {
                        img.style.display = 'none';
                        const errorMsg = document.createElement('div');
                        errorMsg.style.cssText = 'color: #999; font-size: 12px; padding: 10px; background: #f5f5f5; border-radius: 4px;';
                        errorMsg.textContent = '图片加载失败';
                        img.parentNode.insertBefore(errorMsg, img);
                    };
                });
                
                // 添加代码块复制功能
                contentDiv.querySelectorAll('pre').forEach(pre => {
                    const wrapper = document.createElement('div');
                    wrapper.className = 'code-block-wrapper';
                    pre.parentNode.insertBefore(wrapper, pre);
                    wrapper.appendChild(pre);
                    
                    const copyBtn = document.createElement('button');
                    copyBtn.className = 'copy-btn';
                    copyBtn.textContent = '复制';
                    copyBtn.onclick = () => {
                        navigator.clipboard.writeText(pre.textContent);
                        copyBtn.textContent = '已复制';
                        setTimeout(() => copyBtn.textContent = '复制', 2000);
                    };
                    wrapper.appendChild(copyBtn);
                });
                
                // 添加引用来源
                if (references.length > 0) {
                    const refSection = document.createElement('div');
                    refSection.className = 'reference-section';
                    refSection.innerHTML = `
                        <div class="reference-title">📚 参考来源：</div>
                        ${references.map(ref => 
                            `<a class="reference-item" href="${ref.url}" target="_blank" rel="noopener">
                                ${ref.name || ref.url}
                            </a>`
                        ).join('')}
                    `;
                    contentDiv.appendChild(refSection);
                }
            }
            
            messageDiv.appendChild(contentDiv);
            messagesDiv.appendChild(messageDiv);
            
            // 滚动到底部
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            
            return contentDiv;
        }

        // 更新助手消息（流式）
        function updateAssistantMessage(contentDiv, content, references = []) {
            contentDiv.innerHTML = DOMPurify.sanitize(marked.parse(content));
            
            // 添加代码块复制功能
            contentDiv.querySelectorAll('pre').forEach(pre => {
                const wrapper = document.createElement('div');
                wrapper.className = 'code-block-wrapper';
                pre.parentNode.insertBefore(wrapper, pre);
                wrapper.appendChild(pre);
                
                const copyBtn = document.createElement('button');
                copyBtn.className = 'copy-btn';
                copyBtn.textContent = '复制';
                copyBtn.onclick = () => {
                    navigator.clipboard.writeText(pre.textContent);
                    copyBtn.textContent = '已复制';
                    setTimeout(() => copyBtn.textContent = '复制', 2000);
                };
                wrapper.appendChild(copyBtn);
            });
            
            // 添加引用来源
            if (references.length > 0) {
                const refSection = document.createElement('div');
                refSection.className = 'reference-section';
                refSection.innerHTML = `
                    <div class="reference-title">📚 参考来源：</div>
                    ${references.map(ref => 
                        `<a class="reference-item" href="${ref.url}" target="_blank" rel="noopener">
                            ${ref.name || ref.url}
                        </a>`
                    ).join('')}
                `;
                contentDiv.appendChild(refSection);
            }
            
            // 滚动到底部
            const messagesDiv = document.getElementById('chatMessages');
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        // 发送消息
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const sendBtn = document.getElementById('sendBtn');
            const content = input.value.trim();
            
            if (!content) return;
            
            if (!visitorId) {
                showError('用户信息未加载，请刷新页面重试');
                return;
            }
            
            // 禁用输入
            input.value = '';
            input.disabled = true;
            sendBtn.disabled = true;
            isStreaming = true;
            
            // 添加用户消息
            addMessage('user', content);
            
            // 创建助手消息占位
            currentAssistantMessage = addMessage('assistant', '<div class="typing-indicator"><span></span><span></span><span></span></div>');
            currentContent = '';
            currentReferences = [];
            
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        session_id: sessionId,
                        visitor_biz_id: visitorId,
                        content: content
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';
                    
                    for (const line of lines) {
                        if (line.startsWith('data:')) {
                            try {
                                const data = JSON.parse(line.substring(5).trim());
                                handleSSEEvent(data);
                            } catch (e) {
                                console.error('Parse error:', e);
                            }
                        }
                    }
                }
                
            } catch (error) {
                console.error('Error:', error);
                showError(`请求失败: ${error.message}`);
                if (currentAssistantMessage) {
                    currentAssistantMessage.innerHTML = '<span style="color: #c33;">❌ 请求失败，请重试</span>';
                }
            } finally {
                input.disabled = false;
                sendBtn.disabled = false;
                isStreaming = false;
                input.focus();
            }
        }

        // 处理SSE事件
        function handleSSEEvent(data) {
            switch (data.type) {
                case 'reply':
                    if (data.payload) {
                        if (data.payload.content) {
                            currentContent += data.payload.content;
                            updateAssistantMessage(currentAssistantMessage, currentContent, currentReferences);
                        }
                    }
                    break;
                    
                case 'reference':
                    if (data.payload && data.payload.references) {
                        currentReferences = data.payload.references;
                        updateAssistantMessage(currentAssistantMessage, currentContent, currentReferences);
                    }
                    break;
                    
                case 'token_stat':
                    console.log('Token统计:', data.payload);
                    break;
                    
                case 'thought':
                    if (data.payload && data.payload.procedures) {
                        const thoughtContent = data.payload.procedures
                            .map(p => p.debugging?.content)
                            .filter(Boolean)
                            .join('\n');
                        if (thoughtContent) {
                            console.log('思考过程:', thoughtContent);
                        }
                    }
                    break;
                    
                case 'error':
                    showError(`错误: ${data.error?.message || '未知错误'}`);
                    if (currentAssistantMessage) {
                        currentAssistantMessage.innerHTML = `<span style="color: #c33;">❌ ${data.error?.message || '发生错误'}</span>`;
                    }
                    break;
            }
        }

        // 输入框自动调整高度
        document.getElementById('userInput').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });

        // 回车发送（Shift+回车换行）
        document.getElementById('userInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                if (!isStreaming) {
                    sendMessage();
                }
            }
        });

        // 页面加载时初始化
        window.onload = function() {
            initUserInfo();
            document.getElementById('userInput').focus();
        };
    </script>
</body>
</html>
