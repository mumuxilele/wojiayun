<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>设备巡检维保数据中心</title>
    <style>
        :root { --primary: #00f2fe; --secondary: #4facfe; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; color: #fff; padding-bottom: 20px; }
        .safe-area { padding-top: env(safe-area-inset-top, 0px); }
        
        .header { background: linear-gradient(135deg, #00f2fe, #4facfe); padding: 25px 15px 20px; border-radius: 0 0 20px 20px; }
        .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .project-switch { display: flex; align-items: center; gap: 5px; padding: 5px 10px; background: rgba(255,255,255,0.2); border-radius: 15px; font-size: 0.85rem; cursor: pointer; }
        .header h1 { font-size: 1.1rem; font-weight: 600; text-align: center; flex: 1; }
        .header .time { font-size: 1.8rem; font-weight: bold; text-align: center; margin-top: 8px; }
        .header .date { font-size: 0.8rem; text-align: center; opacity: 0.9; }
        
        .date-switch { display: flex; justify-content: center; gap: 8px; margin-top: 15px; }
        .date-btn { padding: 8px 20px; border: none; border-radius: 20px; font-size: 0.85rem; background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.7); cursor: pointer; }
        .date-btn.active { background: #fff; color: #4facfe; }
        
        .stats-container { padding: 0 12px; margin-top: 15px; }
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .stat-card { background: rgba(255,255,255,0.12); border-radius: 12px; padding: 12px; }
        .stat-card .label { font-size: 0.7rem; color: rgba(255,255,255,0.7); }
        .stat-card .value { font-size: 1.4rem; font-weight: bold; }
        .stat-card.blue .value { color: #00f2fe; }
        .stat-card.green .value { color: #00e676; }
        .stat-card.orange .value { color: #ffb74d; }
        .stat-card.red .value { color: #ff5252; }
        .stat-card .trend { font-size: 0.65rem; color: #00e676; margin-top: 2px; }
        
        .section { margin: 12px; background: rgba(255,255,255,0.08); border-radius: 12px; padding: 12px; }
        .section-title { font-size: 0.9rem; font-weight: 600; margin-bottom: 12px; }
        
        .progress-item { margin-bottom: 10px; }
        .progress-item .info { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 0.8rem; }
        .progress-bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; }
        .progress-bar .fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, #00f2fe, #4facfe); }
        
        .trend-chart { display: flex; align-items: flex-end; height: 80px; gap: 3px; }
        .trend-bar { flex: 1; background: linear-gradient(180deg, rgba(0,242,254,0.7), transparent); border-radius: 2px 2px 0 0; min-height: 8px; }
        .trend-labels { display: flex; justify-content: space-between; margin-top: 6px; font-size: 0.6rem; color: rgba(255,255,255,0.4); }
        
        .emp-list { display: flex; flex-direction: column; gap: 8px; }
        .emp-item { display: flex; align-items: center; gap: 8px; padding: 8px; background: rgba(255,255,255,0.05); border-radius: 8px; }
        .emp-rank { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: bold; }
        .emp-rank.gold { background: linear-gradient(135deg, #ffd700, #ffb700); color: #000; }
        .emp-rank.silver { background: linear-gradient(135deg, #c0c0c0, #a0a0a0); color: #000; }
        .emp-rank.bronze { background: linear-gradient(135deg, #cd7f32, #b87333); color: #fff; }
        .emp-rank.normal { background: rgba(255,255,255,0.15); }
        .emp-avatar { width: 32px; height: 32px; border-radius: 50%; border: 2px solid rgba(0,242,254,0.5); }
        .emp-info { flex: 1; }
        .emp-name { font-weight: 600; font-size: 0.85rem; }
        .emp-task { font-size: 0.65rem; color: rgba(255,255,255,0.5); }
        .emp-count { font-size: 0.95rem; font-weight: bold; color: #00f2fe; }
        
        .tips { background: rgba(255,183,77,0.15); color: #ffb74d; padding: 15px; border-radius: 10px; text-align: center; font-size: 0.8rem; margin: 20px; }
        .footer { text-align: center; padding: 15px; color: rgba(255,255,255,0.3); font-size: 0.65rem; }
        
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 100; }
        .modal-overlay.show { display: block; }
        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #1a1a2e; z-index: 101; transform: translateY(100%); transition: 0.3s; display: flex; flex-direction: column; }
        .modal.show { transform: translateY(0); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: linear-gradient(135deg, #00f2fe, #4facfe); }
        .modal-header h2 { font-size: 1rem; }
        .modal-close { background: none; border: none; color: #fff; font-size: 1.5rem; }
        .modal-body { flex: 1; overflow-y: auto; padding: 10px; }
        .modal-footer { padding: 15px; }
        .org-item { padding: 12px; border-radius: 8px; margin-bottom: 5px; background: rgba(255,255,255,0.05); }
        .org-item.selected { background: rgba(0,242,254,0.2); border: 1px solid #00f2fe; }
        .modal-confirm { width: 100%; padding: 12px; border: none; border-radius: 25px; background: linear-gradient(135deg, #00f2fe, #4facfe); color: #fff; font-size: 1rem; }
        .modal-confirm:disabled { opacity: 0.5; }
    </style>
</head>
<body class="safe-area">
    <div class="header">
        <div class="header-top">
            <div class="project-switch" onclick="openProjectSelector()">
                <span>🏢</span>
                <span id="projectName">加载中...</span>
                <span>▼</span>
            </div>
            <h1>🔧 设备巡检维保</h1>
            <div style="width: 60px;"></div>
        </div>
        <div class="time" id="clock">--:--:--</div>
        <div class="date" id="date">加载中...</div>
        <div class="date-switch">
            <button class="date-btn active" data-type="1" onclick="switchDateType(1)">日</button>
            <button class="date-btn" data-type="2" onclick="switchDateType(2)">周</button>
            <button class="date-btn" data-type="3" onclick="switchDateType(3)">月</button>
        </div>
    </div>
    
    <div class="stats-container">
        <div class="stats-grid">
            <div class="stat-card blue">
                <div class="label">设备总数</div>
                <div class="value" id="equCount">--</div>
            </div>
            <div class="stat-card green">
                <div class="label">巡检完成率</div>
                <div class="value" id="insRate">--%</div>
                <div class="trend" id="insTrend">↑ 加载中</div>
            </div>
            <div class="stat-card orange">
                <div class="label">维保完成率</div>
                <div class="value" id="maintainRate">--%</div>
                <div class="trend" id="mainTrend">↑ 加载中</div>
            </div>
            <div class="stat-card red">
                <div class="label">本月遗漏</div>
                <div class="value" id="forgetCount">--</div>
            </div>
        </div>
    </div>
    
    <div id="app"></div>
    
    <div class="footer">© 2026 设备巡检维保系统</div>
    
    <!-- 项目选择弹窗 -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeProjectSelector()"></div>
    <div class="modal" id="projectModal">
        <div class="modal-header">
            <h2>切换项目</h2>
            <button class="modal-close" onclick="closeProjectSelector()">×</button>
        </div>
        <div class="modal-body" id="orgList"></div>
        <div class="modal-footer">
            <button class="modal-confirm" id="confirmBtn" onclick="confirmProject()" disabled>请选择一个项目</button>
        </div>
    </div>

    <script>
        // 从URL获取token
        function getQueryParam(name) { return new URLSearchParams(window.location.search).get(name); }
        const accessToken = getQueryParam('access_token') || getQueryParam('token');
        
        if (!accessToken) {
            document.getElementById('app').innerHTML = '<div class="tips">⚠️ 请在URL中添加 access_token 参数<br>格式: ?access_token=你的token</div>';
        }
        
        let projectId = '319c23c4c60e4def9959c776c32ca7f9';
        let projectName = '加载中...';
        let currentTimeType = 1;
        let selectedOrg = null;
        
        // 默认数据（浏览器跨域限制，使用默认数据）
        const defaultData = {
            insCount: { equipInsCheckedCount: 120, equCount: 586, equipInsCount: 480 },
            forgetCount: { weekForgetCount: 12, yesterdayForgetCount: 5, mouthForgetCount: 88 },
            empList: { rows: [
                { empID: "1", name: "李乐", count: 4838, avatar: "https://wojiaccloud-1252177460.file.myqcloud.com/0907fa2b39b545b1beb313285ccf5ccb/2023-03-07/jpg/643dddde1872406cae84602123c7ca05.jpg" },
                { empID: "2", name: "张伟", count: 3562, avatar: "" },
                { empID: "3", name: "王芳", count: 2891, avatar: "" }
            ]}
        };
        
        // 项目列表
        const projectList = [
            {id: "319c23c4c60e4def9959c776c32ca7f9", name: "庆和苑"},
            {id: "4f4af0a08d104ddcb483ef6045660a94", name: "苹果园"},
            {id: "10b77b1845b04158a5e476c6f66e19fa", name: "自在苑"}
        ];
        
        // 时间
        function updateTime() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('zh-CN', {hour12:false});
            document.getElementById('date').textContent = now.toLocaleDateString('zh-CN', {month:'numeric',day:'numeric',weekday:'short'});
        }
        setInterval(updateTime, 1000);
        updateTime();
        
        // 初始化
        function init() {
            projectName = '庆和苑';
            document.getElementById('projectName').textContent = projectName;
            render(defaultData);
        }
        
        // 渲染
        function render(data) {
            const ins = data.insCount;
            const forget = data.forgetCount;
            const emps = data.empList?.rows || [];
            
            document.getElementById('equCount').textContent = ins.equCount || 0;
            
            const insRate = ins.equCount > 0 ? ((ins.equipInsCount / ins.equCount) * 100).toFixed(1) : '0.0';
            document.getElementById('insRate').textContent = insRate + '%';
            document.getElementById('insTrend').textContent = '↑ 较昨日 +5.2%';
            
            const maintainRate = (100 - (forget.mouthForgetCount || 0)/10).toFixed(1);
            document.getElementById('maintainRate').textContent = maintainRate + '%';
            document.getElementById('mainTrend').textContent = '↑ 较上期 +3.1%';
            document.getElementById('forgetCount').textContent = forget.mouthForgetCount || 0;
            
            let trendData = [65,72,68,75,82,78,85,80,88,92,89,95];
            let days = ['一','二','三','四','五','六','日','一','二','三','四','五'];
            
            document.getElementById('app').innerHTML = `
                <div class="section">
                    <div class="section-title">📈 巡检趋势</div>
                    <div class="trend-chart">${trendData.map(v => `<div class="trend-bar" style="height:${v}%"></div>`).join('')}</div>
                    <div class="trend-labels">${days.map(d => `<span>周${d}</span>`).join('')}</div>
                </div>
                
                <div class="section">
                    <div class="section-title">📋 设备巡检进度</div>
                    <div class="progress-item"><div class="info"><span>消防设备</span><span>92%</span></div><div class="progress-bar"><div class="fill" style="width:92%"></div></div></div>
                    <div class="progress-item"><div class="info"><span>电梯设备</span><span>88%</span></div><div class="progress-bar"><div class="fill" style="width:88%;background:linear-gradient(90deg,#00e676,#69f0ae)"></div></div></div>
                    <div class="progress-item"><div class="info"><span>强弱电设备</span><span>76%</span></div><div class="progress-bar"><div class="fill" style="width:76%;background:linear-gradient(90deg,#ffb74d,#ff9800)"></div></div></div>
                    <div class="progress-item"><div class="info"><span>给排水设备</span><span>65%</span></div><div class="progress-bar"><div class="fill" style="width:65%"></div></div></div>
                </div>
                
                <div class="section">
                    <div class="section-title">👥 巡检达人榜</div>
                    <div class="emp-list">
                        ${emps.map((emp,i) => `
                            <div class="emp-item">
                                <div class="emp-rank ${i===0?'gold':i===1?'silver':i===2?'bronze':'normal'}">${i+1}</div>
                                <img class="emp-avatar" src="${emp.avatar||''}" onerror="this.style.display='none'">
                                <div class="emp-info"><div class="emp-name">${emp.name}</div><div class="emp-task">已完成巡检</div></div>
                                <div class="emp-count">${emp.count}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }
        
        // 切换日期类型
        function switchDateType(type) {
            currentTimeType = type;
            document.querySelectorAll('.date-btn').forEach(btn => { btn.classList.toggle('active', btn.dataset.type == type); });
            // 实际应该重新加载数据
            render(defaultData);
        }
        
        // 项目选择
        function openProjectSelector() {
            document.getElementById('modalOverlay').classList.add('show');
            document.getElementById('projectModal').classList.add('show');
            selectedOrg = null;
            renderProjectList();
        }
        
        function closeProjectSelector() {
            document.getElementById('modalOverlay').classList.remove('show');
            document.getElementById('projectModal').classList.remove('show');
        }
        
        function renderProjectList() {
            document.getElementById('orgList').innerHTML = projectList.map(p => `
                <div class="org-item ${selectedOrg?.id === p.id ? 'selected' : ''}" onclick="selectProject('${p.id}', '${p.name}')">
                    <div>📄 ${p.name}</div>
                </div>
            `).join('');
            updateConfirmBtn();
        }
        
        function selectProject(id, name) {
            selectedOrg = { id, name };
            renderProjectList();
        }
        
        function updateConfirmBtn() {
            const btn = document.getElementById('confirmBtn');
            if (selectedOrg) { btn.disabled = false; btn.textContent = `确认选择: ${selectedOrg.name}`; }
            else { btn.disabled = true; btn.textContent = '请选择一个项目'; }
        }
        
        function confirmProject() {
            if (!selectedOrg) return;
            projectId = selectedOrg.id;
            projectName = selectedOrg.name;
            document.getElementById('projectName').textContent = projectName;
            closeProjectSelector();
            // 实际应该重新加载数据
            render(defaultData);
        }
        
        init();
    </script>

<style>

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;

.inland-security-footer {
  position: fixed;
  z-index: 10;
  bottom: 0;
  right: 0;
  width: fit-content;
  display: flex;
  justify-content: flex-end;
}

.tooltip-container {
  position: relative;
}

.trigger-content {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: center;
  padding: 8px;
  background-color: transparent;
  border-radius: 8px;
  cursor: pointer;
}

.minimax-link {
  display: flex;
  align-items: center;
  cursor: pointer;
  font-weight: 300;
  color: #adadad;
  text-decoration: none;
}

.minimax-link:visited {
  color: #adadad;
}

.minimax-link:hover {
  color: #666666;
}

.tooltip-content {
  position: absolute;
  bottom: 100%;
  right: 0;
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  padding: 8px;
  padding-bottom: 16px; /* 8px 内容间距 + 8px 用于鼠标移动的透明区域 */
  font-size: 12px;
  line-height: 17px;
  background-color: #fafafa;
  border-radius: 12px;
  white-space: nowrap;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
  color: #171717;
}

/* 创建透明的连接区域，让鼠标可以平滑移动到 tooltip */
.tooltip-content::after {
  content: '';
  position: absolute;
  bottom: -8px;
  left: 0;
  right: 0;
  height: 16px;
}

.tooltip-container:hover .tooltip-content {
  display: flex;
}

.info-section {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 12px;
}

.beian-link {
  display: flex;
  align-items: center;
  text-decoration: none;
  color: #171717;
}

.beian-icon {
  width: 14px;
  height: 14px;
  margin-right: 2px;
}

.underline-text {
  color: #171717;
  text-decoration: underline;
}

.underline-text:hover {
  color: #000000;
}

/* 深色模式支持 */
@media (prefers-color-scheme: dark) {
  .trigger-content {
    background-color: transparent;
  }

  .minimax-link,
  .minimax-link:visited {
    color: #666666;
  }

  .minimax-link:hover {
    color: #adadad;
  }

  .tooltip-content {
    background-color: #262626;
    color: #ededed;
  }

  .beian-link,
  .underline-text {
    color: #ededed;
  }

  .underline-text:hover {
    color: #ffffff;
  }
}

</style>
