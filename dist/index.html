    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { text-align: center; color: #333; margin-bottom: 30px; }
        
        .card { background: white; border-radius: 8px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .card h2 { font-size: 18px; color: #333; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #eee; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 14px; color: #666; margin-bottom: 5px; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
        .form-group input:focus { outline: none; border-color: #4a90d9; }
        
        .row { display: flex; gap: 15px; }
        .row .form-group { flex: 1; }
        
        .building-item { background: #f9f9f9; border-radius: 6px; padding: 15px; margin-bottom: 15px; border: 1px solid #eee; }
        .building-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .building-title { font-weight: bold; color: #333; }
        .btn-remove { background: #ff4d4f; color: white; border: none; padding: 5px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        
        .unit-item { background: white; border: 1px dashed #ddd; border-radius: 4px; padding: 10px; margin-bottom: 10px; }
        .unit-item input { margin-bottom: 8px; }
        
        .btn { padding: 12px 24px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; transition: all 0.3s; }
        .btn-primary { background: #4a90d9; color: white; }
        .btn-primary:hover { background: #3a7bc8; }
        .btn-success { background: #52c41a; color: white; }
        .btn-success:hover { background: #45a314; }
        .btn-add { background: #1890ff; color: white; width: 100%; margin-bottom: 10px; }
        .btn-add-unit { background: #52c41a; color: white; width: 100%; }
        
        .btn-group { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }
        
        .log { background: #1e1e1e; color: #0f0; padding: 15px; border-radius: 4px; font-family: monospace; font-size: 12px; max-height: 300px; overflow-y: auto; white-space: pre-wrap; display: none; }
        .log.show { display: block; }
        
        .result { margin-top: 15px; padding: 15px; border-radius: 4px; display: none; }
        .result.success { background: #f6ffed; border: 1px solid #b7eb8f; color: #52c41a; }
        .result.error { background: #fff2f0; border: 1px solid #ffccc7; color: #ff4d4f; }
        
        .tips { font-size: 12px; color: #999; margin-top: 5px; }
        
        .config-section { background: #e6f7ff; border: 1px solid #91d5ff; }
        .config-section h2 { border-color: #91d5ff; }
    </style>
</head>

    <script>
        let buildingCount = 0;
        
        // 初始化
        window.onload = function() {
            loadConfig();
            addBuilding(); // 添加第一个楼栋
        };
        
        // 添加楼栋
        function addBuilding() {
            buildingCount++;
            const html = `
                <div class="building-item" id="building_${buildingCount}">
                    <div class="building-header">
                        <span class="building-title">楼栋 #${buildingCount}</span>
                        <button class="btn-remove" onclick="removeBuilding(${buildingCount})">删除</button>
                    </div>
                    <div class="row">
                        <div class="form-group">
                            <label>楼栋名称 *</label>
                            <input type="text" class="building-name" placeholder="如：泰华大厦A栋">
                        </div>
                        <div class="form-group">
                            <label>楼栋编码 *</label>
                            <input type="text" class="building-number" placeholder="如：thdsAdong">
                            <div class="tips">用于关联单元，请用拼音或英文</div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="form-group">
                            <label>地上层数 *</label>
                            <input type="number" class="building-overCount" value="25">
                        </div>
                        <div class="form-group">
                            <label>地下层数</label>
                            <input type="number" class="building-underCount" value="4">
                        </div>
                    </div>
                    
                    <h3 style="font-size:14px;margin:15px 0 10px;color:#666;">单元列表</h3>
                    <div class="units-container" id="units_${buildingCount}"></div>
                    <button class="btn btn-add-unit" onclick="addUnit(${buildingCount})">+ 添加单元</button>
                </div>
            `;
            document.getElementById('buildingsContainer').insertAdjacentHTML('beforeend', html);
            addUnit(buildingCount); // 每个楼栋默认添加一个单元
        }
        
        // 删除楼栋
        function removeBuilding(id) {
            document.getElementById(`building_${id}`).remove();
        }
        
        // 添加单元
        function addUnit(buildingId) {
            const container = document.getElementById(`units_${buildingId}`);
            const unitCount = container.children.length + 1;
            const html = `
                <div class="unit-item">
                    <div class="row">
                        <div class="form-group">
                            <label>单元名称 *</label>
                            <input type="text" class="unit-name" placeholder="如：1单元">
                        </div>
                    </div>
                </div>
            `;
            container.insertAdjacentHTML('beforeend', html);
        }
        
        // 日志
        function log(msg, type = 'info') {
            const logArea = document.getElementById('logArea');
            const time = new Date().toLocaleTimeString();
            const color = type === 'error' ? '#ff4d4f' : type === 'success' ? '#52c41a' : '#0f0';
            logArea.innerHTML += `<span style="color:${color}">[${time}] ${msg}</span>\n`;
            logArea.classList.add('show');
            logArea.scrollTop = logArea.scrollHeight;
        }
        
        // 显示结果
        function showResult(msg, isSuccess) {
            const result = document.getElementById('resultArea');
            result.textContent = msg;
            result.className = 'result ' + (isSuccess ? 'success' : 'error');
            result.style.display = 'block';
        }
        
        // 获取配置
        function getConfig() {
            return {
                appKey: document.getElementById('appKey').value,
                appSecret: document.getElementById('appSecret').value,
                pid: document.getElementById('pid').value,
                username: document.getElementById('username').value
            };
        }
        
        // 保存配置
        function saveConfig() {
            const config = getConfig();
            localStorage.setItem('wojiaConfig', JSON.stringify(config));
            alert('配置已保存！');
        }
        
        // 加载配置
        function loadConfig() {
            const saved = localStorage.getItem('wojiaConfig');
            if (saved) {
                const config = JSON.parse(saved);
                document.getElementById('appKey').value = config.appKey || '';
                document.getElementById('appSecret').value = config.appSecret || '';
                document.getElementById('pid').value = config.pid || '';
                document.getElementById('username').value = config.username || '';
            }
        }
        
        // 计算签名
        function calculateSignature(appKey, appSecret, clientTime) {
            const paramString = `appKey=${appKey}&clientTime=${clientTime}&version=V1.0&${appSecret}`;
            // MD5
            let md5 = '';
            const md5Chars = '0123456789abcdef';
            // 简单模拟，实际需要 crypto
            const hash = md5Simple(paramString);
            // SHA1
            return sha1(hash);
        }
        
        // 简化版 MD5
        function md5Simple(str) {
            // 使用 JavaScript 内置方式
            let result = '';
            for (let i = 0; i < 32; i++) {
                result += '0';
            }
            return result; // 占位，实际需要正确实现
        }
        
        // SHA1
        function sha1(str) {
            // 这里使用 fetch 调用后端 API 来计算签名
            return str;
        }
        
        // 获取 Token (调用后端 API)
        async function getToken(config) {
            const response = await fetch('https://api.wojiacloud.cn/api/users/ticket?' + 
                `appKey=${config.appKey}&clientTime=${Date.now()}&version=V1.0&signature=demo`);
            // 由于签名计算复杂，建议后端处理
            return null;
        }
        
        // 初始化数据 - 调用后端服务
        async function initData() {
            const config = getConfig();
            const projectName = document.getElementById('projectName').value;
            const projectNumber = document.getElementById('projectNumber').value;
            
            if (!projectName || !projectNumber) {
                alert('请填写项目名称和编码');
                return;
            }
            
            // 收集楼栋和单元数据
            const buildings = [];
            document.querySelectorAll('.building-item').forEach((b, i) => {
                const name = b.querySelector('.building-name').value;
                const number = b.querySelector('.building-number').value;
                const overCount = parseInt(b.querySelector('.building-overCount').value) || 25;
                const underCount = parseInt(b.querySelector('.building-underCount').value) || 0;
                
                if (name && number) {
                    const units = [];
                    b.querySelectorAll('.unit-item').forEach(u => {
                        const unitName = u.querySelector('.unit-name').value;
                        if (unitName) units.push({ name: unitName, buildNumber: number });
                    });
                    buildings.push({ name, number, overCount, underCount, units });
                }
            });
            
            if (buildings.length === 0) {
                alert('请至少添加一个楼栋');
                return;
            }
            
            log('开始初始化数据...');
            log(`项目: ${projectName} (${projectNumber})`);
            log(`楼栋数量: ${buildings.length}`);
            
            // 调用后端 API (需要后端服务支持)
            // 这里显示数据，让用户复制使用
            const data = {
                project: { name: projectName, number: projectNumber },
                buildings: buildings
            };
            
            log('=== 生成的数据 ===');
            log(JSON.stringify(data, null, 2));
            
            showResult('数据已生成！由于签名计算需要后端支持，请复制上方数据使用 Python 脚本执行。', true);

<script>

(function () {

  // 检查是否在 iframe 中
  if (window.self === window.top) {
    return; // 不在 iframe 中，不执行

      }, "*");
    } catch (error) {
      console.warn("无法发送消息到父窗口:", error);
    }
  }

  // 监听来自父窗口的消息
  function handleParentMessage(event) {
    console.log("Received message from parent:", event.data);
    if (event.data.type === "iframe-highlight-toggle") {
      var enabled = event.data.enabled;
      console.log("Highlight toggle:", enabled);
      if (enabled) {
        enableHighlight();
      } else {
        disableHighlight();
      }
    } else if (event.data.type === "enable-iframe-highlight") {
      console.log("Enable iframe highlight");
      enableHighlight();
    } else if (event.data.type === "disable-iframe-highlight") {
      console.log("Disable iframe highlight");
      disableHighlight();
    } else if (event.data.type === "toggle-iframe-highlight") {
      var _enabled = event.data.enabled !== undefined ? event.data.enabled : !highlightEnabled;
      console.log("Toggle iframe highlight to:", _enabled);
      if (_enabled) {
        enableHighlight();
      } else {
        disableHighlight();
      }
    } else if (event.data.type === "update-selected-element") {
      var selector = event.data.selector;
      console.log("Update selected element with selector:", selector);
      if (selector) {
        try {
          var element = document.querySelector(selector);
          console.log("Found element by selector:", element);
          updateSelectedHighlight(element);
        } catch (error) {
          console.warn("Failed to select element:", error);
          updateSelectedHighlight(null);
        }
      } else {
        updateSelectedHighlight(null);
      }
    } else if (event.data.type === "clear-selected-element") {
      console.log("Clear selected element");
      updateSelectedHighlight(null);
    }
  }

  // 启用高亮功能
  function enableHighlight() {
    console.log("Enabling highlight");
    document.addEventListener("mouseover", handleMouseOver, true);
    document.addEventListener("mouseout", handleMouseOut, true);
    document.addEventListener("click", handleClick, true);
    highlightEnabled = true;
    overlay.style.display = "block";
  }

  // 禁用高亮功能
  function disableHighlight() {
    console.log("Disabling highlight");
    highlightEnabled = false;
    // 保持事件监听器，但通过 highlightEnabled 变量控制行为
    // 这样可以保留选中状态的显示
    highlightBox.style.display = "none";
    tagLabel.style.display = "none";
    // 不隐藏 selectedBox 和 selectedLabel，保留选中状态
  }

  // 完全禁用高亮功能（移除所有监听器）
  function fullyDisableHighlight() {
    console.log("Fully disabling highlight");
    highlightEnabled = false;
    document.removeEventListener("mouseover", handleMouseOver, true);
    document.removeEventListener("mouseout", handleMouseOut, true);
    document.removeEventListener("click", handleClick, true);
    overlay.style.display = "none";
    highlightBox.style.display = "none";
    tagLabel.style.display = "none";
    selectedBox.style.display = "none";
    selectedLabel.style.display = "none";
  }

  // 添加事件监听
  enableHighlight();
  window.addEventListener("message", handleParentMessage);

  // 暴露全局函数供外部调用
  window.__iframeHighlightControl = {
    enable: enableHighlight,
    disable: disableHighlight,
    fullyDisable: fullyDisableHighlight,
    isEnabled: function isEnabled() {
      return highlightEnabled;
    },
    getSelectedElement: function getSelectedElement() {
      return selectedElement;
    },
    updateSelected: updateSelectedHighlight,
    // 通过消息发送开关控制
    sendToggleMessage: function sendToggleMessage(enabled) {
      window.parent.postMessage({
        type: 'iframe-highlight-status',
        enabled: enabled || highlightEnabled,
        source: 'iframe-highlight-injector'
      }, '*');
    }
  };

  // 通知父窗口脚本已加载
  try {
    window.parent.postMessage({
      type: "iframe-highlight-ready",
      data: {
        url: window.location.href,
        userAgent: navigator.userAgent,
        timestamp: Date.now()
      },
      source: "iframe-highlight-injector"
    }, "*");
  } catch (error) {
    console.warn("无法发送就绪消息到父窗口:", error);
  }

  // 清理函数
  window.__iframeHighlightCleanup = function () {
    fullyDisableHighlight();
    window.removeEventListener("message", handleParentMessage);
    if (overlay.parentElement) {
      overlay.parentElement.removeChild(overlay);
    }
    delete window.__iframeHighlightInitialized;
    delete window.__iframeHighlightCleanup;
  };
})();

</script>
</body>
