<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>私宴包间</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #f5f5f5;
            padding-bottom: 60px;
        }
        
        .header {
            background: white;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid #e8e8e8;
        }
        
        .back-btn {
            font-size: 24px;
            cursor: pointer;
            background: none;
            border: none;
        }
        
        .header h1 {
            font-size: 18px;
            flex: 1;
        }
        
        /* 包间卡片 */
        .venues-list {
            padding: 10px;
        }
        
        .venue-card {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .venue-card:active {
            transform: scale(0.98);
        }
        
        .venue-image {
            width: 100%;
            height: 150px;
            background: linear-gradient(135deg, #1890ff 0%, #52c41a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
        }
        
        .venue-info {
            padding: 15px;
        }
        
        .venue-name {
            font-size: 16px;
            font-weight: 500;
            color: #333;
            margin-bottom: 8px;
        }
        
        .venue-details {
            display: flex;
            gap: 15px;
            margin-bottom: 10px;
            font-size: 13px;
            color: #666;
        }
        
        .venue-tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }
        
        .tag {
            display: inline-block;
            background-color: #f0f0f0;
            color: #666;
            padding: 4px 8px;
            border-radius: 3px;
            font-size: 12px;
        }
        
        .venue-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .venue-price {
            font-size: 16px;
            font-weight: bold;
            color: #1890ff;
        }
        
        .book-btn {
            background-color: #52c41a;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
        }
        
        /* 模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: flex-end;
        }
        
        .modal.show {
            display: flex;
        }
        
        .modal-content {
            background: white;
            width: 100%;
            border-radius: 8px 8px 0 0;
            padding: 20px;
            max-height: 80vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
        }
        
        @keyframes slideUp {
            from {
                transform: translateY(100%);
            }
            to {
                transform: translateY(0);
            }
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            color: #333;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            font-size: 14px;
            font-family: inherit;
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .checkbox-item input[type="checkbox"] {
            width: auto;
        }
        
        .submit-btn {
            width: 100%;
            padding: 12px;
            background-color: #1890ff;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .submit-btn:active {
            background-color: #0050b3;
        }
        
        /* 底部导航 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: white;
            border-top: 1px solid #e8e8e8;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
        }
        
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            cursor: pointer;
            text-decoration: none;
            color: #666;
            font-size: 12px;
            flex: 1;
            height: 100%;
        }
        
        .nav-item.active {
            color: #1890ff;
        }
        
        .nav-icon {
            font-size: 24px;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
            color: #666;
        }
        
        .loading.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-btn" onclick="goBack()">←</button>
        <h1>私宴包间</h1>
    </div>
    
    <div class="loading" id="loading">加载中...</div>
    
    <div class="venues-list" id="venuesList">
        <!-- 包间卡片将动态插入 -->
    </div>
    
    <!-- 预定模态框 -->
    <div class="modal" id="bookModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>预定包间</h2>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            
            <form id="bookForm">
                <div class="form-group">
                    <label>包间名称</label>
                    <input type="text" id="venueName" readonly>
                </div>
                
                <div class="form-group">
                    <label>预定日期</label>
                    <input type="date" id="bookDate" required>
                </div>
                
                <div class="form-group">
                    <label>预定时间</label>
                    <input type="time" id="bookTime" required>
                </div>
                
                <div class="form-group">
                    <label>预计人数</label>
                    <input type="number" id="guestCount" min="1" value="10" required>
                </div>
                
                <div class="form-group">
                    <label>特殊需求</label>
                    <textarea id="specialRequests" placeholder="请输入特殊需求..."></textarea>
                </div>
                
                <div class="form-group">
                    <label>定制服务</label>
                    <div class="checkbox-group">
                        <div class="checkbox-item">
                            <input type="checkbox" name="service" value="menu">
                            <label>菜品定制</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" name="service" value="wine">
                            <label>酒水配置</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" name="service" value="decoration">
                            <label>场景布置</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" name="service" value="photography">
                            <label>摄影服务</label>
                        </div>
                    </div>
                </div>
                
                <button type="button" class="submit-btn" onclick="submitBook()">确认预定</button>
            </form>
        </div>
    </div>
    
    <!-- 底部导航 -->
    <div class="bottom-nav">
        <a class="nav-item" href="index.html">
            <div class="nav-icon">🏠</div>
            <div>首页</div>
        </a>
        <a class="nav-item" href="orders.html">
            <div class="nav-icon">📦</div>
            <div>订单</div>
        </a>
        <a class="nav-item" href="member.html">
            <div class="nav-icon">👑</div>
            <div>会员</div>
        </a>
        <a class="nav-item" href="profile.html">
            <div class="nav-icon">👤</div>
            <div>我的</div>
        </a>
    </div>
    
    <script>
        let currentVenue = null;
        
        // 获取URL参数
        function getUrlParam(name) {
            const url = new URL(window.location.href);
            return url.searchParams.get(name);
        }
        
        // 统一API请求函数
        async function apiRequest(endpoint, method = 'GET', data = null) {
            const accessToken = getUrlParam('access_token') || 'demo_token';
            const isDev = getUrlParam('isdev') || 'true';
            const apiUrl = location.origin;
            
            const url = new URL(apiUrl + endpoint);
            url.searchParams.append('access_token', accessToken);
            url.searchParams.append('isdev', isDev);
            
            try {
                const options = {
                    method: method,
                    headers: {
                        'Content-Type': 'application/json',
                    }
                };
                
                if (data && method !== 'GET') {
                    options.body = JSON.stringify(data);
                }
                
                const response = await fetch(url.toString(), options);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                return await response.json();
            } catch (error) {
                console.error('API Error:', error);
                throw error;
            }
        }
        
        // 返回上一页
        function goBack() {
            const accessToken = getUrlParam('access_token') || 'demo_token';
            const isDev = getUrlParam('isdev') || 'true';
            window.location.href = `index.html?access_token=${accessToken}&isdev=${isDev}`;
        }
        
        // 加载包间列表
        async function loadVenues() {
            try {
                document.getElementById('loading').classList.add('show');
                const response = await apiRequest('/api/business/venues?type=private_banquet');
                
                const list = document.getElementById('venuesList');
                list.innerHTML = '';
                
                if (response.code === 0 && response.data && response.data.length > 0) {
                    response.data.forEach(venue => {
                        const card = createVenueCard(venue);
                        list.appendChild(card);
                    });
                } else {
                    list.innerHTML = '<div style="text-align: center; padding: 40px; color: #999;">暂无包间</div>';
                }
            } catch (error) {
                console.error('Failed to load venues:', error);
            } finally {
                document.getElementById('loading').classList.remove('show');
            }
        }
        
        // 创建包间卡片
        function createVenueCard(venue) {
            const card = document.createElement('div');
            card.className = 'venue-card';
            card.innerHTML = `
                <div class="venue-image">🥂</div>
                <div class="venue-info">
                    <div class="venue-name">${venue.name}</div>
                    <div class="venue-details">
                        <span>👥 ${venue.capacity}人</span>
                        <span>💰 ¥${venue.price}/场</span>
                    </div>
                    <div class="venue-tags">
                        ${venue.facilities ? venue.facilities.map(f => `<span class="tag">${f}</span>`).join('') : ''}
                    </div>
                    <div class="venue-footer">
                        <div class="venue-price">¥${venue.price}</div>
                        <button class="book-btn" onclick="openBookModal(event)">预定</button>
                    </div>
                </div>
            `;
            card.dataset.venue = JSON.stringify(venue);
            return card;
        }
        
        // 打开预定模态框
        function openBookModal(event) {
            event.stopPropagation();
            const card = event.target.closest('.venue-card');
            currentVenue = JSON.parse(card.dataset.venue);
            
            document.getElementById('venueName').value = currentVenue.name;
            document.getElementById('bookDate').value = '';
            document.getElementById('bookTime').value = '';
            document.getElementById('guestCount').value = 10;
            document.getElementById('specialRequests').value = '';
            
            // 清除所有复选框
            document.querySelectorAll('input[name="service"]').forEach(cb => {
                cb.checked = false;
            });
            
            document.getElementById('bookModal').classList.add('show');
        }
        
        // 关闭模态框
        function closeModal() {
            document.getElementById('bookModal').classList.remove('show');
        }
        
        // 提交预定
        async function submitBook() {
            if (!currentVenue) return;
            
            const bookDate = document.getElementById('bookDate').value;
            const bookTime = document.getElementById('bookTime').value;
            const guestCount = parseInt(document.getElementById('guestCount').value);
            const specialRequests = document.getElementById('specialRequests').value;
            
            const services = [];
            document.querySelectorAll('input[name="service"]:checked').forEach(cb => {
                services.push(cb.value);
            });
            
            if (!bookDate || !bookTime) {
                alert('请选择预定日期和时间');
                return;
            }
            
            try {
                const response = await apiRequest('/api/business/venues/book', 'POST', {
                    venue_id: currentVenue.id,
                    book_date: bookDate,
                    book_time: bookTime,
                    guest_count: guestCount,
                    special_requests: specialRequests,
                    services: services
                });
                
                if (response.code === 0) {
                    alert('预定成功！');
                    closeModal();
                } else {
                    alert('预定失败：' + (response.message || '未知错误'));
                }
            } catch (error) {
                alert('预定失败，请稍后重试');
            }
        }
        
        // 页面加载
        window.addEventListener('load', () => {
            loadVenues();
        });
    </script>
</body>
</html>
