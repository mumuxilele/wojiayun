<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #f5f5f5;
            padding-bottom: 60px;
        }
        
        .header {
            background: white;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid #e8e8e8;
        }
        
        .back-btn {
            font-size: 24px;
            cursor: pointer;
            background: none;
            border: none;
        }
        
        .header h1 {
            font-size: 18px;
            flex: 1;
        }
        
        /* 用户信息卡片 */
        .user-card {
            background: white;
            padding: 20px;
            margin: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            display: flex;
            gap: 15px;
            align-items: center;
        }
        
        .user-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1890ff 0%, #52c41a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            flex-shrink: 0;
        }
        
        .user-info {
            flex: 1;
        }
        
        .user-name {
            font-size: 16px;
            font-weight: 500;
            color: #333;
            margin-bottom: 4px;
        }
        
        .user-phone {
            font-size: 12px;
            color: #999;
        }
        
        .edit-btn {
            background-color: #1890ff;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        
        /* 菜单项 */
        .menu-section {
            background: white;
            margin: 10px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        
        .menu-item {
            padding: 15px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        
        .menu-item:last-child {
            border-bottom: none;
        }
        
        .menu-item:active {
            background-color: #f5f5f5;
        }
        
        .menu-label {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            color: #333;
        }
        
        .menu-icon {
            font-size: 20px;
        }
        
        .menu-arrow {
            font-size: 16px;
            color: #999;
        }
        
        .menu-badge {
            background-color: #ff4d4f;
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 500;
        }
        
        /* 底部按钮 */
        .bottom-buttons {
            padding: 15px;
            margin: 10px;
            display: flex;
            gap: 10px;
        }
        
        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background-color: #1890ff;
            color: white;
        }
        
        .btn-primary:active {
            background-color: #0050b3;
        }
        
        .btn-secondary {
            background-color: #f0f0f0;
            color: #333;
            border: 1px solid #d9d9d9;
        }
        
        .btn-secondary:active {
            background-color: #e8e8e8;
        }
        
        .btn-danger {
            background-color: #fff2f0;
            color: #ff4d4f;
            border: 1px solid #ffccc7;
        }
        
        .btn-danger:active {
            background-color: #ffe7e0;
        }
        
        /* 底部导航 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: white;
            border-top: 1px solid #e8e8e8;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
        }
        
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            cursor: pointer;
            text-decoration: none;
            color: #666;
            font-size: 12px;
            flex: 1;
            height: 100%;
        }
        
        .nav-item.active {
            color: #1890ff;
        }
        
        .nav-icon {
            font-size: 24px;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
            color: #666;
        }
        
        .loading.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-btn" onclick="goBack()">←</button>
        <h1>我的</h1>
    </div>
    
    <div class="loading" id="loading">加载中...</div>
    
    <!-- 用户信息卡片 -->
    <div class="user-card">
        <div class="user-avatar">👤</div>
        <div class="user-info">
            <div class="user-name" id="userName">用户名</div>
            <div class="user-phone" id="userPhone">+86 138****8888</div>
        </div>
        <button class="edit-btn" onclick="editProfile()">编辑</button>
    </div>
    
    <!-- 账户管理 -->
    <div class="menu-section">
        <div class="menu-item" onclick="viewAddresses()">
            <div class="menu-label">
                <span class="menu-icon">📍</span>
                <span>收货地址</span>
            </div>
            <span class="menu-arrow">›</span>
        </div>
        <div class="menu-item" onclick="viewPaymentMethods()">
            <div class="menu-label">
                <span class="menu-icon">💳</span>
                <span>支付方式</span>
            </div>
            <span class="menu-arrow">›</span>
        </div>
        <div class="menu-item" onclick="viewNotifications()">
            <div class="menu-label">
                <span class="menu-icon">🔔</span>
                <span>消息通知</span>
            </div>
            <span class="menu-badge" id="notificationBadge" style="display: none;">3</span>
            <span class="menu-arrow">›</span>
        </div>
    </div>
    
    <!-- 服务与帮助 -->
    <div class="menu-section">
        <div class="menu-item" onclick="contactService()">
            <div class="menu-label">
                <span class="menu-icon">💬</span>
                <span>联系客服</span>
            </div>
            <span class="menu-arrow">›</span>
        </div>
        <div class="menu-item" onclick="viewFAQ()">
            <div class="menu-label">
                <span class="menu-icon">❓</span>
                <span>常见问题</span>
            </div>
            <span class="menu-arrow">›</span>
        </div>
        <div class="menu-item" onclick="viewAbout()">
            <div class="menu-label">
                <span class="menu-icon">ℹ️</span>
                <span>关于我们</span>
            </div>
            <span class="menu-arrow">›</span>
        </div>
    </div>
    
    <!-- 设置 -->
    <div class="menu-section">
        <div class="menu-item" onclick="viewSettings()">
            <div class="menu-label">
                <span class="menu-icon">⚙️</span>
                <span>设置</span>
            </div>
            <span class="menu-arrow">›</span>
        </div>
        <div class="menu-item" onclick="viewPrivacy()">
            <div class="menu-label">
                <span class="menu-icon">🔒</span>
                <span>隐私政策</span>
            </div>
            <span class="menu-arrow">›</span>
        </div>
    </div>
    
    <!-- 底部按钮 -->
    <div class="bottom-buttons">
        <button class="btn btn-secondary" onclick="changePassword()">修改密码</button>
        <button class="btn btn-danger" onclick="logout()">退出登录</button>
    </div>
    
    <!-- 底部导航 -->
    <div class="bottom-nav">
        <a class="nav-item" href="index.html">
            <div class="nav-icon">🏠</div>
            <div>首页</div>
        </a>
        <a class="nav-item" href="orders.html">
            <div class="nav-icon">📦</div>
            <div>订单</div>
        </a>
        <a class="nav-item" href="member.html">
            <div class="nav-icon">👑</div>
            <div>会员</div>
        </a>
        <a class="nav-item active" href="profile.html">
            <div class="nav-icon">👤</div>
            <div>我的</div>
        </a>
    </div>
    
    <script>
        // 获取URL参数
        function getUrlParam(name) {
            const url = new URL(window.location.href);
            return url.searchParams.get(name);
        }
        
        // 统一API请求函数
        async function apiRequest(endpoint, method = 'GET', data = null) {
            const accessToken = getUrlParam('access_token') || 'demo_token';
            const isDev = getUrlParam('isdev') || 'true';
            const apiUrl = location.origin;
            
            const url = new URL(apiUrl + endpoint);
            url.searchParams.append('access_token', accessToken);
            url.searchParams.append('isdev', isDev);
            
            try {
                const options = {
                    method: method,
                    headers: {
                        'Content-Type': 'application/json',
                    }
                };
                
                if (data && method !== 'GET') {
                    options.body = JSON.stringify(data);
                }
                
                const response = await fetch(url.toString(), options);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                return await response.json();
            } catch (error) {
                console.error('API Error:', error);
                throw error;
            }
        }
        
        // 返回上一页
        function goBack() {
            const accessToken = getUrlParam('access_token') || 'demo_token';
            const isDev = getUrlParam('isdev') || 'true';
            window.location.href = `index.html?access_token=${accessToken}&isdev=${isDev}`;
        }
        
        // 加载用户信息
        async function loadUserInfo() {
            try {
                document.getElementById('loading').classList.add('show');
                const response = await apiRequest('/api/business/member');
                
                if (response.code === 0 && response.data) {
                    const user = response.data;
                    document.getElementById('userName').textContent = user.name || '用户';
                    document.getElementById('userPhone').textContent = user.phone || '+86 138****8888';
                }
            } catch (error) {
                console.error('Failed to load user info:', error);
            } finally {
                document.getElementById('loading').classList.remove('show');
            }
        }
        
        // 菜单项操作
        function editProfile() {
            alert('跳转到编辑资料页面');
        }
        
        function viewAddresses() {
            alert('跳转到收货地址管理页面');
        }
        
        function viewPaymentMethods() {
            alert('跳转到支付方式管理页面');
        }
        
        function viewNotifications() {
            alert('跳转到消息通知页面');
        }
        
        function contactService() {
            alert('已连接客服，请稍候...');
        }
        
        function viewFAQ() {
            alert('跳转到常见问题页面');
        }
        
        function viewAbout() {
            alert('关于我们：社区商业管理平台 v1.0');
        }
        
        function viewSettings() {
            alert('跳转到设置页面');
        }
        
        function viewPrivacy() {
            alert('跳转到隐私政策页面');
        }
        
        function changePassword() {
            alert('跳转到修改密码页面');
        }
        
        function logout() {
            if (confirm('确定要退出登录吗？')) {
                alert('已退出登录');
                window.location.href = 'index.html';
            }
        }
        
        // 页面加载
        window.addEventListener('load', () => {
            loadUserInfo();
        });
    </script>
</body>
</html>
