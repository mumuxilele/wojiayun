# 我家云服务 Nginx 配置
# 用于替代22316端口的统一前端服务 和 22307端口的用户服务代理

# 用户服务代理 - 端口 22307（替代 node-service）
server {
    listen 22307;
    server_name _;
    
    # CORS
    add_header Access-Control-Allow-Origin *;
    add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS';
    add_header Access-Control-Allow-Headers 'Content-Type, Token';
    
    # 预检请求
    if ($request_method = 'OPTIONS') {
        return 200;
    }
    
    # 根路径
    location = / {
        default_type application/json;
        return 200 '{"msg":"User Info Service","version":"4.0","description":"Nginx代理到第三方服务"}';
    }
    
    # 用户信息 - 代理到我家云
    location /getUserInfo {
        set $target_host $arg_isdev;
        
        # 根据isdev参数选择环境
        if ($arg_isdev = '1') {
            rewrite ^(.*)$ /dev$1 last;
        }
        
        proxy_pass https://gj.wojiacloud.com/h5/users/getUserInfo;
        proxy_set_header Host gj.wojiacloud.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_server_name on;
    }
    
    # 开发环境用户信息
    location /dev/getUserInfo {
        rewrite ^/dev(.*)$ $1 break;
        proxy_pass https://gj.wojiacloud.cn/h5/users/getUserInfo;
        proxy_set_header Host gj.wojiacloud.cn;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_server_name on;
    }
    
    # 客户列表 - 代理到我家云
    location /rentCus/list {
        proxy_pass https://gj.wojiacloud.com/api/rentCus/list;
        proxy_set_header Host gj.wojiacloud.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_server_name on;
    }
    
    # API路径的客户列表
    location /api/rentCus/list {
        proxy_pass https://gj.wojiacloud.com/api/rentCus/list;
        proxy_set_header Host gj.wojiacloud.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_server_name on;
    }
    
    # 设备巡检统计 - 代理到我家云
    location /equipmentProjectReport/ {
        proxy_pass https://gj.wojiacloud.com/h5/equipmentProjectReport/;
        proxy_set_header Host gj.wojiacloud.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_server_name on;
    }
    
    # 组织单元 - 代理到我家云
    location /orgUnits/getAllOrgUnitForAuth {
        proxy_pass https://gj.wojiacloud.com/h5/orgUnits/getAllOrgUnitForAuth;
        proxy_set_header Host gj.wojiacloud.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_server_name on;
    }
    
    # API路径的组织单元
    location /api/orgUnits/getAllOrgUnitForAuth {
        proxy_pass https://gj.wojiacloud.com/h5/orgUnits/getAllOrgUnitForAuth;
        proxy_set_header Host gj.wojiacloud.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_server_name on;
    }
    
    # 健康检查
    location /health {
        default_type application/json;
        return 200 '{"status":"ok","timestamp":"$time_iso8601"}';
    }
}

# 静态文件服务 - 端口 22316（替代 unified_server）
server {
    listen 22316;
    server_name _;
    
    # Visit 静态文件
    location /visit/ {
        alias /www/wwwroot/wojiayun/frontend/visit/;
        index index.html;
        try_files $uri $uri/ /visit/index.html;
    }
    
    # Equipment 静态文件
    location /equipment/ {
        alias /www/wwwroot/wojiayun/frontend/equipment/;
        index report.html;
        try_files $uri $uri/ /equipment/report.html;
    }
    
    # Chat 静态文件
    location /chat/ {
        alias /www/wwwroot/wojiayun/chat/;
        index user.html;
        try_files $uri $uri/ /chat/user.html;
    }
    
    # WebSocket 代理到 22309 聊天服务
    location /ws {
        proxy_pass http://127.0.0.1:22309;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }
    
    # API 代理 - 用户信息
    location /api/userinfo {
        proxy_pass http://127.0.0.1:22307/getUserInfo;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    # API 代理 - 消息列表
    location /api/messages {
        proxy_pass http://127.0.0.1:22309;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    # API 代理 - 走访相关（已合并到22313）
    location /visit/api/ {
        rewrite ^/visit/api/(.*)$ /api/admin/$1 break;
        proxy_pass http://127.0.0.1:22313;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Token $http_token;
    }
    
    # 默认路由
    location / {
        return 404;
    }
}
