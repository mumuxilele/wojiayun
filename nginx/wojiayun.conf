# 我家云服务 Nginx 配置
# 用于替代22316端口的统一前端服务

# 走访台账静态文件
server {
    listen 22316;
    server_name _;
    
    # Visit 静态文件
    location /visit/ {
        alias /www/wwwroot/wojiayun/frontend/visit/;
        index index.html;
        try_files $uri $uri/ /visit/index.html;
    }
    
    # Equipment 静态文件
    location /equipment/ {
        alias /www/wwwroot/wojiayun/frontend/equipment/;
        index report.html;
        try_files $uri $uri/ /equipment/report.html;
    }
    
    # Chat 静态文件
    location /chat/ {
        alias /www/wwwroot/wojiayun/chat/;
        index user.html;
        try_files $uri $uri/ /chat/user.html;
    }
    
    # WebSocket 代理到 22309 聊天服务
    location /ws {
        proxy_pass http://127.0.0.1:22309;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }
    
    # API 代理 - 用户信息
    location /api/userinfo {
        proxy_pass http://127.0.0.1:22307/getUserInfo;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    # API 代理 - 消息列表
    location /api/messages {
        proxy_pass http://127.0.0.1:22309;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    # API 代理 - 走访相关（已合并到22313）
    location /visit/api/ {
        rewrite ^/visit/api/(.*)$ /api/admin/$1 break;
        proxy_pass http://127.0.0.1:22313;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Token $http_token;
    }
    
    # 默认路由
    location / {
        return 404;
    }
}
